<!-- Variante 2: Badge circular comunidad con 3 figuritas humanas (la más amigable) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6F5EE"/>
      <stop offset="100%" stop-color="#C8E8D9"/>
    </linearGradient>
    <linearGradient id="m2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
  </defs>

  <!-- Fondo circular suave verde -->
  <circle cx="256" cy="256" r="256" fill="url(#bg2)"/>

  <!-- Montaña principal (centrada arriba) -->
  <path d="M 156 320 L 256 130 L 356 320 Z" fill="url(#m2)"/>
  <circle cx="256" cy="130" r="12" fill="#E9C46A"/>

  <!-- 3 figuritas humanas abajo (la "comunidad") -->
  <!-- Figura izquierda -->
  <circle cx="170" cy="370" r="22" fill="#52B788"/>
  <path d="M 140 430 Q 140 400 170 400 Q 200 400 200 430 L 200 440 L 140 440 Z" fill="#52B788"/>

  <!-- Figura central (más alta, vos como host) -->
  <circle cx="256" cy="362" r="26" fill="#2D6A4F"/>
  <path d="M 220 430 Q 220 396 256 396 Q 292 396 292 430 L 292 442 L 220 442 Z" fill="#2D6A4F"/>

  <!-- Figura derecha -->
  <circle cx="342" cy="370" r="22" fill="#74D29F"/>
  <path d="M 312 430 Q 312 400 342 400 Q 372 400 372 430 L 372 440 L 312 440 Z" fill="#74D29F"/>
</svg>
