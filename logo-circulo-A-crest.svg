<!-- Variante A: Crest premium con texto wrapping (estilo Soho House / club privado) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="800" height="800">
  <defs>
    <path id="textCircleTop" d="M 200 200 m -160 0 a 160 160 0 1 1 320 0" />
    <path id="textCircleBottom" d="M 200 200 m -160 0 a 160 160 0 1 0 320 0" />
  </defs>

  <!-- Borde circular dorado fino -->
  <circle cx="200" cy="200" r="178" fill="#FAFDF9" stroke="#E9C46A" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="#E9C46A" stroke-width="0.8" opacity="0.6"/>

  <!-- Texto curvo arriba (PATHWAY · CÍRCULO PRIVADO) -->
  <text font-family="'Fraunces', Georgia, serif" font-size="18" font-weight="500" fill="#1B4332" letter-spacing="6">
    <textPath href="#textCircleTop" startOffset="50%" text-anchor="middle">
      EL · CÍRCULO · PATHWAY
    </textPath>
  </text>

  <!-- Texto curvo abajo (COACHES DE CARRERA · 2026) -->
  <text font-family="'Fraunces', Georgia, serif" font-size="14" font-weight="400" fill="#5A5A55" letter-spacing="4">
    <textPath href="#textCircleBottom" startOffset="50%" text-anchor="middle">
      ✦ COACHES DE CARRERA · MMXXVI ✦
    </textPath>
  </text>

  <!-- Logo Pathway original centrado y ampliado -->
  <g transform="translate(150, 130) scale(1.0)">
    <polygon points="10,82 32,52 54,82" fill="#52B788"/>
    <polygon points="34,82 58,28 82,82" fill="#2D6A4F"/>
    <circle cx="58" cy="22" r="5" fill="#E9C46A"/>
  </g>

  <!-- Líneas decorativas finas a los lados -->
  <line x1="60" y1="200" x2="100" y2="200" stroke="#E9C46A" stroke-width="1" opacity="0.5"/>
  <line x1="300" y1="200" x2="340" y2="200" stroke="#E9C46A" stroke-width="1" opacity="0.5"/>
</svg>
