<!-- Icono: triángulo Pathway con 2 manos en abrazo (forma de corazón) adentro -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <!-- Triángulo principal -->
  <polygon points="10,86 50,14 90,86" fill="#2D6A4F"/>
  <!-- Punta dorada -->
  <circle cx="50" cy="14" r="4" fill="#E9C46A"/>

  <!-- Dos brazos formando abrazo/corazón en el centro del triángulo -->
  <!-- Mano/brazo izquierdo (curva) -->
  <path d="M 35 55
           Q 28 55 28 63
           Q 28 70 35 73
           Q 42 75 50 78"
        fill="none"
        stroke="#FAFDF9"
        stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- Mano/brazo derecho (curva espejo) -->
  <path d="M 65 55
           Q 72 55 72 63
           Q 72 70 65 73
           Q 58 75 50 78"
        fill="none"
        stroke="#FAFDF9"
        stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- Pequeño círculo dorado en el cruce (corazón) -->
  <circle cx="50" cy="78" r="3" fill="#E9C46A"/>
</svg>
