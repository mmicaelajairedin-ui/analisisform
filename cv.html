<!DOCTYPE html>
<html lang="es">
<head>

<title>CV</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#F4F4F4;font-family:'DM Sans',sans-serif;}

/* ══════════════════════════════════════════
   LAYOUT — sidebar izq estilo marca
══════════════════════════════════════════ */
.shell{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR EDITOR ── */
.sidebar{
  width:240px;flex-shrink:0;
  background:#ffffff;color:#2D292A;
  display:flex;flex-direction:column;
  overflow-y:auto;
  box-shadow:2px 0 8px rgba(0,0,0,.06);
  z-index:10;
}
.sb-logo{
  padding:22px 20px 16px;
  border-bottom:1px solid #EDE8E8;
}
.sb-logo-title{
  font-family:'DM Serif Display',serif;
  font-size:15px;color:#2D292A;letter-spacing:.01em;
  margin-bottom:2px;
}
.sb-logo-sub{font-size:10px;color:#888;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.sb-cand{
  padding:14px 20px;
  border-bottom:1px solid #EDE8E8;
  display:flex;align-items:center;gap:10px;
}
.sb-av{
  width:36px;height:36px;border-radius:50%;overflow:hidden;
  border:2px solid #D4BFBF;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:#8C7B80;
  background:#F5EFEF;cursor:pointer;
}
.sb-av img{width:100%;height:100%;object-fit:cover;}
.sb-cand-info{min-width:0;}
.sb-cand-name{font-size:12px;font-weight:600;color:#2D292A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-cand-role{font-size:10px;color:#888;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Secciones sidebar */
.sb-sec{padding:14px 20px;border-bottom:1px solid #F0EDED;}
.sb-sec-lbl{
  font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:#8C7B80;margin-bottom:10px;
}

/* Paleta de colores */
.palette{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.pal-sw{
  width:100%;aspect-ratio:1;border-radius:6px;
  cursor:pointer;border:2px solid transparent;
  transition:all .18s;position:relative;
}
.pal-sw.on{border-color:#fff;transform:scale(1.1);}
.pal-sw.on::after{
  content:'✓';position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.4);
}

/* Font selector */
.font-btn{
  width:100%;padding:8px 10px;
  background:#FAF7F7;border:1px solid #EDE8E8;
  border-radius:7px;color:#4A3F3F;font-size:11px;font-weight:500;
  cursor:pointer;text-align:left;margin-bottom:5px;transition:all .15s;
  font-family:'Montserrat',sans-serif;
}
.font-btn:hover{background:#F5EFEF;}
.font-btn.on{background:#8C7B80;border-color:#8C7B80;color:#fff;font-weight:700;}

/* Foto upload */
.foto-upload{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  background:#FAF7F7;border:1.5px dashed #D4BFBF;
  border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;
}
.foto-upload:hover{background:#F5EFEF;border-color:#8C7B80;}
.foto-prev{
  width:64px;height:64px;border-radius:50%;overflow:hidden;
  border:2px solid #D4BFBF;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#C4A4A4;background:rgba(255,255,255,.06);
}
.foto-prev img{width:100%;height:100%;object-fit:cover;}
.foto-hint{font-size:10px;color:#888;text-align:center;}

/* Botones acción */
.sb-actions{padding:14px 20px;margin-top:auto;border-top:1px solid #EDE8E8;}
.sb-btn{
  width:100%;padding:10px;border-radius:8px;border:none;
  font-size:12px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;margin-bottom:7px;
}
.btn-edit{background:#F5EFEF;color:#8C7B80;border:1.5px solid #EDE8E8;}
.btn-edit:hover{background:#EDE8E8;}
.btn-edit.on{background:#8C7B80;color:#fff;}
.btn-save{background:#8C7B80;color:#fff;}
.btn-save:hover{background:#7A6060;}
.btn-pdf{background:#F5EFEF;color:#584E4A;border:1px solid #EDE8E8;}
.btn-pdf:hover{background:#EDE8E8;}
.btn-back{background:none;border:none;color:#aaa;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;text-align:center;padding:4px;display:flex;align-items:center;justify-content:center;gap:4px;}
.btn-back:hover{color:#584E4A;}
.save-st{font-size:10px;color:#5A8C6E;text-align:center;min-height:14px;margin-top:4px;}

/* ── WORKSPACE ── */
.ws{flex:1;overflow-y:auto;padding:36px 40px;background:#F4F4F4;display:flex;justify-content:center;}
.cv-wrap{width:210mm;display:flex;flex-direction:column;gap:12px;}

/* ══════════════════════════════════════════
   CV PAPER
══════════════════════════════════════════ */
.cv-page{
  width:210mm;background:#fff;
  box-shadow:0 4px 24px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
}
.cv-body-grid{display:grid;grid-template-columns:68mm 1fr;min-height:297mm;}

/* ── COLUMNA IZQUIERDA ── */
.cv-left{
  padding:0;display:flex;flex-direction:column;
  border-right:1px solid #F0EDED;
}
/* Cabecera izquierda — foto + nombre */
.cv-left-head{
  padding:32px 20px 24px;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.12);
}
.cv-foto-wrap{
  width:90px;height:90px;border-radius:50%;overflow:hidden;
  border:3px solid rgba(255,255,255,.3);margin-bottom:14px;
  cursor:pointer;flex-shrink:0;position:relative;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.cv-foto-wrap img{width:100%;height:100%;object-fit:cover;object-position:top;}
.cv-foto-ini{
  width:90px;height:90px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:600;color:rgba(255,255,255,.7);
  letter-spacing:1px;
}
.cv-foto-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.4);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;font-size:10px;color:#fff;font-weight:600;
}
.cv-foto-wrap:hover .cv-foto-overlay{opacity:1;}
.cv-nombre-izq{
  font-family:'DM Serif Display',serif;
  font-size:14px;color:#fff;line-height:1.25;margin-bottom:4px;
  letter-spacing:.01em;
}
.cv-rol-izq{font-size:9.5px;color:rgba(255,255,255,.65);font-weight:500;line-height:1.4;letter-spacing:.02em;}

/* Secciones izquierda */
.cv-left-body{padding:18px 18px 22px;flex:1;}
.sl{margin-bottom:16px;}
.sl-h{
  font-family:'DM Sans',sans-serif;
  font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  padding-bottom:5px;margin-bottom:9px;
  border-bottom-width:1px;border-bottom-style:solid;
}
.sl-item{font-size:10px;line-height:1.55;margin-bottom:4px;font-weight:400;}
.sl-item strong{font-weight:600;}
/* Contacto */
.ct-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;font-size:10px;}
.ct-icon{flex-shrink:0;margin-top:1px;opacity:.6;}
.ct-val{line-height:1.4;word-break:break-all;}
.ct-val a{text-decoration:none;color:inherit;}
/* Competencias */
.comp-item{
  font-size:9.5px;font-weight:500;padding:4px 9px;
  border-radius:4px;margin:2px 2px 2px 0;display:inline-block;
  line-height:1.3;
}
/* Idiomas */
.lang-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.lang-n{font-size:10px;font-weight:500;}
.lang-lv{font-size:8px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.04em;color:#fff;}
/* Herramientas */
.tool{font-size:10px;margin-bottom:4px;display:flex;align-items:flex-start;gap:6px;line-height:1.5;}
.tool-dot{width:3px;height:3px;border-radius:50%;flex-shrink:0;margin-top:5px;}
/* Cursos */
.curso{font-size:10px;margin-bottom:7px;line-height:1.45;}
.curso-n{font-weight:600;}
/* Otros */
.otro{font-size:10px;margin-bottom:4px;display:flex;gap:5px;align-items:flex-start;line-height:1.4;}
.otro-ok{font-weight:700;flex-shrink:0;}

/* ── COLUMNA DERECHA ── */
.cv-right{padding:28px 26px 28px;}
.sec{margin-bottom:18px;}
.sec-h{
  font-family:'DM Serif Display',serif;
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  font-style:normal;
  padding-bottom:6px;margin-bottom:12px;
  border-bottom-width:1.5px;border-bottom-style:solid;
}
/* Experiencia */
.exp{margin-bottom:14px;padding-left:12px;border-left-width:2px;border-left-style:solid;}
.exp-t{
  font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:700;color:#111;margin-bottom:2px;line-height:1.3;
}
.exp-s{font-size:10px;font-weight:500;margin-bottom:6px;line-height:1.4;color:#555;}
.exp-b{
  font-size:10.5px;color:#2D2D2D;line-height:1.7;
  margin-bottom:3px;display:flex;gap:7px;align-items:flex-start;
  position:relative;
}
.exp-b-dot{flex-shrink:0;width:5px;height:5px;border-radius:50%;margin-top:5px;}
.exp-b-txt{flex:1;}
.exp-b strong{font-weight:600;color:#111;}
.exp-b-del{
  display:none;background:none;border:none;cursor:pointer;
  color:#C0756E;font-size:14px;font-weight:700;line-height:1;
  flex-shrink:0;padding:0 2px;opacity:.7;
}
.exp-b-del:hover{opacity:1;}
.editing-mode .exp-b-del{display:block;}
/* Educación */
.edu{margin-bottom:9px;display:flex;gap:10px;align-items:flex-start;}
.edu-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.edu-t{font-size:11px;font-weight:600;color:#111;}
.edu-s{font-size:10px;font-weight:400;margin-top:2px;}

/* ── EDICIÓN ── */
[contenteditable="true"]{outline:none;transition:background .1s;}
.editing [contenteditable="true"]:hover{background:rgba(201,169,110,.08);border-radius:2px;cursor:text;}
.editing [contenteditable="true"]:focus{background:rgba(201,169,110,.12);border-radius:2px;}

/* ── PRINT ── */
@media print{
  body{margin:0;padding:0;background:#fff;}
  .shell{display:block;}
  .sidebar{display:none!important;}
  .ws{padding:0!important;background:#fff!important;display:block;overflow:visible!important;}
  .cv-wrap{overflow:visible!important;}
  .cv-page{box-shadow:none!important;width:100%!important;page-break-inside:auto;}
  .cv-body-grid{min-height:auto!important;}
  .cv-right{overflow:visible!important;}
  .cv-left{overflow:visible!important;}
  .exp,.edu{page-break-inside:avoid;}
  /* Forzar colores de fondo en PDF */
  .cv-page, .cv-page *{
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
    color-adjust:exact!important;
  }
  @page{margin:8mm 0;size:A4;}
}
@media(max-width:900px){
  .sidebar{width:200px;}
  .ws{padding:20px 8px;}
  .cv-wrap,.cv-page{width:100%;}
}
@media(max-width:600px){
  .sidebar{display:none;}
  .ws{padding:8px 4px;}
  .cv-page{width:100%;min-width:0;}
  .cv-body-grid{grid-template-columns:1fr!important;min-height:auto!important;}
  .cv-left{border-right:none;border-bottom:1px solid #eee;}
  .cv-left-head{padding:16px!important;}
  .cv-right{padding:16px!important;}
  .cv-foto-wrap{width:60px!important;height:60px!important;}
  .cv-nombre-izq{font-size:18px!important;}
}
</style>
</head>

<script>
/* ── GOOGLE FONTS DINÁMICAS ── */

  document.head.appendChild(l);

var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';

var _email=null,_d=null,_photo=null,_editing=false,_expressMode=false;

];

function goBack(){
  // En express mode el usuario viene de cv-express.html (Pack Express).
  // Si abrió en pestaña nueva, intenta cerrar; si no se puede (ej.
  // navegó directamente), redirige a cv-express?paid=1 para volver al
  // hub de docs. NO redirigir a cliente.html (no tienen portal).
  if(_expressMode){
    try{window.close();}catch(e){}
    // Si window.close no cerró (típico si la pestaña no fue abierta
    // por script), navegamos al hub de Express.
    setTimeout(function(){
      window.location.href=BASE+'/cv-express.html?paid=1';
    },120);
    return;
  }
  window.location.href=BASE+'/cliente.html';
}

/* ── INIT ── */
(function(){
  var p=new URLSearchParams(window.location.search);

  // Modo Express (Pack Express €40 self-service): cv-express.html guardó
  // el output de la IA en sessionStorage y abrió cv.html?express=1. No
  // hay candidato en Supabase ni email logueado — todo viene de
  // sessionStorage y al guardar también escribimos ahí (no Supabase).
  if(p.get('express')==='1'){
    _expressMode=true;
    cargarExpress();
    buildPalette();
    document.getElementById('file-foto').onchange=onFoto;
    document.addEventListener('keydown',function(e){if(e.key==='Escape'&&_editing)toggleEdit();});
    return;
  }

  _email=p.get('email');
  if(!_email){var u=localStorage.getItem('mj_user');if(u){try{_email=JSON.parse(u).email;}catch(e){}}}
  buildPalette();
  document.getElementById('file-foto').onchange=onFoto;
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&_editing)toggleEdit();});
  if(_email)cargar();
  else showMsg('✨','Sin sesión','Accedé desde tu portal');
})();

// Normaliza la respuesta del Edge Function para que coincida con el formato
// que render() espera. La IA a veces devuelve campos con nombres distintos
// (rol/logros vs titulo/bullets) o cursos como strings con formato roto.
function normalizeExpressCv(d){
  if(!d||typeof d!=='object')return d;
  if(Array.isArray(d.experiencia)){
    d.experiencia=d.experiencia.map(function(e){
      if(!e||typeof e!=='object')return e;
      if(!e.titulo&&e.rol)e.titulo=e.rol;
      if((!Array.isArray(e.bullets)||!e.bullets.length)&&Array.isArray(e.logros))e.bullets=e.logros;
      return e;
    });
  }
  if(Array.isArray(d.cursos)){
    d.cursos=d.cursos.map(function(c){
      if(typeof c==='string'){
        var s=c.trim();
        // Fix JSON roto tipo ["titulo":"X","institucion":"Y","fecha":"-"]
        if(s.charAt(0)==='['&&s.charAt(s.length-1)===']'&&s.indexOf('":')>0){
          try{c=JSON.parse('{'+s.slice(1,-1)+'}');}catch(e){return s;}
        } else if(s.charAt(0)==='{'){
          try{c=JSON.parse(s);}catch(e){return s;}
        } else {
          return s;
        }
      }
      if(c&&typeof c==='object'){
        var nom=c.nombre||c.titulo||'';
        var inst=c.institucion||'';
        var fec=c.fecha||'';
        var fecOk=fec&&fec!=='-'&&fec!=='—'&&fec!=='---';
        if(inst&&fecOk)return nom+' · '+inst+' ('+fec+')';
        if(inst)return nom+' · '+inst;
        if(fecOk)return nom+' ('+fec+')';
        return nom||'';
      }
      return c;
    }).filter(Boolean);
  }
  return d;
}

// Carga datos del Pack Express desde sessionStorage (sin Supabase).
// Acepta:
//   mj_express_cv     — JSON estructurado del cv (formato _d que render() espera)
//   mj_express_foto   — base64 dataURL de la foto subida en el form
//   mj_express_email  — email del comprador (para descarga/contexto)
function cargarExpress(){
  try{
    var rawCv=localStorage.getItem('mj_express_cv');
    var emExp=localStorage.getItem('mj_express_email')||'';
    // Si no hay localStorage pero sí email, cargar de Supabase
    // (cliente entró desde otro dispositivo o limpió cache).
    if(!rawCv && emExp){
      showMsg('⏳','Recuperando tu CV...','Buscando en la nube');
      fetch(SB+'/rest/v1/cv_express?email=eq.'+encodeURIComponent(emExp.toLowerCase().trim())+'&select=*&limit=1',{
        headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
      }).then(function(r){return r.ok?r.json():null;})
        .then(function(rows){
          var row=rows&&rows[0];
          if(!row||!row.cv_optimizado){
            showMsg('⚠️','Sin datos','No encontramos tu CV. Volvé a cv-express.html y completá el formulario.');
            return;
          }
          _d=normalizeExpressCv(row.cv_optimizado);
          if(row.foto){_photo=row.foto;setFotoUI(_photo);localStorage.setItem('mj_express_foto',row.foto);}
          localStorage.setItem('mj_express_cv', JSON.stringify(_d));
          _email=emExp;
          var sbName=document.getElementById('sb-name');
          var sbRole=document.getElementById('sb-role');
          if(sbName)sbName.textContent=(_d&&_d.nombre)||'';
          if(sbRole)sbRole.textContent=(_d&&_d.rol_objetivo)||'';
          render();
        }).catch(function(e){
          console.error('[cv.html express] cargar supabase',e);
          showMsg('⚠️','Error','No pudimos recuperar tu CV. Volvé a generar.');
        });
      return;
    }
    if(!rawCv){showMsg('⚠️','Sin datos','Volvé a cv-express.html y completá el formulario.');return;}
    _d=normalizeExpressCv(JSON.parse(rawCv));
    // Validación: si _d no tiene .nombre, la estructura no es la que cv.html
    // espera. Probablemente el Edge Function no fue re-deployado y devolvió
    // markdown en lugar de JSON estructurado.
    if(!_d||typeof _d!=='object'||!_d.nombre){
      console.error('[cv.html express] _d inválido:', _d);
      showMsg('⚠️','Estructura inválida','La Edge Function devolvió un formato incorrecto. Pedile al admin que re-deploye `generar-informe` y volvé a generar el CV.');
      return;
    }
    var foto=localStorage.getItem('mj_express_foto');
    if(foto){_photo=foto;setFotoUI(_photo);}
    _email=localStorage.getItem('mj_express_email')||'';
    var sbName=document.getElementById('sb-name');
    var sbRole=document.getElementById('sb-role');
    if(sbName)sbName.textContent=(_d&&_d.nombre)||'';
    if(sbRole)sbRole.textContent=(_d&&_d.rol_objetivo)||'';
    render();
  }catch(e){
    console.error('[cv.html express] error',e);
    showMsg('⚠️','Error','No se pudo cargar el CV. Volvé a generar desde cv-express.');
  }
}

function buildPalette(){
  var w=document.getElementById('palette');w.innerHTML='';
  PALETA.forEach(function(p){
    var b=document.createElement('button');
    b.className='pal-sw'+(p.hex===_color?' on':'');
    b.style.background=p.hex;b.title=p.name;
    b.onclick=function(){
      _color=p.hex;
      document.querySelectorAll('.pal-sw').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');
      applyTheme();
    };
    w.appendChild(b);
  });
}

function setFont(title,body){
  _fontTitle=title;_fontBody=body;
  loadGFont(title);if(body!==title)loadGFont(body);
  document.querySelectorAll('.f-btn-id').forEach(function(b){b.classList.remove('on');});
  ['f1','f2','f3','f4'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.classList.remove('on');
  });
  // Mark active
  var map={'DM Serif Display':'f1','Cormorant Garamond':'f2','Playfair Display':'f3','Montserrat':'f4'};
  var el=document.getElementById(map[title]);if(el)el.classList.add('on');
  applyFont();
}

/* ── FOTO ── */
function onFoto(e){
  var f=e.target.files[0];if(!f)return;
  var fr=new FileReader();
  fr.onload=function(ev){
    _photo=ev.target.result;
    setFotoUI(_photo);
    updateFotosEnCV();
    // Guardar foto inmediatamente en Supabase + localStorage
    if(_email){
      var ek=_email.toLowerCase().trim();
      try{localStorage.setItem('mj_foto_'+ek,_photo);}catch(e){}
      fetch(SB+'/rest/v1/candidatos?email=eq.'+enc(ek),{
        method:'PATCH',
        headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},
        body:JSON.stringify({foto_perfil:_photo})
      }).catch(function(){});
    }
  };
  fr.readAsDataURL(f);
}
function setFotoUI(src){
  // Sidebar preview grande
  var fp=document.getElementById('foto-prev');
  fp.innerHTML='<img src="'+src+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
  // Avatar pequeño
  var av=document.getElementById('sb-av');
  av.innerHTML='<img src="'+src+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
}
function updateFotosEnCV(){
  if(!_photo)return;
  document.querySelectorAll('.cv-foto-wrap').forEach(function(el){
    el.innerHTML='<img src="'+_photo+'" style="width:100%;height:100%;object-fit:cover;object-position:top;border-radius:50%;display:block;">'
      +'<div class="cv-foto-overlay" onclick="document.getElementById(\'file-foto\').click()">📷</div>';
  });
  var av=document.getElementById('sb-av');
  if(av)av.innerHTML='<img src="'+_photo+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
}

/* ── CARGA ── */
function cargar(){
  var h={'apikey':KEY,'Authorization':'Bearer '+KEY};
  Promise.all([
    fetch(SB+'/rest/v1/candidatos?email=eq.'+enc(_email)+'&select=*&limit=1',{headers:h}).then(r=>r.json()),
    fetch(SB+'/rest/v1/cv_publicados?email=eq.'+enc(_email)+'&order=created_at.desc&limit=1&select=contenido',{headers:h}).then(r=>r.json())
  ]).then(function(res){
    var cand=res[0]&&res[0].length?res[0][0]:null;
    if(cand){
      document.getElementById('sb-name').textContent=cand.nombre||'';
      document.getElementById('sb-role').textContent=cand.sector||cand.rol||'';
      // Foto: Supabase > localStorage > nada
      if(cand.foto_perfil){_photo=cand.foto_perfil;setFotoUI(_photo);}
      else{try{var _lf=localStorage.getItem('mj_foto_'+_email.toLowerCase().trim());if(_lf){_photo=_lf;setFotoUI(_photo);}}catch(e){}}
    }
    var raw=res[1]&&res[1].length?res[1][0].contenido:null;
    if(raw){
      try{
        var p=JSON.parse(raw);
        if(p&&(p.nombre||p.experiencia)){_d=p;render();return;}
        if(p&&p.cv_data){_d=p.cv_data;render();return;}
      }catch(e){}
      showMsg('✨','CV pendiente','Regenerá el CV desde el panel · tab CV IA');
    } else {
      showMsg('✨','CV pendiente','Generá el CV desde el panel · tab CV IA');
    }
  }).catch(function(){showMsg('⚠️','Error de conexión','Recargá la página');});
}

function showMsg(icon,t,s){

    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:500px;gap:12px;text-align:center;font-family:\'DM Sans\',sans-serif;">'
    +'<div style="font-size:40px;">'+icon+'</div>'
    +'<div style="font-size:16px;font-weight:600;color:#584E4A;">'+t+'</div>'
    +'<div style="font-size:12px;color:#888;max-width:300px;line-height:1.6;">'+s+'</div>'
    +'</div>';
}

/* ── RENDER ── */
function render(){
  if(!_d)return;
  // Restore visual config from saved data
  if(_d._color){
    _color=_d._color;
    document.querySelectorAll('.pal-sw').forEach(function(el){
      el.classList.toggle('on',el.style.background===_color||el.title===PALETA.find(function(p){return p.hex===_color;}));
    });
    buildPalette();
  }
  if(_d._font){
    _fontTitle=_d._font;
    _fontBody=_d._font==='DM Serif Display'?'DM Sans':_d._font;
  }
  // Restaurar foto: _photo (ya cargada de candidatos.foto_perfil) > _d._photo > localStorage
  if(!_photo&&_d._photo){_photo=_d._photo;}
  if(!_photo){try{_photo=localStorage.getItem('mj_foto_'+_email.toLowerCase().trim())||'';}catch(e){}}
  if(_photo){_d._photo=_photo;setFotoUI(_photo);}
  document.getElementById('cv-wrap').innerHTML=buildPages(_d);
  applyTheme();
  setTimeout(function(){
    if(_photo)updateFotosEnCV();
  },50);
}

/* ── THEME ── */
function applyTheme(){
  var c=_color;
  var cl=lighten(c,.88),cm=lighten(c,.6),cdark=darken(c,.15);

  /* Columna izquierda fondo */
  document.querySelectorAll('.cv-left').forEach(function(el){el.style.background=cl;});
  document.querySelectorAll('.cv-left-head').forEach(function(el){el.style.background=lighten(c,.7);});

  /* Títulos izquierda */
  document.querySelectorAll('.cv-nombre-izq').forEach(function(el){el.style.color=darken(c,.2);});
  document.querySelectorAll('.cv-rol-izq').forEach(function(el){el.style.color=darken(c,.1);});
  document.querySelectorAll('.sl-h').forEach(function(el){el.style.color=c;el.style.borderColor=lighten(c,.5);});
  document.querySelectorAll('.sl-item,.ct-row,.lang-n,.tool,.otro,.curso,.curso-n,.otro span').forEach(function(el){el.style.color='#2D292A';});
  document.querySelectorAll('.ct-val a').forEach(function(el){el.style.color=c;});
  document.querySelectorAll('.comp-item').forEach(function(el){el.style.background=lighten(c,.65);el.style.color=darken(c,.2);});
  document.querySelectorAll('.lang-lv').forEach(function(el){el.style.background=c;el.style.color='#fff';});
  document.querySelectorAll('.tool-dot').forEach(function(el){el.style.background=c;});

  /* Derecha */
  document.querySelectorAll('.sec-h').forEach(function(el){el.style.color=c;el.style.borderColor=cl;});
  document.querySelectorAll('.exp').forEach(function(el){el.style.borderColor=c;});
  document.querySelectorAll('.exp-t').forEach(function(el){el.style.color='#111';});
  document.querySelectorAll('.exp-s').forEach(function(el){el.style.color=darken(c,.1);});
  document.querySelectorAll('.exp-b').forEach(function(el){el.style.color='#222';});
  document.querySelectorAll('.exp-b-dot').forEach(function(el){el.style.background=c;});
  document.querySelectorAll('.edu-dot').forEach(function(el){el.style.background=c;});
  document.querySelectorAll('.edu-t').forEach(function(el){el.style.color='#111';});
  document.querySelectorAll('.edu-s').forEach(function(el){el.style.color=darken(c,.1);});

  /* Foto wrapper */
  document.querySelectorAll('.cv-foto-ini').forEach(function(el){el.style.background=lighten(c,.6);el.style.color=c;});
  document.querySelectorAll('.cv-foto-wrap').forEach(function(el){el.style.borderColor=lighten(c,.5);});

  applyFont();
}

function applyFont(){
  var ft=_fontTitle,fb=_fontBody;
  document.querySelectorAll('.cv-nombre-izq,.sec-h,.exp-t').forEach(function(el){el.style.fontFamily='"'+ft+'",serif';});
  document.querySelectorAll('.cv-left-body,.cv-right,.sl-item,.ct-val,.exp-b,.edu-t,.edu-s').forEach(function(el){el.style.fontFamily='"'+fb+'",sans-serif';});
}

/* ── BUILD HTML ── */
function buildPages(d){
  var exp=arr(d.experiencia);
  var edu=arr(d.educacion);
  // Always single page — all experience + education together
  return buildPage(d,exp,true,edu);
}

function buildPage(d,expList,isFirst,eduList){
  var nombre=d.nombre||'';
  var rolObj=d.rol_objetivo||'';
  var obj=d.objetivo||'';
  var ct=d.contacto||{};
  var comps=arr(d.competencias).slice(0,6);
  var idiomas=arr(d.idiomas);
  var herr=arr(d.herramientas);
  var cursos=arr(d.cursos);
  var otros=d.otros||{};
  var edu=arr(d.educacion);
  var ini2=nombre.split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase()||'CV';

  var o='<div class="cv-page"><div class="cv-body-grid">';

  /* ── COL IZQUIERDA ── */
  o+='<div class="cv-left">';

  if(isFirst){
    /* Cabecera con foto + nombre */
    o+='<div class="cv-left-head">';
    o+='<div class="cv-foto-wrap" onclick="document.getElementById(\'file-foto\').click()" title="Cambiar foto">';
    if(_photo){
      o+='<img src="'+_photo+'" style="width:100%;height:100%;object-fit:cover;object-position:top;border-radius:50%;">';
    } else {
      o+='<div class="cv-foto-ini">'+ini2+'</div>';
    }
    o+='<div class="cv-foto-overlay">📷</div>';
    o+='</div>';
    o+='<div class="cv-nombre-izq" contenteditable="false">'+esc(nombre)+'</div>';
    if(rolObj)o+='<div class="cv-rol-izq" contenteditable="false">'+esc(rolObj)+'</div>';
    o+='</div>';

    o+='<div class="cv-left-body">';

    /* Contacto */
    if(ct.tel||ct.email||ct.ciudad||ct.linkedin){
      o+='<div class="sl"><div class="sl-h">Contacto</div>';
      if(ct.tel)o+=ctRow('📞','<span class="ct-edit" data-field="tel" contenteditable="false">'+esc(ct.tel)+'</span>');
      if(ct.email)o+=ctRow('✉','<span class="ct-edit" data-field="email" contenteditable="false">'+esc(ct.email)+'</span>');
      if(ct.ciudad)o+=ctRow('📍','<span class="ct-edit" data-field="ciudad" contenteditable="false">'+esc(ct.ciudad)+'</span>');
      if(ct.linkedin)o+=ctRow('in','<span class="ct-edit" data-field="linkedin" contenteditable="false">'+esc(ct.linkedin)+'</span>');
      o+='</div>';
    }

    /* Competencias */
    if(comps.length){
      o+='<div class="sl"><div class="sl-h">Competencias</div>';
      comps.forEach(function(c){o+='<span class="comp-item" contenteditable="false">'+esc(c)+'</span>';});
      o+='</div>';
    }

    /* Herramientas */
    if(herr.length){
      o+='<div class="sl"><div class="sl-h">Herramientas</div>';
      herr.forEach(function(h){o+='<div class="tool" contenteditable="false"><div class="tool-dot"></div>'+esc(h)+'</div>';});
      o+='</div>';
    }

    /* Idiomas — solo A2+ */
    var idiomasFilt=idiomas.filter(function(id){
      var lv=(id.nivel||'').toLowerCase();
      return !lv.includes('a1')&&!lv.includes('basico')&&!lv.includes('básico');
    });
    if(idiomasFilt.length){
      o+='<div class="sl"><div class="sl-h">Idiomas</div>';
      idiomasFilt.forEach(function(id){
        o+='<div class="lang-row"><span class="lang-n" contenteditable="false">'+esc(id.idioma||id)+'</span>';
        if(id.nivel)o+='<span class="lang-lv" contenteditable="false">'+esc(id.nivel)+'</span>';
        o+='</div>';
      });
      o+='</div>';
    }

    /* Cursos */
    if(cursos.length){
      o+='<div class="sl"><div class="sl-h">Formación complementaria</div>';
      cursos.forEach(function(c){
        var txt='';
        if(typeof c==='string'){txt=c;}
        else if(c&&typeof c==='object'){
          var nom=c.nombre||c.titulo||'';
          var inst=c.institucion||'';
          var fec=c.fecha||'';
          var fecOk=fec&&fec!=='-'&&fec!=='—'&&fec!=='---';
          if(inst&&fecOk)txt=nom+' · '+inst+' ('+fec+')';
          else if(inst)txt=nom+' · '+inst;
          else if(fecOk)txt=nom+' ('+fec+')';
          else txt=nom;
        }
        if(!txt)return;
        o+='<div class="curso"><div class="curso-n" contenteditable="false">'+esc(txt)+'</div></div>';
      });
      o+='</div>';
    }

    /* Educación */
    var eduShow=eduList||[];
    if(eduShow.length){
      o+='<div class="sl"><div class="sl-h">Educación</div>';
      eduShow.forEach(function(e){
        o+='<div class="edu"><div class="edu-dot"></div><div>';
        o+='<div class="edu-t" contenteditable="false">'+esc(e.titulo||'')+'</div>';
        if(e.institucion)o+='<div class="edu-s" contenteditable="false">'+esc(e.institucion)+'</div>';
        o+='</div></div>';
      });
      o+='</div>';
    }

    /* Otros */
    if(otros.incorporacion||otros.modalidad||otros.viajes){
      o+='<div class="sl"><div class="sl-h">Otros datos</div>';
      if(otros.incorporacion)o+='<div class="otro"><span class="otro-ok">✓</span><span contenteditable="false">Incorporación: '+esc(otros.incorporacion)+'</span></div>';
      if(otros.modalidad)o+='<div class="otro"><span class="otro-ok">✓</span><span contenteditable="false">'+esc(otros.modalidad)+'</span></div>';
      if(otros.viajes)o+='<div class="otro"><span class="otro-ok">✓</span><span contenteditable="false">Viajes: '+esc(otros.viajes)+'</span></div>';
      o+='</div>';
    }

    o+='</div>';/* cv-left-body */
  }

  o+='</div>';/* cv-left */

  /* ── COL DERECHA ── */
  o+='<div class="cv-right">';

  if(isFirst&&obj){
    o+='<div class="sec"><div class="sec-h">Perfil</div>';
    o+='<div contenteditable="false" style="font-size:11px;color:#333;line-height:1.75;">'+esc(obj)+'</div>';
    o+='</div>';
  }

  /* Experiencia */
  if(expList.length){
    o+='<div class="sec"><div class="sec-h">Experiencia profesional</div>';
    expList.forEach(function(e,i){
      var rolTxt=e.titulo||e.rol||'';
      var sub=[e.empresa||'',e.fecha||'',e.ubicacion||''].filter(Boolean).join(' · ');
      var bullets=arr(e.bullets);
      if(!bullets.length)bullets=arr(e.logros);
      o+='<div class="exp">';
      o+='<div class="exp-t" contenteditable="false">'+esc(rolTxt)+'</div>';
      if(sub)o+='<div class="exp-s" contenteditable="false">'+esc(sub)+'</div>';
      bullets.slice(0,5).forEach(function(b,bi){
        o+='<div class="exp-b" data-expidx="'+i+'" data-bidx="'+bi+'"><div class="exp-b-dot"></div><div class="exp-b-txt" contenteditable="false">'+boldKw(esc(b))+'</div><button class="exp-b-del" onclick="delBullet(this)" title="Eliminar bullet">×</button></div>';
      });
      o+='</div>';
    });
    o+='</div>';
  }

  o+='</div>';/* cv-right */
  o+='</div></div>';/* grid, page */
  return o;
}

function ctRow(icon,val){
  return '<div class="ct-row"><span class="ct-icon">'+icon+'</span><span class="ct-val">'+val+'</span></div>';
}

/* Negritas automáticas en palabras clave de gestión */
var KW=[
  // Cargos y roles
  'CEO','CFO','COO','Director','Gerente','Manager','Supervisor','Coordinador','Jefe',
  // Términos de negocio
  'P&L','B2B','B2C','KPIs','KPI','ROI','EBITDA','SaaS','ERP','CRM',
  // Habilidades y metodologías  
  'Lean','Agile','Scrum','Six Sigma','MBA',
  // Acciones de impacto (palabras que van en negritas en bullets)
  'lideré','lideró','implementé','implementó','desarrollé','desarrolló','gestioné','gestionó',
  'reduje','redujo','aumenté','aumentó','logré','logró','optimicé','optimizó',
  'diseñé','diseñó','coordiné','coordinó','negocié','negoció','dirigí','dirigió',
  // Conceptos clave
  'expansión internacional','mejora continua','gestión del cambio','gobierno corporativo',
  'transformación digital','reporting ejecutivo','presupuesto anual','plan estratégico',
  'flujo de caja','control de gestión','rentabilidad','facturación'
];
function boldKw(t){
  // Don't process if already has HTML tags
  if(t.indexOf('<')>=0) return t;
  KW.forEach(function(k){
    var re=new RegExp('(?<![>\w])('+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')(?![\w<])','gi');
    t=t.replace(re,'<strong>$1</strong>');
  });
  return t;
}

/* ── EDIT MODE ── */
function toggleEdit(){
  _editing=!_editing;
  var btn=document.getElementById('btn-edit');
  var wrap=document.getElementById('cv-wrap');
  // Make all editable elements active
  wrap.querySelectorAll('[contenteditable]').forEach(function(el){el.contentEditable=_editing?'true':'false';});
  // Also make exp-b-txt editable (they have contenteditable set dynamically)
  wrap.querySelectorAll('.exp-b-txt,.ct-edit,.edu-t,.edu-s').forEach(function(el){el.contentEditable=_editing?'true':'false';});
  if(_editing){
    wrap.querySelectorAll('.cv-page').forEach(function(p){p.classList.add('editing-mode');});
    wrap.classList.add('editing');
    btn.textContent='✓ Listo';btn.classList.add('on');
  } else {
    wrap.querySelectorAll('.cv-page').forEach(function(p){p.classList.remove('editing-mode');});
    wrap.classList.remove('editing');
    btn.textContent='✏ Editar texto';btn.classList.remove('on');
    guardar();
  }
}

/* ── GUARDAR ── */
function guardar(){
  var st=document.getElementById('save-st');
  // En express mode no hay candidato en Supabase — guardamos en sessionStorage
  // así si la pestaña se mantiene abierta los cambios persisten al re-renderizar.
  // Para el "guardado real" el flow es: usuario imprime/descarga PDF desde cv.html.
  if(_expressMode){
    if(_d){_d._color=_color;_d._font=_fontTitle;if(_photo)_d._photo=_photo;}
    syncDFromDOM();
    try{localStorage.setItem('mj_express_cv', JSON.stringify(_d));}catch(e){}
    // Sincronizar a Supabase (tabla cv_express) con email como key
    // para que el cliente recupere su CV desde otro dispositivo.
    var emExp=_email||localStorage.getItem('mj_express_email')||'';
    if(emExp){
      try{
        var hExp={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal,resolution=merge-duplicates'};
        fetch(SB+'/rest/v1/cv_express',{
          method:'POST',
          headers:hExp,
          body:JSON.stringify({
            email:emExp.toLowerCase().trim(),
            cv_optimizado:_d,
            foto:_photo||null,
            nombre:(_d&&_d.nombre)||null,
            updated_at:new Date().toISOString()
          })
        }).catch(function(e){console.warn('[cv express] supabase upsert',e);});
      }catch(e){console.warn('[cv express] supabase upsert',e);}
    }
    if(st){st.textContent='✓ Guardado';st.style.color='#4a7c5f';setTimeout(function(){st.textContent='';},2500);}
    return;
  }
  if(!_email){if(st){st.textContent='Sin sesión';st.style.color='#C0756E';}return;}
  if(!_d){if(st){st.textContent='Sin datos';st.style.color='#C0756E';}return;}
  syncDFromDOM();
  // Guardar también configuración visual
  if(_d){
    _d._color=_color;
    _d._font=_fontTitle;
    if(_photo)_d._photo=_photo;
  }
  if(st){st.textContent='Guardando...';st.style.color='#888';}
  var emailClean=_email.toLowerCase().trim();
  var contenido=JSON.stringify(_d);
  var h={'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'};
  // 1. Intentar PATCH
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+enc(emailClean),{
    method:'PATCH', headers:h,
    body:JSON.stringify({contenido:contenido,updated_at:new Date().toISOString()})
  }).then(function(r){
    if(r.status===404||(r.status===400&&!r.ok)){
      // 2. Si falla, POST
      return fetch(SB+'/rest/v1/cv_publicados',{
        method:'POST', headers:h,
        body:JSON.stringify({email:emailClean,contenido:contenido})
      });
    }
    return r;
  }).then(function(r){
    var ok=r.ok||r.status===204||r.status===201||r.status===200;
    if(st){
      st.textContent=ok?'✓ Guardado':'Error '+r.status;
      st.style.color=ok?'#5A8C6E':'#C0756E';
    }
    // Sync foto to candidatos.foto_perfil so cliente.html can display it
    if(ok&&_photo&&emailClean){
      fetch(SB+'/rest/v1/candidatos?email=eq.'+enc(emailClean),{
        method:'PATCH',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},
        body:JSON.stringify({foto_perfil:_photo})
      }).catch(function(){});
      localStorage.setItem('mj_foto_'+emailClean,_photo);
    }
    setTimeout(function(){if(st){st.textContent='';st.style.color='';}},3000);
  }).catch(function(e){
    console.error('guardar error:',e);
    if(st){st.textContent='Error de red';st.style.color='#C0756E';}
    setTimeout(function(){if(st){st.textContent='';st.style.color='';}},3000);
  });
}

function syncDFromDOM(){
  if(!_d)return;
  // Preservar foto siempre
  if(_photo)_d._photo=_photo;
  // Nombre y rol
  var nEl=document.querySelector('.cv-nombre-izq');
  if(nEl)_d.nombre=nEl.textContent.trim();
  var rEl=document.querySelector('.cv-rol-izq');
  if(rEl)_d.rol_objetivo=rEl.textContent.trim();
  // Perfil/objetivo
  var oEl=document.querySelector('.cv-right [contenteditable]');
  if(oEl&&oEl.className!=='exp-t'&&oEl.className!=='exp-s')_d.objetivo=oEl.textContent.trim();
  // Contacto
  if(!_d.contacto)_d.contacto={};
  document.querySelectorAll('.ct-edit').forEach(function(el){
    var f=el.dataset.field;
    if(f)_d.contacto[f]=el.textContent.trim();
  });
  // Experiencia
  if(_d.experiencia){
    document.querySelectorAll('.exp').forEach(function(expEl,i){
      if(!_d.experiencia[i])return;
      var tEl=expEl.querySelector('.exp-t');
      if(tEl)_d.experiencia[i].titulo=tEl.textContent.trim();
      var sEl=expEl.querySelector('.exp-s');
      if(sEl)_d.experiencia[i].empresa=sEl.textContent.trim();
      var bEls=expEl.querySelectorAll('.exp-b-txt');
      if(bEls.length)_d.experiencia[i].bullets=Array.from(bEls).map(function(b){return b.textContent.trim();}).filter(Boolean);
    });
  }
  // Competencias
  var compEls=document.querySelectorAll('.comp-item');
  if(compEls.length){_d.competencias=Array.from(compEls).map(function(el){return el.textContent.trim();}).filter(Boolean);}
  // Educación
  if(_d.educacion){
    document.querySelectorAll('.edu').forEach(function(eduEl,i){
      if(!_d.educacion[i])return;
      var tEl=eduEl.querySelector('.edu-t');
      if(tEl)_d.educacion[i].titulo=tEl.textContent.trim();
      var sEl=eduEl.querySelector('.edu-s');
      if(sEl)_d.educacion[i].institucion=sEl.textContent.trim();
    });
  }
}

/* ── DELETE BULLET ── */
function delBullet(btn){
  var row=btn.closest('.exp-b');
  if(row)row.remove();
}

/* ── HELPERS ── */
function esc(t){
  if(t==null)return '';
  // Defensa: si Claude devolvió un objeto en lugar de string (ej.
  // {nombre:"X"} en vez de "X"), extraer un valor utilizable.
  if(typeof t==='object'){
    t=t.nombre||t.name||t.texto||t.text||t.valor||t.value||JSON.stringify(t);
  }
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function enc(s){return encodeURIComponent(s);}
function arr(x){return Array.isArray(x)?x:[];}
function lighten(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r+(255-r)*a);g=Math.round(g+(255-g)*a);b=Math.round(b+(255-b)*a);
  return'#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0');}).join('');
}
function darken(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r*(1-a));g=Math.round(g*(1-a));b=Math.round(b*(1-a));
  return'#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0');}).join('');
}
