<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Diseñador de CV — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600&family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Montserrat',sans-serif;}
body{background:#E2E2E2;display:flex;overflow:hidden;}

/* SIDEBAR CONFIG */
.sidebar-config{width:260px;flex-shrink:0;background:#fff;height:100vh;overflow-y:auto;border-right:1px solid #D8D0D0;display:flex;flex-direction:column;}
.sb-header{padding:20px 22px 16px;border-bottom:1px solid #EEE;}
.sb-back{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:#8C7B80;text-decoration:none;margin-bottom:12px;cursor:pointer;background:none;border:none;font-family:'Montserrat',sans-serif;padding:0;}
.sb-back:hover{color:#6B5A5F;}
.sb-title{font-size:13px;font-weight:800;color:#4A3F3F;letter-spacing:.02em;}
.sb-sub{font-size:10px;color:#9E9696;margin-top:2px;}
.sb-section{padding:16px 22px;border-bottom:1px solid #F0EDED;}
.sb-section-lbl{font-size:9px;font-weight:700;color:#9E9696;text-transform:uppercase;letter-spacing:.14em;margin-bottom:12px;}

/* Swatches */
.swatches{display:flex;flex-wrap:wrap;gap:8px;}
.swatch{width:38px;height:38px;border-radius:8px;cursor:pointer;border:2.5px solid transparent;transition:all .15s;}
.swatch.active{border-color:#4A3F3F;transform:scale(1.1);}
.swatch:hover{transform:scale(1.05);}
.swatch-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.swatch-name{font-size:8px;color:#9E9696;text-align:center;width:38px;white-space:nowrap;overflow:hidden;}
.color-preview{height:5px;border-radius:3px;margin-top:8px;transition:background .3s;}

/* Tipografías */
.font-row{margin-bottom:10px;}
.font-lbl{font-size:10px;font-weight:600;color:#4A3F3F;margin-bottom:5px;}
.font-select{width:100%;padding:8px 10px;font-size:11px;font-family:'Montserrat',sans-serif;border:1.5px solid #E0DADA;border-radius:8px;outline:none;color:#4A3F3F;cursor:pointer;background:#FAFAFA;}
.font-select:focus{border-color:#8C7B80;}

/* Foto */
.photo-area{display:flex;align-items:center;gap:10px;}
.photo-preview{width:52px;height:52px;border-radius:50%;background:#F0EDED;border:2px solid #DDD0D0;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#9E9696;font-size:10px;font-weight:700;}
.photo-preview img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-btn{padding:7px 12px;font-size:10px;font-weight:700;font-family:'Montserrat',sans-serif;background:#F5F0F0;color:#8C7B80;border:1.5px solid #DDD0D0;border-radius:8px;cursor:pointer;transition:all .15s;}
.photo-btn:hover{background:#DDD0D0;}
.photo-btn.sel{background:#8C7B80;color:#fff;border-color:#8C7B80;}

/* Footer */
.sb-footer{padding:18px 22px;margin-top:auto;border-top:1px solid #EEE;}
.btn-download{width:100%;padding:14px;font-size:12px;font-weight:800;font-family:'Montserrat',sans-serif;background:#8C7B80;color:#fff;border:none;border-radius:10px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:all .15s;box-shadow:0 4px 14px rgba(140,123,128,.3);}
.btn-download:hover{background:#6B5A5F;}

/* WORKSPACE */
.workspace{flex:1;overflow-y:auto;padding:40px 50px;display:flex;flex-direction:column;align-items:center;}
.workspace-top{width:210mm;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ws-lbl{font-size:10px;font-weight:700;color:#9E9696;text-transform:uppercase;letter-spacing:.1em;}
.ws-badge{font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;background:#fff;color:#8C7B80;border:1.5px solid #DDD0D0;}

/* CV PAPER */
.cv-paper{background:#fff;width:210mm;min-height:297mm;box-shadow:0 20px 60px rgba(0,0,0,.18),0 4px 16px rgba(0,0,0,.08);border-radius:3px;overflow:visible;}

/* CV ESTRUCTURA */
.cv-head{padding:34px 38px 26px;position:relative;}
.cv-photo-wrap{position:absolute;right:36px;top:26px;}
.cv-photo{width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.5);display:block;}
.cv-photo-ini{width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:rgba(255,255,255,.85);border:3px solid rgba(255,255,255,.35);}
.cv-name{font-size:26px;font-weight:800;color:#fff;line-height:1.15;margin-bottom:4px;}
.cv-role{font-size:11px;font-weight:500;color:rgba(255,255,255,.78);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}
.cv-contact{display:flex;flex-wrap:wrap;gap:10px;}
.cv-contact-item{font-size:10px;color:rgba(255,255,255,.72);display:flex;align-items:center;gap:4px;}
.cv-body{display:grid;grid-template-columns:196px 1fr;min-height:calc(297mm - 160px);}
.cv-sidebar-col{padding:22px 18px;}
.cv-main-col{padding:22px 26px;border-left:1px solid #F0EDED;}
.sec-title{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom-width:1.5px;border-bottom-style:solid;}
.cv-block{margin-bottom:16px;}
.item-title{font-size:11px;font-weight:700;color:#2D292A;margin-bottom:1px;}
.item-sub{font-size:10px;font-weight:600;margin-bottom:3px;}
.item-desc{font-size:10px;color:#5E5859;line-height:1.65;}
.skill-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.skill-name{font-size:10px;color:#4A3F3F;font-weight:600;}
.skill-bar{height:4px;background:#E8E0E0;border-radius:2px;width:90px;overflow:hidden;}
.skill-fill{height:4px;border-radius:2px;}
.cv-tag{display:inline-block;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;margin:2px;}
.side-item{font-size:10px;color:#5E5859;margin-bottom:5px;display:flex;align-items:flex-start;gap:5px;}
.empty-cv{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:297mm;gap:12px;color:#9E9696;text-align:center;padding:3rem;}
</style>
</head>
<body>

<div class="workspace">

</div>

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://mmicaelajairedin-ui.github.io/analisisform';

var PALETA=[
  {name:'Antracita',    hex:'#3D4451'},
  {name:'Azul Noche',  hex:'#2C3E6B'},
  {name:'Pizarra',     hex:'#4A5568'},
  {name:'Verde Salvia',hex:'#4A6741'},
  {name:'Gris Azul',   hex:'#5B7FA6'},
  {name:'Azul Acero',  hex:'#2E6B8A'},
  {name:'Negro Suave', hex:'#2D2D2D'},
  {name:'Topo',        hex:'#6B6560'}
];

var _email=null,_cand=null,_inf=null,_cvHtml=null,_iframe=null,_saveT=null,_editing=false;
var _color='#3D4451',_colorName='Antracita';
var _ftitle='Montserrat',_fbody='Open Sans';
var _photo=null,_hstyle='solid';

// Leer email - URL tiene SIEMPRE prioridad sobre localStorage
var _pp=new URLSearchParams(window.location.search);
var _urlEmail=_pp.get('email');
if(_urlEmail){
  _email=_urlEmail; // Email de la URL (cuando Micaela abre el CV de un cliente)
}else{
  var _uu=localStorage.getItem('mj_user');
  if(_uu){try{_email=JSON.parse(_uu).email;}catch(e){}}
}

// Volver
document.getElementById('back-btn').onclick=function(){window.location.href=BASE+'/cliente.html';};

// Swatches
(function(){
  var wrap=document.getElementById('swatches');
  PALETA.forEach(function(p,i){
    var sw=document.createElement('div');sw.className='swatch-wrap';
    var s=document.createElement('div');
    s.className='swatch'+(i===0?' active':'');
    s.style.background=p.hex;
    s.title=p.name;
    s.addEventListener('click',function(){
      document.querySelectorAll('.swatch').forEach(function(x){x.classList.remove('active');});
      s.classList.add('active');
      _color=p.hex;_colorName=p.name;
      document.getElementById('color-preview').style.background=p.hex;
      document.getElementById('color-badge').textContent=p.name;
      render();
    });
    var nm=document.createElement('div');nm.className='swatch-name';nm.textContent=p.name.split(' ')[0];
    sw.appendChild(s);sw.appendChild(nm);wrap.appendChild(sw);
  });
  document.getElementById('color-preview').style.background=_color;
})();

// Font selects
document.getElementById('font-title').addEventListener('change',function(){_ftitle=this.value;render();});
document.getElementById('font-body').addEventListener('change',function(){_fbody=this.value;render();});

// Foto
document.getElementById('photo-btn').addEventListener('click',function(){document.getElementById('photo-input').click();});
document.getElementById('photo-input').addEventListener('change',function(){
  if(!this.files[0])return;
  var r=new FileReader();
  r.onload=function(e){
    _photo=e.target.result;
    // Actualizar preview en sidebar
    var prev=document.getElementById('photo-preview');
    prev.innerHTML='';
    var img=document.createElement('img');img.src=_photo;prev.appendChild(img);
    render();
    // Guardar en Supabase si hay email
    if(_email){
      // Comprimir: si es muy grande, redimensionar
      var canvas=document.createElement('canvas');
      var ctx2=canvas.getContext('2d');
      var imgEl=new Image();
      imgEl.onload=function(){
        var maxW=400,maxH=400;
        var w=imgEl.width,h=imgEl.height;
        if(w>maxW||h>maxH){
          var ratio=Math.min(maxW/w,maxH/h);
          w=Math.round(w*ratio);h=Math.round(h*ratio);
        }
        canvas.width=w;canvas.height=h;
        ctx2.drawImage(imgEl,0,0,w,h);
        var b64=canvas.toDataURL('image/jpeg',0.75);
        // Guardar en Supabase
        fetch(SB+'/rest/v1/candidatos?email=eq.'+encodeURIComponent(_email),{
          method:'PATCH',
          headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
          body:JSON.stringify({foto_perfil:b64})
        }).then(function(){
          var st=document.getElementById('save-st');
          if(st){st.textContent='Foto guardada ✓';setTimeout(function(){st.textContent='';},2000);}
        }).catch(function(){});
      };
      imgEl.src=_photo;
    }
  };
  r.readAsDataURL(this.files[0]);
});

// Estilo cabecera
document.getElementById('style-solid').addEventListener('click',function(){
  _hstyle='solid';
  this.classList.add('sel');
  document.getElementById('style-grad').classList.remove('sel');
  render();
});
document.getElementById('style-grad').addEventListener('click',function(){
  _hstyle='grad';
  this.classList.add('sel');
  document.getElementById('style-solid').classList.remove('sel');
  render();
});

// Descargar
document.getElementById('btn-dl').addEventListener('click',function(){
  var paper=document.getElementById('cv-paper');
  var nombre=_cand?_cand.nombre||'CV':'CV';
  if(_cvHtml){
    var ww2=window.open('','_blank');
    if(ww2){
      var h2=applyStyleToHtml(_cvHtml,_color,_ftitle,_fbody);
      ww2.document.write(h2);ww2.document.close();
      setTimeout(function(){ww2.print();},800);
    }
    return;
  }
  var ww=window.open('','_blank');
  if(!ww)return;
  var html='<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">';
  html+='<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600&family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">';
  html+='<title>CV - '+nombre+'</title>';
  html+='<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#fff;margin:0;}@page{margin:0;size:A4 portrait;}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}';
  html+='.cv-head{padding:34px 38px 26px;position:relative;}.cv-photo-wrap{position:absolute;right:36px;top:26px;}.cv-photo{width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.5);display:block;}.cv-photo-ini{width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:rgba(255,255,255,.85);border:3px solid rgba(255,255,255,.35);}.cv-name{font-size:26px;font-weight:800;color:#fff;line-height:1.15;margin-bottom:4px;}.cv-role{font-size:11px;font-weight:500;color:rgba(255,255,255,.78);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}.cv-contact{display:flex;flex-wrap:wrap;gap:10px;}.cv-contact-item{font-size:10px;color:rgba(255,255,255,.72);display:flex;align-items:center;gap:4px;}.cv-body{display:grid;grid-template-columns:196px 1fr;}.cv-sidebar-col{padding:22px 18px;}.cv-main-col{padding:22px 26px;border-left:1px solid #F0EDED;}.sec-title{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom-width:1.5px;border-bottom-style:solid;}.cv-block{margin-bottom:16px;}.item-title{font-size:11px;font-weight:700;color:#2D292A;margin-bottom:1px;}.item-sub{font-size:10px;font-weight:600;margin-bottom:3px;}.item-desc{font-size:10px;color:#5E5859;line-height:1.65;}.skill-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}.skill-name{font-size:10px;color:#4A3F3F;font-weight:600;}.skill-bar{height:4px;background:#E8E0E0;border-radius:2px;width:90px;overflow:hidden;}.skill-fill{height:4px;border-radius:2px;}.cv-tag{display:inline-block;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;margin:2px;}.side-item{font-size:10px;color:#5E5859;margin-bottom:5px;display:flex;align-items:flex-start;gap:5px;}';
  html+='</style></head><body>';
  html+=paper.innerHTML;
  html+='</body></html>';
  ww.document.write(html);ww.document.close();
  setTimeout(function(){ww.print();},900);
});

// Cargar datos
if(!_email){
  document.getElementById('cv-paper').innerHTML='<div class="empty-cv"><div style="font-size:32px;">&#128272;</div><div style="font-size:13px;color:#9E9696;">Sesion no encontrada</div></div>';
}else{
  Promise.all([
    fetch(SB+'/rest/v1/candidatos?email=eq.'+encodeURIComponent(_email)+'&select=*&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/informes?email=eq.'+encodeURIComponent(_email)+'&select=data&order=created_at.desc&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=contenido',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();})
  ]).then(function(res){
    _cand=res[0]&&res[0].length?res[0][0]:null;
    if(_cand)document.getElementById('cand-name').textContent=_cand.nombre||_email;
    if(res[1]&&res[1].length){var d=res[1][0].data;if(typeof d==='string')try{d=JSON.parse(d);}catch(e){}; _inf=d;}
    _cvHtml=res[2]&&res[2].length?res[2][0].contenido||null:null;
    // Cargar foto guardada
    if(_cand&&_cand.foto_perfil&&!_photo){
      _photo=_cand.foto_perfil;
      var fp=document.getElementById('photo-preview');
      if(fp){fp.innerHTML='';var fi=document.createElement('img');fi.src=_photo;fp.appendChild(fi);}
    }
    render();
  }).catch(function(){
    document.getElementById('cv-paper').innerHTML='<div class="empty-cv"><div>Error al cargar</div></div>';
  });
}

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ini(n){return(n||'').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()||'MJ';}
function lighten(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r+(255-r)*a);g=Math.round(g+(255-g)*a);b=Math.round(b+(255-b)*a);
  return '#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0');}).join('');
}

function applyStyleToHtml(html,color,ft,fb){
  var cl=lighten(color,0.88);
  var css='<style id="ds-override">'+
    ':root{--A:'+color+';--SB:'+cl+';}'+
    'body{font-family:"+fb+",sans-serif!important;}'+
    '.nm,.hd .nm{font-family:"+ft+",sans-serif!important;}'+
    '.hd{background:'+color+'!important;}'+
    '.sd{background:'+cl+'!important;}'+
    '.sh,.mh{color:'+color+'!important;border-bottom-color:'+color+'!important;}'+
    '.ex-d,.lg-l{background:'+color+'!important;}'+
    '.ul li::before,.sk::before{background:'+lighten(color,0.4)+'!important;}'+
    '.ed-s{color:'+lighten(color,0.3)+'!important;}'+
    '</style>';
  html=html.replace('</head>',css+'</head>');
  return html;
}

function mostrarEnIframe(html){
  var paper=document.getElementById('cv-paper');
  paper.style.padding='0';
  paper.style.overflow='visible';
  paper.innerHTML='';
  var ifrm=document.createElement('iframe');
  ifrm.style.cssText='width:100%;border:none;display:block;min-height:1123px;';
  ifrm.scrolling='no';
  paper.appendChild(ifrm);
  _iframe=ifrm;
  function ajustar(){
    try{
      var d=ifrm.contentDocument||ifrm.contentWindow.document;
      var h=Math.max(d.documentElement.scrollHeight,d.body?d.body.scrollHeight:0,1123);
      ifrm.style.height=h+'px';
      paper.style.minHeight=h+'px';
    }catch(ex){ifrm.style.height='1400px';}
  }
  // Usar blob URL - más compatible que srcdoc para documentos grandes
  try{
    var blob=new Blob([html],{type:'text/html;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    ifrm.onload=function(){
      ajustar();
      setTimeout(ajustar,400);
      setTimeout(ajustar,1200);
      URL.revokeObjectURL(url);
    };
    ifrm.src=url;
  }catch(e){
    // Fallback a srcdoc si blob falla
    ifrm.onload=function(){ ajustar(); setTimeout(ajustar,600); };
    ifrm.srcdoc=html;
  }
}

function render(){
  if(_cvHtml){
    var html=applyStyleToHtml(_cvHtml,_color,_ftitle,_fbody);
    mostrarEnIframe(html);
    return;
  }
  // Construir CV desde datos cuando no hay CV de IA
  var c=_cand,inf=_inf,color=_color,ft=_ftitle,fb=_fbody,photo=_photo,hs=_hstyle;
  var colorLight=lighten(color,0.88);
  var colorMid=lighten(color,0.55);
  var nombre=c?c.nombre||'Tu Nombre':'Tu Nombre';
  var rol=c?c.sector||c.rol||'Profesional':'';
  var email2=c?c.email||'':'';
  var tel=c?c.telefono||'':'';
  var ciudad=c?c.ubicacion||c.ciudad||'':'';
  var habs=c?c.habilidades||'':'';
  var skills=habs?habs.split(/[,;|]/).map(function(s){return s.trim();}).filter(Boolean):[];
  var fortalezas=inf?inf.fortalezas||[]:[];

  var headBg=hs==='grad'?
    'background:linear-gradient(135deg,'+color+' 55%,'+colorMid+' 100%);':
    'background:'+color+';';

  var o='<div style="font-family:\''+fb+'\',sans-serif;">';

  // CABECERA
  o+='<div class="cv-head" style="'+headBg+'">';
  o+='<div class="cv-photo-wrap">';
  if(photo){
    o+='<img class="cv-photo" src="'+photo+'" alt="foto">';
  }else{
    o+='<div class="cv-photo-ini" style="font-family:\''+ft+'\',sans-serif;">'+ini(nombre)+'</div>';
  }
  o+='</div>';
  o+='<div class="cv-name" style="font-family:\''+ft+'\',sans-serif;">'+esc(nombre)+'</div>';
  if(rol)o+='<div class="cv-role">'+esc(rol)+'</div>';
  o+='<div class="cv-contact">';
  if(email2)o+='<span class="cv-contact-item">'+esc(email2)+'</span>';
  if(tel)o+='<span class="cv-contact-item">'+esc(tel)+'</span>';
  if(ciudad)o+='<span class="cv-contact-item">'+esc(ciudad)+'</span>';
  o+='</div></div>';

  // CUERPO
  o+='<div class="cv-body">';

  // Sidebar CV
  o+='<div class="cv-sidebar-col" style="background:'+colorLight+';">';

  if(c&&c.objetivo){
    o+='<div class="cv-block"><div class="sec-title" style="color:'+color+';border-color:'+color+';">Perfil</div>';
    o+='<div class="item-desc">'+esc(c.objetivo.slice(0,180))+'</div></div>';
  }

  if(skills.length){
    o+='<div class="cv-block"><div class="sec-title" style="color:'+color+';border-color:'+color+';">Habilidades</div>';
    skills.slice(0,7).forEach(function(sk,i){
      var pct=Math.max(55,95-i*7);
      o+='<div class="skill-row"><span class="skill-name">'+esc(sk)+'</span>';
      o+='<div class="skill-bar"><div class="skill-fill" style="width:'+pct+'%;background:'+color+';"></div></div></div>';
    });
    o+='</div>';
  }

  if(fortalezas.length){
    o+='<div class="cv-block"><div class="sec-title" style="color:'+color+';border-color:'+color+';">Fortalezas</div>';
    fortalezas.slice(0,5).forEach(function(f){
      var words=f.split(' ').slice(0,4).join(' ');
      o+='<div class="cv-tag" style="background:'+colorMid+'55;color:'+color+';">'+esc(words)+'</div>';
    });
    o+='</div>';
  }

  if(c&&c.idiomas){
    o+='<div class="cv-block"><div class="sec-title" style="color:'+color+';border-color:'+color+';">Idiomas</div>';
    c.idiomas.split(/[,;|]/).forEach(function(id){
      if(id.trim())o+='<div class="side-item">&#183; '+esc(id.trim())+'</div>';
    });
    o+='</div>';
  }

  o+='</div>';

  // Main CV
  o+='<div class="cv-main-col">';

  if(c&&c.experiencia){
    o+='<div class="cv-block"><div class="sec-title" style="color:'+color+';border-color:'+colorLight+';">Experiencia profesional</div>';
    var exps=c.experiencia.split(/\n\n|\r\n\r\n/).filter(Boolean);
    if(!exps.length)exps=[c.experiencia];
    exps.slice(0,3).forEach(function(ex){
      var lines=ex.split('\n').filter(Boolean);
      o+='<div style="margin-bottom:12px;padding-left:10px;border-left:2px solid '+colorMid+'66;">';
      if(lines[0])o+='<div class="item-title">'+esc(lines[0])+'</div>';
      if(lines[1])o+='<div class="item-sub" style="color:'+color+';">'+esc(lines[1])+'</div>';
      if(lines[2])o+='<div class="item-desc">'+esc(lines.slice(2).join(' ').slice(0,200))+'</div>';
      o+='</div>';
    });
    o+='</div>';
  }

  if(c&&c.educacion){
    o+='<div class="cv-block"><div class="sec-title" style="color:'+color+';border-color:'+colorLight+';">Educacion</div>';
    var edus=c.educacion.split(/\n\n|\r\n\r\n/).filter(Boolean);
    if(!edus.length)edus=[c.educacion];
    edus.slice(0,2).forEach(function(ed){
      var lines=ed.split('\n').filter(Boolean);
      o+='<div style="margin-bottom:10px;padding-left:10px;border-left:2px solid '+colorMid+'66;">';
      if(lines[0])o+='<div class="item-title">'+esc(lines[0])+'</div>';
      if(lines[1])o+='<div class="item-sub" style="color:'+color+';">'+esc(lines[1])+'</div>';
      o+='</div>';
    });
    o+='</div>';
  }

  if(inf&&inf.estrategia){
    o+='<div class="cv-block"><div class="sec-title" style="color:'+color+';border-color:'+colorLight+';">Propuesta de valor</div>';
    o+='<div class="item-desc">'+esc(inf.estrategia.slice(0,280))+'</div></div>';
  } else if(!c||(!c.experiencia&&!c.educacion)){
    o+='<div class="cv-block"><div class="sec-title" style="color:'+color+';border-color:'+colorLight+';">Tu CV esta en preparacion</div>';
    o+='<div class="item-desc">Micaela esta trabajando en tu perfil personalizado. Cuando este listo aparecera aqui.</div></div>';
  }

  o+='</div></div>';
  o+='</div>';

  document.getElementById('cv-paper').innerHTML=o;
}
// end render
</script>
</body>
</html>
