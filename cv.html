<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>CV Optimizado — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{margin:0;padding:0;background:#F4F4F4;font-family:'Montserrat',sans-serif;}

/* BARRA DE HERRAMIENTAS */
.toolbar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #eee;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.toolbar-brand{font-size:12px;font-weight:700;color:#8C7B80;margin-right:4px;}
.toolbar-sep{width:1px;height:24px;background:#eee;}

/* Selector de estilos */
.style-btns{display:flex;gap:6px;}
.style-btn{padding:5px 12px;font-size:10px;font-weight:700;font-family:'Montserrat',sans-serif;border-radius:20px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;white-space:nowrap;}
.style-btn.active{color:#fff;}
.style-btn[data-style="ejecutivo"]{background:#1B3A5C22;color:#1B3A5C;border-color:#1B3A5C44;}
.style-btn[data-style="ejecutivo"].active{background:#1B3A5C;border-color:#1B3A5C;color:#fff;}
.style-btn[data-style="minimalista"]{background:#3A3A3A22;color:#3A3A3A;border-color:#3A3A3A44;}
.style-btn[data-style="minimalista"].active{background:#3A3A3A;border-color:#3A3A3A;color:#fff;}
.style-btn[data-style="innovacion"]{background:#1B4F9222;color:#1B4F92;border-color:#1B4F9244;}
.style-btn[data-style="innovacion"].active{background:#1B4F92;border-color:#1B4F92;color:#fff;}
.style-btn[data-style="empatico"]{background:#2D6A4F22;color:#2D6A4F;border-color:#2D6A4F44;}
.style-btn[data-style="empatico"].active{background:#2D6A4F;border-color:#2D6A4F;color:#fff;}

.toolbar-btn{padding:6px 14px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;border-radius:8px;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-edit{background:#f5f1f1;color:#8C7B80;border:1.5px solid #e8dede;}
.btn-edit:hover{background:#e8dede;}
.btn-edit.editing{background:#7A9E7E;color:#fff;border-color:#7A9E7E;}
.btn-photo{background:#f5f1f1;color:#8C7B80;border:1.5px solid #e8dede;}
.btn-photo:hover{background:#e8dede;}
.btn-pdf{background:#8C7B80;color:#fff;}
.btn-pdf:hover{background:#6B5A5F;}
.save-st{font-size:10px;color:#999;min-width:60px;}
.ml-auto{margin-left:auto;}

/* LOADING */
.loading{text-align:center;padding:5rem;color:#999;font-size:14px;}

/* IFRAME CONTAINER */
#cv-frame-wrap{width:100%;min-height:calc(100vh - 56px);}
#cv-frame{width:100%;border:none;display:block;min-height:calc(100vh - 56px);}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="toolbar-brand">mj · Micaela Jairedin</span>
  <div class="toolbar-sep"></div>
  <div style="font-size:10px;color:#999;font-weight:600;">Estilo:</div>
  <div class="style-btns">
    <button class="style-btn active" data-style="ejecutivo" onclick="cambiarEstilo('ejecutivo',this)">Ejecutivo</button>
    <button class="style-btn" data-style="minimalista" onclick="cambiarEstilo('minimalista',this)">Minimalista</button>
    <button class="style-btn" data-style="innovacion" onclick="cambiarEstilo('innovacion',this)">Innovación</button>
    <button class="style-btn" data-style="empatico" onclick="cambiarEstilo('empatico',this)">Empático</button>
  </div>
  <div class="toolbar-sep"></div>
  <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="cargarFoto(this)">
  <button class="toolbar-btn btn-photo" onclick="document.getElementById('photo-input').click()">+ Foto</button>
  <button class="toolbar-btn btn-edit" id="edit-btn" onclick="toggleEdit()">✏ Editar</button>
  <span class="save-st" id="save-st"></span>
  <button class="toolbar-btn btn-pdf ml-auto" onclick="imprimirCV()">↓ Descargar PDF</button>
</div>

<div id="root"><div class="loading">Cargando tu CV...</div></div>

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';

var ESTILOS={
  ejecutivo:{
    color:'#1B3A5C',color2:'#4A7FA5',bg:'#F4F6F9',sbg:'#EEF3F8',
    font:'"Georgia","Times New Roman",serif',hfont:'"Georgia",serif',
    nombre:'EJECUTIVO'
  },
  minimalista:{
    color:'#2A2A2A',color2:'#666',bg:'#F8F8F8',sbg:'#F0F0F0',
    font:'"Helvetica Neue","Arial",sans-serif',hfont:'"Helvetica Neue",sans-serif',
    nombre:'MINIMALISTA'
  },
  innovacion:{
    color:'#1B4F92',color2:'#3A7BD5',bg:'#F0F4FF',sbg:'#E8EEFF',
    font:'"Futura","Century Gothic","Arial",sans-serif',hfont:'"Century Gothic","Arial",sans-serif',
    nombre:'INNOVACIÓN'
  },
  empatico:{
    color:'#2D6A4F',color2:'#52B788',bg:'#F0F7F4',sbg:'#E8F5EE',
    font:'"Roboto","Open Sans","Arial",sans-serif',hfont:'"Roboto",sans-serif',
    nombre:'EMPÁTICO'
  }
};

var _email=null,_cvHtml=null,_estilo='ejecutivo',_editing=false,_iframe=null,_saveT=null;

// Leer email de sesión o URL
var user=localStorage.getItem('mj_user');
if(user){try{_email=JSON.parse(user).email;}catch(e){}}
if(!_email){var p=new URLSearchParams(window.location.search);_email=p.get('email');}

if(!_email){
  document.getElementById('root').innerHTML='<div class="loading">Sesión no encontrada. <a href="login.html" style="color:#8C7B80;">Iniciar sesión</a></div>';
}else{
  cargarCV();
}

function cargarCV(){
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=contenido',{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  }).then(function(r){return r.json();}).then(function(rows){
    if(!Array.isArray(rows)||!rows.length){
      document.getElementById('root').innerHTML='<div class="loading">Tu CV aún no está disponible.<br><span style="font-size:12px;color:#bbb;">Micaela lo está preparando.</span></div>';
      return;
    }
    _cvHtml=rows[0].contenido||'';
    mostrarCV(_cvHtml,_estilo);
  }).catch(function(){
    document.getElementById('root').innerHTML='<div class="loading">Error al cargar. Inténtalo de nuevo.</div>';
  });
}

function aplicarEstilo(html,estilo){
  var e=ESTILOS[estilo];
  if(!e)return html;
  // Inyectar variables CSS con el estilo seleccionado
  var cssOverride='<style id="estilo-override">'+
    ':root{--A:'+e.color+';--A2:'+e.color2+';--SB:'+e.sbg+';--AB:'+e.sbg+';}'+
    'body{font-family:'+e.font+'!important;}'+
    '.nm,.ex-t{font-family:'+e.hfont+'!important;}'+
    '.hd{background:'+e.color+'!important;}'+
    '.sd{background:'+e.sbg+'!important;}'+
    '.sh,.mh{color:'+e.color+'!important;border-bottom-color:'+e.color+'!important;}'+
    '.ex-d,.lg-l{background:'+e.color+'!important;}'+
    '.ul li::before,.sk::before,.ct2::before{background:'+e.color2+'!important;}'+
    '.ed-s{color:'+e.color2+'!important;}'+
    '#estilo-badge{background:'+e.color+'!important;}'+
    '</style>';
  var badgeHtml='<div id="estilo-badge" style="position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:'+e.color+';color:#fff;font-size:9px;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:.1em;z-index:999;font-family:Montserrat,sans-serif;">'+e.nombre+'</div>';
  // Insertar override justo antes de </head> y badge antes de </body>
  html=html.replace('</head>',cssOverride+'</head>');
  html=html.replace('</body>',badgeHtml+'</body>');
  return html;
}

function mostrarCV(html,estilo){
  if(!html||(!html.trim().startsWith('<!DOCTYPE')&&!html.trim().startsWith('<html'))){
    // Texto plano
    document.getElementById('root').innerHTML=
      '<div style="max-width:860px;margin:2rem auto;background:#fff;padding:2rem 2.5rem;box-shadow:0 4px 20px rgba(0,0,0,.1);border-radius:12px;white-space:pre-wrap;font-size:13px;line-height:1.8;color:#1a1a1a;">'+
      html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
    return;
  }
  var htmlConEstilo=aplicarEstilo(html,estilo);
  var root=document.getElementById('root');
  root.innerHTML='<div id="cv-frame-wrap"><iframe id="cv-frame" src="about:blank" scrolling="yes"></iframe></div>';
  _iframe=document.getElementById('cv-frame');

  var blob=new Blob([htmlConEstilo],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  _iframe.onload=function(){
    try{
      var h=_iframe.contentDocument.documentElement.scrollHeight;
      _iframe.style.height=Math.max(h,600)+'px';
    }catch(e){
      _iframe.style.height='150vh';
    }
  };
  _iframe.src=url;
}

function cambiarEstilo(estilo,btn){
  _estilo=estilo;
  document.querySelectorAll('.style-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  if(_cvHtml)mostrarCV(_cvHtml,_estilo);
}

function toggleEdit(){
  _editing=!_editing;
  var btn=document.getElementById('edit-btn');
  if(_editing){
    btn.textContent='✓ Listo';
    btn.classList.add('editing');
    // Activar edición dentro del iframe
    try{
      var doc=_iframe.contentDocument;
      doc.querySelectorAll('[contenteditable]').forEach(function(el){el.contentEditable='true';});
      doc.body.classList.add('editing');
      // Escuchar cambios
      doc.addEventListener('input',schedSave);
    }catch(e){}
  }else{
    btn.textContent='✏ Editar';
    btn.classList.remove('editing');
    try{
      var doc=_iframe.contentDocument;
      doc.querySelectorAll('[contenteditable]').forEach(function(el){el.contentEditable='false';});
      doc.body.classList.remove('editing');
    }catch(e){}
    guardarAhora();
  }
}

function schedSave(){
  clearTimeout(_saveT);
  var st=document.getElementById('save-st');
  if(st)st.textContent='Guardando...';
  _saveT=setTimeout(guardarAhora,2000);
}

function guardarAhora(){
  if(!_email)return;
  try{
    var html=_iframe.contentDocument.documentElement.outerHTML;
    // Guardar el html sin el override de estilo para no bloquear futuros cambios
    var htmlLimpio=html.replace(/<style id="estilo-override">[\s\S]*?<\/style>/,'');
    _cvHtml=htmlLimpio;
  }catch(e){return;}
  var st=document.getElementById('save-st');
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email),{
    method:'PATCH',
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({contenido:_cvHtml})
  }).then(function(r){
    if(st)st.textContent=r.ok||r.status===204?'✓ Guardado':'Error';
    setTimeout(function(){if(st)st.textContent='';},3000);
  }).catch(function(){if(st){st.textContent='Error';setTimeout(function(){st.textContent='';},3000);}});
}

function cargarFoto(input){
  if(!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var doc=_iframe.contentDocument;
      var img=doc.getElementById('pi');
      var ini=doc.getElementById('pn');
      if(img){img.src=e.target.result;img.style.display='block';}
      if(ini)ini.style.display='none';
      schedSave();
    }catch(err){}
  };
  reader.readAsDataURL(input.files[0]);
}

function imprimirCV(){
  if(!_iframe)return;
  try{
    _iframe.contentWindow.print();
  }catch(e){
    window.print();
  }
}
</script>
</body>
</html>
