<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Optimizado</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--acc:#1B3A5C;--acc2:#4A7FA5;--acc-bg:#EEF3F8;--sidebar:#F4F6F9;--text:#1a1a1a;--muted:#555;--border:#E5E5E5;}
.t-navy{--acc:#1B3A5C;--acc2:#4A7FA5;--acc-bg:#EEF3F8;--sidebar:#F4F6F9;}
.t-forest{--acc:#1D4A35;--acc2:#3A8060;--acc-bg:#EAF3EE;--sidebar:#F2F7F4;}
.t-burgundy{--acc:#5C1B2E;--acc2:#A54A65;--acc-bg:#F4EEF0;--sidebar:#F7F2F4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#EAEAE6;min-height:100vh;padding:2rem 1rem 4rem;}

/* TOOLBAR */
.toolbar{max-width:860px;margin:0 auto 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.brand{font-size:11px;font-weight:600;color:#8C7B80;background:#fff;padding:5px 14px;border-radius:20px;border:1px solid #e0d8d5;}
.tools{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.tool-label{font-size:10px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.tool-group{display:flex;align-items:center;gap:6px;}
.cdot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s;}
.cdot.on{border-color:#fff;box-shadow:0 0 0 2px var(--acc);}
.tbtn{padding:7px 16px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;border-radius:8px;cursor:pointer;transition:all .15s;}
.tbtn-sec{background:#fff;color:#555;border:1.5px solid #ddd;}.tbtn-sec:hover{border-color:var(--acc);color:var(--acc);}
.tbtn-pri{background:var(--acc);color:#fff;border:none;}.tbtn-pri:hover{opacity:.88;}

/* LOCK */
.lock-wrap{max-width:360px;margin:5rem auto;background:#fff;border-radius:16px;padding:2.5rem 2rem;text-align:center;box-shadow:0 4px 30px rgba(0,0,0,.08);}
.lock-wrap h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:6px;}
.lock-wrap p{font-size:12px;color:#666;line-height:1.6;margin-bottom:1.4rem;}
.lock-inp{width:150px;padding:11px;font-size:18px;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:.25em;text-align:center;text-transform:uppercase;border:2px solid #ddd;border-radius:10px;outline:none;}
.lock-inp:focus{border-color:var(--acc);}
.lock-btn{margin-top:10px;width:100%;padding:12px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;background:var(--acc);color:#fff;border:none;border-radius:10px;cursor:pointer;}
.lock-err{font-size:12px;color:#c0756e;margin-top:7px;min-height:16px;}

/* CV */
.cv{max-width:860px;margin:0 auto;background:#fff;box-shadow:0 8px 50px rgba(0,0,0,.12);}

/* HEADER */
.cv-head{padding:36px 40px 28px 40px;border-bottom:3px solid var(--acc);display:flex;align-items:center;gap:28px;}
.photo-wrap{flex-shrink:0;cursor:pointer;position:relative;}
.photo-circle{width:96px;height:96px;border-radius:50%;border:3px solid var(--acc);overflow:hidden;background:var(--acc-bg);display:flex;align-items:center;justify-content:center;}
.photo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;}
.photo-ini{font-family:'Playfair Display',serif;font-size:30px;color:var(--acc);font-weight:800;}
.photo-hint{font-size:9px;font-weight:600;color:var(--acc2);text-align:center;margin-top:4px;opacity:.7;}
.head-info{flex:1;}
.cv-name{font-family:'Playfair Display',serif;font-size:30px;font-weight:800;color:var(--text);line-height:1.1;letter-spacing:-.02em;margin-bottom:4px;}
.cv-role{font-size:10.5px;font-weight:700;color:var(--acc);letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px;}
.cv-contacts{display:flex;flex-wrap:wrap;gap:4px 16px;margin-bottom:10px;}
.cv-contact{font-size:11px;color:var(--muted);}
.cv-contact strong{color:var(--text);font-weight:600;}
.cv-badges{display:flex;flex-wrap:wrap;gap:5px;}
.cv-badge{font-size:9.5px;font-weight:600;color:var(--acc);background:var(--acc-bg);padding:2px 10px;border-radius:20px;}

/* BODY */
.cv-body{display:grid;grid-template-columns:210px 1fr;}

/* SIDEBAR */
.cv-side{background:var(--sidebar);padding:28px 20px;border-right:1px solid var(--border);}
.s-sec{margin-bottom:24px;}
.s-sec:last-child{margin-bottom:0;}
.s-title{font-size:8px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.2em;margin-bottom:9px;padding-bottom:5px;border-bottom:1.5px solid var(--acc);}
.s-item{font-size:11.5px;color:var(--text);padding:3px 0 3px 11px;border-bottom:.5px solid var(--border);line-height:1.45;position:relative;}
.s-item::before{content:'';position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:50%;background:var(--acc2);}
.s-item:last-child{border-bottom:none;}
.lang-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:.5px solid var(--border);}
.lang-row:last-child{border-bottom:none;}
.lang-name{font-size:11.5px;color:var(--text);font-weight:500;}
.lang-lvl{font-size:9px;font-weight:700;color:#fff;background:var(--acc);padding:2px 8px;border-radius:10px;}
.edu-item{margin-bottom:12px;padding-bottom:12px;border-bottom:.5px solid var(--border);}
.edu-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.edu-deg{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.3;}
.edu-school{font-size:10.5px;color:var(--acc2);font-weight:500;margin-top:1px;}
.edu-yr{font-size:10px;color:var(--muted);margin-top:2px;}

/* MAIN */
.cv-main{padding:28px 34px;}
.m-sec{margin-bottom:24px;}
.m-sec:last-child{margin-bottom:0;}
.m-title{font-size:8px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.2em;margin-bottom:10px;padding-bottom:5px;border-bottom:1.5px solid var(--acc);}
.summary{font-size:12px;color:var(--text);line-height:1.8;}
.kw-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.kw{font-size:9.5px;font-weight:600;color:var(--acc);background:var(--acc-bg);padding:2px 9px;border-radius:10px;}
.exp-block{margin-bottom:18px;padding-bottom:18px;border-bottom:.5px solid var(--border);}
.exp-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.exp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:2px;}
.exp-title{font-family:'Playfair Display',serif;font-size:13.5px;font-weight:700;color:var(--text);line-height:1.2;}
.exp-dates{font-size:9.5px;font-weight:700;color:#fff;background:var(--acc);padding:2px 9px;border-radius:10px;flex-shrink:0;white-space:nowrap;}
.exp-co{font-size:11px;color:var(--acc2);font-weight:600;margin-bottom:5px;}
.exp-ctx{font-size:10.5px;color:#888;background:var(--acc-bg);border-radius:4px;padding:4px 9px;margin-bottom:6px;line-height:1.5;border-left:2px solid var(--acc2);font-style:italic;}
.exp-list{list-style:none;padding:0;}
.exp-list li{font-size:11.5px;color:var(--text);line-height:1.7;padding:3px 0 3px 14px;position:relative;}
.exp-list li::before{content:'';position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--acc);}
.exp-list li strong{font-weight:700;color:var(--acc);}

.loading{text-align:center;padding:5rem;color:#999;}

@media print{
  body{background:#fff;padding:0;}
  .toolbar{display:none;}
  .cv{box-shadow:none;max-width:100%;}
  .cv-head,.cv-side,.exp-dates,.lang-lvl,.kw,.cv-badge{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  @page{margin:.4cm;size:A4;}
}
</style>
</head>

<div class="toolbar" id="toolbar">

  <div class="tools">

var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var _row=null,_email=null,_code=null;

function init(){
  var p=new URLSearchParams(window.location.search);
  _email=p.get('email');_code=p.get('code');
  if(!_email){showErr('No se encontro el CV.');return;}
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=*',{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  }).then(function(r){return r.json();}).then(function(rows){
    if(!rows||!rows.length){showErr('Tu CV aun no esta disponible.');return;}
    _row=rows[0];
    if(_row.codigo&&_code!==_row.codigo){showLock();return;}
    renderCV(_row.contenido||'');
  }).catch(function(e){showErr('Error: '+e.message);});

function showErr(m){document.getElementById('root').innerHTML='<div class="loading">'+m+'</div>';}

function showLock(){
  document.getElementById('root').innerHTML='<div class="lock-wrap">'
    +'<h2>&#128274; Accede a tu CV</h2>'
    +'<p>Introduce el codigo que Micaela te envio por WhatsApp.</p>'
    +'<input class="lock-inp" id="li" type="text" maxlength="8" placeholder="XXXXXX">'
    +'<button class="lock-btn" onclick="verificar()">Ver mi CV</button>'
    +'<p class="lock-err" id="le"></p></div>';

function verificar(){
  var code=(document.getElementById('li').value||'').trim().toUpperCase();
  if(code===(_row.codigo||'').toUpperCase()){
    _code=code;
    window.history.replaceState({},'',location.pathname+'?email='+encodeURIComponent(_email)+'&code='+code);
    renderCV(_row.contenido||'');
  } else {document.getElementById('le').textContent='Codigo incorrecto.';}
}

function setTheme(t,btn){
  document.body.className='t-'+t;
  document.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('on');});
  btn.classList.add('on');
}

function loadPhoto(inp){
  if(!inp.files[0])return;
  var r=new FileReader();
  r.onload=function(e){
    var img=document.getElementById('cv-ph-img');
    var ini=document.getElementById('cv-ph-ini');
    if(img){img.src=e.target.result;img.style.display='block';}
    if(ini)ini.style.display='none';
  };
  r.readAsDataURL(inp.files[0]);
}

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Parse the plain text CV into structured sections
function parseCV(text){
  var data={name:'',role:'',email:'',phone:'',city:'',linkedin:'',
    summary:[],skills:[],langs:[],edu:[],certs:[],exp:[]};

  var lines=text.split('\n');

  // --- NAME: first non-empty, non-special line ---
  for(var i=0;i<Math.min(6,lines.length);i++){
    var l=lines[i].trim();
    if(l.length>2&&!l.includes('@')&&!l.match(/^\+?\d/)&&!l.includes('---')&&!l.includes('linkedin')&&!l.match(/^[A-Z\s·|·]{20,}/)){
      data.name=l;break;
    }
  }
  // --- ROLE: second meaningful line ---
  var foundName=false;
  for(var i=0;i<Math.min(10,lines.length);i++){
    var l=lines[i].trim();
    if(!l)continue;
    if(l===data.name){foundName=true;continue;}
    if(foundName&&l.length>4&&!l.includes('@')&&!l.match(/^\+?\d/)&&!l.includes('---')&&!l.includes('linkedin')){
      data.role=l;break;
    }
  }
  // --- CONTACT ---
  var em=text.match(/[\w.+-]+@[\w.-]+\.\w+/);if(em)data.email=em[0];
  var ph=text.match(/\+?[\d][\d\s().+\-]{8,16}/);if(ph)data.phone=ph[0].trim();
  var li=text.match(/linkedin\.com\/in\/[\w-]+/i);if(li)data.linkedin=li[0];
  var cy=text.match(/(Boiro|Galicia|A Coru[nñ]a|Madrid|Barcelona|Sevilla|Valencia|España|Spain)[^|\n,·]*/i);
  if(cy)data.city=cy[0].trim().replace(/[·|,\s]+$/,'');

  // --- SECTION PARSER ---
  var SECS={
    'RESUMEN':'summary','EJECUTIVO':'summary',
    'EXPERIENCIA':'exp',
    'HABILIDAD':'skills','COMPETENCIA':'skills',
    'IDIOMA':'langs',
    'FORMACI':'edu',
    'CERTIFICACI':'certs','CURSO':'certs'
  };

  var curSec=null;
  var curBlock=[];

  function flushBlock(){
    if(!curSec||!curBlock.length)return;
    var joined=curBlock.join('\n').trim();
    if(!joined)return;
    if(curSec==='summary'){
      // Summary: take first 5 lines of actual text
      var slines=curBlock.filter(function(l){return l.trim()&&!l.trim().match(/^[-·•]/);}).slice(0,5);
      data.summary=slines;
    } else if(curSec==='skills'){
      curBlock.forEach(function(l){
        var cl=l.replace(/^[-·•\s]+/,'').trim();
        if(!cl||cl.length<2)return;
        // Split by · or ,
        if(cl.includes('·')){cl.split('·').forEach(function(s){if(s.trim().length>2)data.skills.push(s.trim());});}
        else data.skills.push(cl);
      });
    } else if(curSec==='langs'){
      curBlock.forEach(function(l){
        var cl=l.replace(/^[-·•\s]+/,'').trim();if(!cl||cl.length<2)return;
        var p=cl.split(':');
        if(p.length<2)p=cl.split(/\s{2,}|—|–/);
        data.langs.push({n:(p[0]||'').trim(),l:(p[1]||'').trim()});
      });
    } else if(curSec==='edu'){
      curBlock.forEach(function(l){
        var cl=l.replace(/^[-·•\s]+/,'').trim();if(!cl||cl.length<3)return;
        var p=cl.split('·');
        var yrm=cl.match(/\d{4}/);
        data.edu.push({
          deg:p[0]?p[0].trim().replace(/\d{4}.*/,'').trim():cl,
          school:(p[1]||'').trim(),
          yr:yrm?yrm[0]:''
        });
      });
    } else if(curSec==='certs'){
      curBlock.forEach(function(l){
        var cl=l.replace(/^[-·•\s]+/,'').trim();if(cl.length>3)data.certs.push(cl);
      });
    } else if(curSec==='exp'){
      // Parse experience blocks
      var expBlocks=[],cur2=[];
      curBlock.forEach(function(l){
        var hasDate=/(\d{4}|\b(Ene|Feb|Mar|Abr|May|Jun|Jul|Ago|Sep|Oct|Nov|Dic)\b)/i.test(l);
        var notBullet=!l.trim().match(/^[-·•]/);
        var notLower=!l.trim().match(/^[a-záéíóúñü]/);
        var ok=l.trim().length>3&&l.trim().length<130;
        if(hasDate&&notBullet&&notLower&&ok&&cur2.length>1){expBlocks.push(cur2.join('\n'));cur2=[l];}
        else cur2.push(l);
      });
      if(cur2.length)expBlocks.push(cur2.join('\n'));
      expBlocks.filter(function(b){return b.trim().length>15;}).forEach(function(block){
        var blines=block.split('\n').filter(function(l){return l.trim();});
        if(!blines.length)return;
        var title=blines[0],dates='',company='',ctx='',bullets=[];
        var dm=title.match(/\d{2}\/\d{4}\s*[-\u2013]+\s*(\w+)/i)
          ||title.match(/(Ene|Feb|Mar|Abr|May|Jun|Jul|Ago|Sep|Oct|Nov|Dic)[\w]*\.?\s*\d{4}\s*[-\u2013]+\s*\S+/i)
          ||title.match(/\d{4}\s*[-\u2013\u2014]+\s*(\d{4}|Actualidad|Presente|Actual)/i);
        if(dm){dates=dm[0];title=title.replace(dm[0],'').replace(/[|·—\-]+/g,' ').replace(/\s+/g,' ').trim();}
        for(var j=1;j<blines.length;j++){
          var bl=blines[j].trim();if(!bl)continue;
          if(j===1&&!bl.match(/^[-·•]/)&&!bl.match(/^[a-z]/))company=bl;
          else if(/^(Contexto|Nota|Context):/i.test(bl))ctx=bl.replace(/^[^:]+:\s*/,'');
          else if(bl.match(/^[-·•]/))bullets.push(bl.replace(/^[-·•]\s*/,''));
        }
        data.exp.push({title:title,dates:dates,company:company,ctx:ctx,bullets:bullets});
      });
    }
    curBlock=[];
  }

  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    var u=l.trim().toUpperCase().replace(/[^A-ZÁÉÍÓÚÑÜ\s]/g,'');
    var matched=null;
    for(var k in SECS){if(u.trim().indexOf(k)===0&&l.trim().length<60&&!l.trim().match(/^[-·•]/)){matched=SECS[k];break;}}
    if(matched){flushBlock();curSec=matched;continue;}
    if(curSec)curBlock.push(l);
  }
  flushBlock();
  return data;
}

function renderCV(text){
  var d=parseCV(text);
  var ini=d.name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()||'CV';

  var kwList=['Dirección General','Gestión P&L','B2B Industrial','Expansión Internacional','Supply Chain','Gobierno Corporativo','Lean','Transformación Digital'];

  var html='<div class="cv">';

  // HEADER
  html+='<div class="cv-head">'
    +'<div class="photo-wrap" onclick="document.getElementById(\'photo-file\').click()">'
      +'<div class="photo-circle">'
        +'<img id="cv-ph-img" src="" alt="foto">'
        +'<span id="cv-ph-ini" class="photo-ini">'+ini+'</span>'
      +'</div>'
      +'<div class="photo-hint">+ Añadir foto</div>'
    +'</div>'
    +'<div class="head-info">'
      +'<div class="cv-name">'+esc(d.name||'Nombre Apellido')+'</div>'
      +'<div class="cv-role">'+esc(d.role)+'</div>'
      +'<div class="cv-contacts">'
        +(d.email?'<div class="cv-contact"><strong>'+esc(d.email)+'</strong></div>':'')
        +(d.phone?'<div class="cv-contact">'+esc(d.phone)+'</div>':'')
        +(d.city?'<div class="cv-contact">'+esc(d.city)+'</div>':'')
        +(d.linkedin?'<div class="cv-contact">'+esc(d.linkedin)+'</div>':'')
      +'</div>'
      +'<div class="cv-badges">'
        +'<span class="cv-badge">Disponibilidad inmediata</span>'
        +'<span class="cv-badge">Abierto a relocalizaci\u00f3n</span>'
        +'<span class="cv-badge">Biling\u00fce ES &middot; EN</span>'
      +'</div>'
    +'</div>'
  +'</div>';

  // BODY
  html+='<div class="cv-body">';

  // SIDEBAR
  html+='<div class="cv-side">';
  if(d.skills.length){
    html+='<div class="s-sec"><div class="s-title">Competencias</div>';
    d.skills.slice(0,14).forEach(function(s){html+='<div class="s-item">'+esc(s)+'</div>';});
    html+='</div>';
  }
  if(d.langs.length){
    html+='<div class="s-sec"><div class="s-title">Idiomas</div>';
    d.langs.forEach(function(l){
      html+='<div class="lang-row"><span class="lang-name">'+esc(l.n)+'</span>'+(l.l?'<span class="lang-lvl">'+esc(l.l)+'</span>':'')+'</div>';
    });
    html+='</div>';
  }
  if(d.edu.length){
    html+='<div class="s-sec"><div class="s-title">Formaci\u00f3n</div>';
    d.edu.forEach(function(e){
      html+='<div class="edu-item"><div class="edu-deg">'+esc(e.deg)+'</div>'
        +(e.school?'<div class="edu-school">'+esc(e.school)+'</div>':'')
        +(e.yr?'<div class="edu-yr">'+esc(e.yr)+'</div>':'')+'</div>';
    });
    html+='</div>';
  }
  if(d.certs.length){
    html+='<div class="s-sec"><div class="s-title">Certificaciones</div>';
    d.certs.slice(0,5).forEach(function(c){html+='<div class="s-item">'+esc(c)+'</div>';});
    html+='</div>';
  }
  html+='</div>';

  // MAIN
  html+='<div class="cv-main">';
  if(d.summary.length){
    html+='<div class="m-sec"><div class="m-title">Resumen ejecutivo</div>'
      +'<div class="summary">'+d.summary.map(function(l){return esc(l.trim());}).join('<br>')+'</div>'
      +'<div class="kw-row">'+kwList.map(function(k){return'<span class="kw">'+k+'</span>';}).join('')+'</div>'
      +'</div>';
  }
  if(d.exp.length){
    html+='<div class="m-sec"><div class="m-title">Experiencia profesional</div>';
    d.exp.forEach(function(e){
      html+='<div class="exp-block">'
        +'<div class="exp-head"><div class="exp-title">'+esc(e.title)+'</div>'+(e.dates?'<div class="exp-dates">'+esc(e.dates)+'</div>':'')+'</div>'
        +(e.company?'<div class="exp-co">'+esc(e.company)+'</div>':'')
        +(e.ctx?'<div class="exp-ctx">'+esc(e.ctx)+'</div>':'')
        +(e.bullets.length?'<ul class="exp-list">'+e.bullets.map(function(b){
          return'<li>'+esc(b).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')+'</li>';
        }).join('')+'</ul>':'')
        +'</div>';
    });
    html+='</div>';
  }
  html+='</div>';
  html+='</div>';
  html+='</div>';

  document.getElementById('root').innerHTML=html;
}

init();
</script>
