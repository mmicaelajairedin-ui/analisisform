<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Optimizado</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--acc:#1B3A5C;--acc2:#4A7FA5;--acc-bg:#EEF3F8;--side:#F4F6F9;--txt:#1a1a1a;--sub:#555;--bd:#E5E5E5;}
.tf{--acc:#1D4A35;--acc2:#3A8060;--acc-bg:#EAF3EE;--side:#F2F7F4;}
.tb2{--acc:#5C1B2E;--acc2:#A54A65;--acc-bg:#F4EEF0;--side:#F7F2F4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#E8E6E2;min-height:100vh;padding:2rem 1rem 4rem;}
.bar{max-width:860px;margin:0 auto 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.bar-brand{font-size:11px;font-weight:600;color:#8C7B80;background:#fff;padding:5px 14px;border-radius:20px;border:1px solid #e0d8d5;}
.bar-r{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.lbl{font-size:10px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.cdot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s;}
.cdot.on{border-color:#fff;box-shadow:0 0 0 2.5px var(--acc);}
.btn{padding:7px 16px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;border-radius:8px;cursor:pointer;transition:all .15s;border:none;}
.btn-o{background:#fff;color:#555;border:1.5px solid #ddd;}.btn-o:hover{border-color:var(--acc);color:var(--acc);}
.btn-f{background:var(--acc);color:#fff;}.btn-f:hover{opacity:.88;}
.lock{max-width:360px;margin:5rem auto;background:#fff;border-radius:16px;padding:2.5rem 2rem;text-align:center;box-shadow:0 4px 30px rgba(0,0,0,.08);}
.lock h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:6px;}
.lock p{font-size:12px;color:#666;line-height:1.6;margin-bottom:1.4rem;}
.lock input{width:150px;padding:11px;font-size:18px;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:.25em;text-align:center;text-transform:uppercase;border:2px solid #ddd;border-radius:10px;outline:none;}
.lock input:focus{border-color:var(--acc);}
.lock .go{margin-top:10px;width:100%;padding:12px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;background:var(--acc);color:#fff;border:none;border-radius:10px;cursor:pointer;}
.lock .err{font-size:12px;color:#c0756e;margin-top:7px;min-height:16px;}
.cv{max-width:860px;margin:0 auto;background:#fff;box-shadow:0 8px 50px rgba(0,0,0,.13);}
.cv-hd{background:var(--acc);padding:34px 38px 28px;display:flex;align-items:center;gap:26px;position:relative;overflow:hidden;}
.cv-hd::after{content:'';position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04);}
.ph{flex-shrink:0;cursor:pointer;z-index:2;position:relative;}
.ph-c{width:92px;height:92px;border-radius:50%;border:3px solid rgba(255,255,255,.3);overflow:hidden;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;}
.ph-c img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;}
.ph-ini{font-family:'Playfair Display',serif;font-size:30px;font-weight:800;color:rgba(255,255,255,.9);}
.ph-hint{font-size:9px;font-weight:600;color:rgba(255,255,255,.55);text-align:center;margin-top:4px;}
.hd-i{flex:1;z-index:2;}
.cv-name{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#fff;line-height:1.1;letter-spacing:-.02em;margin-bottom:4px;}
.cv-role{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.72);letter-spacing:.2em;text-transform:uppercase;margin-bottom:11px;}
.cv-cts{display:flex;flex-wrap:wrap;gap:3px 16px;margin-bottom:10px;}
.cv-ct{font-size:11px;color:rgba(255,255,255,.72);}
.cv-ct b{color:#fff;font-weight:600;}
.cv-tags{display:flex;flex-wrap:wrap;gap:5px;}
.cv-tag{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.88);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);padding:2px 10px;border-radius:20px;}
.cv-body{display:grid;grid-template-columns:210px 1fr;}
.cv-side{background:var(--side);padding:26px 20px;border-right:1px solid var(--bd);}
.s-sec{margin-bottom:24px;}.s-sec:last-child{margin-bottom:0;}
.s-h{font-size:7.5px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.22em;margin-bottom:8px;padding-bottom:5px;border-bottom:1.5px solid var(--acc);}
.sk{font-size:11.5px;color:var(--txt);padding:3.5px 0 3.5px 11px;border-bottom:.5px solid var(--bd);line-height:1.4;position:relative;}
.sk::before{content:'';position:absolute;left:0;top:10px;width:4px;height:4px;border-radius:50%;background:var(--acc2);}
.sk:last-child{border-bottom:none;}
.lg{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:.5px solid var(--bd);}
.lg:last-child{border-bottom:none;}
.lg-n{font-size:11.5px;color:var(--txt);font-weight:500;}
.lg-l{font-size:9px;font-weight:700;color:#fff;background:var(--acc);padding:2px 8px;border-radius:10px;}
.ed{margin-bottom:12px;padding-bottom:12px;border-bottom:.5px solid var(--bd);}
.ed:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ed-d{font-size:11.5px;font-weight:700;color:var(--txt);line-height:1.3;}
.ed-s{font-size:10.5px;color:var(--acc2);font-weight:500;margin-top:1px;}
.ed-y{font-size:10px;color:var(--sub);margin-top:2px;}
.ct{font-size:11px;color:var(--txt);padding:3px 0 3px 11px;border-bottom:.5px solid var(--bd);line-height:1.4;position:relative;}
.ct::before{content:'';position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:50%;background:var(--acc2);}
.ct:last-child{border-bottom:none;}
.cv-main{padding:26px 32px;}
.m-sec{margin-bottom:22px;}.m-sec:last-child{margin-bottom:0;}
.m-h{font-size:7.5px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.22em;margin-bottom:9px;padding-bottom:5px;border-bottom:1.5px solid var(--acc);}
.sum{font-size:12px;color:var(--txt);line-height:1.8;}
.kws{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.kw{font-size:9.5px;font-weight:600;color:var(--acc);background:var(--acc-bg);padding:2px 9px;border-radius:10px;}
.ex{margin-bottom:17px;padding-bottom:17px;border-bottom:.5px solid var(--bd);}
.ex:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ex-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:2px;}
.ex-t{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--txt);line-height:1.2;}
.ex-dt{font-size:9.5px;font-weight:700;color:#fff;background:var(--acc);padding:2px 9px;border-radius:10px;flex-shrink:0;white-space:nowrap;}
.ex-co{font-size:11px;color:var(--acc2);font-weight:600;margin-bottom:5px;}
.ex-ctx{font-size:10.5px;color:#888;background:var(--acc-bg);border-radius:4px;padding:4px 9px;margin-bottom:6px;line-height:1.5;border-left:2px solid var(--acc2);font-style:italic;}
.ex-ul{list-style:none;padding:0;}
.ex-ul li{font-size:11.5px;color:var(--txt);line-height:1.7;padding:3px 0 3px 14px;position:relative;}
.ex-ul li::before{content:'';position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--acc);}
.ex-ul li b{font-weight:700;color:var(--acc);}
.loading{text-align:center;padding:5rem;color:#999;}
@media print{
  body{background:#fff;padding:0;}
  .bar{display:none;}
  .cv{box-shadow:none;max-width:100%;}
  .cv-hd,.cv-side,.ex-dt,.lg-l,.kw,.cv-tag{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  @page{margin:.4cm;size:A4;}
}
</style>
</head>
<body>
<div class="bar">
  <div class="bar-brand">Micaela Jairedin &middot; Career Coach & Recruiter</div>
  <div class="bar-r">
    <span class="lbl">Color</span>
    <div class="cdot on" style="background:#1B3A5C" onclick="setT('',this)"></div>
    <div class="cdot" style="background:#1D4A35" onclick="setT('tf',this)"></div>
    <div class="cdot" style="background:#5C1B2E" onclick="setT('tb2',this)"></div>
    <input type="file" id="ph-f" accept="image/*" style="display:none" onchange="loadPh(this)">

</div>
<div id="root"><div class="loading">Cargando...</div></div>
<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var _row=null,_email=null,_code=null;

function init(){
  var p=new URLSearchParams(window.location.search);
  _email=p.get('email');_code=p.get('code');
  if(!_email){showErr('No se encontró el CV. Contacta con Micaela.');return;}
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=*',{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  }).then(function(r){return r.json();}).then(function(rows){
    if(!rows||!rows.length){showErr('Tu CV aún no está disponible. Micaela lo publicará pronto.');return;}
    _row=rows[0];
    if(_row.codigo&&_code!==_row.codigo){showLock();return;}
    render(_row.contenido||'');
  }).catch(function(e){showErr('Error: '+e.message);});

function showErr(m){document.getElementById('root').innerHTML='<div class="loading">'+m+'</div>';}

function showLock(){
  document.getElementById('root').innerHTML='<div class="lock">'
    +'<h2>&#128274; Accede a tu CV</h2>'
    +'<p>Introduce el código que Micaela te envió por WhatsApp.</p>'
    +'<input id="ci" type="text" maxlength="8" placeholder="XXXXXX">'
    +'<button class="go" onclick="check()">Ver mi CV</button>'
    +'<div class="err" id="ce"></div></div>';
}
function check(){
  var c=(document.getElementById('ci').value||'').trim().toUpperCase();
  if(c===(_row.codigo||'').toUpperCase()){
    _code=c;
    window.history.replaceState({},'',location.pathname+'?email='+encodeURIComponent(_email)+'&code='+c);
    render(_row.contenido||'');
  } else document.getElementById('ce').textContent='Código incorrecto.';
}
function setT(cls,btn){
  document.body.className=cls;
  document.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('on');});
  btn.classList.add('on');
}
function loadPh(inp){
  if(!inp.files[0])return;
  var r=new FileReader();
  r.onload=function(e){
    var i=document.getElementById('ph-img'),n=document.getElementById('ph-ini');
    if(i){i.src=e.target.result;i.style.display='block';}
    if(n)n.style.display='none';
  };
  r.readAsDataURL(inp.files[0]);
}
function e(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function bold(t){return e(t).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');}

// ROBUST PARSER — works with our standard CV format
function parse(text){
  var D={name:'',role:'',email:'',phone:'',city:'',li:'',summary:'',
    skills:[],langs:[],edu:[],certs:[],exp:[]};

  var lines=text.split('\n');

  // Extract contact info anywhere in text
  var em=text.match(/[\w.+-]+@[\w.-]+\.\w+/);if(em)D.email=em[0];
  var ph=text.match(/\+?\d[\d\s().-]{8,}/);if(ph)D.phone=ph[0].replace(/\s+/g,' ').trim().slice(0,18);
  var li=text.match(/linkedin\.com\/in\/[\w-]+/i);if(li)D.li=li[0];
  var cy=text.match(/(Boiro|Galicia|Coru[nñ]a|Madrid|Barcelona|Sevilla|Valencia|Bilbao|España)[^\n|·,]*/i);
  if(cy)D.city=cy[0].trim().replace(/[·|,\s·]+$/,'');

  // Name: first real line (not email, phone, url, or separator)
  for(var i=0;i<Math.min(8,lines.length);i++){
    var l=lines[i].trim();
    if(l.length>2&&l.length<60&&!l.includes('@')&&!l.match(/^\+?\d/)&&!l.includes('linkedin')&&!l.includes('---')&&!l.match(/^[A-ZÁÉÍÓÚ\s·|]{25,}/)){
      D.name=l;break;
    }
  }

  // Role: line after name that looks like a title
  var nm=false;
  for(var i=0;i<Math.min(12,lines.length);i++){
    var l=lines[i].trim();
    if(!l)continue;
    if(l===D.name){nm=true;continue;}
    if(nm&&l.length>5&&!l.includes('@')&&!l.match(/^\+?\d/)&&!l.includes('linkedin')&&!l.includes('---')){
      D.role=l;break;
    }
  }

  // Section parser — detect headers by pattern matching
  var SEC_RE=/^(RESUMEN\s*EJECUTIVO|RESUMEN|EXPERIENCIA\s*PROFESIONAL|EXPERIENCIA|HABILIDADES\s*DIRECTIVAS|HABILIDADES|COMPETENCIAS|IDIOMAS|FORMACIÓN|FORMACION|CERTIFICACIONES|CERTIFICACIONES\s*PROFESIONALES|CURSOS)[\s:·—]*/i;
  var SEC_MAP={
    'RESUMEN':'sum','EXPERIENCIA':'exp',
    'HABILIDADES':'skills','COMPETENCIAS':'skills',
    'IDIOMAS':'langs','FORMACI':'edu',
    'CERTIFICACI':'certs','CURSOS':'certs'
  };

  var cur=null,buf=[];
  function flush(){
    if(!cur||!buf.length)return;
    var text2=buf.join('\n');
    if(cur==='sum'){
      D.summary=buf.filter(function(l){return l.trim()&&!l.trim().match(/^Palabras\s+clave/i);}).slice(0,5).join(' ').replace(/\s+/g,' ').trim();
    } else if(cur==='skills'){
      buf.forEach(function(l){
        var c=l.replace(/^[-·•\s]+/,'').trim();
        if(!c||c.length<2)return;
        if(c.includes('·')){c.split('·').forEach(function(s){if(s.trim().length>2)D.skills.push(s.trim());});}
        else D.skills.push(c);
      });
    } else if(cur==='langs'){
      buf.forEach(function(l){
        var c=l.replace(/^[-·•\s]+/,'').trim();if(!c||c.length<2)return;
        var p=c.split(':');if(p.length<2)p=c.split(/\s{2,}|[—–]/);
        if(p[0]&&p[0].trim().length>1)D.langs.push({n:p[0].trim(),l:(p[1]||'').trim()});
      });
    } else if(cur==='edu'){
      buf.forEach(function(l){
        var c=l.replace(/^[-·•\s]+/,'').trim();if(!c||c.length<3)return;
        var p=c.split('·');
        var ym=c.match(/\d{4}/);
        var deg=(p[0]||c).trim().replace(/\s*\d{4}.*$/,'').trim();
        if(deg.length>3)D.edu.push({deg:deg,school:(p[1]||'').trim(),yr:ym?ym[0]:''});
      });
    } else if(cur==='certs'){
      buf.forEach(function(l){
        var c=l.replace(/^[-·•\s]+/,'').trim();if(c.length>3)D.certs.push(c);
      });
    } else if(cur==='exp'){
      // Split into experience blocks by detecting job title lines
      var blocks=[],cb=[];
      buf.forEach(function(l){
        var hasDash=l.includes('—')||l.includes('–')||l.includes('--');
        var hasDate=/\d{4}/.test(l);
        var notBullet=!l.trim().match(/^[-·•]/);
        var notLower=!l.trim().match(/^[a-záéíóúñü]/i)||l.trim().match(/^[A-ZÁÉÍÓÚ]/);
        var shortLine=l.trim().length>3&&l.trim().length<140;
        if((hasDash||hasDate)&&notBullet&&shortLine&&cb.length>0){
          blocks.push(cb.join('\n'));cb=[l];
        } else cb.push(l);
      });
      if(cb.length)blocks.push(cb.join('\n'));

      blocks.filter(function(b){return b.trim().length>15;}).forEach(function(block){
        var bls=block.split('\n').filter(function(l){return l.trim();});
        if(!bls.length)return;
        var title=bls[0],dates='',co='',ctx='',bullets=[];

        // Extract dates from title
        var dm=title.match(/(\d{2}\/\d{4}|\w{3}\.?\s*\d{4}|\d{4})\s*[–—-]+\s*(\w+\.?\s*\d{0,4}|Actualidad|Presente|Actual)/i);
        if(dm){dates=dm[0];title=title.replace(dm[0],'').replace(/[|·—\-]+/g,' ').replace(/\s+/g,' ').trim();}

        for(var j=1;j<bls.length;j++){
          var bl=bls[j].trim();if(!bl)continue;
          if(j===1&&!bl.match(/^[-·•]/)&&!bl.match(/^[a-záéíóú]/i))co=bl;
          else if(/^(Contexto|Context|Nota):/i.test(bl))ctx=bl.replace(/^[^:]+:\s*/,'');
          else if(bl.match(/^[-·•]/))bullets.push(bl.replace(/^[-·•]\s*/,''));
        }
        if(title.length>2)D.exp.push({t:title,dt:dates,co:co,ctx:ctx,bl:bullets});
      });
    }
    buf=[];
  }

  lines.forEach(function(l){
    var m=l.trim().match(SEC_RE);
    if(m){
      flush();
      var key=null;
      for(var k in SEC_MAP){if(m[0].toUpperCase().replace(/\s+/g,'').indexOf(k.replace(/\s+/g,''))===0){key=SEC_MAP[k];break;}}
      cur=key;
      return;
    }
    if(cur)buf.push(l);
  });
  flush();
  return D;
}

function render(text){
  var d=parse(text);
  var ini=d.name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()||'CV';

  // ATS keywords — extract from skills + add standard ones
  var kws=['Dirección General','Gestión P&L','B2B Industrial','Expansión Internacional','Supply Chain','Gobierno Corporativo','Lean','Transformación Digital'];

  var H='<div class="cv">';

  // HEADER
  H+='<div class="cv-hd">'
    +'<div class="ph" onclick="document.getElementById(\'ph-f\').click()">'
      +'<div class="ph-c"><img id="ph-img" src="" alt=""><span id="ph-ini">'+ini+'</span></div>'
      +'<div class="ph-hint">+ Añadir foto</div>'
    +'</div>'
    +'<div class="hd-i">'
      +'<div class="cv-name">'+e(d.name||'Nombre Apellido')+'</div>'
      +'<div class="cv-role">'+e(d.role||'Rol profesional')+'</div>'
      +'<div class="cv-cts">'
        +(d.email?'<div class="cv-ct"><b>'+e(d.email)+'</b></div>':'')
        +(d.phone?'<div class="cv-ct">'+e(d.phone)+'</div>':'')
        +(d.city?'<div class="cv-ct">'+e(d.city)+'</div>':'')
        +(d.li?'<div class="cv-ct">'+e(d.li)+'</div>':'')
      +'</div>'
      +'<div class="cv-tags">'
        +'<span class="cv-tag">Disponibilidad inmediata</span>'
        +'<span class="cv-tag">Abierto a relocalización</span>'
        +'<span class="cv-tag">Bilingüe ES · EN</span>'
      +'</div>'
    +'</div>'
  +'</div>';

  H+='<div class="cv-body">';

  // SIDEBAR
  H+='<div class="cv-side">';
  if(d.skills.length){
    H+='<div class="s-sec"><div class="s-h">Competencias</div>';
    d.skills.slice(0,13).forEach(function(s){H+='<div class="sk">'+e(s)+'</div>';});
    H+='</div>';
  }
  if(d.langs.length){
    H+='<div class="s-sec"><div class="s-h">Idiomas</div>';
    d.langs.forEach(function(l){H+='<div class="lg"><span class="lg-n">'+e(l.n)+'</span>'+(l.l?'<span class="lg-l">'+e(l.l)+'</span>':'')+'</div>';});
    H+='</div>';
  }
  if(d.edu.length){
    H+='<div class="s-sec"><div class="s-h">Formación</div>';
    d.edu.forEach(function(x){
      H+='<div class="ed"><div class="ed-d">'+e(x.deg)+'</div>'
        +(x.school?'<div class="ed-s">'+e(x.school)+'</div>':'')
        +(x.yr?'<div class="ed-y">'+e(x.yr)+'</div>':'')+'</div>';
    });
    H+='</div>';
  }
  if(d.certs.length){
    H+='<div class="s-sec"><div class="s-h">Certificaciones</div>';
    d.certs.slice(0,5).forEach(function(c){H+='<div class="ct">'+e(c)+'</div>';});
    H+='</div>';
  }
  H+='</div>';

  // MAIN
  H+='<div class="cv-main">';
  if(d.summary){
    H+='<div class="m-sec"><div class="m-h">Resumen ejecutivo</div>'
      +'<div class="sum">'+e(d.summary)+'</div>'
      +'<div class="kws">'+kws.map(function(k){return'<span class="kw">'+k+'</span>';}).join('')+'</div>'
      +'</div>';
  }
  if(d.exp.length){
    H+='<div class="m-sec"><div class="m-h">Experiencia profesional</div>';
    d.exp.forEach(function(x){
      H+='<div class="ex">'
        +'<div class="ex-hd"><div class="ex-t">'+e(x.t)+'</div>'+(x.dt?'<div class="ex-dt">'+e(x.dt)+'</div>':'')+'</div>'
        +(x.co?'<div class="ex-co">'+e(x.co)+'</div>':'')
        +(x.ctx?'<div class="ex-ctx">'+e(x.ctx)+'</div>':'')
        +(x.bl.length?'<ul class="ex-ul">'+x.bl.map(function(b){return'<li>'+bold(b)+'</li>';}).join('')+'</ul>':'')
        +'</div>';
    });
    H+='</div>';
  }
  H+='</div></div></div>';
  document.getElementById('root').innerHTML=H;
}
init();
</script>
</body>
</html>
