<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Mi CV — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;600&family=Playfair+Display:wght@700;800&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Open Sans',sans-serif;background:#F0ECEC;overflow:hidden;}
/* ── LAYOUT ── */
.shell{display:flex;height:100vh;overflow:hidden;}
/* ── SIDEBAR ── */
.sb{width:260px;flex-shrink:0;background:#fff;border-right:1px solid #EDE8E8;display:flex;flex-direction:column;overflow-y:auto;box-shadow:2px 0 12px rgba(0,0,0,.04);}
.sb-hd{padding:16px 18px 12px;border-bottom:1px solid #F0EDED;}
.sb-back{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#8E7676;cursor:pointer;background:none;border:none;font-family:'Montserrat',sans-serif;margin-bottom:8px;padding:0;}
.sb-title{font-size:14px;font-weight:800;color:#2D292A;font-family:'Montserrat',sans-serif;letter-spacing:-.3px;}
.sb-sub{font-size:11px;color:#888;margin-top:2px;}
.sb-sec{padding:14px 18px;border-bottom:1px solid #F5F0F0;}
.sb-lbl{font-size:9px;font-weight:800;color:#8E7676;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;font-family:'Montserrat',sans-serif;}
/* Photo */
.photo-wrap{display:flex;align-items:center;gap:12px;}
.photo-prev{width:52px;height:52px;border-radius:50%;background:#F5EFEF;border:2px dashed #D4BFBF;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;}
.photo-prev img{width:100%;height:100%;object-fit:cover;}
.photo-btn{font-size:11px;font-weight:600;color:#8E7676;background:#F5EFEF;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:'Montserrat',sans-serif;display:block;margin-bottom:4px;}
/* Swatches */
.swatches{display:flex;flex-wrap:wrap;gap:6px;}
.sw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.sw.on{border-color:#2D292A;transform:scale(1.15);}
/* Font selects */
.font-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.font-lbl{font-size:11px;color:#4A3F3F;font-weight:600;}
.font-sel{font-size:11px;padding:5px 8px;border:1.5px solid #EDE8E8;border-radius:8px;background:#fff;color:#2D292A;cursor:pointer;outline:none;font-family:'Montserrat',sans-serif;}
/* Style btns */
.style-row{display:flex;gap:8px;}
.style-btn{flex:1;font-size:11px;font-weight:700;padding:7px 0;border-radius:8px;cursor:pointer;border:1.5px solid #EDE8E8;background:#F9F6F6;color:#888;font-family:'Montserrat',sans-serif;transition:all .15s;}
.style-btn.on{background:#8E7676;color:#fff;border-color:#8E7676;}
/* Checkboxes */
.sec-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:11px;color:#4A3F3F;cursor:pointer;}
.sec-row input{accent-color:#8E7676;width:14px;height:14px;}
/* Footer buttons */
.sb-ft{padding:14px 18px;margin-top:auto;border-top:1px solid #F0EDED;}
.btn-main{width:100%;padding:11px;font-size:12px;font-weight:700;font-family:'Montserrat',sans-serif;border:none;border-radius:10px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;}
.btn-edit{background:#F5F0F0;color:#8E7676;border:1.5px solid #DDD0D0;}
.btn-edit:hover{background:#EDE8E8;}
.btn-save{background:#5A8C6E;color:#fff;}
.btn-save:hover{background:#4A7A5E;}
.btn-dl{background:#2D292A;color:#fff;}
.btn-dl:hover{background:#4A3F3F;}
.save-st{font-size:11px;color:#5A8C6E;text-align:center;min-height:16px;font-weight:600;}
/* ── WORKSPACE ── */
.ws{flex:1;overflow-y:auto;padding:36px 50px 80px;display:flex;flex-direction:column;align-items:center;background:#EDEAEA;}
.ws-top{width:210mm;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ws-title{font-size:12px;font-weight:700;color:#888;font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:.08em;}
.ws-badge{font-size:10px;font-weight:700;color:#8E7676;background:#F5EFEF;padding:3px 10px;border-radius:20px;font-family:'Montserrat',sans-serif;}
/* Paper + iframe */
.paper{width:210mm;min-height:297mm;background:#fff;box-shadow:0 12px 40px rgba(0,0,0,.1);border-radius:2px;overflow:hidden;position:relative;}
.paper iframe{width:100%;height:100%;border:none;display:block;}
/* Empty state */
.empty-cv{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:297mm;gap:12px;text-align:center;padding:2rem;}
.empty-cv-icon{font-size:48px;}
.empty-cv-title{font-size:15px;font-weight:800;color:#4A3F3F;font-family:'Montserrat',sans-serif;}
.empty-cv-sub{font-size:12px;color:#9E9696;line-height:1.6;}
@media print{.sb{display:none!important;}.ws{padding:0!important;background:#fff!important;overflow:visible!important;}.paper{box-shadow:none!important;}}
@media(max-width:900px){.sb{display:none;}.ws{padding:16px;}}
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->
<div class="sb">
  <div class="sb-hd">
    <button class="sb-back" id="back-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Volver al portal
    </button>
    <div class="sb-title">Editor de CV</div>
    <div class="sb-sub" id="cand-name">Cargando...</div>
  </div>

  <div class="sb-sec">
    <div class="sb-lbl">Foto de perfil</div>
    <div class="photo-wrap">
      <div class="photo-prev" id="photo-prev" onclick="document.getElementById('photo-input').click()">
        <span style="font-size:20px;color:#C4A4A4;">+</span>
      </div>
      <div>
        <button class="photo-btn" onclick="document.getElementById('photo-input').click()">Subir foto</button>
        <div style="font-size:9px;color:#9E9696;">JPG o PNG cuadrada</div>

      </div>

  <div class="sb-sec">
    <div class="sb-lbl">Color de acento</div>

  <div class="sb-sec">
    <div class="sb-lbl">Tipografía</div>
    <div class="font-row">
      <div class="font-lbl">Títulos</div>
      <select class="font-sel" id="font-title">
        <option value="Montserrat">Montserrat</option>
        <option value="Playfair Display">Playfair Display</option>
        <option value="Raleway">Raleway</option>
        <option value="Georgia">Georgia</option>
      </select>
    </div>
    <div class="font-row">
      <div class="font-lbl">Cuerpo</div>
      <select class="font-sel" id="font-body">
        <option value="Open Sans">Open Sans</option>
        <option value="Montserrat">Montserrat</option>
        <option value="Raleway">Raleway</option>
      </select>
    </div>
  </div>

  <div class="sb-sec">
    <div class="sb-lbl">Estilo cabecera</div>
    <div class="style-row">
      <button class="style-btn on" id="style-solid" onclick="setStyle('solid')">Sólido</button>
      <button class="style-btn" id="style-grad" onclick="setStyle('grad')">Degradado</button>
    </div>
  </div>

  <div class="sb-sec">
    <div class="sb-lbl">Secciones</div>
    <label class="sec-row"><input type="checkbox" id="sec-exp" checked onchange="rerender()"> Experiencia</label>
    <label class="sec-row"><input type="checkbox" id="sec-edu" checked onchange="rerender()"> Educación</label>
    <label class="sec-row"><input type="checkbox" id="sec-skills" checked onchange="rerender()"> Competencias</label>
    <label class="sec-row"><input type="checkbox" id="sec-idiomas" checked onchange="rerender()"> Idiomas</label>
    <label class="sec-row"><input type="checkbox" id="sec-cursos" checked onchange="rerender()"> Cursos</label>
    <label class="sec-row"><input type="checkbox" id="sec-otros" checked onchange="rerender()"> Otros datos</label>
  </div>

  <div class="sb-ft">
    <button class="btn-main btn-edit" id="btn-edit" onclick="toggleEdit()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Editar texto
    </button>
    <button class="btn-main btn-save" id="btn-save" onclick="guardar()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Guardar cambios
    </button>
    <button class="btn-main btn-dl" onclick="window.print()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Descargar / Imprimir
    </button>
    <div class="save-st" id="save-st"></div>
  </div>
</div>

<!-- WORKSPACE -->
<div class="ws">
  <div class="ws-top">
    <div class="ws-title">Vista previa</div>
    <div class="ws-badge" id="ws-badge">Cargando...</div>
  </div>
  <div class="paper" id="paper">
    <div class="empty-cv">
      <div class="empty-cv-icon">📄</div>
      <div class="empty-cv-title">Cargando CV...</div>
      <div class="empty-cv-sub">Conectando con Supabase</div>
    </div>
  </div>
</div>

</div><!-- shell -->

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://mmicaelajairedin-ui.github.io/analisisform';

// ── ESTADO ──
var _email=null,_cand=null,_inf=null,_cvData=null,_photo=null;
var _color='#8E7676',_ftitle='Montserrat',_fbody='Open Sans',_hstyle='solid';
var _iframe=null,_editing=false;

var PALETA=[
  {hex:'#8E7676',name:'Malva'},
  {hex:'#584E4A',name:'Carbón'},
  {hex:'#2D292A',name:'Negro'},
  {hex:'#5B7FA6',name:'Azul'},
  {hex:'#5A8C6E',name:'Verde'},
  {hex:'#C4907A',name:'Terracota'},
  {hex:'#7A6B8A',name:'Violeta'},
  {hex:'#888888',name:'Gris'},
];

// ── INIT ──
(function(){
  var params=new URLSearchParams(window.location.search);
  _email=params.get('email');
  if(!_email){
    var u=localStorage.getItem('mj_user');
    if(u){try{_email=JSON.parse(u).email;}catch(e){}}
  }
  if(!_email){showEmpty('Sesión no encontrada','Accedé desde tu portal');return;}
  buildSwatches();
  cargar();
  document.getElementById('back-btn').onclick=function(){window.location.href=BASE+'/cliente.html';};
  document.getElementById('photo-input').onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var fr=new FileReader();
    fr.onload=function(ev){
      _photo=ev.target.result;
      var prev=document.getElementById('photo-prev');
      prev.innerHTML='<img src="'+_photo+'">';
      rerender();
    };
    fr.readAsDataURL(file);
  };
  document.getElementById('font-title').onchange=function(){_ftitle=this.value;rerender();};
  document.getElementById('font-body').onchange=function(){_fbody=this.value;rerender();};
})();

function buildSwatches(){
  var c=document.getElementById('swatches');
  c.innerHTML='';
  PALETA.forEach(function(p){
    var b=document.createElement('button');
    b.className='sw'+(p.hex===_color?' on':'');
    b.style.background=p.hex;
    b.title=p.name;
    b.onclick=function(){
      _color=p.hex;
      document.getElementById('color-name').textContent=p.name;
      document.querySelectorAll('.sw').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');
      rerender();
    };
    c.appendChild(b);
  });
  var first=PALETA.find(function(p){return p.hex===_color;})||PALETA[0];
  document.getElementById('color-name').textContent=first.name;
}

function setStyle(s){
  _hstyle=s;
  document.getElementById('style-solid').classList.toggle('on',s==='solid');
  document.getElementById('style-grad').classList.toggle('on',s==='grad');
  rerender();
}

// ── CARGA ──
function cargar(){
  fetch(SB+'/rest/v1/candidatos?email=eq.'+encodeURIComponent(_email)+'&select=*&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}})
  .then(function(r){return r.json();})
  .then(function(rows){
    _cand=rows&&rows.length?rows[0]:null;
    if(_cand&&_cand.foto_perfil){
      _photo=_cand.foto_perfil;
      var prev=document.getElementById('photo-prev');
      prev.innerHTML='<img src="'+_photo+'">';
    }
    if(_cand) document.getElementById('cand-name').textContent=_cand.nombre||'';
    return fetch(SB+'/rest/v1/informes?email=eq.'+encodeURIComponent(_email)+'&select=data&order=created_at.desc&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  })
  .then(function(r){return r.json();})
  .then(function(rows){
    if(rows&&rows.length){
      var raw=rows[0].data;
      try{_inf=typeof raw==='string'?JSON.parse(raw):raw;}catch(e){_inf=null;}
    }
    return fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=contenido',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  })
  .then(function(r){return r.json();})
  .then(function(rows){
    if(rows&&rows.length&&rows[0].contenido){
      var raw=rows[0].contenido;
      // ¿Es JSON (cv_data del panel IA)?
      try{
        var parsed=JSON.parse(raw);
        if(parsed&&(parsed.nombre||parsed.experiencia)){
          _cvData=parsed;
          document.getElementById('ws-badge').textContent='CV generado por IA';
          rerender();
          return;
        }
      }catch(e){}
      // Es HTML guardado — mostrar directo en iframe
      _cvData=null;
      document.getElementById('ws-badge').textContent='CV guardado';
      mostrarEnIframe(raw);
    } else {
      // Sin CV guardado — construir desde datos del candidato
      _cvData=null;
      document.getElementById('ws-badge').textContent='Vista previa básica';
      rerender();
    }
  })
  .catch(function(){showEmpty('Error al cargar','Recargá la página');});
}

// ── RENDER ──
function rerender(){
  if(_cvData){
    var html=buildHtml(_cvData);
    mostrarEnIframe(html);
  } else {
    // Render básico desde _cand
    var html=buildBasico();
    mostrarEnIframe(html);
  }
}

function mostrarEnIframe(html){
  var paper=document.getElementById('paper');
  if(!_iframe){
    paper.innerHTML='';
    var ifrm=document.createElement('iframe');
    ifrm.style.cssText='width:100%;min-height:297mm;border:none;display:block;';
    paper.appendChild(ifrm);
    _iframe=ifrm;
  }
  var doc=_iframe.contentDocument||_iframe.contentWindow.document;
  doc.open();doc.write(html);doc.close();
  // Ajustar altura
  setTimeout(function(){
    try{
      var h=doc.documentElement.scrollHeight;
      _iframe.style.height=Math.max(h,1122)+'px';
    }catch(e){}
  },200);
}

function showEmpty(title,sub){
  document.getElementById('paper').innerHTML='<div class="empty-cv"><div class="empty-cv-icon">🔒</div><div class="empty-cv-title">'+title+'</div><div class="empty-cv-sub">'+sub+'</div></div>';
}

// ── EDITAR ──
function toggleEdit(){
  _editing=!_editing;
  var btn=document.getElementById('btn-edit');
  if(_iframe){
    try{
      var doc=_iframe.contentDocument||_iframe.contentWindow.document;
      doc.body.contentEditable=_editing?'true':'false';
      doc.body.style.outline=_editing?'2px dashed rgba(142,118,118,.4)':'none';
    }catch(e){}
  }
  btn.innerHTML=_editing
    ?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg> Salir de edición'
    :'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar texto';
  btn.style.background=_editing?'#8E7676':'';
  btn.style.color=_editing?'#fff':'';
}

// ── GUARDAR ──
function guardar(){
  var btn=document.getElementById('btn-save');
  var st=document.getElementById('save-st');
  var html='';
  if(_iframe){
    try{html=_iframe.contentDocument.documentElement.outerHTML;}catch(e){}
  }
  if(!html||!_email){st.textContent='Error: sin contenido';return;}
  btn.textContent='Guardando...';btn.disabled=true;
  st.textContent='';
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email),{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}})
  .then(function(r){return r.json();})
  .then(function(rows){
    var method=rows&&rows.length?'PATCH':'POST';
    var url=SB+'/rest/v1/cv_publicados'+(rows&&rows.length?'?email=eq.'+encodeURIComponent(_email):'');
    return fetch(url,{method:method,headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},body:JSON.stringify({email:_email,contenido:html,updated_at:new Date().toISOString()})});
  })
  .then(function(r){
    if(r.ok||r.status===204){
      st.textContent='✓ Guardado correctamente';
      btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar cambios';
      btn.disabled=false;
    } else {
      throw new Error(r.status);
    }
  })
  .catch(function(e){
    st.textContent='Error al guardar. Intentá de nuevo.';
    st.style.color='#C0756E';
    btn.innerHTML='Guardar cambios';btn.disabled=false;
  });
}

// ── HELPER ──
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function lighten(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r+(255-r)*a);g=Math.round(g+(255-g)*a);b=Math.round(b+(255-b)*a);
  return'#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0');}).join('');
}

// ── BUILD HTML DESDE JSON (cv_data del panel IA) ──
function buildHtml(d){
  var color=_color,ft=_ftitle,fb=_fbody,hs=_hstyle;
  var cl=lighten(color,0.88),cm=lighten(color,0.55);
  var showExp=document.getElementById('sec-exp').checked;
  var showEdu=document.getElementById('sec-edu').checked;
  var showSkills=document.getElementById('sec-skills').checked;
  var showIdiomas=document.getElementById('sec-idiomas').checked;
  var showCursos=document.getElementById('sec-cursos').checked;
  var showOtros=document.getElementById('sec-otros').checked;

  var nombre=d.nombre||'';
  var rolObj=d.rol_objetivo||'';
  var objetivo=d.objetivo||'';
  var contacto=d.contacto||{};
  var exp=Array.isArray(d.experiencia)?d.experiencia:[];
  var edu=Array.isArray(d.educacion)?d.educacion:[];
  var comps=Array.isArray(d.competencias)?d.competencias:[];
  var idiomas=Array.isArray(d.idiomas)?d.idiomas:[];
  var herr=Array.isArray(d.herramientas)?d.herramientas:[];
  var cursos=Array.isArray(d.cursos)?d.cursos:[];
  var otros=d.otros||{};

  var headBg=hs==='grad'
    ?'background:linear-gradient(135deg,'+color+' 0%,'+cm+' 100%);'
    :'background:'+color+';';

  var css='<style>';
  css+='*{box-sizing:border-box;margin:0;padding:0;}';
  css+='body{font-family:"'+fb+'",sans-serif;font-size:11px;color:#2D292A;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}';
  css+='.cv{display:grid;grid-template-columns:195px 1fr;min-height:297mm;width:210mm;}';
  // Columna izquierda
  css+='.cv-l{'+headBg+'}';
  css+='.foto{width:100%;height:195px;overflow:hidden;display:flex;align-items:center;justify-content:center;}';
  css+='.foto img{width:100%;height:100%;object-fit:cover;object-position:top;}';
  css+='.foto-ini{width:100%;height:195px;display:flex;align-items:center;justify-content:center;font-family:"'+ft+'",sans-serif;font-size:52px;font-weight:900;color:rgba(255,255,255,.9);letter-spacing:2px;background:'+cm+';}'
  css+='.l-body{padding:16px 14px;}';
  css+='.l-nombre{font-family:"'+ft+'",sans-serif;font-size:13px;font-weight:800;color:'+lighten(color,0.9)+';line-height:1.25;margin-bottom:3px;letter-spacing:-.2px;}';
  css+='.l-rol{font-size:9.5px;color:'+lighten(color,0.7)+';font-weight:600;margin-bottom:14px;line-height:1.4;}';
  css+='.sl{margin-bottom:13px;}';
  css+='.sl-h{font-family:"'+ft+'",sans-serif;font-size:7.5px;font-weight:800;color:'+lighten(color,0.7)+';text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid '+lighten(color,0.6)+';padding-bottom:4px;margin-bottom:7px;}';
  css+='.sl-row{font-size:9.5px;color:'+lighten(color,0.85)+';margin-bottom:4px;line-height:1.45;word-break:break-all;}';
  css+='.tag{display:inline-block;font-size:8px;font-weight:700;padding:2px 7px;border-radius:3px;margin:2px 2px 2px 0;background:'+lighten(color,0.5)+';color:'+lighten(color,0.95)+';}';
  css+='.lang-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}';
  css+='.lang-n{font-size:9.5px;color:'+lighten(color,0.88)+';font-weight:600;}';
  css+='.lang-lv{font-size:8px;font-weight:700;background:'+lighten(color,0.5)+';color:'+lighten(color,0.95)+';padding:2px 6px;border-radius:3px;}';
  css+='.tool{font-size:9.5px;color:'+lighten(color,0.85)+';margin-bottom:3px;display:flex;gap:5px;align-items:center;}';
  css+='.tool::before{content:"";width:4px;height:4px;border-radius:50%;background:'+lighten(color,0.6)+';flex-shrink:0;}';
  // Columna derecha
  css+='.cv-r{padding:24px 22px;background:#fff;}';
  css+='.r-head{border-bottom:2px solid '+cl+';padding-bottom:12px;margin-bottom:16px;}';
  css+='.r-nombre{font-family:"'+ft+'",sans-serif;font-size:30px;font-weight:900;color:#111;letter-spacing:-1.5px;line-height:1;text-transform:uppercase;}';
  css+='.r-rol{font-size:11px;font-weight:700;color:'+color+';margin-top:5px;letter-spacing:.03em;}';
  css+='.r-obj{font-size:10.5px;color:#555;line-height:1.7;margin-top:6px;}';
  css+='.r-sec{margin-bottom:14px;}';
  css+='.r-h{font-family:"'+ft+'",sans-serif;font-size:7.5px;font-weight:900;color:'+color+';text-transform:uppercase;letter-spacing:1.5px;border-bottom:2px solid '+cl+';padding-bottom:3px;margin-bottom:9px;}';
  css+='.exp{margin-bottom:11px;padding-left:10px;border-left:3px solid '+color+';}';
  css+='.exp-t{font-family:"'+ft+'",sans-serif;font-size:11.5px;font-weight:800;color:#111;margin-bottom:2px;}';
  css+='.exp-s{font-size:9.5px;color:'+color+';font-weight:700;margin-bottom:4px;}';
  css+='.exp-b{font-size:10px;color:#444;line-height:1.6;margin-bottom:2px;display:flex;gap:5px;}';
  css+='.exp-b::before{content:"–";color:'+color+';flex-shrink:0;}';
  css+='.edu{margin-bottom:8px;display:flex;gap:9px;align-items:flex-start;}';
  css+='.edu-dot{width:7px;height:7px;border-radius:50%;background:'+color+';flex-shrink:0;margin-top:3px;}';
  css+='.edu-t{font-size:11px;font-weight:800;color:#111;}';
  css+='.edu-s{font-size:9.5px;color:'+color+';font-weight:600;margin-top:1px;}';
  css+='.otros-g{display:grid;grid-template-columns:1fr 1fr;gap:5px;}';
  css+='.otro{font-size:10px;color:#444;display:flex;gap:4px;}';
  css+='.otro-check{color:'+color+';font-weight:800;}';
  css+='@page{margin:0;size:A4;}@media print{body{background:#fff;}}';
  css+='</style>';

  var o=css+'<div class="cv"><div class="cv-l">';
  // Foto
  if(_photo){o+='<div class="foto"><img src="'+_photo+'"></div>';}
  else{o+='<div class="foto-ini">'+(nombre.split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase()||'CV')+'</div>';}
  o+='<div class="l-body">';
  o+='<div class="l-nombre">'+esc(nombre)+'</div>';
  if(rolObj)o+='<div class="l-rol">'+esc(rolObj)+'</div>';
  // Contacto
  if(contacto.tel||contacto.email||contacto.ciudad||contacto.linkedin){
    o+='<div class="sl"><div class="sl-h">Contacto</div>';
    if(contacto.tel)o+='<div class="sl-row">📞 '+esc(contacto.tel)+'</div>';
    if(contacto.email)o+='<div class="sl-row">✉ '+esc(contacto.email)+'</div>';
    if(contacto.ciudad)o+='<div class="sl-row">📍 '+esc(contacto.ciudad)+'</div>';
    if(contacto.linkedin)o+='<div class="sl-row">in/'+esc(contacto.linkedin)+'</div>';
    o+='</div>';
  }
  // Skills
  if(showSkills&&comps.length){
    o+='<div class="sl"><div class="sl-h">Competencias</div>';
    comps.slice(0,8).forEach(function(c){o+='<div class="tag">'+esc(c)+'</div>';});
    o+='</div>';
  }
  // Idiomas
  if(showIdiomas&&idiomas.length){
    o+='<div class="sl"><div class="sl-h">Idiomas</div>';
    idiomas.forEach(function(id){
      o+='<div class="lang-row"><span class="lang-n">'+esc(id.idioma||id)+'</span>';
      if(id.nivel)o+='<span class="lang-lv">'+esc(id.nivel)+'</span>';
      o+='</div>';
    });
    o+='</div>';
  }
  // Herramientas
  if(herr.length){
    o+='<div class="sl"><div class="sl-h">Herramientas</div>';
    herr.slice(0,8).forEach(function(h){o+='<div class="tool">'+esc(h)+'</div>';});
    o+='</div>';
  }
  o+='</div></div>';// l-body, cv-l

  // Columna derecha
  o+='<div class="cv-r">';
  o+='<div class="r-head">';
  o+='<div class="r-nombre">'+esc(nombre)+'</div>';
  if(rolObj)o+='<div class="r-rol">'+esc(rolObj)+'</div>';
  if(objetivo)o+='<div class="r-obj">'+esc(objetivo)+'</div>';
  o+='</div>';
  // Experiencia
  if(showExp&&exp.length){
    o+='<div class="r-sec"><div class="r-h">Experiencia profesional</div>';
    exp.forEach(function(e){
      o+='<div class="exp">';
      o+='<div class="exp-t">'+esc(e.titulo||'')+'</div>';
      if(e.empresa)o+='<div class="exp-s">'+esc(e.empresa)+'</div>';
      if(Array.isArray(e.bullets)){e.bullets.forEach(function(b){o+='<div class="exp-b">'+esc(b)+'</div>';});}
      else if(e.descripcion)o+='<div class="exp-b">'+esc(e.descripcion)+'</div>';
      o+='</div>';
    });
    o+='</div>';
  }
  // Educación
  if(showEdu&&edu.length){
    o+='<div class="r-sec"><div class="r-h">Educación</div>';
    edu.forEach(function(e){
      o+='<div class="edu"><div class="edu-dot"></div><div>';
      o+='<div class="edu-t">'+esc(e.titulo||'')+'</div>';
      if(e.institucion)o+='<div class="edu-s">'+esc(e.institucion)+'</div>';
      o+='</div></div>';
    });
    o+='</div>';
  }
  // Cursos
  if(showCursos&&cursos.length){
    o+='<div class="r-sec"><div class="r-h">Formación complementaria</div>';
    cursos.forEach(function(c){
      o+='<div class="edu"><div class="edu-dot"></div><div class="edu-t">'+esc(c)+'</div></div>';
    });
    o+='</div>';
  }
  // Otros
  if(showOtros&&(otros.incorporacion||otros.modalidad||otros.viajes)){
    o+='<div class="r-sec"><div class="r-h">Otros datos</div><div class="otros-g">';
    if(otros.incorporacion)o+='<div class="otro"><span class="otro-check">✓</span>Incorporación: '+esc(otros.incorporacion)+'</div>';
    if(otros.modalidad)o+='<div class="otro"><span class="otro-check">✓</span>Modalidad: '+esc(otros.modalidad)+'</div>';
    if(otros.viajes)o+='<div class="otro"><span class="otro-check">✓</span>Viajes: '+esc(otros.viajes)+'</div>';
    o+='</div></div>';
  }
  o+='</div></div>';// cv-r, cv
  return'<!DOCTYPE html><html><head><meta charset="UTF-8">'+css+'</head><body>'+o.replace(css,'')+'</body></html>';
}

// ── BUILD BÁSICO DESDE _cand (sin cv_data) ──
function buildBasico(){
  var c=_cand,color=_color,ft=_ftitle,fb=_fbody;
  var cl=lighten(color,0.88),cm=lighten(color,0.55);
  if(!c){return'<html><body style="display:flex;align-items:center;justify-content:center;min-height:297mm;font-family:sans-serif;color:#888;font-size:13px;">Sin datos del candidato</body></html>';}
  var nombre=c.nombre||'';
  var rol=c.sector||c.rol||'';
  var skills=c.habilidades?(c.habilidades.split(/[,;|]/).map(function(x){return x.trim();}).filter(Boolean)):[];
  var hs=_hstyle;
  var headBg=hs==='grad'?'background:linear-gradient(135deg,'+color+' 0%,'+cm+' 100%);':'background:'+color+';';
  return'<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:"'+fb+'",sans-serif;font-size:11px;color:#2D292A;background:#fff;}.cv{display:grid;grid-template-columns:195px 1fr;min-height:297mm;}.cv-l{'+headBg+'padding:20px 16px;}.l-nombre{font-family:"'+ft+'",sans-serif;font-size:15px;font-weight:800;color:#fff;margin-bottom:4px;}.l-rol{font-size:10px;color:rgba(255,255,255,.7);margin-bottom:14px;}.sl-h{font-size:8px;font-weight:800;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;margin-top:14px;}.sl-row{font-size:10px;color:rgba(255,255,255,.85);margin-bottom:3px;}.tag{display:inline-block;background:rgba(255,255,255,.2);color:#fff;font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:3px;margin:2px;}.cv-r{padding:24px 22px;}.r-head{border-bottom:2px solid '+cl+';padding-bottom:12px;margin-bottom:16px;}.r-nombre{font-family:"'+ft+'",sans-serif;font-size:28px;font-weight:900;color:#111;letter-spacing:-1.5px;text-transform:uppercase;}.r-rol{font-size:11px;font-weight:700;color:'+color+';margin-top:5px;}.r-obj{font-size:10.5px;color:#555;line-height:1.7;margin-top:6px;}.r-sec{margin-bottom:14px;}.r-h{font-size:8px;font-weight:900;color:'+color+';text-transform:uppercase;letter-spacing:1.5px;border-bottom:2px solid '+cl+';padding-bottom:3px;margin-bottom:9px;}.prep{font-size:12px;color:#9E9696;line-height:1.7;font-style:italic;}</style></head><body><div class="cv"><div class="cv-l"><div class="l-nombre">'+esc(nombre)+'</div><div class="l-rol">'+esc(rol)+'</div>'+
  (c.email?'<div class="sl-h">Contacto</div><div class="sl-row">'+esc(c.email)+'</div>':'')+
  (c.ciudad?'<div class="sl-row">'+esc(c.ciudad)+'</div>':'')+
  (skills.length?'<div class="sl-h">Habilidades</div>'+skills.slice(0,6).map(function(s){return'<div class="tag">'+esc(s)+'</div>';}).join(''):'')
  +'</div><div class="cv-r"><div class="r-head"><div class="r-nombre">'+esc(nombre)+'</div><div class="r-rol">'+esc(rol)+'</div>'+(c.objetivo?'<div class="r-obj">'+esc(c.objetivo)+'</div>':'')+'</div><div class="r-sec"><div class="r-h">Estado del CV</div><div class="prep">Micaela está preparando tu CV optimizado. Cuando esté listo aparecerá aquí.</div></div></div></div></body></html>';
}
</script>
