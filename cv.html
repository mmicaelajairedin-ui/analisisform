<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>CV</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#E8E4E4;font-family:'Inter',sans-serif;}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:#fff;border-bottom:1px solid #EDE8E8;
  height:52px;padding:0 20px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.tb-back{background:none;border:none;font-size:11px;font-weight:700;color:#888;cursor:pointer;font-family:'Montserrat',sans-serif;display:flex;align-items:center;gap:5px;}
.tb-back:hover{color:#2D292A;}
.tb-sep{width:1px;height:24px;background:#EDE8E8;flex-shrink:0;}
.tb-brand{font-size:13px;font-weight:800;color:#2D292A;font-family:'Montserrat',sans-serif;}
.tb-name{font-size:11px;color:#888;font-weight:600;font-family:'Montserrat',sans-serif;}
.tb-spacer{flex:1;}
/* Color swatches */
.tb-lbl{font-size:9px;font-weight:800;color:#8E7676;text-transform:uppercase;letter-spacing:.1em;font-family:'Montserrat',sans-serif;}
.sw-wrap{display:flex;gap:5px;align-items:center;}
.sw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s;flex-shrink:0;}
.sw.on{border-color:#2D292A;transform:scale(1.2);}
/* Font select */
.tb-sel{font-size:11px;padding:4px 8px;border:1.5px solid #EDE8E8;border-radius:7px;background:#fff;color:#2D292A;cursor:pointer;outline:none;font-family:'Montserrat',sans-serif;}
/* Photo */
.tb-photo{width:30px;height:30px;border-radius:50%;overflow:hidden;border:2px solid #D4BFBF;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#F5EFEF;font-size:11px;color:#8E7676;flex-shrink:0;}
.tb-photo img{width:100%;height:100%;object-fit:cover;}
/* Buttons */
.tb-btn{font-size:11px;font-weight:700;padding:7px 14px;border-radius:8px;cursor:pointer;border:none;font-family:'Montserrat',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .15s;}
.btn-edit{background:#F5F0F0;color:#8E7676;}
.btn-edit:hover{background:#EDE8E8;}
.btn-edit.on{background:#8E7676;color:#fff;}
.btn-save{background:#5A8C6E;color:#fff;}
.btn-save:hover{opacity:.9;}
.btn-pdf{background:#2D292A;color:#fff;}
.btn-pdf:hover{opacity:.9;}
.save-st{font-size:11px;color:#5A8C6E;font-weight:700;font-family:'Montserrat',sans-serif;}

/* ── WORKSPACE ── */
.ws{padding:68px 30px 50px;display:flex;justify-content:center;min-height:100vh;}
.cv-wrap{width:210mm;display:flex;flex-direction:column;gap:0;}

/* ── PÁGINA ── */
.cv-page{
  width:210mm;background:#fff;
  box-shadow:0 8px 32px rgba(0,0,0,.12);
  margin-bottom:16px;
  position:relative;overflow:hidden;
  page-break-after:always;
}

/* ── CABECERA ── */
.cv-head{
  display:flex;align-items:center;gap:0;
}
.cv-head-left{
  width:72mm;flex-shrink:0;
  padding:22px 18px 18px;
  display:flex;align-items:center;gap:12px;
}
.cv-foto{
  width:68px;height:68px;border-radius:50%;overflow:hidden;
  border:3px solid rgba(255,255,255,.35);flex-shrink:0;
  cursor:pointer;position:relative;
}
.cv-foto img{width:100%;height:100%;object-fit:cover;object-position:top;}
.cv-foto-ini{
  width:68px;height:68px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;color:rgba(255,255,255,.85);
  background:rgba(255,255,255,.15);cursor:pointer;
}
.cv-head-right{
  flex:1;padding:22px 20px 18px 16px;
}
.cv-nombre{
  font-size:26px;font-weight:900;color:#111;
  letter-spacing:-1px;line-height:1;text-transform:uppercase;
  margin-bottom:4px;
}
.cv-rol{
  font-size:11px;font-weight:700;letter-spacing:.04em;
  margin-bottom:10px;
}
.cv-contacto{display:flex;flex-wrap:wrap;gap:4px 14px;}
.cv-ct{font-size:10px;color:#555;display:flex;align-items:center;gap:4px;}
.cv-ct a{color:inherit;text-decoration:none;}
.cv-ct svg{flex-shrink:0;}

/* ── BODY 2 COLUMNAS ── */
.cv-body{display:grid;grid-template-columns:72mm 1fr;}

/* ── COLUMNA IZQUIERDA ── */
.cv-left{padding:16px 16px 20px;border-right:1px solid #F0EDED;}
.sl{margin-bottom:14px;}
.sl-h{
  font-size:7.5px;font-weight:900;text-transform:uppercase;
  letter-spacing:1.4px;padding-bottom:4px;margin-bottom:8px;
  border-bottom-width:1.5px;border-bottom-style:solid;
  font-family:'Montserrat',sans-serif;
}
.sl-item{font-size:10px;color:#333;margin-bottom:5px;line-height:1.5;}
.sl-item strong{font-weight:700;}
.lang-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.lang-n{font-size:10px;color:#333;font-weight:600;}
.lang-lv{font-size:8px;font-weight:800;padding:2px 7px;border-radius:3px;color:#fff;}
.comp-tag{
  display:inline-block;font-size:9px;font-weight:700;
  padding:3px 8px;border-radius:3px;margin:2px 2px 2px 0;
  line-height:1.4;
}
.tool-item{
  font-size:9.5px;color:#444;margin-bottom:4px;
  display:flex;align-items:flex-start;gap:5px;line-height:1.4;
}
.tool-item::before{content:"▸";flex-shrink:0;font-size:8px;margin-top:2px;}
.curso-item{font-size:9.5px;color:#333;margin-bottom:6px;line-height:1.45;}
.curso-nombre{font-weight:600;}
.otros-item{font-size:9.5px;color:#444;margin-bottom:4px;display:flex;gap:5px;align-items:flex-start;}
.otros-ok{font-weight:800;}

/* ── COLUMNA DERECHA ── */
.cv-right{padding:16px 18px 20px;}
.sec{margin-bottom:14px;}
.sec-h{
  font-size:7.5px;font-weight:900;text-transform:uppercase;
  letter-spacing:1.4px;padding-bottom:4px;margin-bottom:10px;
  border-bottom-width:2px;border-bottom-style:solid;
  font-family:'Montserrat',sans-serif;
}
.exp{margin-bottom:12px;padding-left:10px;border-left-width:2.5px;border-left-style:solid;}
.exp-t{font-size:11.5px;font-weight:800;color:#111;margin-bottom:1px;font-family:'Montserrat',sans-serif;}
.exp-s{font-size:9.5px;font-weight:600;margin-bottom:5px;}
.exp-b{
  font-size:10px;color:#333;line-height:1.65;
  margin-bottom:3px;display:flex;gap:6px;align-items:flex-start;
}
.exp-b::before{content:"–";flex-shrink:0;font-weight:700;margin-top:0px;}
.edu{margin-bottom:7px;display:flex;gap:8px;align-items:flex-start;}
.edu-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.edu-t{font-size:10.5px;font-weight:700;color:#111;}
.edu-s{font-size:9.5px;font-weight:500;margin-top:1px;}

/* ── EDICIÓN ── */
[contenteditable="true"]{outline:none;}
.editing-mode [contenteditable="true"]:hover{background:rgba(142,118,118,.07);border-radius:2px;cursor:text;}
.editing-mode [contenteditable="true"]:focus{background:rgba(142,118,118,.1);border-radius:2px;}
.edit-hint{
  display:none;position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:#2D292A;color:#fff;font-size:11px;font-weight:700;
  font-family:'Montserrat',sans-serif;padding:8px 18px;border-radius:20px;
  pointer-events:none;z-index:300;
}
.editing-mode ~ .edit-hint,.editing-mode+.edit-hint{display:block;}
body.editing .edit-hint{display:block;}

/* ── NÚMERO SEPARADO POR 3 DÍGITOS ── */
.num{font-variant-numeric:tabular-nums;}

/* ── PRINT ── */
@media print{
  .topbar,.edit-hint{display:none!important;}
  html,body{background:#fff!important;}
  .ws{padding:0!important;background:#fff!important;}
  .cv-page{box-shadow:none!important;margin-bottom:0!important;}
  @page{margin:0;size:A4;}
}

@media(max-width:800px){
  .ws{padding:60px 4px 40px;}
  .cv-page,.cv-wrap{width:100%;}
  .cv-body{grid-template-columns:160px 1fr;}
  .cv-head-left{width:160px;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <button class="tb-back" id="btn-back" onclick="goBack()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Portal
  </button>
  <div class="tb-sep"></div>
  <div class="tb-brand">CV</div>
  <div class="tb-name" id="tb-name"></div>
  <div class="tb-sep"></div>

  <!-- Foto -->
  <div class="tb-photo" id="tb-photo" onclick="document.getElementById('file-foto').click()" title="Cambiar foto">+</div>
  <input type="file" id="file-foto" accept="image/*" style="display:none">

  <div class="tb-sep"></div>
  <div class="tb-lbl">Color</div>
  <div class="sw-wrap" id="sw-wrap"></div>

  <div class="tb-sep"></div>
  <div class="tb-lbl">Fuente</div>
  <select class="tb-sel" id="sel-font" onchange="applyFont(this.value)">
    <option value="Montserrat">Montserrat</option>
    <option value="Inter">Inter</option>
    <option value="Georgia">Georgia</option>
    <option value="Raleway">Raleway</option>
  </select>

  <div class="tb-spacer"></div>
  <span class="save-st" id="save-st"></span>
  <button class="tb-btn btn-edit" id="btn-edit" onclick="toggleEdit()">✏ Editar</button>
  <button class="tb-btn btn-save" onclick="guardar()">✓ Guardar</button>
  <button class="tb-btn btn-pdf" onclick="window.print()">↓ PDF</button>
</div>

<div class="edit-hint" id="edit-hint">Clic en cualquier texto para editar · Esc para salir</div>

<!-- WORKSPACE -->
<div class="ws" id="ws">
  <div class="cv-wrap" id="cv-wrap">
    <div style="display:flex;align-items:center;justify-content:center;min-height:400px;color:#999;font-family:'Montserrat',sans-serif;font-size:13px;">Cargando CV...</div>
  </div>
</div>

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://mmicaelajairedin-ui.github.io/analisisform';

var _email=null,_d=null,_photo=null,_color='#584E4A',_font='Montserrat',_editing=false;

var PALETA=[
  {hex:'#584E4A',name:'Carbón'},
  {hex:'#8E7676',name:'Malva'},
  {hex:'#2D3E50',name:'Marino'},
  {hex:'#2D292A',name:'Negro'},
  {hex:'#4A6FA5',name:'Azul'},
  {hex:'#5A8C6E',name:'Verde'},
  {hex:'#7A5C4A',name:'Marrón'},
  {hex:'#6B5A8A',name:'Violeta'},
];

function goBack(){window.location.href=BASE+'/cliente.html';}

// ── INIT ──
(function(){
  var p=new URLSearchParams(window.location.search);
  _email=p.get('email');
  if(!_email){var u=localStorage.getItem('mj_user');if(u){try{_email=JSON.parse(u).email;}catch(e){}}}
  buildSwatches();
  document.getElementById('file-foto').onchange=onFotoChange;
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&_editing)toggleEdit();});
  if(_email) cargar();
  else showErr('Sin sesión','Accedé desde tu portal');
})();

function buildSwatches(){
  var w=document.getElementById('sw-wrap');
  w.innerHTML='';
  PALETA.forEach(function(p){
    var b=document.createElement('button');
    b.className='sw'+(p.hex===_color?' on':'');
    b.style.background=p.hex;b.title=p.name;
    b.onclick=function(){
      _color=p.hex;
      document.querySelectorAll('.sw').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');
      applyTheme();
    };
    w.appendChild(b);
  });
}

// ── CARGA ──
function cargar(){
  var h={'apikey':KEY,'Authorization':'Bearer '+KEY};
  Promise.all([
    fetch(SB+'/rest/v1/candidatos?email=eq.'+enc(_email)+'&select=*&limit=1',{headers:h}).then(r=>r.json()),
    fetch(SB+'/rest/v1/cv_publicados?email=eq.'+enc(_email)+'&order=created_at.desc&limit=1&select=contenido',{headers:h}).then(r=>r.json())
  ]).then(function(res){
    var cand=res[0]&&res[0].length?res[0][0]:null;
    if(cand){
      document.getElementById('tb-name').textContent=cand.nombre||'';
      if(cand.foto_perfil){_photo=cand.foto_perfil;setFotoPreview(_photo);}
    }
    var raw=res[1]&&res[1].length?res[1][0].contenido:null;
    if(raw){
      try{
        var parsed=JSON.parse(raw);
        if(parsed&&(parsed.nombre||parsed.experiencia)){_d=parsed;render();return;}
      }catch(e){}
      // HTML guardado — mostrarlo directo
      document.getElementById('cv-wrap').innerHTML=raw;
      applyTheme();
    } else if(cand) {
      showErr('CV en preparación','Micaela está trabajando en tu CV.');
    } else {
      showErr('Sin datos','Accedé desde tu portal.');
    }
  }).catch(function(){showErr('Error de conexión','Recargá la página.');});
}

function showErr(t,s){
  document.getElementById('cv-wrap').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:10px;color:#999;font-family:Montserrat,sans-serif;text-align:center;"><div style="font-size:36px;">📄</div><div style="font-size:14px;font-weight:800;color:#4A3F3F;">'+t+'</div><div style="font-size:12px;">'+s+'</div></div>';
}

// ── FOTO ──
function onFotoChange(e){
  var f=e.target.files[0];if(!f)return;
  var fr=new FileReader();
  fr.onload=function(ev){_photo=ev.target.result;setFotoPreview(_photo);updateFotos();};
  fr.readAsDataURL(f);
}
function setFotoPreview(src){
  var p=document.getElementById('tb-photo');
  p.innerHTML='<img src="'+src+'" style="width:100%;height:100%;object-fit:cover;">';
}
function updateFotos(){
  document.querySelectorAll('.cv-foto').forEach(function(el){
    el.innerHTML='<img src="'+_photo+'" style="width:100%;height:100%;object-fit:cover;object-position:top;">';
    el.onclick=function(){document.getElementById('file-foto').click();};
  });
}

// ── RENDER ──
function render(){
  if(!_d){showErr('Sin datos de CV','Generá el CV desde el panel.');return;}
  document.getElementById('cv-wrap').innerHTML=buildPages(_d);
  applyTheme();
}

// ── THEME ──
function applyTheme(){
  var c=_color;
  var cl=lighten(c,.88),cm=lighten(c,.5);
  // Head background
  document.querySelectorAll('.cv-head-left').forEach(function(el){el.style.background=c;});
  document.querySelectorAll('.cv-head-right').forEach(function(el){el.style.background=cl;});
  // Name color
  document.querySelectorAll('.cv-nombre').forEach(function(el){el.style.color=c;});
  document.querySelectorAll('.cv-rol').forEach(function(el){el.style.color=c;});
  // Section headers
  document.querySelectorAll('.sl-h').forEach(function(el){el.style.color=c;el.style.borderColor=cm;});
  document.querySelectorAll('.sec-h').forEach(function(el){el.style.color=c;el.style.borderColor=cl;});
  // Exp border
  document.querySelectorAll('.exp').forEach(function(el){el.style.borderColor=c;});
  document.querySelectorAll('.exp-s').forEach(function(el){el.style.color=c;});
  document.querySelectorAll('.exp-b::before').forEach(function(el){el.style.color=c;});
  // Edu dot
  document.querySelectorAll('.edu-dot').forEach(function(el){el.style.background=c;});
  document.querySelectorAll('.edu-s').forEach(function(el){el.style.color=cm;});
  // Competencias tags
  document.querySelectorAll('.comp-tag').forEach(function(el){el.style.background=cl;el.style.color=c;});
  // Lang level
  document.querySelectorAll('.lang-lv').forEach(function(el){el.style.background=c;});
  // Left col text
  document.querySelectorAll('.sl-item,.lang-n,.tool-item,.otros-item,.curso-nombre').forEach(function(el){el.style.color='rgba(255,255,255,.9)';});
  document.querySelectorAll('.cv-left').forEach(function(el){el.style.background=c;});
  // Contacto
  document.querySelectorAll('.cv-ct').forEach(function(el){el.style.color='rgba(255,255,255,.8)';});
  // Font
  applyFont(_font);
}

function applyFont(f){
  _font=f;
  document.querySelectorAll('.cv-nombre,.exp-t,.sec-h,.sl-h').forEach(function(el){el.style.fontFamily='"'+f+'",sans-serif';});
}

// ── BUILD PAGES ──
function buildPages(d){
  var exp=arr(d.experiencia);
  // Página 1: cabecera + col izq (todo) + primeras 2 exp
  // Página 2: resto de exp + educación
  var exp1=exp.slice(0,2);
  var exp2=exp.slice(2);

  var pg1=buildPage1(d,exp1);
  var pg2=exp2.length||arr(d.educacion).length?buildPage2(d,exp2):'';
  return pg1+pg2;
}

function buildPage1(d,expSlice){
  var nombre=d.nombre||'';
  var rolObj=d.rol_objetivo||'';
  var obj=d.objetivo||'';
  var ct=d.contacto||{};
  var comps=arr(d.competencias);
  var idiomas=arr(d.idiomas);
  var herr=arr(d.herramientas);
  var cursos=arr(d.cursos);
  var otros=d.otros||{};
  var ini2=nombre.split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase()||'CV';

  var o='<div class="cv-page">';

  // CABECERA
  o+='<div class="cv-head">';
  // Izquierda cabecera — foto
  o+='<div class="cv-head-left">';
  if(_photo){
    o+='<div class="cv-foto"><img src="'+_photo+'" onclick="document.getElementById(\'file-foto\').click()"></div>';
  } else {
    o+='<div class="cv-foto-ini" onclick="document.getElementById(\'file-foto\').click()">'+ini2+'</div>';
  }
  o+='</div>';
  // Derecha cabecera — nombre, rol, contacto
  o+='<div class="cv-head-right">';
  o+='<div class="cv-nombre" contenteditable="false">'+esc(nombre)+'</div>';
  o+='<div class="cv-rol" contenteditable="false">'+esc(rolObj)+'</div>';
  o+='<div class="cv-contacto">';
  if(ct.tel) o+='<div class="cv-ct"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.57 3.43 2 2 0 0 1 3.54 1.26h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.8a16 16 0 0 0 6.29 6.29l.88-.88a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 17"/></svg><span contenteditable="false">'+esc(ct.tel)+'</span></div>';
  if(ct.email) o+='<div class="cv-ct"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span contenteditable="false">'+esc(ct.email)+'</span></div>';
  if(ct.ciudad) o+='<div class="cv-ct"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span contenteditable="false">'+esc(ct.ciudad)+'</span></div>';
  if(ct.linkedin) o+='<div class="cv-ct"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg><a href="https://linkedin.com/in/'+esc(ct.linkedin)+'" target="_blank" contenteditable="false">linkedin.com/in/'+esc(ct.linkedin)+'</a></div>';
  o+='</div></div></div>';

  // BODY
  o+='<div class="cv-body">';

  // COLUMNA IZQUIERDA
  o+='<div class="cv-left">';
  // Perfil
  if(obj){
    o+='<div class="sl"><div class="sl-h">Perfil profesional</div>';
    o+='<div class="sl-item" contenteditable="false" style="font-size:9.5px;line-height:1.6;opacity:.88;">'+esc(obj)+'</div>';
    o+='</div>';
  }
  // Competencias
  if(comps.length){
    o+='<div class="sl"><div class="sl-h">Competencias</div>';
    comps.slice(0,6).forEach(function(c){o+='<span class="comp-tag" contenteditable="false">'+esc(c)+'</span>';});
    o+='</div>';
  }
  // Herramientas
  if(herr.length){
    o+='<div class="sl"><div class="sl-h">Herramientas</div>';
    herr.forEach(function(h){o+='<div class="tool-item" contenteditable="false">'+esc(h)+'</div>';});
    o+='</div>';
  }
  // Idiomas
  if(idiomas.length){
    o+='<div class="sl"><div class="sl-h">Idiomas</div>';
    idiomas.forEach(function(id){
      var n=id.idioma||id,lv=id.nivel||'';
      // Solo mostrar nivel si es A2+ (no básico)
      var showLv=lv&&!lv.toLowerCase().includes('a1')&&!lv.toLowerCase().includes('basico');
      o+='<div class="lang-row">';
      o+='<span class="lang-n" contenteditable="false">'+esc(n)+'</span>';
      if(showLv)o+='<span class="lang-lv" contenteditable="false">'+esc(lv)+'</span>';
      o+='</div>';
    });
    o+='</div>';
  }
  // Cursos
  if(cursos.length){
    o+='<div class="sl"><div class="sl-h">Formación complementaria</div>';
    cursos.forEach(function(c){
      if(typeof c==='string'){
        o+='<div class="curso-item"><div class="curso-nombre" contenteditable="false">'+esc(c)+'</div></div>';
      } else {
        o+='<div class="curso-item"><div class="curso-nombre" contenteditable="false">'+esc(c.nombre||c)+'</div>'+(c.institucion?'<div style="font-size:9px;opacity:.7;">'+esc(c.institucion)+'</div>':'')+'</div>';
      }
    });
    o+='</div>';
  }
  // Otros datos
  if(otros.incorporacion||otros.modalidad||otros.viajes){
    o+='<div class="sl"><div class="sl-h">Otros datos</div>';
    if(otros.incorporacion)o+='<div class="otros-item"><span class="otros-ok">✓</span><span contenteditable="false">Incorporación: '+esc(otros.incorporacion)+'</span></div>';
    if(otros.modalidad)o+='<div class="otros-item"><span class="otros-ok">✓</span><span contenteditable="false">Modalidad: '+esc(otros.modalidad)+'</span></div>';
    if(otros.viajes)o+='<div class="otros-item"><span class="otros-ok">✓</span><span contenteditable="false">Viajes: '+esc(otros.viajes)+'</span></div>';
    o+='</div>';
  }
  o+='</div>';

  // COLUMNA DERECHA
  o+='<div class="cv-right">';
  // Experiencia
  if(expSlice.length){
    o+='<div class="sec"><div class="sec-h">Experiencia profesional</div>';
    expSlice.forEach(function(e){
      o+='<div class="exp">';
      o+='<div class="exp-t" contenteditable="false">'+esc(e.titulo||'')+'</div>';
      if(e.empresa)o+='<div class="exp-s" contenteditable="false">'+esc(e.empresa)+'</div>';
      arr(e.bullets).slice(0,5).forEach(function(b){
        o+='<div class="exp-b" contenteditable="false">'+bold(esc(b))+'</div>';
      });
      o+='</div>';
    });
    o+='</div>';
  }
  o+='</div>';

  o+='</div></div>'; // body, page
  return o;
}

function buildPage2(d,expRest){
  var edu=arr(d.educacion);
  if(!expRest.length&&!edu.length)return '';

  var o='<div class="cv-page">';
  o+='<div class="cv-body">';
  o+='<div class="cv-left"></div>';
  o+='<div class="cv-right">';

  // Resto de experiencia
  if(expRest.length){
    o+='<div class="sec"><div class="sec-h">Experiencia profesional (cont.)</div>';
    expRest.forEach(function(e){
      o+='<div class="exp">';
      o+='<div class="exp-t" contenteditable="false">'+esc(e.titulo||'')+'</div>';
      if(e.empresa)o+='<div class="exp-s" contenteditable="false">'+esc(e.empresa)+'</div>';
      arr(e.bullets).slice(0,5).forEach(function(b){
        o+='<div class="exp-b" contenteditable="false">'+bold(esc(b))+'</div>';
      });
      o+='</div>';
    });
    o+='</div>';
  }

  // Educación
  if(edu.length){
    o+='<div class="sec"><div class="sec-h">Educación</div>';
    edu.forEach(function(e){
      o+='<div class="edu">';
      o+='<div class="edu-dot"></div>';
      o+='<div><div class="edu-t" contenteditable="false">'+esc(e.titulo||'')+'</div>';
      if(e.institucion)o+='<div class="edu-s" contenteditable="false">'+esc(e.institucion)+'</div>';
      o+='</div></div>';
    });
    o+='</div>';
  }

  o+='</div></div></div>';
  return o;
}

// ── EDIT MODE ──
function toggleEdit(){
  _editing=!_editing;
  var btn=document.getElementById('btn-edit');
  document.querySelectorAll('[contenteditable]').forEach(function(el){
    el.contentEditable=_editing?'true':'false';
  });
  if(_editing){
    document.body.classList.add('editing');
    document.getElementById('cv-wrap').querySelectorAll('.cv-page').forEach(function(p){p.classList.add('editing-mode');});
    document.getElementById('edit-hint').style.display='block';
    btn.textContent='✓ Listo';btn.classList.add('on');
  } else {
    document.body.classList.remove('editing');
    document.getElementById('cv-wrap').querySelectorAll('.cv-page').forEach(function(p){p.classList.remove('editing-mode');});
    document.getElementById('edit-hint').style.display='none';
    btn.textContent='✏ Editar';btn.classList.remove('on');
  }
}

// ── GUARDAR ──
function guardar(){
  var st=document.getElementById('save-st');
  var wrap=document.getElementById('cv-wrap');
  var html=wrap.innerHTML;
  if(!_email||!html){st.textContent='Error';return;}
  st.textContent='Guardando...';
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+enc(_email),{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}})
  .then(function(r){return r.json();})
  .then(function(rows){
    var method=rows&&rows.length?'PATCH':'POST';
    var url=SB+'/rest/v1/cv_publicados'+(rows&&rows.length?'?email=eq.'+enc(_email):'');
    return fetch(url,{method:method,headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},
      body:JSON.stringify({email:_email,contenido:JSON.stringify(_d||html),updated_at:new Date().toISOString()})});
  })
  .then(function(r){
    st.textContent=r.ok||r.status===204?'✓ Guardado':'Error';
    st.style.color=r.ok||r.status===204?'#5A8C6E':'#C0756E';
    setTimeout(function(){st.textContent='';st.style.color='';},3000);
  })
  .catch(function(){st.textContent='Error';st.style.color='#C0756E';setTimeout(function(){st.textContent='';st.style.color='';},3000);});
}

// ── HELPERS ──
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function enc(s){return encodeURIComponent(s);}
function arr(x){return Array.isArray(x)?x:[];}
function lighten(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r+(255-r)*a);g=Math.round(g+(255-g)*a);b=Math.round(b+(255-b)*a);
  return'#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0');}).join('');
}
// Poner en negrita palabras entre ** o palabras clave de gestión
function bold(t){
  return t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
}
function fmtNum(t){
  return(t||'').replace(/\b(\d{4,})\b/g,function(m){return m.replace(/\B(?=(\d{3})+(?!\d))/g,'.');});
}
