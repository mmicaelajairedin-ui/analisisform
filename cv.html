<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Optimizado</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--A:#1B3A5C;--A2:#4A7FA5;--AB:#EEF3F8;--SB:#F4F6F9;--T:#1a1a1a;--S:#555;--BD:#E5E5E5;}
.f{--A:#1D4A35;--A2:#3A8060;--AB:#EAF3EE;--SB:#F2F7F4;}
.b{--A:#5C1B2E;--A2:#A54A65;--AB:#F4EEF0;--SB:#F7F2F4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#E8E6E2;padding:2rem 1rem 5rem;}
.bar{max-width:860px;margin:0 auto 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.bar-l{font-size:11px;font-weight:600;color:#8C7B80;background:#fff;padding:5px 14px;border-radius:20px;border:1px solid #e0d8d5;}
.bar-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.blbl{font-size:10px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.cdot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:.15s;}
.cdot.on{border-color:#fff;box-shadow:0 0 0 2.5px var(--A);}
.xbtn{padding:7px 16px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;border-radius:8px;cursor:pointer;border:none;transition:.15s;}
.xbtn-o{background:#fff;color:#555;border:1.5px solid #ddd;}.xbtn-o:hover{border-color:var(--A);color:var(--A);}
.xbtn-y{background:#f3a41b;color:#fff;}.xbtn-y:hover{opacity:.88;}
.xbtn-p{background:var(--A);color:#fff;}.xbtn-p:hover{opacity:.88;}
.lock{max-width:360px;margin:5rem auto;background:#fff;border-radius:16px;padding:2.5rem 2rem;text-align:center;box-shadow:0 4px 30px rgba(0,0,0,.08);}
.lock h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:6px;}
.lock p{font-size:12px;color:#666;line-height:1.6;margin-bottom:1.4rem;}
.lock input{width:150px;padding:11px;font-size:18px;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:.25em;text-align:center;text-transform:uppercase;border:2px solid #ddd;border-radius:10px;outline:none;}
.lock input:focus{border-color:var(--A);}
.lock button{margin-top:10px;width:100%;padding:12px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;background:var(--A);color:#fff;border:none;border-radius:10px;cursor:pointer;}
.lock-err{font-size:12px;color:#c0756e;margin-top:7px;min-height:16px;}
.cv{max-width:860px;margin:0 auto;background:#fff;box-shadow:0 8px 50px rgba(0,0,0,.13);}
.hd{background:var(--A);padding:36px 40px 30px;display:flex;align-items:center;gap:28px;position:relative;overflow:hidden;}
.hd::after{content:'';position:absolute;right:-50px;top:-50px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none;}
.ph{flex-shrink:0;cursor:pointer;position:relative;z-index:2;}
.ph-c{width:96px;height:96px;border-radius:50%;border:3px solid rgba(255,255,255,.3);overflow:hidden;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;}
.ph-c img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;}
.ph-ini{font-family:'Playfair Display',serif;font-size:30px;font-weight:800;color:rgba(255,255,255,.9);}
.ph-hint{font-size:9px;font-weight:600;color:rgba(255,255,255,.5);text-align:center;margin-top:5px;}
.hi{flex:1;z-index:2;}
[contenteditable]{outline:none;border-radius:3px;transition:background .15s;}
body.editing [contenteditable]:hover{background:rgba(255,255,255,.15);cursor:text;}
body.editing [contenteditable]:focus{background:rgba(255,255,255,.2);}
body.editing .cv-main-col [contenteditable]:hover{background:rgba(27,58,92,.06);}
body.editing .cv-main-col [contenteditable]:focus{background:rgba(27,58,92,.09);}
body.editing .cv-side-col [contenteditable]:hover{background:rgba(27,58,92,.06);}
body.editing .cv-side-col [contenteditable]:focus{background:rgba(27,58,92,.09);}
.name{font-family:'Playfair Display',serif;font-size:30px;font-weight:800;color:#fff;line-height:1.1;letter-spacing:-.02em;margin-bottom:5px;}
.rol{font-size:10px;font-weight:700;color:rgba(255,255,255,.72);letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px;}
.cts{display:flex;flex-wrap:wrap;gap:4px 18px;margin-bottom:10px;}
.ct{font-size:11px;color:rgba(255,255,255,.75);}
.ct strong{color:#fff;font-weight:600;}
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.88);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;}
.bd{display:grid;grid-template-columns:210px 1fr;}
.cv-side-col{background:var(--SB);padding:28px 20px;border-right:1px solid var(--BD);}
.ss{margin-bottom:26px;}
.ss:last-child{margin-bottom:0;}
.sh{font-size:8px;font-weight:700;color:var(--A);text-transform:uppercase;letter-spacing:.22em;margin-bottom:9px;padding-bottom:5px;border-bottom:1.5px solid var(--A);}
.sk{font-size:11.5px;color:var(--T);padding:3.5px 0 3.5px 12px;border-bottom:.5px solid var(--BD);line-height:1.4;position:relative;display:block;width:100%;}
.sk::before{content:'';position:absolute;left:0;top:10px;width:4px;height:4px;border-radius:50%;background:var(--A2);}
.sk:last-child{border-bottom:none;}
.lg-row{display:flex;justify-content:space-between;align-items:center;padding:4.5px 0;border-bottom:.5px solid var(--BD);}
.lg-row:last-child{border-bottom:none;}
.lg-n{font-size:11.5px;color:var(--T);font-weight:500;}
.lg-l{font-size:9px;font-weight:700;color:#fff;background:var(--A);padding:2px 8px;border-radius:10px;}
.ed{margin-bottom:13px;padding-bottom:13px;border-bottom:.5px solid var(--BD);}
.ed:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ed-d{font-size:11.5px;font-weight:700;color:var(--T);line-height:1.3;}
.ed-s{font-size:10.5px;color:var(--A2);font-weight:500;margin-top:2px;}
.ed-y{font-size:10px;color:var(--S);margin-top:2px;}
.ct2{font-size:11px;color:var(--T);padding:3px 0 3px 12px;border-bottom:.5px solid var(--BD);line-height:1.4;position:relative;display:block;width:100%;}
.ct2::before{content:'';position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:50%;background:var(--A2);}
.ct2:last-child{border-bottom:none;}
.cv-main-col{padding:28px 34px;}
.ms{margin-bottom:24px;}
.ms:last-child{margin-bottom:0;}
.mh{font-size:8px;font-weight:700;color:var(--A);text-transform:uppercase;letter-spacing:.22em;margin-bottom:10px;padding-bottom:5px;border-bottom:1.5px solid var(--A);}
.sum{font-size:12px;color:var(--T);line-height:1.8;}
.sum strong{font-weight:700;color:var(--A);}
.kws{display:flex;flex-wrap:wrap;gap:4px;margin-top:9px;}
.kw{font-size:9.5px;font-weight:600;color:var(--A);background:var(--AB);padding:2px 9px;border-radius:10px;}
.ex{margin-bottom:18px;padding-bottom:18px;border-bottom:.5px solid var(--BD);}
.ex:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:2px;}
.ex-t{font-family:'Playfair Display',serif;font-size:13.5px;font-weight:700;color:var(--T);line-height:1.2;flex:1;}
.ex-d{font-size:9.5px;font-weight:700;color:#fff;background:var(--A);padding:2px 9px;border-radius:10px;flex-shrink:0;white-space:nowrap;}
.ex-co{font-size:11px;color:var(--A2);font-weight:600;margin-bottom:5px;}
.ex-ctx{font-size:10.5px;color:#888;background:var(--AB);border-radius:4px;padding:4px 9px;margin-bottom:6px;line-height:1.5;border-left:2px solid var(--A2);font-style:italic;}
.ex-ul{list-style:none;padding:0;}
.ex-ul li{font-size:11.5px;color:var(--T);line-height:1.7;padding:3px 0 3px 14px;position:relative;}
.ex-ul li::before{content:'';position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--A);}
.ex-ul li strong{font-weight:700;color:var(--A);}
.bullet-controls{display:none;}
body.editing .bullet-controls{display:flex;gap:6px;margin-top:6px;}
.bc-btn{padding:3px 10px;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif;border:1.5px solid var(--BD);background:#fff;color:var(--S);border-radius:6px;cursor:pointer;}
.bc-btn:hover{border-color:var(--A);color:var(--A);}
.bc-btn.rem{border-color:#e5c5c5;color:#c0756e;}
.bc-btn.rem:hover{border-color:#c0756e;background:#fdf6f6;}
.loading{text-align:center;padding:5rem;color:#999;font-size:14px;}
@media print{
  body{background:#fff;padding:0;}
  .bar{display:none;}.bullet-controls{display:none!important;}
  .cv{box-shadow:none;max-width:100%;}
  .hd,.cv-side-col,.ex-d,.lg-l,.kw,.tag{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  @page{margin:.4cm;size:A4;}
}
</style>
</head>
<body>
<div class="bar" id="bar">
  <div class="bar-l">Micaela Jairedin &middot; Career Coach & Recruiter</div>
  <div class="bar-r">
    <span class="blbl">Color</span>
    <div class="cdot on" style="background:#1B3A5C" onclick="setT('',this)"></div>
    <div class="cdot" style="background:#1D4A35" onclick="setT('f',this)"></div>
    <div class="cdot" style="background:#5C1B2E" onclick="setT('b',this)"></div>
    <input type="file" id="ph-file" accept="image/*" style="display:none" onchange="loadPh(this)">
    <button class="xbtn xbtn-o" onclick="document.getElementById('ph-file').click()">+ Foto</button>
    <button class="xbtn xbtn-y" id="edit-btn" onclick="toggleEdit()">&#9998; Editar</button>
    <button class="xbtn xbtn-p" onclick="window.print()">&#8595; Descargar PDF</button>
  </div>
</div>
<div id="root"><div class="loading">Cargando tu CV...</div></div>
<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var _row=null,_email=null,_code=null,_editing=false;

function init(){
  var p=new URLSearchParams(window.location.search);
  _email=p.get('email');_code=(p.get('code')||'').trim().toUpperCase();
  if(!_email){showErr('No se encontr\u00f3 el CV.');return;}
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=*',{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  }).then(function(r){return r.json();}).then(function(rows){
    if(!rows||!rows.length){showErr('Tu CV a\u00fan no est\u00e1 disponible. Micaela lo publicar\u00e1 pronto.');return;}
    _row=rows[0];
    var dbCode=(_row.codigo||'').trim().toUpperCase();
    if(dbCode&&_code!==dbCode){showLock();return;}
    renderCV(_row);
  }).catch(function(e){showErr('Error: '+e.message);});
}

function showErr(m){document.getElementById('root').innerHTML='<div class="loading">'+m+'</div>';}

function showLock(){
  document.getElementById('bar').style.display='none';
  document.getElementById('root').innerHTML='<div class="lock">'
    +'<h2>&#128274; Tu CV optimizado</h2>'
    +'<p>Introduce el c\u00f3digo que Micaela te envi\u00f3 por WhatsApp.</p>'
    +'<input id="li" type="text" maxlength="8" placeholder="XXXXXX" autocomplete="off" style="text-transform:uppercase;">'
    +'<button onclick="verificar()">Ver mi CV</button>'
    +'<p class="lock-err" id="le"></p></div>';
}

function verificar(){
  var code=(document.getElementById('li').value||'').trim().toUpperCase();
  var dbCode=(_row.codigo||'').trim().toUpperCase();
  if(code===dbCode){
    _code=code;
    window.history.replaceState({},'',location.pathname+'?email='+encodeURIComponent(_email)+'&code='+code);
    document.getElementById('bar').style.display='';
    renderCV(_row);
  } else {
    document.getElementById('le').textContent='C\u00f3digo incorrecto.';
  }
}

function setT(cls,btn){
  document.body.className=cls+(_editing?' editing':'');
  document.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('on');});
  btn.classList.add('on');
}

function loadPh(inp){
  if(!inp.files[0])return;
  var r=new FileReader();
  r.onload=function(e){
    var img=document.getElementById('ph-img');
    var ini=document.getElementById('ph-ini');
    if(img){img.src=e.target.result;img.style.display='block';}
    if(ini)ini.style.display='none';
  };
  r.readAsDataURL(inp.files[0]);
}

function toggleEdit(){
  _editing=!_editing;
  var btn=document.getElementById('edit-btn');
  var cls=document.body.className.replace(' editing','');
  if(_editing){
    document.body.className=cls+' editing';
    btn.textContent='\u2713 Listo';btn.style.background='#4a7c5f';
    document.querySelectorAll('[contenteditable]').forEach(function(el){el.contentEditable='true';});
  } else {
    document.body.className=cls;
    btn.textContent='\u270E Editar';btn.style.background='';
    document.querySelectorAll('[contenteditable]').forEach(function(el){el.contentEditable='false';});
  }
}

function addBullet(ulId){
  var ul=document.getElementById(ulId);if(!ul)return;
  var li=document.createElement('li');li.contentEditable='true';li.textContent='Escribe aqu\u00ed el nuevo bullet...';
  li.style.color='#aaa';
  li.onfocus=function(){if(this.textContent==='Escribe aqu\u00ed el nuevo bullet...'){this.textContent='';this.style.color='';}};
  ul.appendChild(li);li.focus();
}

function removeBullet(ulId){
  var ul=document.getElementById(ulId);
  if(ul&&ul.children.length>1)ul.removeChild(ul.lastElementChild);
}

function renderCV(row){
  var text=row.contenido||'';
  // Parse text into structured CV
  var cv=parseCV(text);
  var ini=cv.name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()||'CV';
  var kws=['Direcci\u00f3n General','Gesti\u00f3n P&L','B2B Industrial','Expansi\u00f3n Internacional','Supply Chain','Gobierno Corporativo','Lean','Transformaci\u00f3n Digital'];

  var html='<div class="cv" id="cv-doc">';

  // HEADER
  html+='<div class="hd">'
    +'<div class="ph" onclick="document.getElementById(\'ph-file\').click()">'
      +'<div class="ph-c"><img id="ph-img" src="" alt=""><span id="ph-ini" class="ph-ini">'+ini+'</span></div>'
      +'<div class="ph-hint">+ A\u00f1adir foto</div>'
    +'</div>'
    +'<div class="hi">'
      +'<div class="name" contenteditable="false">'+esc(cv.name)+'</div>'
      +'<div class="rol" contenteditable="false">'+esc(cv.role)+'</div>'
      +'<div class="cts">'
        +(cv.email?'<div class="ct" contenteditable="false"><strong>'+esc(cv.email)+'</strong></div>':'')
        +(cv.phone?'<div class="ct" contenteditable="false">'+esc(cv.phone)+'</div>':'')
        +(cv.city?'<div class="ct" contenteditable="false">'+esc(cv.city)+'</div>':'')
        +(cv.linkedin?'<div class="ct" contenteditable="false">'+esc(cv.linkedin)+'</div>':'')
      +'</div>'
      +'<div class="tags">'
        +'<span class="tag" contenteditable="false">Disponibilidad inmediata</span>'
        +'<span class="tag" contenteditable="false">Abierto a relocalizaci\u00f3n</span>'
        +'<span class="tag" contenteditable="false">Biling\u00fce ES \u00b7 EN</span>'
      +'</div>'
    +'</div>'
  +'</div>';

  // BODY
  html+='<div class="bd"><div class="cv-side-col">';

  if(cv.skills.length){
    html+='<div class="ss"><div class="sh">Competencias</div>';
    cv.skills.slice(0,14).forEach(function(s,i){html+='<div class="sk" contenteditable="false">'+esc(s)+'</div>';});
    html+='</div>';
  }
  if(cv.langs.length){
    html+='<div class="ss"><div class="sh">Idiomas</div>';
    cv.langs.forEach(function(l){html+='<div class="lg-row"><span class="lg-n" contenteditable="false">'+esc(l.n)+'</span>'+(l.l?'<span class="lg-l" contenteditable="false">'+esc(l.l)+'</span>':'')+'</div>';});
    html+='</div>';
  }
  if(cv.edu.length){
    html+='<div class="ss"><div class="sh">Formaci\u00f3n</div>';
    cv.edu.forEach(function(e){html+='<div class="ed"><div class="ed-d" contenteditable="false">'+esc(e.deg)+'</div>'+(e.school?'<div class="ed-s" contenteditable="false">'+esc(e.school)+'</div>':'')+(e.yr?'<div class="ed-y" contenteditable="false">'+esc(e.yr)+'</div>':'')+'</div>';});
    html+='</div>';
  }
  if(cv.certs.length){
    html+='<div class="ss"><div class="sh">Certificaciones</div>';
    cv.certs.slice(0,5).forEach(function(c){html+='<div class="ct2" contenteditable="false">'+esc(c)+'</div>';});
    html+='</div>';
  }
  html+='</div>';

  // MAIN
  html+='<div class="cv-main-col">';
  if(cv.summary){
    html+='<div class="ms"><div class="mh">Resumen ejecutivo</div>'
      +'<div class="sum" contenteditable="false">'+esc(cv.summary)+'</div>'
      +'<div class="kws">'+kws.map(function(k){return'<span class="kw" contenteditable="false">'+k+'</span>';}).join('')+'</div>'
      +'</div>';
  }
  if(cv.exp.length){
    html+='<div class="ms"><div class="mh">Experiencia profesional</div>';
    cv.exp.forEach(function(e,ei){
      var ulId='ul-'+ei;
      html+='<div class="ex">'
        +'<div class="ex-top"><div class="ex-t" contenteditable="false">'+esc(e.title)+'</div>'+(e.dates?'<div class="ex-d" contenteditable="false">'+esc(e.dates)+'</div>':'')+'</div>'
        +(e.company?'<div class="ex-co" contenteditable="false">'+esc(e.company)+'</div>':'')
        +(e.ctx?'<div class="ex-ctx" contenteditable="false">'+esc(e.ctx)+'</div>':'')
        +(e.bullets.length?'<ul class="ex-ul" id="'+ulId+'">'+e.bullets.map(function(b){return'<li contenteditable="false">'+esc(b).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')+'</li>';}).join('')+'</ul>':'')
        +'<div class="bullet-controls">'
          +'<button class="bc-btn" onclick="addBullet(\''+ulId+'\')">+ A\u00f1adir bullet</button>'
          +'<button class="bc-btn rem" onclick="removeBullet(\''+ulId+'\')">− Quitar</button>'
        +'</div>'
        +'</div>';
    });
    html+='</div>';
  }
  html+='</div></div></div>';

  document.getElementById('root').innerHTML=html;
}

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function parseCV(text){
  var cv={name:'',role:'',email:'',phone:'',city:'',linkedin:'',summary:'',skills:[],langs:[],edu:[],certs:[],exp:[]};
  var lines=text.split('\n');

  // Name — first non-empty meaningful line
  for(var i=0;i<Math.min(8,lines.length);i++){
    var l=lines[i].trim();
    if(l&&l.length>2&&!l.includes('@')&&!l.match(/^\+?\d/)&&!l.includes('---')&&!l.match(/^[A-Z\s·|]{20,}/)){cv.name=l;break;}
  }
  // Role — next meaningful line
  var foundName=false;
  for(var i=0;i<Math.min(12,lines.length);i++){
    var l=lines[i].trim();if(!l)continue;
    if(l===cv.name){foundName=true;continue;}
    if(foundName&&l.length>4&&!l.includes('@')&&!l.match(/^\+?\d/)&&!l.includes('---')){cv.role=l;break;}
  }
  var em=text.match(/[\w.+-]+@[\w.-]+\.\w+/);if(em)cv.email=em[0];
  var ph=text.match(/\+?[\d][\d\s().+\-]{8,16}/);if(ph)cv.phone=ph[0].trim();
  var li=text.match(/linkedin\.com\/in\/[\w-]+/i);if(li)cv.linkedin=li[0];
  var cy=text.match(/(Boiro|Galicia|A Coru[n\u00f1]a|Madrid|Barcelona|Sevilla|Valencia|Espa[n\u00f1]a|Spain)[^|\n,·]*/i);
  if(cy)cv.city=cy[0].trim().replace(/[·|,\s]+$/,'');

  function getSec(kw){
    var idx=-1;
    for(var i=0;i<lines.length;i++){
      if(lines[i].trim().toUpperCase().indexOf(kw)===0&&lines[i].trim().length<70){idx=i;break;}
    }
    if(idx===-1)return[];
    var out=[];
    var secKws=['RESUMEN','EJECUTIVO','EXPERIENCIA','HABILIDAD','COMPETENCIA','IDIOMA','FORMACI','CERTIFICACI','CURSO'];
    for(var j=idx+1;j<lines.length;j++){
      var u=lines[j].trim().toUpperCase().replace(/[^A-Z\u00C0-\u024F\s]/g,'');
      if(u.length>3&&u.length<60&&secKws.some(function(k){return u.indexOf(k)===0;})&&out.length>0)break;
      out.push(lines[j]);
    }
    return out.filter(function(l){return l.trim().length>0;});
  }

  var sumLines=getSec('RESUMEN');
  cv.summary=sumLines.filter(function(l){return l.trim()&&!l.trim().match(/^[A-Z\s]{10,}$/);}).join(' ').trim();

  var skillLines=getSec('HABILIDAD').length?getSec('HABILIDAD'):getSec('COMPETENCIA');
  skillLines.forEach(function(l){
    var cl=l.replace(/^[-·•\s]+/,'').trim();
    if(cl.includes('·')){cl.split('·').forEach(function(s){if(s.trim().length>2)cv.skills.push(s.trim());});}
    else if(cl.length>2)cv.skills.push(cl);
  });

  getSec('IDIOMA').forEach(function(l){
    var cl=l.replace(/^[-·•\s]+/,'').trim();if(!cl||cl.length<2)return;
    var p=cl.split(':');
    if(p.length<2)p=cl.split(/\s{2,}|[—–]/);
    cv.langs.push({n:(p[0]||'').trim(),l:(p[1]||'').trim()});
  });

  getSec('FORMACI').forEach(function(l){
    var cl=l.replace(/^[-·•\s]+/,'').trim();if(!cl||cl.length<3)return;
    var p=cl.split('·');
    var yrm=cl.match(/\d{4}/);
    cv.edu.push({deg:p[0]?p[0].replace(/\d{4}.*/,'').trim():cl,school:(p[1]||'').trim(),yr:yrm?yrm[0]:''});
  });

  getSec('CERTIFICACI').forEach(function(l){
    var cl=l.replace(/^[-·•\s]+/,'').trim();if(cl.length>3)cv.certs.push(cl);
  });

  // Experience blocks
  var expLines=getSec('EXPERIENCIA');
  var blocks=[],cur=[];
  expLines.forEach(function(l){
    var hasDate=/\d{4}/.test(l);
    var notBullet=!l.trim().match(/^[-·•]/);
    var notLower=!l.trim().match(/^[a-z\u00e0-\u00ff]/);
    var ok=l.trim().length>3&&l.trim().length<130;
    if(hasDate&&notBullet&&notLower&&ok&&cur.length>1){blocks.push(cur.join('\n'));cur=[l];}
    else cur.push(l);
  });
  if(cur.length)blocks.push(cur.join('\n'));

  blocks.filter(function(b){return b.trim().length>15;}).forEach(function(block){
    var blines=block.split('\n').filter(function(l){return l.trim();});
    if(!blines.length)return;
    var title=blines[0],dates='',company='',ctx='',bullets=[];
    var dm=title.match(/\d{2}\/\d{4}\s*[-\u2013]+\s*\S+/i)||title.match(/\d{4}\s*[-\u2013\u2014]+\s*(\d{4}|Actualidad|Presente)/i);
    if(dm){dates=dm[0];title=title.replace(dm[0],'').replace(/[|·—\-]+/g,' ').replace(/\s+/g,' ').trim();}
    for(var j=1;j<blines.length;j++){
      var bl=blines[j].trim();if(!bl)continue;
      if(j===1&&!bl.match(/^[-·•]/)&&!bl.match(/^[a-z\u00e0-\u00ff]/))company=bl;
      else if(/^(Contexto|Nota|Context):/i.test(bl))ctx=bl.replace(/^[^:]+:\s*/,'');
      else if(bl.match(/^[-·•]/))bullets.push(bl.replace(/^[-·•]\s*/,''));
    }
    cv.exp.push({title:title,dates:dates,company:company,ctx:ctx,bullets:bullets});
  });

  return cv;
}

init();
</script>
