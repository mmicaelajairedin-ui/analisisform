<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Optimizado</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --acc:#1B3A5C;--acc2:#4A7FA5;--acc-bg:#EEF3F8;
  --text:#1a1a1a;--muted:#666;--border:#E5E5E5;--sidebar:#F7F8FA;
}
.t-navy{--acc:#1B3A5C;--acc2:#4A7FA5;--acc-bg:#EEF3F8;--sidebar:#F4F6F9;}
.t-forest{--acc:#1D4A35;--acc2:#3A8060;--acc-bg:#EAF3EE;--sidebar:#F2F7F4;}
.t-burgundy{--acc:#5C1B2E;--acc2:#A54A65;--acc-bg:#F4EEF0;--sidebar:#F7F2F4;}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#EAEAE6;min-height:100vh;padding:2rem 1rem 4rem;}

/* TOOLBAR */
.toolbar{max-width:860px;margin:0 auto 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.brand{font-size:11px;font-weight:600;color:#8C7B80;background:#fff;padding:5px 14px;border-radius:20px;border:1px solid #e0d8d5;}
.tools{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.tool-group{display:flex;align-items:center;gap:6px;}
.tool-label{font-size:10px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0;}
.color-dot.on{border-color:#fff;box-shadow:0 0 0 2px var(--acc);}
.dot-navy{background:#1B3A5C;}
.dot-forest{background:#1D4A35;}
.dot-burgundy{background:#5C1B2E;}
.tbtn{padding:7px 16px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;border:none;border-radius:8px;cursor:pointer;transition:all .15s;}
.tbtn-outline{background:#fff;color:#555;border:1.5px solid #ddd;}
.tbtn-outline:hover{border-color:var(--acc);color:var(--acc);}
.tbtn-fill{background:var(--acc);color:#fff;}
.tbtn-fill:hover{opacity:.88;}

/* LOCK SCREEN */
.lock-wrap{max-width:380px;margin:5rem auto;background:#fff;border-radius:16px;padding:2.5rem 2rem;text-align:center;box-shadow:0 4px 30px rgba(0,0,0,.08);}
.lock-icon{font-size:38px;margin-bottom:1rem;}
.lock-wrap h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:6px;}
.lock-wrap p{font-size:12px;color:#666;line-height:1.6;margin-bottom:1.4rem;}
.lock-inp{width:150px;padding:11px;font-size:18px;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:.25em;text-align:center;text-transform:uppercase;border:2px solid #ddd;border-radius:10px;outline:none;transition:border .15s;}
.lock-inp:focus{border-color:var(--acc);}
.lock-btn{margin-top:10px;width:100%;padding:12px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;background:var(--acc);color:#fff;border:none;border-radius:10px;cursor:pointer;}
.lock-err{font-size:12px;color:#c0756e;margin-top:7px;min-height:16px;}

/* CV PAGE */
.cv-page{max-width:860px;margin:0 auto;background:#fff;box-shadow:0 8px 50px rgba(0,0,0,.12);}

/* HEADER */
.cv-header{padding:36px 40px 28px;border-bottom:3px solid var(--acc);display:flex;align-items:flex-start;gap:28px;position:relative;}
.cv-header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--acc);}
.photo-wrap{flex-shrink:0;position:relative;}
.photo-circle{width:100px;height:100px;border-radius:50%;border:3px solid var(--acc);overflow:hidden;background:var(--acc-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.photo-circle:hover{border-color:var(--acc2);opacity:.9;}
.photo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.photo-ini{font-family:'Playfair Display',serif;font-size:32px;color:var(--acc);font-weight:800;}
.photo-hint{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;color:#fff;background:var(--acc);padding:2px 7px;border-radius:8px;white-space:nowrap;opacity:0;transition:opacity .2s;}
.photo-wrap:hover .photo-hint{opacity:1;}
.cv-header-info{flex:1;}
.cv-name{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;color:var(--text);line-height:1.1;letter-spacing:-.02em;margin-bottom:3px;}
.cv-role{font-size:11px;font-weight:700;color:var(--acc);letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px;}
.cv-contacts{display:flex;flex-wrap:wrap;gap:6px 18px;margin-bottom:10px;}
.cv-contact{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.cv-contact strong{color:var(--text);font-weight:600;}
.cv-tags{display:flex;flex-wrap:wrap;gap:5px;}
.cv-tag{font-size:10px;font-weight:600;color:var(--acc);background:var(--acc-bg);padding:3px 10px;border-radius:20px;}

/* BODY - TWO COLUMN */
.cv-body{display:grid;grid-template-columns:220px 1fr;}

/* SIDEBAR */
.cv-side{background:var(--sidebar);padding:24px 20px;border-right:1px solid var(--border);}
.s-sec{margin-bottom:22px;}
.s-title{font-size:8px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.2em;margin-bottom:10px;padding-bottom:5px;border-bottom:1.5px solid var(--acc);}

.skill-item{font-size:11.5px;color:var(--text);padding:3px 0 3px 10px;border-bottom:.5px solid var(--border);line-height:1.4;position:relative;}
.skill-item::before{content:'';position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:50%;background:var(--acc2);}
.skill-item:last-child{border-bottom:none;}

.lang-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:.5px solid var(--border);}
.lang-item:last-child{border-bottom:none;}
.lang-name{font-size:11.5px;color:var(--text);font-weight:500;}
.lang-lvl{font-size:9.5px;font-weight:700;color:#fff;background:var(--acc);padding:2px 8px;border-radius:10px;}

.edu-item{margin-bottom:12px;padding-bottom:12px;border-bottom:.5px solid var(--border);}
.edu-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.edu-deg{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.3;}
.edu-school{font-size:10.5px;color:var(--acc2);margin-top:1px;font-weight:500;}
.edu-yr{font-size:10px;color:var(--muted);margin-top:2px;}

.cert-item{font-size:11px;color:var(--text);padding:3px 0;border-bottom:.5px solid var(--border);line-height:1.4;}
.cert-item:last-child{border-bottom:none;}

/* MAIN COL */
.cv-main{padding:26px 32px;}
.m-sec{margin-bottom:20px;}
.m-title{font-size:8px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.2em;margin-bottom:10px;padding-bottom:5px;border-bottom:1.5px solid var(--acc);display:flex;align-items:center;gap:8px;}
.summary{font-size:11.5px;color:var(--text);line-height:1.75;}
.kw-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.kw{font-size:9.5px;font-weight:600;color:var(--acc);background:var(--acc-bg);padding:2px 8px;border-radius:10px;}

.exp-item{margin-bottom:16px;padding-bottom:16px;border-bottom:.5px solid var(--border);}
.exp-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.exp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:1px;}
.exp-title{font-family:'Playfair Display',serif;font-size:13.5px;font-weight:700;color:var(--text);line-height:1.2;}
.exp-dates{font-size:10px;font-weight:600;color:#fff;background:var(--acc);padding:2px 9px;border-radius:10px;flex-shrink:0;white-space:nowrap;}
.exp-co{font-size:11px;color:var(--acc2);font-weight:600;margin-bottom:5px;}
.exp-ctx{font-size:10.5px;color:#888;background:var(--acc-bg);border-radius:4px;padding:4px 8px;margin-bottom:6px;line-height:1.5;border-left:2px solid var(--acc2);font-style:italic;}
.exp-list{list-style:none;padding:0;}
.exp-list li{font-size:11.5px;color:var(--text);line-height:1.65;padding:2px 0 2px 13px;position:relative;}
.exp-list li::before{content:'';position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--acc);}
.exp-list li strong{font-weight:700;color:var(--acc);}

/* FOOTER */
.cv-footer{background:var(--sidebar);border-top:1px solid var(--border);padding:9px 32px;display:flex;justify-content:space-between;align-items:center;}
.cv-footer-brand{font-size:9.5px;font-weight:700;color:var(--acc);}
.cv-footer-note{font-size:9.5px;color:#aaa;}

/* LOADING */
.loading{text-align:center;padding:5rem;color:#999;}

@media print{
  body{background:#fff;padding:0;}
  .toolbar{display:none;}
  .cv-page{box-shadow:none;max-width:100%;}
  .cv-header,.cv-side,.exp-dates,.lang-lvl,.kw,.cv-tag{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .cv-header::before{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  @page{margin:.4cm;size:A4;}
}
</style>
</head>
<body class="t-navy">

<div class="toolbar" id="toolbar">
  <div class="brand">Micaela Jairedin &middot; Career Coach & Recruiter</div>
  <div class="tools">
    <div class="tool-group">
      <span class="tool-label">Color</span>
      <div class="color-dot dot-navy on" onclick="setTheme('navy',this)" title="Azul marino"></div>
      <div class="color-dot dot-forest" onclick="setTheme('forest',this)" title="Verde bosque"></div>
      <div class="color-dot dot-burgundy" onclick="setTheme('burgundy',this)" title="Borgoña"></div>
    </div>
    <input type="file" id="photo-file" accept="image/*" style="display:none" onchange="loadPhoto(this)">
    <button class="tbtn tbtn-outline" onclick="document.getElementById('photo-file').click()">&#128247; Añadir foto</button>
    <button class="tbtn tbtn-fill" onclick="window.print()">&#8595; Descargar PDF</button>
  </div>
</div>

<div id="root"><div class="loading">Cargando...</div></div>

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var _row=null,_email=null,_code=null;

function init(){
  var p=new URLSearchParams(window.location.search);
  _email=p.get('email');_code=p.get('code');
  if(!_email){showErr('No se encontro el CV. Contacta con Micaela.');return;}
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=*',{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  }).then(function(r){return r.json();}).then(function(rows){
    if(!rows||!rows.length){showErr('Tu CV aun no esta disponible. Micaela lo publicara pronto.');return;}
    _row=rows[0];
    if(_row.codigo&&_code!==_row.codigo){showLock();return;}
    renderCV(_row.contenido||'');
  }).catch(function(e){showErr('Error: '+e.message);});
}

function showErr(m){document.getElementById('root').innerHTML='<div class="loading"><p>'+m+'</p><p style="font-size:11px;color:#ccc;margin-top:6px;">mmicaela.jairedin@gmail.com</p></div>';}

function showLock(){
  document.getElementById('root').innerHTML='<div class="lock-wrap">'
    +'<div class="lock-icon">&#128274;</div>'
    +'<h2>Accede a tu CV</h2>'
    +'<p>Introduce el codigo que Micaela te envio por WhatsApp.</p>'
    +'<input class="lock-inp" id="li" type="text" maxlength="8" placeholder="XXXXXX" autocomplete="off">'
    +'<button class="lock-btn" onclick="verificar()">Ver mi CV</button>'
    +'<p class="lock-err" id="le"></p></div>';
}

function verificar(){
  var code=(document.getElementById('li').value||'').trim().toUpperCase();
  if(code===(_row.codigo||'').toUpperCase()){
    _code=code;
    window.history.replaceState({},'',location.pathname+'?email='+encodeURIComponent(_email)+'&code='+code);
    renderCV(_row.contenido||'');
  } else {
    document.getElementById('le').textContent='Codigo incorrecto. Verifica el mensaje de Micaela.';
  }
}

function setTheme(t,btn){
  document.body.className='t-'+t;
  document.querySelectorAll('.color-dot').forEach(function(d){d.classList.remove('on');});
  btn.classList.add('on');
}

function loadPhoto(inp){
  if(!inp.files[0])return;
  var r=new FileReader();
  r.onload=function(e){
    var img=document.getElementById('cv-ph-img');
    var ini=document.getElementById('cv-ph-ini');
    if(img){img.src=e.target.result;img.style.display='block';}
    if(ini)ini.style.display='none';
  };
  r.readAsDataURL(inp.files[0]);
}

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getSection(text,keyword){
  var lines=text.split('\n');
  var start=-1;
  for(var i=0;i<lines.length;i++){
    if(lines[i].toUpperCase().replace(/[-—\s]/g,'').indexOf(keyword.replace(/\s/g,''))!==-1&&lines[i].trim().length<70){
      start=i;break;
    }
  }
  if(start===-1)return'';
  var out=[];
  var sectionHeaders=['RESUMEN','EXPERIENCIA','FORMACI','HABILIDAD','IDIOMA','CERTIFICACI','COMPETENCIA'];
  for(var j=start+1;j<lines.length;j++){
    var u=lines[j].trim().toUpperCase().replace(/[-—\s]/g,'');
    var isHeader=sectionHeaders.some(function(h){return u.indexOf(h)===0&&lines[j].trim().length<70&&!lines[j].trim().match(/^[-·•]/);});
    if(isHeader&&out.length>0)break;
    out.push(lines[j]);
  }
  return out.join('\n').trim();
}

function parseExperience(text){
  if(!text)return[];
  var blocks=[],cur=[];
  var lines=text.split('\n');
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    var hasDate=/(\d{4}|\b(Ene|Feb|Mar|Abr|May|Jun|Jul|Ago|Sep|Oct|Nov|Dic|Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\b)/i.test(l);
    var notBullet=!l.trim().match(/^[-·•]/);
    var notLower=!l.trim().match(/^[a-záéíóúñü]/);
    var shortEnough=l.trim().length>3&&l.trim().length<130;
    if(hasDate&&notBullet&&notLower&&shortEnough&&cur.length>1){
      blocks.push(cur.join('\n'));cur=[l];
    } else {cur.push(l);}
  }
  if(cur.length)blocks.push(cur.join('\n'));
  return blocks.filter(function(b){return b.trim().length>20;});
}

function renderBlock(block){
  var lines=block.split('\n').filter(function(l){return l.trim();});
  if(!lines.length)return'';
  var title=lines[0],dates='',company='',ctx='',bullets=[];
  var dm=title.match(/(Ene|Feb|Mar|Abr|May|Jun|Jul|Ago|Sep|Oct|Nov|Dic|Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)?\.?\s*\d{4}\s*[-\u2013\u2014]+\s*(Actualidad|Presente|[\w]*\.?\s*\d{0,4})/i);
  if(!dm)dm=title.match(/\d{4}\s*[-\u2013\u2014]+\s*(\d{4}|Actualidad|Presente)/i);
  if(!dm)dm=title.match(/\d{2}\/\d{4}\s*[-\u2013]+\s*(\d{2}\/\d{4}|Presente|Actualidad)/i);
  if(dm){dates=dm[0];title=title.replace(dm[0],'').replace(/[|·—]/g,'').replace(/\s+/g,' ').trim();}
  for(var i=1;i<lines.length;i++){
    var l=lines[i].trim();if(!l)continue;
    if(i===1&&!l.match(/^[-·•·]/)&&!l.match(/^[a-z]/))company=l;
    else if(/^(Contexto|Context|Nota):/i.test(l))ctx=l.replace(/^[^:]+:\s*/,'');
    else if(l.match(/^[-·•·]/))bullets.push(l.replace(/^[-·•·]\s*/,''));
    else if(i>1&&!l.match(/^[-·•·]/)&&bullets.length===0&&!company)company=l;
  }
  return'<div class="exp-item">'
    +'<div class="exp-head"><div class="exp-title">'+esc(title)+'</div>'+(dates?'<div class="exp-dates">'+esc(dates)+'</div>':'')+'</div>'
    +(company?'<div class="exp-co">'+esc(company)+'</div>':'')
    +(ctx?'<div class="exp-ctx">'+esc(ctx)+'</div>':'')
    +(bullets.length?'<ul class="exp-list">'+bullets.map(function(b){
      return'<li>'+esc(b).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')+'</li>';
    }).join('')+'</ul>':'')
    +'</div>';
}

function renderCV(text){
  var lines=text.split('\n').filter(function(l){return l.trim();});

  // Name
  var name='';
  for(var i=0;i<Math.min(8,lines.length);i++){
    var l=lines[i].trim();
    if(l.length>3&&!l.includes('@')&&!l.match(/^\+?\d/)&&!l.includes('---')&&!l.match(/^[A-Z\s·|]{3,}$/)&&l.split(' ').length<=6){name=l;break;}
  }
  // Role line
  var role='';
  for(var i=1;i<Math.min(10,lines.length);i++){
    var l=lines[i].trim();
    if(l&&l!==name&&l.length>5&&!l.includes('@')&&!l.match(/^\+?\d/)&&!l.includes('---')){role=l;break;}
  }

  var emailM=text.match(/[\w.+-]+@[\w.-]+\.\w+/);
  var phoneM=text.match(/\+?[\d\s().+\-]{9,20}/);
  var liM=text.match(/linkedin\.com\/in\/[\w-]+/i);
  var cityM=text.match(/(Boiro|Galicia|A Coru[nñ]a|Madrid|Barcelona|Sevilla|Valencia|Bilbao|España)[^|\n,·]*/i);

  var ini=name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()||'CV';

  var summary=getSection(text,'RESUMEN');
  var skills=getSection(text,'HABILIDAD');
  if(!skills)skills=getSection(text,'COMPETENCIA');
  var langs=getSection(text,'IDIOMA');
  var edu=getSection(text,'FORMACI');
  var certs=getSection(text,'CERTIFICACI');
  var expText=getSection(text,'EXPERIENCIA');
  var expBlocks=parseExperience(expText);

  var skillList=skills?skills.split('\n').filter(function(l){
    return l.trim()&&!l.trim().match(/^[A-Z\s:·—]{8,}$/)&&l.trim().length>2;
  }).map(function(l){return l.replace(/^[-·•·\s]+/,'').trim();}).filter(function(l){return l.length>2;}):[];

  // Flatten skill items that have · separators
  var skillFlat=[];
  skillList.forEach(function(s){
    if(s.includes('·')){s.split('·').forEach(function(p){if(p.trim().length>2)skillFlat.push(p.trim());});}
    else skillFlat.push(s);
  });
  skillFlat=skillFlat.slice(0,14);

  var langList=langs?langs.split('\n').filter(function(l){return l.trim()&&l.trim().length>2;}).map(function(l){
    var p=l.replace(/^[-·•\s]+/,'').split(':');
    if(p.length<2)p=l.replace(/^[-·•\s]+/,'').split(/\s{2,}|—|–/);
    return{n:(p[0]||'').trim(),l:(p[1]||'').trim()};
  }).filter(function(x){return x.n.length>1;}):[];

  var eduList=edu?edu.split('\n').filter(function(l){return l.trim()&&l.trim().length>2&&!l.trim().match(/^[A-Z\s]{10,}$/);}).map(function(l){
    var clean=l.replace(/^[-·•\s]+/,'').trim();
    var parts=clean.split('·');
    if(parts.length>=2)return{deg:parts[0].trim(),school:(parts[1]||'').trim(),yr:(parts[2]||parts[3]||'').trim()};
    // Try splitting by comma or dash with year
    var yrM=clean.match(/\d{4}/);
    return{deg:clean.replace(/\d{4}.*/,'').replace(/[·,\-\s]+$/,'').trim(),school:'',yr:yrM?yrM[0]:''};
  }).filter(function(x){return x.deg.length>3;}):[];

  var certList=certs?certs.split('\n').filter(function(l){return l.trim()&&l.trim().length>3&&!l.trim().match(/^[A-Z\s]{10,}$/);}).map(function(l){return l.replace(/^[-·•\s]+/,'').trim();}):[];

  // ATS keywords from content
  var kwList=['Dirección General','Gestión P&L','B2B Industrial','Expansión Internacional','Supply Chain','Gobierno Corporativo','Lean','Transformación Digital'];

  var html='<div class="cv-page">';

  // HEADER
  html+='<div class="cv-header">'
    +'<div class="photo-wrap">'
      +'<div class="photo-circle" onclick="document.getElementById(\'photo-file\').click()" title="Añadir foto">'
        +'<img id="cv-ph-img" src="" style="display:none" alt="foto">'
        +'<span id="cv-ph-ini" class="photo-ini">'+ini+'</span>'
      +'</div>'
      +'<div class="photo-hint">Añadir foto</div>'
    +'</div>'
    +'<div class="cv-header-info">'
      +'<div class="cv-name">'+esc(name)+'</div>'
      +'<div class="cv-role">'+esc(role)+'</div>'
      +'<div class="cv-contacts">'
        +(emailM?'<div class="cv-contact"><strong>'+esc(emailM[0])+'</strong></div>':'')
        +(phoneM?'<div class="cv-contact">'+esc(phoneM[0].trim())+'</div>':'')
        +(cityM?'<div class="cv-contact">'+esc(cityM[0].trim().replace(/[·|,\s]+$/,''))+'</div>':'')
        +(liM?'<div class="cv-contact">'+esc(liM[0])+'</div>':'')
      +'</div>'
      +'<div class="cv-tags">'
        +'<span class="cv-tag">Disponibilidad inmediata</span>'
        +'<span class="cv-tag">Abierto a relocalizaci\u00f3n</span>'
        +'<span class="cv-tag">Biling\u00fce ES \u00b7 EN</span>'
      +'</div>'
    +'</div>'
  +'</div>';

  // BODY
  html+='<div class="cv-body">';

  // SIDEBAR
  html+='<div class="cv-side">';
  if(skillFlat.length){
    html+='<div class="s-sec"><div class="s-title">Competencias</div>';
    skillFlat.forEach(function(s){html+='<div class="skill-item">'+esc(s)+'</div>';});
    html+='</div>';
  }
  if(langList.length){
    html+='<div class="s-sec"><div class="s-title">Idiomas</div>';
    langList.forEach(function(l){
      html+='<div class="lang-item"><span class="lang-name">'+esc(l.n)+'</span>'+(l.l?'<span class="lang-lvl">'+esc(l.l)+'</span>':'')+'</div>';
    });
    html+='</div>';
  }
  if(eduList.length){
    html+='<div class="s-sec"><div class="s-title">Formaci\u00f3n</div>';
    eduList.forEach(function(e){
      html+='<div class="edu-item"><div class="edu-deg">'+esc(e.deg)+'</div>'
        +(e.school?'<div class="edu-school">'+esc(e.school)+'</div>':'')
        +(e.yr?'<div class="edu-yr">'+esc(e.yr)+'</div>':'')+'</div>';
    });
    html+='</div>';
  }
  if(certList.length){
    html+='<div class="s-sec"><div class="s-title">Certificaciones</div>';
    certList.slice(0,5).forEach(function(c){html+='<div class="cert-item">'+esc(c)+'</div>';});
    html+='</div>';
  }
  html+='</div>'; // end sidebar

  // MAIN
  html+='<div class="cv-main">';
  if(summary){
    html+='<div class="m-sec"><div class="m-title">Resumen ejecutivo</div>'
      +'<div class="summary">'+esc(summary)+'</div>'
      +'<div class="kw-row">'+kwList.map(function(k){return'<span class="kw">'+k+'</span>';}).join('')+'</div>'
      +'</div>';
  }
  if(expBlocks.length){
    html+='<div class="m-sec"><div class="m-title">Experiencia profesional</div>';
    expBlocks.forEach(function(b){html+=renderBlock(b);});
    html+='</div>';
  }
  html+='</div>'; // end main
  html+='</div>'; // end body

  // FOOTER
  html+='<div class="cv-footer">'
    +'<div class="cv-footer-brand">Micaela Jairedin &middot; Career Coach & Recruiter</div>'
    +'<div class="cv-footer-note">CV optimizado &middot; Confidencial</div>'
    +'</div>';

  html+='</div>'; // end cv-page
  document.getElementById('root').innerHTML=html;
}

init();
</script>
</body>
</html>
