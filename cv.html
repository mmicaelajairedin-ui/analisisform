<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Mi CV — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#8C7B80;--rose-dark:#6B5A5F;--rose-light:#F5F0F0;--rose-mid:#DDD0D0;
  --white:#FFFFFF;--bg:#F4F4F4;--sb-bg:#F4F1F0;
  --text:#2D292A;--text2:#5E5859;--muted:#9E9696;--border:#EAE5E5;
  --green:#7A9E7E;--shadow:0 2px 16px rgba(140,123,128,.08);
  --shadow-md:0 6px 28px rgba(140,123,128,.13);--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Montserrat',sans-serif;color:var(--text);background:var(--bg);}

/* APP SHELL */
.app{display:flex;min-height:100vh;}

/* SIDEBAR */
.sb{width:220px;background:var(--sb-bg);border-right:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-brand-foto{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--rose-mid);}
.sb-brand-name{font-size:11px;font-weight:800;color:var(--text);}
.sb-brand-sub{font-size:9px;color:var(--muted);}
.sb-user{padding:12px 16px;border-bottom:1px solid var(--border);}
.sb-hello{font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px;}
.sb-pill{display:inline-block;background:var(--rose-light);color:var(--rose);font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.sb-sec{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;padding:0 8px;margin:10px 0 4px;}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);border:none;background:none;font-family:'Montserrat',sans-serif;width:100%;text-align:left;transition:all .15s;margin-bottom:2px;}
.ni:hover{background:var(--rose-light);color:var(--rose);}
.ni.on{background:var(--rose);color:#fff;}
.ni svg{flex-shrink:0;opacity:.7;}
.ni.on svg{opacity:1;}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border);}
.sb-urow{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sb-uav{width:28px;height:28px;border-radius:50%;background:var(--rose-light);color:var(--rose);border:1.5px solid var(--rose-mid);font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-uname{font-size:10px;font-weight:700;color:var(--text);}
.sb-uemail{font-size:8px;color:var(--muted);}
.sb-out{width:100%;padding:7px;font-size:10px;font-weight:600;font-family:'Montserrat',sans-serif;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;}
.sb-out:hover{border-color:var(--rose);color:var(--rose);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh;}

/* TOOLBAR */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:var(--shadow);flex-shrink:0;}
.tb-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.style-btns{display:flex;gap:5px;}
.style-btn{padding:5px 12px;font-size:10px;font-weight:700;font-family:'Montserrat',sans-serif;border-radius:20px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;}
.style-btn[data-style="ejecutivo"]{background:#1B3A5C14;color:#1B3A5C;border-color:#1B3A5C44;}
.style-btn[data-style="ejecutivo"].active{background:#1B3A5C;color:#fff;border-color:#1B3A5C;}
.style-btn[data-style="minimalista"]{background:#3A3A3A14;color:#3A3A3A;border-color:#3A3A3A44;}
.style-btn[data-style="minimalista"].active{background:#3A3A3A;color:#fff;border-color:#3A3A3A;}
.style-btn[data-style="innovacion"]{background:#1B4F9214;color:#1B4F92;border-color:#1B4F9244;}
.style-btn[data-style="innovacion"].active{background:#1B4F92;color:#fff;border-color:#1B4F92;}
.style-btn[data-style="empatico"]{background:#2D6A4F14;color:#2D6A4F;border-color:#2D6A4F44;}
.style-btn[data-style="empatico"].active{background:#2D6A4F;color:#fff;border-color:#2D6A4F;}
.tb-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.tb-btn{padding:7px 14px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;border-radius:9px;cursor:pointer;border:none;transition:all .15s;}
.tb-btn.ghost{background:var(--rose-light);color:var(--rose);border:1.5px solid var(--rose-mid);}
.tb-btn.ghost:hover{background:var(--rose-mid);}
.tb-btn.ghost.editing{background:var(--green);color:#fff;border-color:var(--green);}
.tb-btn.primary{background:var(--rose);color:#fff;}
.tb-btn.primary:hover{background:var(--rose-dark);}
.save-st{font-size:10px;color:var(--muted);}
.ml-auto{margin-left:auto;}

/* CONTENT */
.cv-content{flex:1;overflow-y:auto;padding:28px 40px 60px;}

/* HERO CARD */
.hero-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:24px 28px;margin-bottom:20px;display:flex;align-items:center;gap:20px;}
.hero-avatar{width:64px;height:64px;border-radius:50%;background:var(--rose-light);color:var(--rose);font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid var(--rose-mid);font-family:'Playfair Display',serif;font-style:italic;}
.hero-info{flex:1;}
.hero-greeting{font-size:20px;font-weight:800;color:var(--text);margin-bottom:2px;}
.hero-sub{font-size:13px;color:var(--text2);margin-bottom:12px;}
.hero-prog{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:5px;}
.hero-prog-fill{height:6px;background:var(--rose);border-radius:3px;transition:width .6s ease;}
.hero-prog-lbl{font-size:10px;color:var(--muted);}
.hero-badge{padding:5px 14px;background:var(--rose-light);color:var(--rose);font-size:11px;font-weight:700;border-radius:20px;flex-shrink:0;}

/* HITOS */
.hitos{display:flex;align-items:center;gap:0;margin-bottom:20px;background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:16px 20px;}
.hito{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;}
.hito:not(:last-child)::after{content:'';position:absolute;top:14px;left:60%;width:80%;height:2px;background:var(--border);}
.hito.done:not(:last-child)::after{background:var(--rose);}
.hito-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;z-index:1;margin-bottom:6px;position:relative;}
.hito.done .hito-dot{background:var(--rose);color:#fff;}
.hito.active .hito-dot{background:#fff;color:var(--rose);border:2px solid var(--rose);box-shadow:0 0 0 4px var(--rose-light);}
.hito.pending .hito-dot{background:var(--border);color:var(--muted);}
.hito-lbl{font-size:9px;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.04em;}
.hito.done .hito-lbl{color:var(--rose);}
.hito.active .hito-lbl{color:var(--text);font-weight:800;}
.hito.pending .hito-lbl{color:var(--muted);}

/* ACTION CARDS */
.actions-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.ac-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:22px 20px;display:flex;flex-direction:column;align-items:flex-start;gap:10px;transition:box-shadow .2s,transform .2s;cursor:pointer;border:1.5px solid transparent;}
.ac-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--rose-mid);}
.ac-icon{width:48px;height:48px;border-radius:12px;background:var(--rose-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ac-icon svg{opacity:.85;}
.ac-title{font-size:14px;font-weight:800;color:var(--text);}
.ac-desc{font-size:12px;color:var(--text2);line-height:1.5;}
.ac-btn{margin-top:auto;padding:9px 18px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;background:var(--rose);color:#fff;border:none;border-radius:9px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:background .15s;}
.ac-btn:hover{background:var(--rose-dark);}

/* CV VIEWER */
.cv-viewer{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.cv-viewer-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cv-viewer-lbl{font-size:9px;font-weight:700;color:var(--rose);text-transform:uppercase;letter-spacing:.12em;}
.cv-viewer-title{font-size:16px;font-weight:700;color:var(--text);}
.cv-frame-wrap{width:100%;}
#cv-frame{width:100%;border:none;display:block;min-height:500px;}

/* EMPTY */
.empty-cv{text-align:center;padding:4rem 2rem;}
.empty-icon{font-size:48px;margin-bottom:14px;}
.empty-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;}
.empty-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px;}
.empty-btn{padding:12px 28px;font-size:13px;font-weight:700;font-family:'Montserrat',sans-serif;background:var(--rose);color:#fff;border:none;border-radius:10px;cursor:pointer;}

/* INPUT FOTO */
#photo-input{display:none;}

@media(max-width:900px){
  .sb{display:none;}
  .cv-content{padding:16px 14px 60px;}
  .actions-grid{grid-template-columns:1fr;}
}
</style>
</head>

  ejecutivo:{color:'#1B3A5C',color2:'#4A7FA5',bg:'#F4F6F9',sbg:'#EEF3F8',font:'"Georgia","Times New Roman",serif',hfont:'"Georgia",serif',nombre:'EJECUTIVO'},

  innovacion:{color:'#1B4F92',color2:'#3A7BD5',bg:'#F0F4FF',sbg:'#E8EEFF',font:'"Futura","Century Gothic","Arial",sans-serif',hfont:'"Century Gothic","Arial",sans-serif',nombre:'INNOVACIÓN'},

};

var _email=null,_cvHtml=null,_estilo='ejecutivo',_editing=false,_iframe=null,_saveT=null;
var _cand=null,_informe=null;

// Leer email
var user=localStorage.getItem('mj_user');
if(user){try{var u=JSON.parse(user);_email=u.email;}catch(e){}}
if(!_email){var p=new URLSearchParams(window.location.search);_email=p.get('email');}

function ini(n){return(n||'').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()||'??';}
function pn(n){return(n||'').split(' ')[0]||'Tu CV';}
function irA(url){window.location.href=BASE+'/'+url;}
function cerrar(){localStorage.removeItem('mj_user');window.location.href=BASE+'/login.html';}

// Inicializar
if(!_email){
  document.getElementById('cv-content').innerHTML='<div class="empty-cv"><div class="empty-icon">🔐</div><div class="empty-title">Sesión no encontrada</div><div class="empty-desc">Inicia sesión para ver tu CV.</div><button class="empty-btn" onclick="irA('login.html')">Iniciar sesión</button></div>';
}else{
  cargarDatos();
}

function cargarDatos(){
  Promise.all([
    fetch(SB+'/rest/v1/candidatos?email=eq.'+encodeURIComponent(_email)+'&select=*&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/informes?email=eq.'+encodeURIComponent(_email)+'&select=data&order=created_at.desc&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=contenido',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();})
  ]).then(function(res){
    if(res[0]&&res[0].length)_cand=res[0][0];
    if(res[1]&&res[1].length){var raw=res[1][0].data;if(typeof raw==='string')try{raw=JSON.parse(raw);}catch(e){}; _informe=raw;}
    if(res[2]&&res[2].length)_cvHtml=res[2][0].contenido||'';

    // Actualizar sidebar
    var nombre=_cand?_cand.nombre:'';
    document.getElementById('sb-hello').textContent='👋 Hola, '+pn(nombre)+'!';
    document.getElementById('sb-uav').textContent=ini(nombre);
    document.getElementById('sb-uname').textContent=nombre;
    document.getElementById('sb-uemail').textContent=_email;

    renderContenido();
  }).catch(function(){
    document.getElementById('cv-content').innerHTML='<div class="empty-cv"><div class="empty-icon">⚠️</div><div class="empty-title">Error al cargar</div><div class="empty-desc">Recarga la página.</div></div>';
  });
}

function renderContenido(){
  var nombre=_cand?_cand.nombre:'';
  var sem=_cand?parseInt(_cand.semana_activa)||1:1;
  var pct=Math.min(100,Math.round(((sem-1)/4)*100));
  var hitos=['Inicio','CV Optimizado','LinkedIn','Entrevistas','Final'];
  
  var o='';
  
  // HERO CARD
  o+='<div class="hero-card">';
  o+='<div class="hero-avatar">'+ini(nombre)+'</div>';
  o+='<div class="hero-info">';
  o+='<div class="hero-greeting">¡Hola, '+pn(nombre)+'! Tu CV está aquí 🎯</div>';
  o+='<div class="hero-sub">Edita, personaliza el estilo y descarga tu CV optimizado.</div>';
  o+='<div class="hero-prog"><div class="hero-prog-fill" style="width:'+pct+'%"></div></div>';
  o+='<div class="hero-prog-lbl">Semana '+sem+' de 4 · Proceso '+pct+'% completado</div>';
  o+='</div>';
  o+='<div class="hero-badge">'+(_cvHtml?'✓ CV listo':'En preparación')+'</div>';
  o+='</div>';

  // HITOS
  o+='<div class="hitos">';
  hitos.forEach(function(h,i){
    var n=i+1;
    var cl=n<sem?'done':n===sem?'active':'pending';
    o+='<div class="hito '+cl+'">';
    o+='<div class="hito-dot">'+(n<sem?'✓':n)+'</div>';
    o+='<div class="hito-lbl">'+h+'</div>';
    o+='</div>';
  });
  o+='</div>';

  // ACTION CARDS
  o+='<div class="actions-grid">';
  // Card 1 - Editar CV
  o+='<div class="ac-card" onclick="toggleEdit()">';
  o+='<div class="ac-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--rose)" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>';
  o+='<div><div class="ac-title">Editar mi CV</div><div class="ac-desc">Haz cambios directamente sobre el documento.</div></div>';
  o+='<button class="ac-btn">IR AL EDITOR</button>';
  o+='</div>';
  // Card 2 - Cambiar estilo
  o+='<div class="ac-card" onclick="abrirEstilos()">';
  o+='<div class="ac-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--rose)" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 12 2a10 10 0 0 0-7.07 2.93M4.93 19.07A10 10 0 0 0 12 22a10 10 0 0 0 7.07-2.93"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg></div>';
  o+='<div><div class="ac-title">Cambiar estilo</div><div class="ac-desc">Ejecutivo, Minimalista, Innovación o Empático.</div></div>';
  o+='<button class="ac-btn">VER ESTILOS</button>';
  o+='</div>';
  // Card 3 - Descargar
  o+='<div class="ac-card" onclick="imprimirCV()">';
  o+='<div class="ac-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--rose)" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>';
  o+='<div><div class="ac-title">Descargar PDF</div><div class="ac-desc">Descarga tu CV listo para enviar.</div></div>';
  o+='<button class="ac-btn">DESCARGAR</button>';
  o+='</div>';
  o+='</div>';

  // CV VIEWER
  if(_cvHtml){
    o+='<div class="cv-viewer"><div class="cv-viewer-hd"><div><div class="cv-viewer-lbl">Tu documento</div><div class="cv-viewer-title">CV Optimizado</div></div></div>';
    o+='<div class="cv-frame-wrap"><iframe id="cv-frame" src="about:blank" scrolling="yes"></iframe></div></div>';
  }else{
    o+='<div class="cv-viewer"><div class="empty-cv"><div class="empty-icon">📝</div><div class="empty-title">Tu CV está en preparación</div><div class="empty-desc">Micaela está trabajando en tu CV personalizado. Te avisará cuando esté listo.</div><button class="empty-btn" onclick="window.open('https://wa.me/34611256224','_blank')">Hablar con Micaela</button></div></div>';
  }

  document.getElementById('cv-content').innerHTML=o;

  if(_cvHtml){
    _iframe=document.getElementById('cv-frame');
    mostrarCV(_cvHtml,_estilo);
  }
}

function aplicarEstilo(html,estilo){
  var e=ESTILOS[estilo];if(!e)return html;
  var cssOverride='<style id="estilo-override">'+
    ':root{--A:'+e.color+';--A2:'+e.color2+';--SB:'+e.sbg+';--AB:'+e.sbg+';}'+
    'body{font-family:'+e.font+'!important;}'+
    '.nm,.ex-t{font-family:'+e.hfont+'!important;}'+
    '.hd{background:'+e.color+'!important;}'+
    '.sd{background:'+e.sbg+'!important;}'+
    '.sh,.mh{color:'+e.color+'!important;border-bottom-color:'+e.color+'!important;}'+
    '.ex-d,.lg-l{background:'+e.color+'!important;}'+
    '.ul li::before,.sk::before,.ct2::before{background:'+e.color2+'!important;}'+
    '.ed-s{color:'+e.color2+'!important;}'+
    '#estilo-badge{background:'+e.color+'!important;}'+
    '</style>';
  var badgeHtml='<div id="estilo-badge" style="position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:'+e.color+';color:#fff;font-size:9px;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:.1em;z-index:999;font-family:Montserrat,sans-serif;">'+e.nombre+'</div>';
  html=html.replace('</head>',cssOverride+'</head>');
  html=html.replace('</body>',badgeHtml+'</body>');
  return html;
}

function mostrarCV(html,estilo){
  if(!_iframe)return;
  if(!html||(!html.trim().startsWith('<!DOCTYPE')&&!html.trim().startsWith('<html'))){
    _iframe.parentElement.innerHTML='<div style="padding:2rem;white-space:pre-wrap;font-size:13px;line-height:1.8;color:var(--text);">'+html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
    return;
  }
  var htmlConEstilo=aplicarEstilo(html,estilo);
  var blob=new Blob([htmlConEstilo],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  _iframe.onload=function(){
    try{var h=_iframe.contentDocument.documentElement.scrollHeight;_iframe.style.height=Math.max(h,600)+'px';}
    catch(e){_iframe.style.height='150vh';}
  };
  _iframe.src=url;
}

function cambiarEstilo(estilo,btn){
  _estilo=estilo;
  document.querySelectorAll('.style-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  if(_cvHtml&&_iframe)mostrarCV(_cvHtml,_estilo);
}

function abrirEstilos(){
  document.querySelector('.style-btns').scrollIntoView({behavior:'smooth'});
}

function toggleEdit(){
  _editing=!_editing;
  var btn=document.getElementById('edit-btn');
  if(_editing){
    btn.textContent='✓ Listo';btn.classList.add('editing');
    try{
      var doc=_iframe.contentDocument;
      doc.querySelectorAll('[contenteditable]').forEach(function(el){el.contentEditable='true';});
      doc.body.classList.add('editing');
      doc.addEventListener('input',schedSave);
    }catch(e){}
  }else{
    btn.textContent='✏ Editar';btn.classList.remove('editing');
    try{
      var doc=_iframe.contentDocument;
      doc.querySelectorAll('[contenteditable]').forEach(function(el){el.contentEditable='false';});
      doc.body.classList.remove('editing');
    }catch(e){}
    guardarAhora();
  }
}

function schedSave(){
  clearTimeout(_saveT);
  var st=document.getElementById('save-st');if(st)st.textContent='Guardando...';
  _saveT=setTimeout(guardarAhora,2000);
}

function guardarAhora(){
  if(!_email||!_iframe)return;
  try{
    var html=_iframe.contentDocument.documentElement.outerHTML;
    var htmlLimpio=html.replace(/<style id="estilo-override">[\s\S]*?<\/style>/,'');
    _cvHtml=htmlLimpio;
  }catch(e){return;}
  var st=document.getElementById('save-st');
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email),{
    method:'PATCH',
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({contenido:_cvHtml})
  }).then(function(r){
    if(st){st.textContent=r.ok||r.status===204?'✓ Guardado':'Error';setTimeout(function(){if(st)st.textContent='';},3000);}
  }).catch(function(){if(st){st.textContent='Error';setTimeout(function(){st.textContent='';},3000);}});
}

function cargarFoto(input){
  if(!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var doc=_iframe.contentDocument;
      var img=doc.getElementById('pi');var ini2=doc.getElementById('pn');
      if(img){img.src=e.target.result;img.style.display='block';}
      if(ini2)ini2.style.display='none';
      schedSave();
    }catch(err){}
  };
  reader.readAsDataURL(input.files[0]);
}

function imprimirCV(){
  if(_iframe){try{_iframe.contentWindow.print();return;}catch(e){}}
  window.print();
}
</script>
</body>
