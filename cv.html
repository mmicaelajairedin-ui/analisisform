<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>CV Optimizado</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{margin:0;padding:0;background:#E8E6E2;font-family:'Helvetica Neue',Arial,sans-serif;}
.loading{text-align:center;padding:5rem;color:#999;font-size:14px;}
</style>
</head>
<body>
<div id="root"><div class="loading">Cargando tu CV...</div></div>
<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';

var _email=null;
var user=localStorage.getItem('mj_user');
if(user){try{_email=JSON.parse(user).email;}catch(e){}}
if(!_email){var p=new URLSearchParams(window.location.search);_email=p.get('email');}
if(!_email){
  document.getElementById('root').innerHTML='<div class="loading">Sesión no encontrada. <a href="login.html" style="color:#8C7B80;">Iniciar sesión</a></div>';
}else{cargarCV();}

function cargarCV(){
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=contenido',{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  }).then(function(r){return r.json();}).then(function(rows){
    if(!Array.isArray(rows)||!rows.length){
      document.getElementById('root').innerHTML='<div class="loading">Tu CV aún no está disponible.<br><span style="font-size:12px;color:#bbb;">Micaela lo está preparando.</span></div>';
      return;
    }
    mostrarCV(rows[0].contenido||'');
  }).catch(function(){
    document.getElementById('root').innerHTML='<div class="loading">Error al cargar. Inténtalo de nuevo.</div>';
  });
}

function mostrarCV(html){
  if(html.trim().startsWith('<!DOCTYPE')||html.trim().startsWith('<html')){
    var root=document.getElementById('root');
    root.style.cssText='margin:0;padding:0;';
    var blob=new Blob([html],{type:'text/html'});
    var url=URL.createObjectURL(blob);
    var iframe=document.createElement('iframe');
    iframe.src=url;
    iframe.style.cssText='width:100%;border:none;display:block;min-height:100vh;';
    iframe.onload=function(){
      try{
        var h=iframe.contentDocument.documentElement.scrollHeight;
        iframe.style.height=h+'px';
      }catch(e){iframe.style.height='200vh';}
    };
    root.innerHTML='';
    root.appendChild(iframe);
  }else{
    document.getElementById('root').innerHTML=
      '<div style="max-width:860px;margin:2rem auto;background:#fff;padding:2rem 2.5rem;box-shadow:0 4px 20px rgba(0,0,0,.1);border-radius:8px;white-space:pre-wrap;font-size:13px;line-height:1.8;color:#1a1a1a;">'+
      html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
  }
}
</script>
</body>
</html>
