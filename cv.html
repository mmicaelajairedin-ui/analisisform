<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Optimizado</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#1B3A5C;
  --accent-light:#E8EEF4;
  --accent-mid:#4A7FA5;
  --text:#1a1a1a;
  --text-muted:#555;
  --border:#E2E2E2;
  --bg-side:#F4F6F9;
}
.theme-navy{--accent:#1B3A5C;--accent-light:#E8EEF4;--accent-mid:#4A7FA5;--bg-side:#F4F6F9;}
.theme-forest{--accent:#1D4A35;--accent-light:#E8F2EC;--accent-mid:#3A8060;--bg-side:#F2F7F4;}
.theme-burgundy{--accent:#5C1B2E;--accent-light:#F4E8EC;--accent-mid:#A54A65;--bg-side:#F7F2F4;}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#ECEAE6;min-height:100vh;padding:2rem 1rem 3rem;}

/* CONTROLS */
.controls{max-width:860px;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.brand-pill{font-size:12px;font-weight:600;color:#8C7B80;background:#fff;padding:6px 16px;border-radius:20px;border:1px solid #e0d8d5;}
.ctrl-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.theme-btns{display:flex;gap:6px;align-items:center;}
.theme-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s;}
.theme-btn.on{border-color:#fff;box-shadow:0 0 0 2px #888;}
.theme-btn-navy{background:#1B3A5C;}
.theme-btn-forest{background:#1D4A35;}
.theme-btn-burgundy{background:#5C1B2E;}
.ctrl-label{font-size:11px;color:#888;font-weight:500;}
.photo-btn{padding:6px 14px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;background:#fff;color:#555;border:1.5px solid #ddd;border-radius:8px;cursor:pointer;}
.photo-btn:hover{border-color:#8C7B80;color:#8C7B80;}
.btn-dl{padding:9px 20px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;}
.btn-dl:hover{opacity:.9;}

/* CODE SCREEN */
.code-screen{max-width:400px;margin:5rem auto;background:#fff;border-radius:16px;padding:2.5rem;text-align:center;box-shadow:0 4px 30px rgba(0,0,0,.08);}
.lock-icon{font-size:40px;margin-bottom:1rem;}
.code-screen h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:8px;}
.code-screen p{font-size:13px;color:#666;line-height:1.6;margin-bottom:1.5rem;}
.code-inp{width:160px;padding:12px;font-size:18px;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:.25em;text-align:center;text-transform:uppercase;border:2px solid #ddd;border-radius:10px;outline:none;}
.code-inp:focus{border-color:var(--accent);}
.code-btn{margin-top:12px;width:100%;padding:12px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;}
.code-err{font-size:12px;color:#c0756e;margin-top:8px;min-height:16px;}

/* CV DOCUMENT */
.cv{max-width:860px;margin:0 auto;background:#fff;box-shadow:0 8px 60px rgba(0,0,0,.12);position:relative;}

/* HEADER */
.cv-head{background:var(--accent);padding:0;display:grid;grid-template-columns:auto 1fr;min-height:160px;}
.cv-head-photo-col{width:160px;background:var(--accent-mid);display:flex;align-items:center;justify-content:center;padding:28px 20px;position:relative;}
.cv-head-photo-col::after{content:'';position:absolute;right:-20px;top:0;bottom:0;width:40px;background:var(--accent-mid);clip-path:polygon(0 0,0% 100%,100% 50%);z-index:1;}
.photo-circle{width:110px;height:110px;border-radius:50%;border:3px solid rgba(255,255,255,.3);overflow:hidden;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.photo-circle img{width:100%;height:100%;object-fit:cover;}
.photo-ini{font-family:'Playfair Display',serif;font-size:36px;color:rgba(255,255,255,.85);}
.cv-head-info{padding:28px 32px 28px 44px;display:flex;flex-direction:column;justify-content:center;z-index:2;}
.cv-name{font-family:'Playfair Display',serif;font-size:30px;font-weight:800;color:#fff;line-height:1.15;margin-bottom:5px;letter-spacing:-.01em;}
.cv-role{font-size:11px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px;}
.cv-contacts{display:flex;flex-wrap:wrap;gap:14px;}
.cv-contact{font-size:11px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:5px;}
.cv-contact-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.4);}
.cv-contact strong{color:#fff;font-weight:600;}
.cv-badges{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.cv-badge{font-size:10px;font-weight:600;color:rgba(255,255,255,.9);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;letter-spacing:.04em;}

/* BODY */
.cv-body{display:grid;grid-template-columns:220px 1fr;}

/* SIDEBAR */
.cv-side{background:var(--bg-side);padding:28px 20px;border-right:1px solid var(--border);}
.cv-sec{margin-bottom:24px;}
.cv-sec-title{font-size:8.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.16em;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--accent);display:flex;align-items:center;gap:6px;}
.skill-row{font-size:11.5px;color:var(--text);padding:4px 0;border-bottom:.5px solid var(--border);line-height:1.4;display:flex;align-items:center;gap:6px;}
.skill-row::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--accent-mid);flex-shrink:0;}
.skill-row:last-child{border-bottom:none;}
.lang-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--border);}
.lang-row:last-child{border-bottom:none;}
.lang-name{font-size:11.5px;color:var(--text);font-weight:500;}
.lang-lvl{font-size:10px;color:var(--accent);font-weight:700;background:var(--accent-light);padding:2px 7px;border-radius:10px;}
.edu-item{margin-bottom:14px;padding-bottom:14px;border-bottom:.5px solid var(--border);}
.edu-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.edu-deg{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.3;}
.edu-inst{font-size:10.5px;color:var(--text-muted);margin-top:2px;}
.edu-yr{font-size:10px;color:var(--accent);font-weight:600;margin-top:3px;background:var(--accent-light);display:inline-block;padding:1px 7px;border-radius:8px;}
.cert-row{font-size:11px;color:var(--text);padding:4px 0;border-bottom:.5px solid var(--border);line-height:1.4;}
.cert-row:last-child{border-bottom:none;}
.score-item{margin-bottom:10px;}
.score-lbl{font-size:10px;color:var(--text-muted);margin-bottom:4px;font-weight:500;display:flex;justify-content:space-between;}
.score-pct{font-weight:700;color:var(--accent);}
.score-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.score-fill{height:4px;border-radius:2px;background:var(--accent);}

/* MAIN */
.cv-main{padding:28px 32px;}
.sec{margin-bottom:22px;}
.sec-title{font-size:8.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.16em;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--accent);}
.summary{font-size:12px;color:var(--text);line-height:1.8;}
.kw-bar{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.kw{font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:3px 9px;border-radius:12px;}
.exp-item{margin-bottom:18px;padding-bottom:18px;border-bottom:.5px solid var(--border);}
.exp-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.exp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:2px;}
.exp-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.2;}
.exp-dates{font-size:10px;font-weight:700;color:var(--accent);white-space:nowrap;background:var(--accent-light);padding:2px 8px;border-radius:10px;flex-shrink:0;}
.exp-company{font-size:11.5px;color:var(--accent-mid);font-weight:600;margin-bottom:5px;}
.exp-context{font-size:10.5px;color:#888;background:#fafafa;border-radius:4px;padding:5px 8px;margin-bottom:6px;line-height:1.5;border-left:2px solid var(--accent-mid);font-style:italic;}
.exp-bullets{list-style:none;padding:0;}
.exp-bullets li{font-size:11.5px;color:var(--text);line-height:1.7;padding:2px 0 2px 14px;position:relative;}
.exp-bullets li::before{content:'';position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--accent);}
.exp-bullets li strong{font-weight:700;color:var(--accent);}

/* FOOTER */
.cv-foot{background:var(--bg-side);border-top:1px solid var(--border);padding:10px 32px;display:flex;justify-content:space-between;align-items:center;}
.cv-foot-brand{font-size:10px;font-weight:600;color:var(--accent);}
.cv-foot-note{font-size:10px;color:#aaa;}

/* LOADING */
.loading{text-align:center;padding:4rem;color:#999;}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#8C7B80;margin:0 2px;animation:dp 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

@media(max-width:640px){
  .cv-body{grid-template-columns:1fr;}
  .cv-head{grid-template-columns:1fr;}
  .cv-head-photo-col{width:100%;padding:20px;flex-direction:row;gap:16px;}
  .cv-head-photo-col::after{display:none;}
  .cv-head-info{padding:20px;}
}
@media print{
  body{background:#fff;padding:0;}
  .controls{display:none;}
  .cv{box-shadow:none;max-width:100%;}
  .cv-head{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .cv-side{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .score-fill,.lang-lvl,.edu-yr,.kw,.exp-dates{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  @page{margin:.4cm;size:A4;}
}
</style>
</head>
<body class="theme-navy">

<div class="controls" id="controls">
  <div class="brand-pill">Micaela Jairedin &middot; Career Coach & Recruiter</div>
  <div class="ctrl-right">
    <span class="ctrl-label">Color:</span>
    <div class="theme-btns">
      <div class="theme-btn theme-btn-navy on" onclick="setTheme('navy',this)" title="Azul marino"></div>
      <div class="theme-btn theme-btn-forest" onclick="setTheme('forest',this)" title="Verde bosque"></div>
      <div class="theme-btn theme-btn-burgundy" onclick="setTheme('burgundy',this)" title="Borgoña"></div>
    </div>
    <button class="photo-btn" onclick="document.getElementById('photo-inp').click()">+ Añadir foto</button>
    <input type="file" id="photo-inp" accept="image/*" style="display:none" onchange="loadPhoto(this)">
    <button class="btn-dl" onclick="window.print()">Descargar PDF</button>
  </div>
</div>

<div id="root"><div class="loading"><div class="dots"><span></span><span></span><span></span></div><p style="margin-top:12px;">Cargando tu CV...</p></div></div>

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var _row=null,_email=null,_code=null;

function init(){
  var p=new URLSearchParams(window.location.search);
  _email=p.get('email');_code=p.get('code');
  if(!_email){showErr('No se encontro el CV.');return;}
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=*',{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  }).then(function(r){return r.json();}).then(function(rows){
    if(!rows||!rows.length){showErr('Tu CV aun no esta disponible. Micaela lo publicara pronto.');return;}
    _row=rows[0];
    if(_row.codigo&&_code!==_row.codigo){showCodeForm();return;}
    renderCV(_row.contenido||'');
  }).catch(function(e){showErr('Error: '+e.message);});
}

function showErr(m){document.getElementById('root').innerHTML='<div class="loading"><p>'+m+'</p></div>';}

function showCodeForm(){
  document.getElementById('root').innerHTML='<div class="code-screen">'
    +'<div class="lock-icon">&#128274;</div>'
    +'<h2>Introduce tu codigo</h2>'
    +'<p>Micaela te lo envio por WhatsApp junto con este link.</p>'
    +'<input class="code-inp" id="ci" type="text" maxlength="8" placeholder="XXXXXX" autocomplete="off">'
    +'<button class="code-btn" onclick="verificar()">Acceder a mi CV</button>'
    +'<p class="code-err" id="ce"></p></div>';
}

function verificar(){
  var code=document.getElementById('ci').value.trim().toUpperCase();
  if(code===(_row.codigo||'').toUpperCase()){
    _code=code;
    window.history.replaceState({},'',location.pathname+'?email='+encodeURIComponent(_email)+'&code='+code);
    renderCV(_row.contenido||'');
  } else {
    document.getElementById('ce').textContent='Codigo incorrecto.';
  }
}

function setTheme(t,btn){
  document.body.className='theme-'+t;
  document.querySelectorAll('.theme-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
}

function loadPhoto(inp){
  var file=inp.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=document.getElementById('cv-photo-img');
    if(img){img.src=e.target.result;img.style.display='block';}
    var ini=document.getElementById('cv-photo-ini');
    if(ini)ini.style.display='none';
  };
  reader.readAsDataURL(file);
}

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function extractSec(text,kw){
  var lines=text.split('\n');
  var idx=-1;
  for(var i=0;i<lines.length;i++){
    if(lines[i].toUpperCase().indexOf(kw)!==-1&&lines[i].trim().length<60){idx=i;break;}
  }
  if(idx===-1)return '';
  var out=[];
  for(var j=idx+1;j<lines.length;j++){
    var l=lines[j];
    var u=l.trim().toUpperCase();
    if(u.length>3&&u.length<60&&u===u.replace(/[^A-Z\s\u00C0-\u024F]/g,'')&&!l.trim().startsWith('-')&&!l.trim().startsWith('·')&&j>idx+1){break;}
    out.push(l);
  }
  return out.join('\n').trim();
}

function parseExp(text){
  if(!text)return[];
  var blocks=[],cur=[];
  text.split('\n').forEach(function(l){
    var hasDate=l.match(/\d{4}/);
    var isHeader=l.trim().length>3&&l.trim().length<120&&!l.trim().match(/^[-·•]/)&&!l.trim().match(/^[a-z]/);
    if(hasDate&&isHeader&&cur.length>1){blocks.push(cur.join('\n'));cur=[l];}
    else cur.push(l);
  });
  if(cur.length)blocks.push(cur.join('\n'));
  return blocks.filter(function(b){return b.trim().length>15;});
}

function renderExpBlock(block){
  var lines=block.split('\n').filter(function(l){return l.trim();});
  if(!lines.length)return'';
  var title=lines[0];var dates='';var company='';var context='';var bullets=[];
  var dm=title.match(/(\w{2,4}\.?\s*\d{4}|\d{4})\s*[-\u2013\u2014]+\s*(\w+\.?\s*\d{0,4}|Actualidad|Presente)/i);
  if(!dm)dm=title.match(/(\d{4})\s*[-\u2013]\s*(\d{4}|Actualidad|Presente)/i);
  if(dm){dates=dm[0];title=title.replace(dm[0],'').replace(/[|·]/g,'').trim();}
  for(var i=1;i<lines.length;i++){
    var l=lines[i].trim();if(!l)continue;
    if(i===1&&!l.match(/^[-·•]/))company=l;
    else if(l.toLowerCase().match(/^(contexto|nota|context):/i))context=l.replace(/^[^:]+:/i,'').trim();
    else if(l.match(/^[-·•]/))bullets.push(l.replace(/^[-·•]\s*/,''));
  }
  var html='<div class="exp-item">'
    +'<div class="exp-head"><div class="exp-title">'+esc(title)+'</div>'+(dates?'<div class="exp-dates">'+esc(dates)+'</div>':'')+'</div>'
    +(company?'<div class="exp-company">'+esc(company)+'</div>':'')
    +(context?'<div class="exp-context">'+esc(context)+'</div>':'')
    +(bullets.length?'<ul class="exp-bullets">'+bullets.map(function(b){
      return '<li>'+b.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')+'</li>';
    }).join('')+'</ul>':'')
    +'</div>';
  return html;
}

function renderCV(text){
  var lines=text.split('\n');
  // Extract name - first meaningful line
  var name='';
  for(var i=0;i<Math.min(8,lines.length);i++){
    var l=lines[i].trim();
    if(l&&l.length>3&&!l.includes('@')&&!l.match(/^\+?\d/)&&!l.includes('---')){name=l;break;}
  }
  // Role - second meaningful line
  var role='';
  for(var i=1;i<Math.min(10,lines.length);i++){
    var l=lines[i].trim();
    if(l&&l!==name&&l.length>5&&!l.includes('@')&&!l.match(/^\+?\d/)&&!l.includes('---')&&!l.match(/^[A-Z\s]+$/)){ role=l;break;}
  }
  var emailMatch=text.match(/[\w.+-]+@[\w.-]+\.\w+/);
  var phoneMatch=text.match(/\+?[\d\s().+-]{9,20}/);
  var liMatch=text.match(/linkedin\.com\/in\/[\w-]+/i);
  var cityMatch=text.match(/(Boiro|Galicia|A Coru[nñ]a|Madrid|Barcelona|España)[^|\n,]*/i);
  var ini=name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()||'CV';

  var summary=extractSec(text,'RESUMEN');
  var skills=extractSec(text,'HABILIDADES');
  var langs=extractSec(text,'IDIOMAS');
  var edu=extractSec(text,'FORMACI');
  var certs=extractSec(text,'CERTIFIC');
  var expText=extractSec(text,'EXPERIENCIA');
  var expBlocks=parseExp(expText);

  // ATS Keywords derived from content
  var kwList=['Dirección General','Gestión P&L','B2B Industrial','Expansión Internacional','Supply Chain','Gobierno Corporativo','Lean','Transformación Digital','Construcción','Agroindustria'];

  var skillList=skills?skills.split('\n').filter(function(l){return l.trim()&&!l.match(/^[-·\s]*$/)&&!l.match(/^[A-Z\s:]{5,}$/);}).map(function(l){return l.replace(/^[-·•]\s*/,'').trim();}):[];
  var langList=langs?langs.split('\n').filter(function(l){return l.trim();}).map(function(l){var p=l.replace(/^[-·•]\s*/,'').split(':');return{n:(p[0]||'').trim(),l:(p[1]||'').trim()};}).filter(function(x){return x.n.length>1;}):[];
  var eduList=edu?edu.split('\n').filter(function(l){return l.trim()&&!l.match(/^[A-Z\s]{6,}$/);}).map(function(l){
    var p=l.replace(/^[-·•]\s*/,'').split('·');
    return{deg:(p[0]||'').trim(),inst:(p[1]||'').trim(),yr:(p[2]||p[3]||'').trim()};
  }).filter(function(x){return x.deg.length>2;}):[];
  var certList=certs?certs.split('\n').filter(function(l){return l.trim()&&l.trim()!=='--';}).map(function(l){return l.replace(/^[-·•]\s*/,'').trim();}):[];

  var html='<div class="cv" id="cv-doc">';

  // HEADER
  html+='<div class="cv-head">'
    +'<div class="cv-head-photo-col">'
      +'<div class="photo-circle" onclick="document.getElementById(\'photo-inp\').click()" title="Haz clic para añadir foto">'
        +'<img id="cv-photo-img" src="" style="display:none;" alt="Foto">'
        +'<div class="photo-ini" id="cv-photo-ini">'+ini+'</div>'
      +'</div>'
    +'</div>'
    +'<div class="cv-head-info">'
      +'<div class="cv-name">'+esc(name)+'</div>'
      +'<div class="cv-role">'+esc(role)+'</div>'
      +'<div class="cv-contacts">'
        +(emailMatch?'<div class="cv-contact"><strong>'+esc(emailMatch[0])+'</strong></div>':'')
        +(phoneMatch?'<div class="cv-contact"><span class="cv-contact-dot"></span>'+esc(phoneMatch[0].trim())+'</div>':'')
        +(cityMatch?'<div class="cv-contact"><span class="cv-contact-dot"></span>'+esc(cityMatch[0].trim())+'</div>':'')
        +(liMatch?'<div class="cv-contact"><span class="cv-contact-dot"></span>'+esc(liMatch[0])+'</div>':'')
      +'</div>'
      +'<div class="cv-badges">'
        +'<span class="cv-badge">Disponibilidad inmediata</span>'
        +'<span class="cv-badge">Abierto a relocalizaci\u00f3n</span>'
        +'<span class="cv-badge">Biling\u00fce ES-EN</span>'
      +'</div>'
    +'</div>'
  +'</div>';

  // BODY
  html+='<div class="cv-body">';

  // SIDEBAR
  html+='<div class="cv-side">';

  // Skills
  if(skillList.length){
    html+='<div class="cv-sec"><div class="cv-sec-title">Competencias</div>';
    skillList.slice(0,12).forEach(function(s){html+='<div class="skill-row">'+esc(s)+'</div>';});
    html+='</div>';
  }

  // Languages
  if(langList.length){
    html+='<div class="cv-sec"><div class="cv-sec-title">Idiomas</div>';
    langList.forEach(function(l){
      html+='<div class="lang-row"><span class="lang-name">'+esc(l.n)+'</span>'+(l.l?'<span class="lang-lvl">'+esc(l.l)+'</span>':'')+'</div>';
    });
    html+='</div>';
  }

  // Education
  if(eduList.length){
    html+='<div class="cv-sec"><div class="cv-sec-title">Formaci\u00f3n</div>';
    eduList.forEach(function(e){
      html+='<div class="edu-item"><div class="edu-deg">'+esc(e.deg)+'</div>'
        +(e.inst?'<div class="edu-inst">'+esc(e.inst)+'</div>':'')
        +(e.yr?'<div class="edu-yr">'+esc(e.yr)+'</div>':'')+'</div>';
    });
    html+='</div>';
  }

  // Certifications
  if(certList.length){
    html+='<div class="cv-sec"><div class="cv-sec-title">Certificaciones</div>';
    certList.forEach(function(c){html+='<div class="cert-row">'+esc(c)+'</div>';});
    html+='</div>';
  }

  html+='</div>'; // end sidebar

  // MAIN COL
  html+='<div class="cv-main">';

  // Summary
  if(summary){
    html+='<div class="sec"><div class="sec-title">Resumen ejecutivo</div>'
      +'<div class="summary">'+esc(summary)+'</div>'
      +'<div class="kw-bar">'+kwList.map(function(k){return'<span class="kw">'+k+'</span>';}).join('')+'</div>'
      +'</div>';
  }

  // Experience
  if(expBlocks.length){
    html+='<div class="sec"><div class="sec-title">Experiencia profesional</div>';
    expBlocks.forEach(function(b){html+=renderExpBlock(b);});
    html+='</div>';
  }

  html+='</div>'; // end main
  html+='</div>'; // end body

  // FOOTER
  html+='<div class="cv-foot">'
    +'<div class="cv-foot-brand">Micaela Jairedin &middot; Career Coach & Recruiter</div>'
    +'<div class="cv-foot-note">CV optimizado &middot; Confidencial</div>'
    +'</div>';

  html+='</div>'; // end cv-doc
  document.getElementById('root').innerHTML=html;
}

init();
</script>
</body>
</html>
