<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>CV Optimizado — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{margin:0;padding:0;background:#F4F4F4;font-family:'Montserrat',sans-serif;}

/* TOOLBAR */
.toolbar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #EAE5E5;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 2px 12px rgba(140,123,128,.08);}

/* Botón volver */
.btn-back{display:flex;align-items:center;gap:6px;padding:7px 14px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;border-radius:9px;cursor:pointer;border:1.5px solid #EAE5E5;background:#F5F0F0;color:#8C7B80;text-decoration:none;transition:all .15s;}
.btn-back:hover{background:#DDD0D0;border-color:#DDD0D0;}

/* Marca */
.toolbar-brand{display:flex;align-items:center;gap:8px;}
.toolbar-brand img{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1.5px solid #DDD0D0;}
.toolbar-brand-name{font-size:11px;font-weight:700;color:#2D292A;}
.toolbar-sep{width:1px;height:22px;background:#EAE5E5;flex-shrink:0;}

/* Estilos */
.style-lbl{font-size:10px;font-weight:700;color:#9E9696;text-transform:uppercase;letter-spacing:.1em;}
.style-btns{display:flex;gap:5px;}
.style-btn{padding:5px 11px;font-size:10px;font-weight:700;font-family:'Montserrat',sans-serif;border-radius:20px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;white-space:nowrap;}
.style-btn[data-style="ejecutivo"]{background:#1B3A5C14;color:#1B3A5C;border-color:#1B3A5C44;}
.style-btn[data-style="ejecutivo"].active{background:#1B3A5C;color:#fff;border-color:#1B3A5C;}
.style-btn[data-style="minimalista"]{background:#3A3A3A14;color:#3A3A3A;border-color:#3A3A3A44;}
.style-btn[data-style="minimalista"].active{background:#3A3A3A;color:#fff;border-color:#3A3A3A;}
.style-btn[data-style="innovacion"]{background:#1B4F9214;color:#1B4F92;border-color:#1B4F9244;}
.style-btn[data-style="innovacion"].active{background:#1B4F92;color:#fff;border-color:#1B4F92;}
.style-btn[data-style="empatico"]{background:#2D6A4F14;color:#2D6A4F;border-color:#2D6A4F44;}
.style-btn[data-style="empatico"].active{background:#2D6A4F;color:#fff;border-color:#2D6A4F;}

.toolbar-btn{padding:7px 14px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;border-radius:9px;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-ghost{background:#F5F0F0;color:#8C7B80;border:1.5px solid #EAE5E5;}
.btn-ghost:hover{background:#DDD0D0;}
.btn-ghost.editing{background:#7A9E7E;color:#fff;border-color:#7A9E7E;}
.btn-primary{background:#8C7B80;color:#fff;}
.btn-primary:hover{background:#6B5A5F;}
.save-st{font-size:10px;color:#9E9696;min-width:60px;}
.ml-auto{margin-left:auto;}
.loading-msg{text-align:center;padding:5rem;color:#9E9696;font-size:14px;}
#cv-frame-wrap{width:100%;min-height:calc(100vh - 52px);}
#cv-frame{width:100%;border:none;display:block;min-height:calc(100vh - 52px);}
</style>
</head>

function cargarCV(){
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=contenido',{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  }).then(function(r){return r.json();}).then(function(rows){
    if(!Array.isArray(rows)||!rows.length){
      document.getElementById('root').innerHTML='<div class="loading-msg">Tu CV aún no está disponible.<br><span style="font-size:12px;color:#bbb;">Micaela lo está preparando.</span></div>';
      return;
    }
    _cvHtml=rows[0].contenido||'';
    mostrarCV(_cvHtml,_estilo);
  }).catch(function(){
    document.getElementById('root').innerHTML='<div class="loading-msg">Error al cargar. Inténtalo de nuevo.</div>';
  });
}

function aplicarEstilo(html,estilo){
  var e=ESTILOS[estilo];if(!e)return html;
  var cssOverride='<style id="estilo-override">'+
    ':root{--A:'+e.color+';--A2:'+e.color2+';--SB:'+e.sbg+';--AB:'+e.sbg+';}'+
    'body{font-family:'+e.font+'!important;}'+
    '.nm,.ex-t{font-family:'+e.hfont+'!important;}'+
    '.hd{background:'+e.color+'!important;}'+
    '.sd{background:'+e.sbg+'!important;}'+
    '.sh,.mh{color:'+e.color+'!important;border-bottom-color:'+e.color+'!important;}'+
    '.ex-d,.lg-l{background:'+e.color+'!important;}'+
    '.ul li::before,.sk::before,.ct2::before{background:'+e.color2+'!important;}'+
    '.ed-s{color:'+e.color2+'!important;}'+
    '#estilo-badge{background:'+e.color+'!important;}'+
    '</style>';
  var badgeHtml='<div id="estilo-badge" style="position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:'+e.color+';color:#fff;font-size:9px;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:.1em;z-index:999;font-family:Montserrat,sans-serif;">'+e.nombre+'</div>';
  html=html.replace('</head>',cssOverride+'</head>');
  html=html.replace('</body>',badgeHtml+'</body>');
  return html;
}

function mostrarCV(html,estilo){
  if(!html||(!html.trim().startsWith('<!DOCTYPE')&&!html.trim().startsWith('<html'))){
    document.getElementById('root').innerHTML=
      '<div style="max-width:860px;margin:2rem auto;background:#fff;padding:2rem 2.5rem;box-shadow:0 4px 20px rgba(0,0,0,.1);border-radius:12px;white-space:pre-wrap;font-size:13px;line-height:1.8;color:#1a1a1a;">'+
      html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
    return;
  }
  var htmlConEstilo=aplicarEstilo(html,estilo);
  var root=document.getElementById('root');
  root.innerHTML='<div id="cv-frame-wrap"><iframe id="cv-frame" src="about:blank" scrolling="yes"></iframe></div>';
  _iframe=document.getElementById('cv-frame');
  var blob=new Blob([htmlConEstilo],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  _iframe.onload=function(){
    try{var h=_iframe.contentDocument.documentElement.scrollHeight;_iframe.style.height=Math.max(h,600)+'px';}
    catch(e){_iframe.style.height='150vh';}
  };
  _iframe.src=url;
}

function cambiarEstilo(estilo,btn){
  _estilo=estilo;
  document.querySelectorAll('.style-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  if(_cvHtml)mostrarCV(_cvHtml,_estilo);
}

function toggleEdit(){
  _editing=!_editing;

    btn.textContent='✓ Listo';btn.classList.add('editing');
    try{
      var doc=_iframe.contentDocument;
      doc.querySelectorAll('[contenteditable]').forEach(function(el){el.contentEditable='true';});
      doc.body.classList.add('editing');
      doc.addEventListener('input',schedSave);
    }catch(e){}
  }else{
    btn.textContent='✏ Editar';btn.classList.remove('editing');
    try{
      var doc=_iframe.contentDocument;
      doc.querySelectorAll('[contenteditable]').forEach(function(el){el.contentEditable='false';});
      doc.body.classList.remove('editing');
    }catch(e){}
    guardarAhora();
  }
}

function schedSave(){
  clearTimeout(_saveT);
  var st=document.getElementById('save-st');if(st)st.textContent='Guardando...';
  _saveT=setTimeout(guardarAhora,2000);
}

function guardarAhora(){
  if(!_email||!_iframe)return;
  try{
    var html=_iframe.contentDocument.documentElement.outerHTML;
    var htmlLimpio=html.replace(/<style id="estilo-override">[\s\S]*?<\/style>/,'');
    _cvHtml=htmlLimpio;
  }catch(e){return;}
  var st=document.getElementById('save-st');
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email),{
    method:'PATCH',
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({contenido:_cvHtml})
  }).then(function(r){
    if(st){st.textContent=r.ok||r.status===204?'✓ Guardado':'Error';setTimeout(function(){if(st)st.textContent='';},3000);}
  }).catch(function(){if(st){st.textContent='Error';setTimeout(function(){st.textContent='';},3000);}});
}

function cargarFoto(input){
  if(!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var doc=_iframe.contentDocument;
      var img=doc.getElementById('pi');var ini=doc.getElementById('pn');
      if(img){img.src=e.target.result;img.style.display='block';}
      if(ini)ini.style.display='none';
      schedSave();
    }catch(err){}
  };
  reader.readAsDataURL(input.files[0]);
}

function imprimirCV(){
  if(_iframe){try{_iframe.contentWindow.print();return;}catch(e){}}
  window.print();
}
</script>
</body>
