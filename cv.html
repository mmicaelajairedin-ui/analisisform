<title>Mi CV · Career Pathway</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600&family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Montserrat',sans-serif;}
body{background:#F5F4F2;display:flex;overflow:hidden;height:100vh;}

/* SIDEBAR CONFIG */
.sidebar-config{width:268px;flex-shrink:0;background:#FFFFFF;height:100vh;overflow-y:auto;border-right:1px solid #EDEAE8;display:flex;flex-direction:column;}
.sb-header{padding:20px 22px 16px;border-bottom:1px solid #EEE;}
.sb-back{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:#8C7B80;text-decoration:none;margin-bottom:12px;cursor:pointer;background:none;border:none;font-family:'Montserrat',sans-serif;padding:0;}
.sb-back:hover{color:#6B5A5F;}
.sb-title{font-size:13px;font-weight:800;color:#4A3F3F;letter-spacing:.02em;}
.sb-sub{font-size:10px;color:#9E9696;margin-top:2px;}
.sb-section{padding:16px 22px;border-bottom:1px solid #F0EDED;}
.sb-section-lbl{font-size:9px;font-weight:700;color:#9E9696;text-transform:uppercase;letter-spacing:.14em;margin-bottom:12px;}

/* Swatches */
.swatches{display:flex;flex-wrap:wrap;gap:8px;}
.swatch{width:38px;height:38px;border-radius:8px;cursor:pointer;border:2.5px solid transparent;transition:all .15s;}
.swatch.active{border-color:#4A3F3F;transform:scale(1.1);}
.swatch:hover{transform:scale(1.05);}
.swatch-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.swatch-name{font-size:8px;color:#9E9696;text-align:center;width:38px;white-space:nowrap;overflow:hidden;}
.color-preview{height:5px;border-radius:3px;margin-top:8px;transition:background .3s;}

/* Tipografías */
.font-row{margin-bottom:10px;}
.font-lbl{font-size:10px;font-weight:600;color:#4A3F3F;margin-bottom:5px;}
.font-select{width:100%;padding:8px 10px;font-size:11px;font-family:'Montserrat',sans-serif;border:1.5px solid #E0DADA;border-radius:8px;outline:none;color:#4A3F3F;cursor:pointer;background:#FFFFFF;}
.font-select:focus{border-color:#8C7B80;}

/* Foto */
.photo-area{display:flex;align-items:center;gap:10px;}
.photo-preview{width:52px;height:52px;border-radius:50%;background:#F0EDED;border:2px solid #DDD0D0;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#9E9696;font-size:10px;font-weight:700;}
.photo-preview img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-btn{padding:7px 12px;font-size:10px;font-weight:700;font-family:'Montserrat',sans-serif;background:#F5F0F0;color:#8C7B80;border:1.5px solid #DDD0D0;border-radius:8px;cursor:pointer;transition:all .15s;}
.photo-btn:hover{background:#DDD0D0;}
.photo-btn.sel{background:#8C7B80;color:#fff;border-color:#8C7B80;}

/* Footer */
.sb-footer{padding:18px 22px;margin-top:auto;border-top:1px solid #EEE;}
.btn-download{width:100%;padding:13px;font-size:11px;font-weight:800;font-family:'Montserrat',sans-serif;background:#8C7B80;color:#fff;border:1.5px solid transparent;border-radius:10px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:all .2s ease;box-shadow:0 4px 12px rgba(140,123,128,.25);}
.btn-download:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(140,123,128,.35);}
.btn-download:active{transform:translateY(0);}
.btn-download:hover{opacity:.9;}
.btn-download.editing{background:#8C7B80;color:#fff;border-color:#8C7B80;}
.btn-download:hover{background:#6B5A5F;}

/* WORKSPACE */
.workspace{flex:1;overflow-y:auto;padding:36px 50px 80px;display:flex;flex-direction:column;align-items:center;height:100vh;background:#F5F4F2;}
.workspace-top{width:210mm;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ws-lbl{font-size:10px;font-weight:700;color:#9E9696;text-transform:uppercase;letter-spacing:.1em;}
.ws-badge{font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;background:#fff;color:#8C7B80;border:1.5px solid #DDD0D0;}

/* CV PAPER */
.cv-paper{background:#fff;width:210mm;min-height:297mm;box-shadow:0 8px 40px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04);border-radius:4px;overflow:visible;transition:box-shadow .3s ease;}

/* CV ESTRUCTURA */
.cv-head{padding:34px 38px 26px;position:relative;}
.cv-photo-wrap{position:absolute;right:36px;top:26px;}
.cv-photo{width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.5);display:block;}
.cv-photo-ini{width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;letter-spacing:-0.02em;color:rgba(255,255,255,.85);border:3px solid rgba(255,255,255,.35);}
.cv-name{font-size:26px;font-weight:800;letter-spacing:-0.02em;color:#fff;line-height:1.15;margin-bottom:4px;}
.cv-role{font-size:11px;font-weight:500;color:rgba(255,255,255,.78);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}
.cv-contact{display:flex;flex-wrap:wrap;gap:10px;}
.cv-contact-item{font-size:10px;color:rgba(255,255,255,.72);display:flex;align-items:center;gap:4px;}
.cv-body{display:grid;grid-template-columns:196px 1fr;min-height:calc(297mm - 160px);}
.cv-sidebar-col{padding:22px 18px;}
.cv-main-col{padding:22px 26px;border-left:1px solid #F0EDED;}
.sec-title{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom-width:1.5px;border-bottom-style:solid;}
.cv-block{margin-bottom:16px;}
.item-title{font-size:11px;font-weight:700;color:#2D292A;margin-bottom:1px;}
.item-sub{font-size:10px;font-weight:600;margin-bottom:3px;}
.item-desc{font-size:10px;color:#5E5859;line-height:1.65;}
.skill-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.skill-name{font-size:10px;color:#4A3F3F;font-weight:600;}
.skill-bar{height:4px;background:#E8E0E0;border-radius:2px;width:90px;overflow:hidden;}
.skill-fill{height:4px;border-radius:2px;}
.cv-tag{display:inline-block;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;margin:2px;}
.side-item{font-size:10px;color:#5E5859;margin-bottom:5px;display:flex;align-items:flex-start;gap:5px;}
.empty-cv{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:297mm;gap:12px;color:#9E9696;text-align:center;padding:3rem;}
@media print{
  .sidebar-config{display:none!important;}
  .workspace{padding:0!important;background:#fff!important;}
  .cv-paper{box-shadow:none!important;}
  body{background:#fff!important;}
}

/* ── Edición in-situ ─────────────────────────────────── */
[contenteditable="true"]:focus {
  outline: 2px solid #8C7B80;
  background: rgba(140,123,128,.05);
  border-radius: 4px;
  box-shadow: 0 0 15px rgba(140,123,128,.2);
  transition: all .3s ease;
}
[contenteditable="true"]:hover {
  background: rgba(140,123,128,.04);
  border-radius: 3px;
  outline: 1px dashed rgba(140,123,128,.35);
}

/* ── Swatches animados ───────────────────────────────── */
.swatch {
  transition: transform .2s ease, box-shadow .2s ease !important;
}
.swatch:hover {
  transform: scale(1.2) rotate(5deg) !important;
  box-shadow: 0 4px 12px rgba(0,0,0,.2) !important;
}
.swatch.active {
  transform: scale(1.1) !important;
  box-shadow: 0 3px 10px rgba(0,0,0,.25) !important;
}

/* ── Botones sidebar con micro-interacción ───────────── */
.btn-download {
  transition: transform .15s ease, box-shadow .15s ease, background .2s ease !important;
}
.btn-download:hover {
  transform: translateY(-1px) !important;
  box-shadow: 0 6px 18px rgba(140,123,128,.35) !important;
}
.btn-download:active {
  transform: translateY(0) !important;
}

/* ── Fade-in del CV al cargar ────────────────────────── */
.cv-paper {
  animation: fadeInUp .4s ease both;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Swatch tooltip ──────────────────────────────────── */
.swatch-wrap {
  position: relative;
}
.swatch-name {
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  background: #4A3F3F;
  color: #fff;
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s ease;
}
.swatch-wrap:hover .swatch-name {
  opacity: 1;
}

/* ── Sidebar scroll suave ────────────────────────────── */
.sidebar-config {
  scroll-behavior: smooth;
}

/* ── Section labels más elegantes ───────────────────── */
.sb-section-lbl {
  letter-spacing: .12em;
  transition: color .2s;
}

/* ── Color preview con transición ───────────────────── */
.color-preview {
  transition: background .3s ease !important;
}


/* ── Look & Feel 2026 ───────────────────────────────────── */
.sb-title { letter-spacing: -0.03em; }
.sb-section { border-bottom: 1px solid #F0EEED; }
.sb-header { background: #fff; border-bottom: 1px solid #F0EEED; }
.swatch { border-radius: 50% !important; }  /* Círculos orgánicos */
.font-select {
  border: none !important;
  border-bottom: 1.5px solid #E0DADA !important;
  border-radius: 0 !important;
  background: transparent !important;
  padding-left: 0 !important;
}
.font-select:focus {
  border-bottom-color: #8C7B80 !important;
  outline: none !important;
}
.photo-btn {
  border-radius: 20px !important;
}
.btn-download {
  border-radius: 20px !important;
  letter-spacing: 0.04em;
}
.cv-paper {
  border-radius: 6px !important;
}


/* ── Affordance de edición ───────────────────────────────── */
.editing-active [contenteditable="true"] {
  position: relative;
  border-left: 2px solid rgba(140,123,128,.3) !important;
  padding-left: 6px !important;
  border-radius: 0 3px 3px 0 !important;
  background: rgba(140,123,128,.03) !important;
  transition: all .2s ease;
}
.editing-active [contenteditable="true"]:focus {
  border-left-color: #8C7B80 !important;
  background: rgba(140,123,128,.06) !important;
  box-shadow: 0 0 12px rgba(140,123,128,.15) !important;
}

</style>

  <div class="sb-section">
    <div class="sb-section-lbl">Secciones visibles</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:11px;color:#4A3F3F;cursor:pointer;">
        <input type="checkbox" id="sec-exp" checked onchange="toggleSection('exp',this.checked)" style="accent-color:#8C7B80;width:14px;height:14px;">

  </div>

  <div class="sb-footer">
    <button class="btn-download" id="btn-edit-mode" onclick="toggleEditMode()" style="background:#F5F0F0;color:#8C7B80;border:1.5px solid #DDD0D0;margin-bottom:6px;">&#9998; Editar CV</button>

</div>

<div class="workspace">

      <div style="font-size:36px;">&#128196;</div>
      <div style="font-size:14px;font-weight:700;letter-spacing:-0.02em;color:#4A3F3F;">Cargando CV...</div>
    </div>
  </div>
</div>

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';

  {name:'Azul Acero',  hex:'#2E6B8A'},

var _email=null,_cand=null,_inf=null,_cvHtml=null,_iframe=null,_saveT=null,_editing=false;
var _color='#3D4451',_colorName='Antracita';
var _ftitle='Montserrat',_fbody='Open Sans';
var _photo=null,_hstyle='solid';

// Leer email - URL tiene SIEMPRE prioridad sobre localStorage
var _pp=new URLSearchParams(window.location.search);
var _urlEmail=_pp.get('email');
if(_urlEmail){
  _email=_urlEmail; // Email de la URL (cuando Micaela abre el CV de un cliente)
}else{

}

document.getElementById('back-btn').onclick=function(){window.location.href=BASE+'/cliente.html';};

(function(){
  var wrap=document.getElementById('swatches');
  PALETA.forEach(function(p,i){
    var sw=document.createElement('div');sw.className='swatch-wrap';
    var s=document.createElement('div');
    s.className='swatch'+(i===0?' active':'');
    s.style.background=p.hex;

    s.addEventListener('click',function(){
      document.querySelectorAll('.swatch').forEach(function(x){x.classList.remove('active');});
      s.classList.add('active');

// Font selects

  _ftitle=this.value;
  if(!updateTheme(_color,_ftitle,_fbody)){ render(); }

  }

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ini(n){return(n||'').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()||'MJ';}
function lighten(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r+(255-r)*a);g=Math.round(g+(255-g)*a);b=Math.round(b+(255-b)*a);
  return '#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0');}).join('');
}

function applyStyleToHtml(html,color,ft,fb){
  var cl=lighten(color,0.88);
  var cm=lighten(color,0.55);
  var css='<style id="ds-override">'+
    ':root{--cv-primary:'+color+';--cv-light:'+cl+';--cv-mid:'+cm+';}'+
    'body{font-family:"'+ft+'",sans-serif!important;}'+
    '.nm,.hd .nm,.cv-name{font-family:"'+ft+'",sans-serif!important;}'+
    '.hd,.cv-head{background:var(--cv-primary)!important;}'+
    '.sd,.cv-sidebar-col{background:var(--cv-light)!important;}'+
    '.sh,.mh,.sec-title{color:var(--cv-primary)!important;border-bottom-color:var(--cv-primary)!important;}'+
    '.ex-d,.lg-l{background:var(--cv-primary)!important;}'+
    '.ul li::before,.sk::before{background:'+lighten(color,0.4)+'!important;}'+
    '.ed-s{color:'+lighten(color,0.3)+'!important;}'+
    '[contenteditable="true"]:hover{background:rgba(140,123,128,.06);outline:2px solid var(--cv-primary);border-radius:3px;}'+
    '</style>';
  html=html.replace('</head>',css+'</head>');
  return html;
}

function updateTheme(color,ft,fb){
  // Cambio instantáneo via CSS vars — sin regenerar el HTML
  if(_iframe){
    try{
      var doc=_iframe.contentDocument||_iframe.contentWindow.document;
      var root=doc.documentElement;
      root.style.setProperty('--cv-primary', color);
      root.style.setProperty('--cv-light', lighten(color,0.88));
      root.style.setProperty('--cv-mid', lighten(color,0.55));
      if(ft) doc.body.style.setProperty('font-family', '"'+ft+'", sans-serif');
      // Actualizar heads y secciones
      doc.querySelectorAll('.cv-head,.hd').forEach(function(el){ el.style.background=color; });
      doc.querySelectorAll('.cv-sidebar-col,.sd').forEach(function(el){ el.style.background=lighten(color,0.88); });
      doc.querySelectorAll('.sec-title,.sh,.mh').forEach(function(el){ el.style.color=color; el.style.borderBottomColor=color; });
      return true; // éxito — no hace falta render()
    }catch(ex){ return false; }
  }
  return false; // no hay iframe — hay que hacer render()
}
function mostrarEnIframe(html){
  var paper=document.getElementById('cv-paper');
  paper.style.padding='0';
  paper.style.overflow='visible';
  paper.innerHTML='';
  var ifrm=document.createElement('iframe');
  ifrm.style.cssText='width:100%;border:none;display:block;min-height:1123px;';
  ifrm.setAttribute('scrolling','no');
  paper.appendChild(ifrm);
  _iframe=ifrm;
  function ajustar(){
    try{
      var d=ifrm.contentDocument||ifrm.contentWindow.document;
      var h=Math.max(d.documentElement.scrollHeight, d.body?d.body.scrollHeight:0, 1123);
      ifrm.style.height=h+'px';
      paper.style.minHeight=h+'px';
    }catch(ex){ifrm.style.height='1400px';}
  }
  ifrm.onload=function(){ ajustar(); setTimeout(ajustar,300); setTimeout(ajustar,800); };
  // Usar blob URL para mejor compatibilidad
  try{
    var blob=new Blob([html],{type:'text/html;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    ifrm.onload=function(){ ajustar(); setTimeout(ajustar,300); setTimeout(ajustar,800); URL.revokeObjectURL(url); };
    ifrm.src=url;
  }catch(ex){
    ifrm.srcdoc=html;
  }
}

function render(){

        // Es cv_data JSON → renderizar con el diseño del cv.html
        _renderFromJson(parsed);
        return;

    // Es HTML normal → mostrar en iframe

  // Herramientas
  if(herr.length){
    o += '<div class="sl-sec"><div class="sl-h">Herramientas</div>';
    herr.forEach(function(h){ o += '<div class="tool-row"><div class="tool-dot"></div>'+esc(h)+'</div>'; });
    o += '</div>';
  }

  // Cursos
  if(cursos.length){
    o += '<div class="sl-sec"><div class="sl-h">Cursos</div>';
    cursos.slice(0,4).forEach(function(c){ o += '<div class="sl-row">&#8227; '+esc(c)+'</div>'; });
    o += '</div>';
  }

  o += '</div></div>'; // col-l-body, cv-left

  // Columna derecha
  o += '<div class="col-r">';
  o += '<div class="cr-head">';
  o += '<div class="cr-nombre">'+esc(nombre)+'</div>';
  if(rolObj)   o += '<div class="cr-rol">'+esc(rolObj)+'</div>';
  if(objetivo) o += '<div class="cr-obj">'+esc(objetivo)+'</div>';
  o += '</div>';

  // Experiencia
  if(exp.length){
    o += '<div class="cr-sec"><div class="cr-h">Experiencia profesional</div>';
    exp.forEach(function(ex){
      o += '<div class="exp-blk">';
      if(ex.titulo)  o += '<div class="exp-t">'+esc(ex.titulo)+'</div>';
      if(ex.empresa) o += '<div class="exp-s">'+esc(ex.empresa)+'</div>';
      (ex.bullets||[]).forEach(function(b){ o += '<div class="exp-b">'+esc(b)+'</div>'; });
      o += '</div>';
    });
    o += '</div>';
  }

  // Educación
  if(edu.length){
    o += '<div class="cr-sec"><div class="cr-h">Educación</div>';
    edu.forEach(function(ed){
      o += '<div class="edu-blk"><div class="edu-dot"></div><div>';
      if(ed.titulo)      o += '<div class="edu-t">'+esc(ed.titulo)+'</div>';
      if(ed.institucion) o += '<div class="edu-s">'+esc(ed.institucion)+'</div>';
      o += '</div></div>';
    });
    o += '</div>';
  }

  // Otros datos
  if(otros.incorporacion||otros.modalidad||otros.viajes){
    o += '<div class="cr-sec"><div class="cr-h">Otros datos</div><div class="otros-g">';
    if(otros.incorporacion) o += '<div class="otro"><span class="otro-ok">&#10003;</span>'+esc(otros.incorporacion)+'</div>';
    if(otros.modalidad)     o += '<div class="otro"><span class="otro-ok">&#10003;</span>'+esc(otros.modalidad)+'</div>';
    if(otros.viajes)        o += '<div class="otro"><span class="otro-ok">&#10003;</span>'+esc(otros.viajes)+'</div>';
    o += '</div></div>';
  }

  o += '</div></div>'; // col-r, cv

  document.getElementById('cv-paper').innerHTML = o;
}



// ── Editar CV ────────────────────────────────────────────
var _editMode=false;
function toggleEditMode(){
  _editMode=!_editMode;
  var btn=document.getElementById('btn-edit-mode');
  if(_editMode){
    if(btn){btn.textContent='✓ Terminar edición';btn.style.background='#8C7B80';btn.style.color='#fff';}
    // Editar en iframe si existe, sino editar el paper directamente
    if(_iframe){
      try{var d=_iframe.contentDocument||_iframe.contentWindow.document;if(d&&d.body){d.body.contentEditable='true';d.body.style.boxShadow='inset 0 0 0 2px rgba(140,123,128,.3)';}}catch(ex){}
    } else {
      var p=document.getElementById('cv-paper');
      if(p){
        // Seleccionar todos los textos editables del diseño
        var sels = '.cr-nombre,.cr-rol,.cr-obj,.exp-t,.exp-s,.exp-b,.edu-t,.edu-s,.col-l-nombre,.col-l-rol,.sl-row,.tag-c,.lang-n,.tool-row,.otro,.cv-name,.cv-role,.item-title,.item-sub,.item-desc,.cv-contact-item,.skill-name,.side-item';
        var els = p.querySelectorAll(sels);
        if(els.length === 0){
          // Fallback: cualquier elemento hoja con texto
          p.querySelectorAll('div,span,p').forEach(function(el){
            if(el.children.length===0&&el.textContent.trim()) els = Array.from(els).concat([el]);
          });
        }
        els.forEach(function(el){
          el.contentEditable='true';
          el.style.outline='1px dashed rgba(140,123,128,.4)';
          el.style.cursor='text';
        });
        p.style.boxShadow='0 0 0 3px rgba(140,123,128,.2)';
      }
    }
  } else {
    if(btn){btn.textContent='✏ Editar CV';btn.style.background='#F5F0F0';btn.style.color='#8C7B80';}
    if(_iframe){
      try{var d=_iframe.contentDocument||_iframe.contentWindow.document;if(d&&d.body){d.body.contentEditable='false';d.body.style.boxShadow='';}}catch(ex){}
    } else {
      var p=document.getElementById('cv-paper');
      if(p){
        p.querySelectorAll('[contenteditable]').forEach(function(el){
          el.contentEditable='false';el.style.outline='';el.style.cursor='';
        });
        p.style.boxShadow='0 10px 40px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.04)';
      }
    }
    saveEdits();
  }
}

// ── Guardar CV ───────────────────────────────────────────
function saveEdits(){
  try{
    var doc=_iframe?(_iframe.contentDocument||_iframe.contentWindow.document):null;
    var html=doc?doc.documentElement.outerHTML:document.getElementById('cv-paper').innerHTML;
    if(!_email||!html) return;
    // Feedback visual en botón
    var btn=document.getElementById('btn-save');
    var originalHtml=btn?btn.innerHTML:'';
    if(btn){btn.innerHTML='&#9203; Guardando...';btn.style.opacity='.7';btn.disabled=true;}
    fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email),{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}})
    .then(function(r){return r.json();}).then(function(rows){
      var method=rows&&rows.length?'PATCH':'POST';
      var url=SB+'/rest/v1/cv_publicados'+(rows&&rows.length?'?email=eq.'+encodeURIComponent(_email):'');
      return fetch(url,{method:method,headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},body:JSON.stringify({email:_email,contenido:html,updated_at:new Date().toISOString()})});
    }).then(function(){
      if(btn){btn.innerHTML='&#10003; ¡Guardado!';btn.style.opacity='1';btn.style.background='#5A8C6E';}
      setTimeout(function(){
        if(btn){btn.innerHTML=originalHtml;btn.style.background='#5A8C6E';btn.disabled=false;}
      },2500);
    }).catch(function(){
      if(btn){btn.innerHTML='&#9888; Error';btn.style.opacity='1';btn.style.background='#C0756E';}
      setTimeout(function(){
        if(btn){btn.innerHTML=originalHtml;btn.style.background='#5A8C6E';btn.disabled=false;}
      },2500);
    });
  }catch(ex){
    console.warn(ex);
  }
}

// ── btn-save ─────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click',function(){ saveEdits(); });


function toggleSection(sec, visible){
  if(!_iframe) return;
  try{
    var doc=_iframe.contentDocument||_iframe.contentWindow.document;
    var selectors = {
      'exp':    '.r-sec:has(.r-sec-h:-moz-any(*)), .cv-block, [class*="exp"]',
      'edu':    '.r-sec:nth-child(2)',
      'skills': '.cv-sidebar-col .sec:nth-child(2), [class*="skill"], [class*="comp"]',
      'idiomas':'[class*="lang"], [class*="idio"]'
    };
    // Buscar por texto del header
    var headers = doc.querySelectorAll('.r-sec-h, .sec-title, .sh, .mh');
    headers.forEach(function(h){
      var txt = h.textContent.toLowerCase();
      var match = false;
      if(sec==='exp'    && (txt.indexOf('experiencia')>=0||txt.indexOf('laboral')>=0)) match=true;
      if(sec==='edu'    && (txt.indexOf('educaci')>=0||txt.indexOf('formaci')>=0)) match=true;
      if(sec==='skills' && (txt.indexOf('competen')>=0||txt.indexOf('habilidad')>=0||txt.indexOf('skill')>=0)) match=true;
      if(sec==='idiomas'&& (txt.indexOf('idioma')>=0||txt.indexOf('lengua')>=0)) match=true;
      if(match){
        var parent = h.parentElement;
        if(parent) parent.style.display = visible ? '' : 'none';
      }
    });
  }catch(ex){ console.warn('toggleSection:', ex); }
}
