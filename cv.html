<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Mi CV Profesional</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600&family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Montserrat',sans-serif;}
body{display:flex;background:#EFEBEB;}

/* ══ SIDEBAR IZQUIERDO ══════════════════════════════════════ */
.sidebar-config{
  width:290px;flex-shrink:0;
  background:#fff;height:100vh;
  overflow-y:auto;
  border-right:1px solid #E8E0E0;
  display:flex;flex-direction:column;
  box-shadow:2px 0 12px rgba(0,0,0,.06);
}
.sb-header{
  padding:16px 20px 14px;
  border-bottom:1px solid #F0EDED;
  background:#FAF6F6;
}
.sb-back{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;color:#8C7B80;
  cursor:pointer;background:none;border:none;
  font-family:'Montserrat',sans-serif;padding:0;
  margin-bottom:10px;
}
.sb-back:hover{color:#6B5A5F;}
.sb-title{font-size:16px;font-weight:800;color:#4A3F3F;letter-spacing:-.3px;}
.sb-sub{font-size:12px;color:#9E9696;margin-top:3px;}

.sb-section{padding:14px 20px;border-bottom:1px solid #F5F0F0;}
.sb-section-lbl{
  font-size:11px;font-weight:700;color:#9E9696;
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;
}

/* Swatches */
.swatches{display:flex;flex-wrap:wrap;gap:6px;}
.swatch{width:38px;height:38px;border-radius:10px;cursor:pointer;border:2.5px solid transparent;transition:all .15s;}
.swatch.active{border-color:#4A3F3F;transform:scale(1.1);}
.swatch:hover{transform:scale(1.05);}
.swatch-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.swatch-name{font-size:7px;color:#9E9696;text-align:center;width:32px;overflow:hidden;white-space:nowrap;}
.color-preview{height:4px;border-radius:2px;margin-top:6px;transition:background .3s;}

/* Fuente */
.font-row{margin-bottom:8px;}
.font-lbl{font-size:13px;font-weight:700;color:#4A3F3F;margin-bottom:6px;}
.font-select{
  width:100%;padding:10px 12px;font-size:13px;
  font-family:'Montserrat',sans-serif;
  border:1.5px solid #E0DADA;border-radius:8px;
  outline:none;color:#4A3F3F;background:#FAFAFA;cursor:pointer;
}
.font-select:focus{border-color:#8C7B80;}

/* Foto */
.photo-area{display:flex;align-items:center;gap:10px;}
.photo-preview{
  width:48px;height:48px;border-radius:50%;
  background:#F0EDED;border:2px solid #DDD0D0;
  overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:#9E9696;font-size:18px;
}
.photo-preview img{width:100%;height:100%;object-fit:cover;}
.photo-btn{
  padding:10px 16px;font-size:12px;font-weight:700;
  font-family:'Montserrat',sans-serif;
  background:#F5F0F0;color:#8C7B80;
  border:1.5px solid #DDD0D0;border-radius:8px;cursor:pointer;
}
.photo-btn:hover{background:#DDD0D0;}
.photo-btn.sel{background:#8C7B80;color:#fff;border-color:#8C7B80;}

/* Footer sidebar */
.sb-footer{
  padding:16px 20px;margin-top:auto;
  border-top:1px solid #EEE;
  display:flex;flex-direction:column;gap:8px;
}
.btn-action{
  width:100%;padding:15px;font-size:13px;font-weight:800;
  font-family:'Montserrat',sans-serif;
  border:none;border-radius:10px;cursor:pointer;
  letter-spacing:.06em;text-transform:uppercase;transition:all .15s;
}
.btn-edit{background:#F5F0F0;color:#8C7B80;border:1.5px solid #DDD0D0;}
.btn-edit:hover{background:#DDD0D0;}
.btn-edit.editing{background:#8C7B80;color:#fff;border-color:#8C7B80;}
.btn-save{background:#5A8C6E;color:#fff;box-shadow:0 4px 12px rgba(90,140,110,.3);}
.btn-save:hover{background:#4A7A5E;}
.btn-dl{background:#8C7B80;color:#fff;box-shadow:0 4px 12px rgba(140,123,128,.3);}
.btn-dl:hover{background:#6B5A5F;}

/* ══ WORKSPACE DERECHO ══════════════════════════════════════ */
.workspace{
  flex:1;overflow-y:auto;
  padding:32px 44px 60px;
  display:flex;flex-direction:column;
  align-items:center;
  background:#EFEBEB;
}

/* Badge de color arriba del paper */


/* CV PAPER */
.cv-paper{
  background:#fff;width:210mm;
  min-height:297mm;
  box-shadow:0 20px 60px rgba(0,0,0,.15),0 4px 16px rgba(0,0,0,.07);
  border-radius:3px;
  position:relative;
}
.cv-paper iframe{
  width:100%;border:none;display:block;min-height:297mm;
}

.empty-cv{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:297mm;gap:12px;color:#9E9696;
  text-align:center;padding:3rem;
}

/* Estilo de los pasos de sección activos */
.photo-btn.sel{background:#8C7B80;color:#fff;border-color:#8C7B80;}

/* ══ PRINT ══════════════════════════════════════════════════ */
@media print{
  .sidebar-config{display:none!important;}
  .workspace{padding:0!important;background:#fff!important;}
  .ws-meta{display:none!important;}
  .cv-paper{box-shadow:none!important;border-radius:0!important;}
  body{background:#fff!important;}
}
</style>
</head>
<body>

<!-- SIDEBAR IZQUIERDO -->
<div class="sidebar-config">
  <div class="sb-header">
    <button class="sb-back" id="back-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Volver
    </button>
    <div class="sb-title">Diseñador de CV</div>
    <div class="sb-sub" id="cand-name">Cargando...</div>
  </div>

  <div class="sb-section">
    <div class="sb-section-lbl">Foto de perfil</div>
    <div class="photo-area">
      <div class="photo-preview" id="photo-preview"><span>+</span></div>
      <div>
        <input type="file" id="photo-input" accept="image/*" style="display:none">
        <button class="photo-btn" id="photo-btn">Subir foto</button>
        <div style="font-size:9px;color:#9E9696;margin-top:4px;">JPG o PNG cuadrada</div>
      </div>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-section-lbl">Color de acento</div>
    <div class="swatches" id="swatches"></div>
    <div class="color-preview" id="color-preview"></div>
  </div>

  <div class="sb-section">
    <div class="sb-section-lbl">Tipografías</div>
    <div class="font-row">
      <div class="font-lbl">Títulos</div>
      <select class="font-select" id="font-title">
        <option value="Montserrat">Montserrat (Bold)</option>
        <option value="Playfair Display">Playfair Display</option>
        <option value="Raleway">Raleway</option>
        <option value="Georgia">Georgia</option>
      </select>
    </div>
    <div class="font-row">
      <div class="font-lbl">Cuerpo</div>
      <select class="font-select" id="font-body">
        <option value="Open Sans">Open Sans</option>
        <option value="Montserrat">Montserrat</option>
        <option value="Raleway">Raleway</option>
      </select>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-section-lbl">Estilo cabecera</div>
    <div style="display:flex;gap:8px;">
      <button class="photo-btn sel" id="style-solid" style="flex:1;">Sólido</button>
      <button class="photo-btn" id="style-grad" style="flex:1;">Degradado</button>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-section-lbl">Color seleccionado</div>
    <div id="color-badge" style="display:inline-block;padding:5px 14px;border-radius:20px;background:#F5F0F0;color:#8C7B80;font-size:12px;font-weight:700;border:1.5px solid #DDD0D0;letter-spacing:.03em;">Antracita</div>
  </div>

  <div class="sb-footer">
    <button class="btn-action btn-edit" id="btn-edit-mode" onclick="toggleEditMode()">✏ Editar CV</button>
    <button class="btn-action btn-save" id="btn-save">✓ Guardar cambios</button>
    <button class="btn-action btn-dl" id="btn-dl">↓ Descargar / Imprimir</button>
  </div>
</div>

<!-- WORKSPACE DERECHO -->
<div class="workspace">
  <div class="cv-paper" id="cv-paper">
    <div class="empty-cv">
      <div style="font-size:36px;">📄</div>
      <div style="font-size:14px;font-weight:700;color:#4A3F3F;">Cargando CV...</div>
    </div>
  </div>
</div>

<script>

var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://mmicaelajairedin-ui.github.io/analisisform';

var PALETA=[
  {name:'Antracita',    hex:'#3D4451'},
  {name:'Azul Noche',  hex:'#2C3E6B'},
  {name:'Pizarra',     hex:'#4A5568'},
  {name:'Verde Salvia',hex:'#4A6741'},
  {name:'Gris Azul',   hex:'#5B7FA6'},
  {name:'Azul Acero',  hex:'#2E6B8A'},
  {name:'Negro Suave', hex:'#2D2D2D'},
  {name:'Topo',        hex:'#6B6560'}
];

var _email=null,_cand=null,_inf=null,_cvHtml=null,_cvData=null,_iframe=null,_saveT=null,_editing=false;
var _color='#3D4451',_colorName='Antracita';
var _ftitle='Montserrat',_fbody='Open Sans';
var _photo=null,_hstyle='solid';

// Leer email - URL tiene SIEMPRE prioridad sobre localStorage
var _pp=new URLSearchParams(window.location.search);
var _urlEmail=_pp.get('email');
if(_urlEmail){
  _email=_urlEmail; // Email de la URL (cuando Micaela abre el CV de un cliente)
}else{
  var _uu=localStorage.getItem('mj_user');
  if(_uu){try{_email=JSON.parse(_uu).email;}catch(e){}}
}

// Volver
document.getElementById('back-btn').onclick=function(){window.location.href=BASE+'/cliente.html';};

// Swatches
(function(){
  var wrap=document.getElementById('swatches');
  PALETA.forEach(function(p,i){
    var sw=document.createElement('div');sw.className='swatch-wrap';
    var s=document.createElement('div');
    s.className='swatch'+(i===0?' active':'');
    s.style.background=p.hex;
    s.title=p.name;
    s.addEventListener('click',function(){
      document.querySelectorAll('.swatch').forEach(function(x){x.classList.remove('active');});
      s.classList.add('active');
      _color=p.hex;_colorName=p.name;
      document.getElementById('color-preview').style.background=p.hex;
      document.getElementById('color-badge').textContent=p.name;
      render();
    });
    var nm=document.createElement('div');nm.className='swatch-name';nm.textContent=p.name.split(' ')[0];
    sw.appendChild(s);sw.appendChild(nm);wrap.appendChild(sw);
  });
  document.getElementById('color-preview').style.background=_color;
})();

// Font selects
document.getElementById('font-title').addEventListener('change',function(){_ftitle=this.value;render();});
document.getElementById('font-body').addEventListener('change',function(){_fbody=this.value;render();});

// Foto
document.getElementById('photo-btn').addEventListener('click',function(){document.getElementById('photo-input').click();});
document.getElementById('photo-input').addEventListener('change',function(){
  if(!this.files[0])return;
  var file=this.files[0];
  // Comprimir con canvas antes de guardar
  var reader=new FileReader();
  reader.onload=function(e){
    var imgEl=new Image();
    imgEl.onload=function(){
      var canvas=document.createElement('canvas');
      var maxW=320,maxH=320;
      var w=imgEl.width,h=imgEl.height;
      if(w>maxW||h>maxH){var ratio=Math.min(maxW/w,maxH/h);w=Math.round(w*ratio);h=Math.round(h*ratio);}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(imgEl,0,0,w,h);
      var b64=canvas.toDataURL('image/jpeg',0.7);
      _photo=b64;
      // 1. Guardar en localStorage (inmediato, sin fallo)
      if(_email) localStorage.setItem('mj_foto_'+_email, b64);
      // 2. Mostrar en preview
      var prev=document.getElementById('photo-preview');
      if(prev){prev.innerHTML='';var pi=document.createElement('img');pi.src=b64;prev.appendChild(pi);}
      // 3. Renderizar CV con foto
      render();
      // 4. Intentar guardar en Supabase (silencioso si falla)
      if(_email){
        fetch(SB+'/rest/v1/candidatos?email=eq.'+encodeURIComponent(_email),{
          method:'PATCH',
          headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
          body:JSON.stringify({foto_perfil:b64})
        }).then(function(r){
          var st=document.getElementById('save-st');
          if(!st)return;
          if(r.ok||r.status===204){
            st.textContent='Foto guardada ✓';
            setTimeout(function(){if(st)st.textContent='';},2500);
          }else{
            // Supabase rechazó - puede que la columna no exista
            // La foto ya está en localStorage, mostrar advertencia
            r.text().then(function(body){
              console.warn('Supabase foto error '+r.status+':', body);
              st.textContent='Foto guardada localmente';
              st.style.color='var(--muted)';
              setTimeout(function(){if(st){st.textContent='';st.style.color='';}},3000);
            });
          }
        }).catch(function(err){
          console.warn('Foto network error:', err);
          var st=document.getElementById('save-st');
          if(st){st.textContent='Foto guardada localmente';setTimeout(function(){st.textContent='';},2500);}
        });
      }
    };
    imgEl.src=e.target.result;
  };
  reader.readAsDataURL(file);
});

// Estilo cabecera
document.getElementById('style-solid').addEventListener('click',function(){
  _hstyle='solid';
  this.classList.add('sel');
  document.getElementById('style-grad').classList.remove('sel');
  render();
});
document.getElementById('style-grad').addEventListener('click',function(){
  _hstyle='grad';
  this.classList.add('sel');
  document.getElementById('style-solid').classList.remove('sel');
  render();
});

// Descargar
document.getElementById('btn-save').addEventListener('click',function(){
  saveEdits();
});

document.getElementById('btn-dl').addEventListener('click',function(){
  var paper=document.getElementById('cv-paper');
  var nombre=_cand?_cand.nombre||'CV':'CV';
  if(_cvHtml){
    var ww2=window.open('','_blank');
    if(ww2){
      var h2=applyStyleToHtml(_cvHtml,_color,_ftitle,_fbody);
      ww2.document.write(h2);ww2.document.close();
      setTimeout(function(){ww2.print();},800);
    }
    return;
  }
  var ww=window.open('','_blank');
  if(!ww)return;
  var html='<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">';
  html+='<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Open+Sans:wght@300;400;600&family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">';
  html+='<title>CV - '+nombre+'</title>';
  html+='<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#fff;margin:0;}@page{margin:0;size:A4 portrait;}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}';
  html+='.cv-head{padding:34px 38px 26px;position:relative;}.cv-photo-wrap{position:absolute;right:36px;top:26px;}.cv-photo{width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.5);display:block;}.cv-photo-ini{width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:rgba(255,255,255,.85);border:3px solid rgba(255,255,255,.35);}.cv-name{font-size:26px;font-weight:800;color:#fff;line-height:1.15;margin-bottom:4px;}.cv-role{font-size:11px;font-weight:500;color:rgba(255,255,255,.78);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}.cv-contact{display:flex;flex-wrap:wrap;gap:10px;}.cv-contact-item{font-size:10px;color:rgba(255,255,255,.72);display:flex;align-items:center;gap:4px;}.cv-body{display:grid;grid-template-columns:196px 1fr;}.cv-sidebar-col{padding:22px 18px;}.cv-main-col{padding:22px 26px;border-left:1px solid #F0EDED;}.sec-title{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom-width:1.5px;border-bottom-style:solid;}.cv-block{margin-bottom:16px;}.item-title{font-size:11px;font-weight:700;color:#2D292A;margin-bottom:1px;}.item-sub{font-size:10px;font-weight:600;margin-bottom:3px;}.item-desc{font-size:10px;color:#5E5859;line-height:1.65;}.skill-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}.skill-name{font-size:10px;color:#4A3F3F;font-weight:600;}.skill-bar{height:4px;background:#E8E0E0;border-radius:2px;width:90px;overflow:hidden;}.skill-fill{height:4px;border-radius:2px;}.cv-tag{display:inline-block;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;margin:2px;}.side-item{font-size:10px;color:#5E5859;margin-bottom:5px;display:flex;align-items:flex-start;gap:5px;}';
  html+='</style></head><body>';
  html+=paper.innerHTML;
  html+='</body></html>';
  ww.document.write(html);ww.document.close();
  setTimeout(function(){ww.print();},900);
});

// Cargar foto desde localStorage al inicio
if(_email){
  var _fL=localStorage.getItem('mj_foto_'+_email);
  if(_fL){
    _photo=_fL;
    var _fpEl=document.getElementById('photo-preview');
    if(_fpEl){_fpEl.innerHTML='';var _fpi=document.createElement('img');_fpi.src=_fL;_fpEl.appendChild(_fpi);}
  }
}

// Cargar datos
if(!_email){
  document.getElementById('cv-paper').innerHTML='<div class="empty-cv"><div style="font-size:32px;">&#128272;</div><div style="font-size:13px;color:#9E9696;">Sesion no encontrada</div></div>';
}else{
  Promise.all([
    fetch(SB+'/rest/v1/candidatos?email=eq.'+encodeURIComponent(_email)+'&select=*&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/informes?email=eq.'+encodeURIComponent(_email)+'&select=data&order=created_at.desc&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=contenido',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();})
  ]).then(function(res){
    _cand=res[0]&&res[0].length?res[0][0]:null;
    if(_cand)document.getElementById('cand-name').textContent=_cand.nombre||_email;
    if(res[1]&&res[1].length){var d=res[1][0].data;if(typeof d==='string')try{d=JSON.parse(d);}catch(e){}; _inf=d;}
    var _rawContenido = res[2]&&res[2].length ? res[2][0].contenido||null : null;
    if(_rawContenido){
      try{
        var _parsedCv = JSON.parse(_rawContenido);
        if(_parsedCv && _parsedCv.nombre && _parsedCv.experiencia){
          _cvData = _parsedCv;
          _cvHtml = null;
        } else {
          _cvHtml = _rawContenido;
          _cvData = null;
        }
      } catch(e){
        // HTML legacy — detectar si tiene la barra vieja y descartarlo
        var _hasOldBar = _rawContenido.indexOf('Career Coach') >= 0 
          || _rawContenido.indexOf('+ Foto') >= 0
          || _rawContenido.indexOf('cv-editor-bar') >= 0
          || _rawContenido.indexOf('EJECUTIVO') >= 0
          || _rawContenido.indexOf('INNOVACI') >= 0;
        if(_hasOldBar){
          // Descartar HTML legacy — renderizar desde datos del candidato
          _cvHtml = null;
          _cvData = null;
          // Borrar en Supabase para que no vuelva a cargarse
          if(_email){
            fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email),{
              method:'PATCH',
              headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY},
              body:JSON.stringify({contenido:null})
            }).catch(function(){});
          }
        } else {
          _cvHtml = _rawContenido;
          _cvData = null;
        }
      }
    } else {
      _cvHtml = null;
      _cvData = null;
    }
    // Cargar foto: localStorage tiene prioridad, luego Supabase
    if(_cand&&_cand.foto_perfil&&!_photo){
      _photo=_cand.foto_perfil;
      // Sincronizar con localStorage
      if(_email) localStorage.setItem('mj_foto_'+_email, _photo);
      var fp=document.getElementById('photo-preview');
      if(fp){fp.innerHTML='';var fi=document.createElement('img');fi.src=_photo;fp.appendChild(fi);}
    }
    render();
  }).catch(function(){
    document.getElementById('cv-paper').innerHTML='<div class="empty-cv"><div>Error al cargar</div></div>';
  });
}

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ini(n){return(n||'').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()||'MJ';}
function lighten(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r+(255-r)*a);g=Math.round(g+(255-g)*a);b=Math.round(b+(255-b)*a);
  return '#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0');}).join('');
}

function applyStyleToHtml(html,color,ft,fb){
  var cl=lighten(color,0.88);
  // Limpiar barras y textos legacy
  html=html.replace(/<div[^>]*class="[^"]*(?:cv-editor-bar|color-bar|hd-bar|cv-toolbar|ws-meta|editor-toolbar|cv-actions)[^"]*"[^>]*>[\s\S]*?<\/div>/gi,'');
  html=html.replace(/<div[^>]*id="(?:cv-toolbar|color-badge|ws-meta|cv-bar)"[^>]*>[\s\S]*?<\/div>/gi,'');
  html=html.replace(/RESUMEN EJECUTIVO/gi,'Perfil profesional');
  html=html.replace(/EJECUTIVO/gi,'');
  html=html.replace(/INNOVACI[\u00d3O]N/gi,'');
  var css='<style id="ds-override">'+
    ':root{--A:'+color+';--SB:'+cl+';}'+
    'body{font-family:"'+ft+'",sans-serif!important;}'+
    '.nm,.hd .nm{font-family:"'+ft+'",sans-serif!important;}'+
    '.hd{background:'+color+'!important;}'+
    '.sd{background:'+cl+'!important;}'+
    '.sh,.mh{color:'+color+'!important;border-bottom-color:'+color+'!important;}'+
    '.ex-d,.lg-l{background:'+color+'!important;}'+
    '.ul li::before,.sk::before{background:'+lighten(color,0.4)+'!important;}'+
    '.ed-s{color:'+lighten(color,0.3)+'!important;}'+
    '[class*="toolbar"],[class*="editor-bar"],[class*="cv-bar"]{display:none!important;}'+
    '</style>';
  html=html.replace('</head>',css+'</head>');
  return html;
}
function mostrarEnIframe(html){
  var paper=document.getElementById('cv-paper');
  paper.style.padding='0';
  paper.style.overflow='visible';
  paper.innerHTML='';
  var ifrm=document.createElement('iframe');
  ifrm.style.cssText='width:100%;border:none;display:block;min-height:1123px;';
  ifrm.scrolling='no';
  paper.appendChild(ifrm);
  _iframe=ifrm;
  function ajustar(){
    try{
      var d=ifrm.contentDocument||ifrm.contentWindow.document;
      var h=Math.max(d.documentElement.scrollHeight,d.body?d.body.scrollHeight:0,1123);
      ifrm.style.height=h+'px';
      paper.style.minHeight=h+'px';
    }catch(ex){ifrm.style.height='1400px';}
  }
  // Usar blob URL - más compatible que srcdoc para documentos grandes
  try{
    var blob=new Blob([html],{type:'text/html;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    ifrm.onload=function(){
      ajustar();
      setTimeout(ajustar,400);
      setTimeout(ajustar,1200);
      URL.revokeObjectURL(url);
    };
    ifrm.src=url;
  }catch(e){
    // Fallback a srcdoc si blob falla
    ifrm.onload=function(){ ajustar(); setTimeout(ajustar,600); };
    ifrm.srcdoc=html;
  }
}

// renderFromData — Diseño Ana García: minimalista dos columnas
// Columna izq: fondo suave, foto grande, contacto, skills
// Columna der: nombre grande, experiencia, educación
// ════════════════════════════════════════════════════════
function renderFromData(d){
  var color  = _color  || '#8C7B80';
  var ft     = _ftitle || 'Montserrat';
  var fb     = _fbody  || 'Open Sans';
  var photo  = _photo;

  var colorBg  = lighten(color, 0.88);
  var colorMid = lighten(color, 0.60);

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function ini(n){ return (n||'').split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase(); }

  var nombre   = d.nombre || 'Tu Nombre';
  var rolObj   = d.rol_objetivo || '';
  var objetivo = d.objetivo || '';
  var contacto = d.contacto || {};
  var exp      = d.experiencia || [];
  var edu      = d.educacion || [];
  var comps    = d.competencias || [];
  var idiomas  = d.idiomas || [];
  var herr     = d.herramientas || [];
  var cursos   = d.cursos || [];
  var otros    = d.otros || {};

  // ── CSS minimalista ────────────────────────────────────
  var gc = encodeURIComponent(ft)+':wght@400;700;800';
  var gb = encodeURIComponent(fb)+':wght@400;600';
  var gf = 'https://fonts.googleapis.com/css2?family='+gc+'&family='+gb+'&display=swap';

  var css = '<style>';
  css += '@import url("'+gf+'");';
  css += '*{box-sizing:border-box;margin:0;padding:0;}';
  css += 'body{font-family:"'+fb+'",sans-serif;font-size:10.5px;color:#2A2A2A;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}';
  css += '.cv{display:grid;grid-template-columns:210px 1fr;width:210mm;min-height:297mm;}';

  // ── Columna izquierda ──────────────────────────────────
  css += '.col-l{background:'+colorBg+';display:flex;flex-direction:column;}';

  // Foto: ocupa toda la anchura, altura generosa
  css += '.foto-wrap{width:100%;height:260px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:'+colorMid+'55;}';
  css += '.foto-wrap img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}';
  css += '.foto-ini{width:100%;height:260px;background:'+color+';display:flex;align-items:center;justify-content:center;font-family:"'+ft+'",sans-serif;font-size:60px;font-weight:800;color:#fff;letter-spacing:4px;}';

  // Nombre y rol bajo la foto en la columna izq
  css += '.col-l-id{padding:18px 20px 0;border-bottom:1px solid '+color+'33;padding-bottom:16px;margin-bottom:0;}';
  css += '.col-l-nombre{font-family:"'+ft+'",sans-serif;font-size:16px;font-weight:800;color:'+color+';line-height:1.2;letter-spacing:-.3px;margin-bottom:4px;}';
  css += '.col-l-rol{font-size:10px;color:'+color+'BB;font-weight:600;letter-spacing:.04em;line-height:1.4;}';

  // Secciones columna izq
  css += '.col-l-body{padding:16px 20px;flex:1;}';
  css += '.sl-sec{margin-bottom:16px;}';
  css += '.sl-h{font-family:"'+ft+'",sans-serif;font-size:8px;font-weight:800;color:'+color+';text-transform:uppercase;letter-spacing:1.6px;padding-bottom:4px;border-bottom:1.5px solid '+color+'44;margin-bottom:8px;}';
  css += '.sl-row{display:flex;align-items:flex-start;gap:6px;font-size:9.5px;color:#3A3A3A;margin-bottom:5px;line-height:1.45;word-break:break-all;}';
  css += '.sl-ic{color:'+color+';flex-shrink:0;font-size:11px;margin-top:0;}';

  // Competencias: tags rectangulares con color sólido
  css += '.tag-comp{display:inline-block;background:'+color+';color:#fff;font-family:"'+ft+'",sans-serif;font-size:9px;font-weight:700;padding:3px 9px;border-radius:3px;margin:2px 3px 2px 0;letter-spacing:.3px;}';

  // Idiomas
  css += '.lang-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}';
  css += '.lang-n{font-size:10px;color:#3A3A3A;font-weight:600;}';
  css += '.lang-l{font-size:8.5px;font-weight:800;color:#fff;background:'+color+';padding:2px 8px;border-radius:2px;letter-spacing:.3px;}';
  css += '.lang-c{font-size:8.5px;font-weight:700;color:#888;background:#EBEBEB;padding:2px 8px;border-radius:2px;}';

  // Herramientas
  css += '.tool-row{font-size:10px;color:#3A3A3A;margin-bottom:4px;display:flex;align-items:center;gap:7px;}';
  css += '.tool-dot{width:5px;height:5px;border-radius:50%;background:'+color+';flex-shrink:0;}';

  // Cursos
  css += '.curso-row{font-size:9.5px;color:#3A3A3A;margin-bottom:4px;display:flex;gap:5px;line-height:1.4;}';
  css += '.curso-dot{color:'+color+';flex-shrink:0;}';

  // ── Columna derecha ────────────────────────────────────
  css += '.col-r{padding:36px 32px;background:#fff;}';

  // Header: nombre grandísimo, línea divisoria
  css += '.cr-head{margin-bottom:24px;padding-bottom:20px;border-bottom:2.5px solid '+colorBg+';}';
  css += '.cr-nombre{font-family:"'+ft+'",sans-serif;font-size:38px;font-weight:800;color:#111;letter-spacing:-2px;line-height:1;text-transform:uppercase;margin-bottom:8px;}';
  css += '.cr-rol{font-size:13px;font-weight:700;color:'+color+';letter-spacing:.04em;margin-bottom:10px;}';
  css += '.cr-obj{font-size:11px;color:#555;line-height:1.75;font-family:"'+fb+'",sans-serif;}';

  // Secciones derecha
  css += '.cr-sec{margin-bottom:20px;}';
  css += '.cr-h{font-family:"'+ft+'",sans-serif;font-size:8px;font-weight:800;color:'+color+';text-transform:uppercase;letter-spacing:1.6px;border-bottom:2px solid '+colorBg+';padding-bottom:5px;margin-bottom:12px;}';

  // Experiencia: borde izq del color, limpio
  css += '.exp-blk{margin-bottom:14px;padding-left:14px;border-left:3px solid '+color+';}';
  css += '.exp-t{font-family:"'+ft+'",sans-serif;font-size:12px;font-weight:800;color:#111;margin-bottom:3px;letter-spacing:-.2px;}';
  css += '.exp-s{font-size:10px;color:'+color+';font-weight:700;margin-bottom:5px;}';
  css += '.exp-b{font-size:10.5px;color:#444;line-height:1.65;margin-bottom:3px;display:flex;gap:7px;font-family:"'+fb+'",sans-serif;}';
  css += '.exp-b::before{content:"—";color:'+color+';flex-shrink:0;font-weight:700;}';

  // Educación
  css += '.edu-blk{margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}';
  css += '.edu-dot{width:9px;height:9px;border-radius:50%;background:'+color+';flex-shrink:0;margin-top:3px;}';
  css += '.edu-t{font-family:"'+ft+'",sans-serif;font-size:11px;font-weight:800;color:#111;margin-bottom:2px;}';
  css += '.edu-s{font-size:10px;color:'+color+';font-weight:600;}';

  // Otros datos
  css += '.otros-g{display:grid;grid-template-columns:1fr 1fr;gap:6px;}';
  css += '.otro{font-size:10px;color:#444;display:flex;gap:5px;align-items:flex-start;font-family:"'+fb+'",sans-serif;}';
  css += '.otro-ok{color:'+color+';font-weight:800;flex-shrink:0;}';

  // Print
  css += '@page{margin:0;size:A4 portrait;}';
  css += '@media print{body{background:#fff;}.cv{width:210mm;}}';
  css += '</style>';

  // ── HTML ──────────────────────────────────────────────
  var o = css + '<div class="cv">';

  // ═══ COLUMNA IZQUIERDA ═══
  o += '<div class="col-l">';

  // Foto grande
  if(photo){
    o += '<div class="foto-wrap"><img src="'+photo+'" alt="foto"></div>';
  } else {
    o += '<div class="foto-ini">'+ini(nombre)+'</div>';
  }

  // Nombre + rol bajo la foto
  o += '<div class="col-l-id">';
  o += '<div class="col-l-nombre">'+esc(nombre)+'</div>';
  if(rolObj) o += '<div class="col-l-rol">'+esc(rolObj)+'</div>';
  o += '</div>';

  o += '<div class="col-l-body">';

  // CONTACTO
  if(contacto.tel||contacto.email||contacto.ciudad||contacto.linkedin){
    o += '<div class="sl-sec"><div class="sl-h">Contacto</div>';
    if(contacto.tel)     o += '<div class="sl-row"><span class="sl-ic">&#9990;</span>'+esc(contacto.tel)+'</div>';
    if(contacto.email)   o += '<div class="sl-row"><span class="sl-ic">&#9993;</span>'+esc(contacto.email)+'</div>';
    if(contacto.ciudad)  o += '<div class="sl-row"><span class="sl-ic">&#9675;</span>'+esc(contacto.ciudad)+'</div>';
    if(contacto.linkedin)o += '<div class="sl-row"><span class="sl-ic">&#128279;</span>'+esc(contacto.linkedin)+'</div>';
    o += '</div>';
  }

  // COMPETENCIAS
  if(comps.length){
    o += '<div class="sl-sec"><div class="sl-h">Competencias</div>';
    comps.slice(0,6).forEach(function(c){ o += '<span class="tag-comp">'+esc(c)+'</span>'; });
    o += '</div>';
  }

  // IDIOMAS
  if(idiomas.length){
    o += '<div class="sl-sec"><div class="sl-h">Idiomas</div>';
    idiomas.forEach(function(id){
      var nmb = typeof id === 'object' ? (id.idioma||'') : id;
      var lvl = typeof id === 'object' ? (id.nivel||'') : '';
      var isC = lvl.toLowerCase().indexOf('curso')>=0||lvl==='A1'||lvl==='A2'||lvl.toLowerCase()==='básico'||lvl.toLowerCase()==='basico';
      o += '<div class="lang-row"><span class="lang-n">'+esc(nmb)+'</span>'
        +(lvl?'<span class="'+(isC?'lang-c':'lang-l')+'">'+esc(isC?'En curso':lvl)+'</span>':'')
        +'</div>';
    });
    o += '</div>';
  }

  // HERRAMIENTAS
  if(herr.length){
    o += '<div class="sl-sec"><div class="sl-h">Herramientas</div>';
    herr.forEach(function(h){ o += '<div class="tool-row"><div class="tool-dot"></div>'+esc(h)+'</div>'; });
    o += '</div>';
  }

  // CURSOS
  if(cursos.length){
    o += '<div class="sl-sec"><div class="sl-h">Cursos</div>';
    cursos.slice(0,5).forEach(function(c){ o += '<div class="curso-row"><span class="curso-dot">&#8227;</span>'+esc(c)+'</div>'; });
    o += '</div>';
  }

  o += '</div></div>'; // col-l-body, col-l

  // ═══ COLUMNA DERECHA ═══
  o += '<div class="col-r">';
  o += '<div class="cr-head">';
  o += '<div class="cr-nombre">'+esc(nombre)+'</div>';
  if(rolObj)   o += '<div class="cr-rol">'+esc(rolObj)+'</div>';
  if(objetivo) o += '<div class="cr-obj">'+esc(objetivo)+'</div>';
  o += '</div>';

  // EXPERIENCIA
  if(exp.length){
    o += '<div class="cr-sec"><div class="cr-h">Experiencia profesional</div>';
    exp.forEach(function(ex){
      o += '<div class="exp-blk">';
      if(ex.titulo)  o += '<div class="exp-t">'+esc(ex.titulo)+'</div>';
      if(ex.empresa) o += '<div class="exp-s">'+esc(ex.empresa)+'</div>';
      (ex.bullets||[]).forEach(function(b){ o += '<div class="exp-b">'+esc(b)+'</div>'; });
      o += '</div>';
    });
    o += '</div>';
  }

  // EDUCACIÓN
  if(edu.length){
    o += '<div class="cr-sec"><div class="cr-h">Educación</div>';
    edu.forEach(function(ed){
      o += '<div class="edu-blk"><div class="edu-dot"></div><div>';
      if(ed.titulo)      o += '<div class="edu-t">'+esc(ed.titulo)+'</div>';
      if(ed.institucion) o += '<div class="edu-s">'+esc(ed.institucion)+'</div>';
      o += '</div></div>';
    });
    o += '</div>';
  }

  // OTROS DATOS
  if(otros.incorporacion||otros.modalidad||otros.viajes){
    o += '<div class="cr-sec"><div class="cr-h">Otros datos</div><div class="otros-g">';
    if(otros.incorporacion) o += '<div class="otro"><span class="otro-ok">&#10003;</span>'+esc(otros.incorporacion)+'</div>';
    if(otros.modalidad)     o += '<div class="otro"><span class="otro-ok">&#10003;</span>'+esc(otros.modalidad)+'</div>';
    if(otros.viajes)        o += '<div class="otro"><span class="otro-ok">&#10003;</span>'+esc(otros.viajes)+'</div>';
    o += '</div></div>';
  }

  o += '</div></div>'; // col-r, cv

  document.getElementById('cv-paper').innerHTML = o;
}


function render(){
  // ── Prioridad 1: cv_data JSON de la IA ──
  if(_cvData && _cvData.nombre){
    renderFromData(_cvData);
    return;
  }
  // ── Prioridad 2: HTML guardado en Supabase ──
  if(_cvHtml){
    try{
      var _p = JSON.parse(_cvHtml);
      if(_p && _p.nombre && _p.experiencia){
        _cvData = _p; renderFromData(_cvData); return;
      }
    }catch(e){}
    var html=applyStyleToHtml(_cvHtml,_color,_ftitle,_fbody);
    mostrarEnIframe(html);
    return;
  }
  // ── Prioridad 3: construir desde datos del candidato (_cand) ──
  var c=_cand, inf=_inf;
  if(!c){ document.getElementById('cv-paper').innerHTML='<div class="empty-cv"><div style="font-size:36px;">📄</div><div style="font-size:14px;font-weight:700;color:#4A3F3F;margin-top:12px;">Cargando CV...</div></div>'; return; }

  // Construir objeto cv_data desde los campos del candidato
  function splitField(str, sep){ return str ? str.split(sep||/[,;|]/).map(function(x){return x.trim();}).filter(Boolean) : []; }
  function splitLines(str){ return str ? str.split('\n').filter(function(l){return l.trim();}) : []; }
  function splitBlocks(str){ var b=str?str.split(/\n{2,}|\r\n\r\n/).map(function(x){return x.trim();}).filter(Boolean):[]; return b.length?b:(str?[str]:[]); }

  // Experiencia: cada bloque → {titulo, empresa, bullets}
  var expData = splitBlocks(c.experiencia).map(function(block){
    var lines = block.split('\n').map(function(l){return l.trim();}).filter(Boolean);
    var titulo  = lines[0] || '';
    var empresa = '';
    var bullets = [];
    if(lines[1]){
      var parts = lines[1].split(/\||–|--/).map(function(p){return p.trim();});
      empresa = parts.join(' · ');
    }
    lines.slice(2).forEach(function(l){
      var clean = l.replace(/^[-•·*]\s*/,'');
      if(clean) bullets.push(clean);
    });
    return {titulo:titulo, empresa:empresa, bullets:bullets};
  });

  // Educación: cada bloque → {titulo, institucion}
  var eduData = splitBlocks(c.educacion).map(function(block){
    var lines = block.split('\n').map(function(l){return l.trim();}).filter(Boolean);
    var titulo = lines[0] || '';
    var inst   = '';
    if(lines[1]){
      var parts = lines[1].split(/\||–/).map(function(p){return p.trim();});
      inst = parts[0] + (parts[1] ? ' · '+parts[1] : '');
    }
    return {titulo:titulo, institucion:inst};
  });

  // Idiomas: convertir string "Inglés C1, Español Nativo" → [{idioma, nivel}]
  var idiomasData = splitField(c.idiomas).map(function(id){
    var m = id.match(/^(.+?)\s+(C[12]|B[12]|A[12]|Nativo|Native|Básico|Avanzado|Intermedio|En\s+curso)$/i);
    if(m) return {idioma: m[1].trim(), nivel: m[2].trim()};
    return {idioma: id, nivel: ''};
  });

  // Competencias: habilidades del candidato o fortalezas del informe
  var comps = splitField(c.habilidades).slice(0,6);
  if(!comps.length && inf && inf.fortalezas) comps = (inf.fortalezas||[]).slice(0,6);

  // Herramientas del candidato o del informe
  var herr = splitField(c.herramientas);

  // Idiomas: si no hay campo idiomas, intentar del informe
  if(!idiomasData.length && inf && inf.idiomas) {
    idiomasData = splitField(inf.idiomas).map(function(id){ return {idioma:id,nivel:''}; });
  }

  // Urgencia
  var urgente = c.urgencia && c.urgencia.toLowerCase().indexOf('inmed')>=0;

  // Ubicación: campo ubicacion o ciudad
  var ciudad = c.ubicacion || c.ciudad || '';

  // LinkedIn URL
  var liUrl = c.linkedin ? (c.linkedin.indexOf('linkedin.com')>=0 ? c.linkedin : 'linkedin.com/in/'+c.linkedin) : '';

  // Objetivo: del campo objetivo o del logro
  var objText = c.objetivo || (inf && inf.resumen ? inf.resumen.slice(0,250) : '') || '';

  // Si no hay experiencia estructurada, intentar del cargo y sector
  if(!expData.length && (c.cargo||c.sector)){
    expData = [{
      titulo:  c.cargo || c.sector || '',
      empresa: '',
      bullets: c.logro ? [c.logro] : []
    }];
  }

  var cvDataBuilt = {
    nombre:       c.nombre || '',
    rol_objetivo: c.rol || c.cargo || c.sector || '',
    objetivo:     objText,
    contacto: {
      tel:      c.telefono || c.tel || '',
      email:    c.email || '',
      ciudad:   ciudad,
      linkedin: liUrl
    },
    experiencia:  expData,
    educacion:    eduData,
    competencias: comps,
    idiomas:      idiomasData,
    herramientas: herr,
    cursos:       splitLines(c.cursos),
    otros: {
      incorporacion: urgente ? 'Incorporación inmediata' : '',
      modalidad:     c.modalidad || '',
      viajes:        c.disponibilidad_viaje ? 'Disponibilidad para viajes' : (c.geo||'')
    }
  };

  renderFromData(cvDataBuilt);
}



// ═══ MODO EDICIÓN DEL CV ════════════════════════════════════
var _editMode = false;

function toggleEditMode(){
  _editMode = !_editMode;
  var btn = document.getElementById('btn-edit-mode');
  var paper = document.getElementById('cv-paper');
  if(_editMode){
    // Activar edición: hacer todos los textos del iframe editables
    if(btn){ btn.textContent = '✓ Terminar edición'; btn.classList.add('editing'); }
    enableEditing();
  } else {
    if(btn){ btn.textContent = '✏ Editar CV'; btn.classList.remove('editing'); }
    disableEditing();
    // Auto-guardar al salir del modo edición
    saveEdits();
  }
}

function enableEditing(){
  try{
    if(_iframe){
      var doc=_iframe.contentDocument||_iframe.contentWindow.document;
      if(doc&&doc.body){doc.body.contentEditable='true';doc.body.style.outline='none';doc.body.style.boxShadow='inset 0 0 0 3px #8C7B8066';}
    } else {
      var paper=document.getElementById('cv-paper');
      if(paper){
        paper.querySelectorAll('.cr-nombre,.cr-rol,.cr-obj,.exp-t,.exp-s,.exp-b,.edu-t,.edu-s,.col-l-name,.col-l-role,.sl-row,.sk-tag,.lang-n,.otro,.tool').forEach(function(el){
          el.contentEditable='true';
          el.style.outline='1px dashed #8C7B8066';
          el.style.cursor='text';
        });
        paper.style.boxShadow='0 0 0 3px #8C7B8066';
      }
    }
  }catch(ex){console.warn('enableEditing:',ex);}
}
function disableEditing(){
  try{
    if(_iframe){
      var doc=_iframe.contentDocument||_iframe.contentWindow.document;
      if(doc&&doc.body){doc.body.contentEditable='false';doc.body.style.boxShadow='';}
    } else {
      var paper=document.getElementById('cv-paper');
      if(paper){
        paper.querySelectorAll('[contenteditable]').forEach(function(el){
          el.contentEditable='false';el.style.outline='';el.style.cursor='';
        });
        paper.style.boxShadow='0 20px 60px rgba(0,0,0,.15),0 4px 16px rgba(0,0,0,.07)';
      }
    }
  }catch(ex){}
}
function saveEdits(){
  // Guardar el HTML editado del CV en Supabase
  try{
    var doc = _iframe ? (_iframe.contentDocument||_iframe.contentWindow.document) : null;
    var htmlContent = doc ? doc.documentElement.outerHTML : document.getElementById('cv-paper').innerHTML;
    if(!_email || !htmlContent) return;
    
    // Guardar en cv_publicados
    fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email),{
      method:'GET',
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    }).then(function(r){return r.json();}).then(function(rows){
      var method = rows&&rows.length ? 'PATCH' : 'POST';
      var url = SB+'/rest/v1/cv_publicados'+(rows&&rows.length?'?email=eq.'+encodeURIComponent(_email):'');
      return fetch(url,{
        method: method,
        headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},
        body: JSON.stringify({email:_email, contenido: htmlContent, updated_at: new Date().toISOString()})
      });
    }).then(function(){
      showStatus('Cambios guardados ✓', '#5A8C6E');
    }).catch(function(err){
      showStatus('Error al guardar', '#C0756E');
    });
  }catch(ex){
    showStatus('Error: '+ex.message, '#C0756E');
  }
}

function showStatus(msg, color){
  var st = document.getElementById('cv-status');
  if(!st){
    st = document.createElement('div');
    st.id = 'cv-status';
    st.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:700;font-family:Montserrat,sans-serif;color:#fff;z-index:999;transition:opacity .3s;box-shadow:0 4px 16px rgba(0,0,0,.15);';
    document.body.appendChild(st);
  }
  st.textContent = msg;
  st.style.background = color||'#5A8C6E';
  st.style.opacity = '1';
  clearTimeout(st._t);
  st._t = setTimeout(function(){ st.style.opacity='0'; }, 2500);
}

</script>
