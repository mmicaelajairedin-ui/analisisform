<!-- Buscamos 5 coaches — horizontal 1.91:1 (1200x628) ideal LinkedIn / FB link preview -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#52B788" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#52B788" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="628" fill="url(#bg)"/>
  <rect width="1200" height="628" fill="url(#glow)"/>

  <!-- Logo Pathway izquierda arriba -->
  <g transform="translate(60, 60) scale(0.9)">
    <polygon points="10,82 32,52 54,82" fill="#52B788"/>
    <polygon points="34,82 58,28 82,82" fill="#FAFDF9"/>
    <circle cx="58" cy="22" r="5" fill="#E9C46A"/>
  </g>
  <text x="155" y="120"
        font-family="'Fraunces', Georgia, serif"
        font-size="32"
        font-weight="500"
        fill="#FAFDF9"
        letter-spacing="-1">Pathway<tspan fill="#52B788">.</tspan></text>

  <!-- Eyebrow -->
  <text x="60" y="220"
        font-family="'Inter', Arial, sans-serif"
        font-size="16"
        font-weight="600"
        fill="#E9C46A"
        letter-spacing="4">COMUNIDAD DE COACHES DE CARRERA</text>

  <!-- Headline -->
  <text x="60" y="320"
        font-family="'Fraunces', Georgia, serif"
        font-size="78"
        font-weight="500"
        fill="#FAFDF9"
        letter-spacing="-2">Buscamos <tspan fill="#E9C46A" font-weight="600">5 coaches</tspan></text>
  <text x="60" y="395"
        font-family="'Fraunces', Georgia, serif"
        font-size="78"
        font-weight="400"
        font-style="italic"
        fill="#FAFDF9"
        letter-spacing="-2">de carrera.</text>

  <!-- Línea -->
  <line x1="60" y1="450" x2="200" y2="450" stroke="#52B788" stroke-width="2"/>

  <!-- Subline -->
  <text x="60" y="500"
        font-family="'Inter', Arial, sans-serif"
        font-size="20"
        font-weight="400"
        fill="rgba(250,253,249,0.85)">Comunidad de coaches LATAM.</text>
  <text x="60" y="530"
        font-family="'Inter', Arial, sans-serif"
        font-size="20"
        font-weight="400"
        fill="rgba(250,253,249,0.85)">1 encuentro al mes. Sin venta. Sin pitch.</text>

  <!-- URL -->
  <text x="60" y="590"
        font-family="'Inter', Arial, sans-serif"
        font-size="14"
        font-weight="600"
        fill="#52B788"
        letter-spacing="2">PATHWAYCAREERCOACH.COM/COMUNIDAD</text>

  <!-- Iconos decorativos lado derecho -->
  <g transform="translate(900, 200)" opacity="0.85">
    <!-- Triangulito 1 (personitas) -->
    <g transform="translate(0,0) scale(1.4)">
      <polygon points="10,86 50,14 90,86" fill="#52B788" opacity="0.25"/>
      <circle cx="50" cy="14" r="4" fill="#E9C46A"/>
      <circle cx="38" cy="62" r="3" fill="#FAFDF9"/>
      <path d="M 33 76 Q 33 68 38 68 Q 43 68 43 76 L 43 80 L 33 80 Z" fill="#FAFDF9"/>
      <circle cx="50" cy="55" r="3.5" fill="#FAFDF9"/>
      <path d="M 44 72 Q 44 62 50 62 Q 56 62 56 72 L 56 78 L 44 78 Z" fill="#FAFDF9"/>
      <circle cx="62" cy="62" r="3" fill="#FAFDF9"/>
      <path d="M 57 76 Q 57 68 62 68 Q 67 68 67 76 L 67 80 L 57 80 Z" fill="#FAFDF9"/>
    </g>
  </g>
</svg>
