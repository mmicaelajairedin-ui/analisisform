<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Carta de presentación</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#EDEAEA;font-family:'Lora',serif;}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:#fff;border-bottom:1px solid #EDE8E8;
  padding:0 24px;height:52px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.tb-brand{font-size:13px;font-weight:800;color:#2D292A;font-family:'Montserrat',sans-serif;letter-spacing:-.3px;}
.tb-name{font-size:12px;color:#888;font-weight:600;font-family:'Montserrat',sans-serif;}
.tb-sep{width:1px;height:24px;background:#EDE8E8;flex-shrink:0;}
.tb-spacer{flex:1;}
.save-st{font-size:11px;color:#5A8C6E;font-weight:600;font-family:'Montserrat',sans-serif;white-space:nowrap;}
.tb-btn{font-size:11px;font-weight:700;padding:7px 14px;border-radius:8px;cursor:pointer;border:none;font-family:'Montserrat',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .15s;}
.btn-back{background:none;border:none;font-size:11px;color:#888;cursor:pointer;font-family:'Montserrat',sans-serif;display:flex;align-items:center;gap:5px;}
.btn-back:hover{color:#2D292A;}
.btn-edit{background:#F5F0F0;color:#8E7676;}
.btn-edit:hover{background:#EDE8E8;}
.btn-edit.on{background:#8E7676;color:#fff;}
.btn-save{background:#5A8C6E;color:#fff;}
.btn-save:hover{background:#4A7A5E;}
.btn-pdf{background:#2D292A;color:#fff;}
.btn-pdf:hover{background:#4A3F3F;}

/* ── WORKSPACE ── */
.ws{padding:72px 40px 60px;display:flex;justify-content:center;min-height:100vh;}

/* ── PAPEL CARTA ── */
.carta-wrap{width:210mm;}
.carta-paper{
  width:210mm;min-height:297mm;background:#fff;
  box-shadow:0 12px 40px rgba(0,0,0,.12);
  padding:28mm 26mm 24mm;
  position:relative;
}

/* Acento lateral izquierdo */
.carta-paper::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:5px;
  background:#8E7676;
}

/* ── CABECERA ── */
.carta-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:28px;padding-bottom:20px;
  border-bottom:1px solid #EDE8E8;
}
.ch-left{}
.ch-nombre{
  font-family:'Montserrat',sans-serif;
  font-size:18px;font-weight:800;color:#2D292A;
  letter-spacing:-.3px;line-height:1.2;margin-bottom:6px;
}
.ch-dato{font-size:11px;color:#666;line-height:1.7;font-family:'Lora',serif;}
.ch-right{text-align:right;}
.ch-fecha{font-size:11px;color:#888;font-style:italic;margin-bottom:6px;}
.ch-lugar{font-size:11px;color:#888;}

/* ── DESTINATARIO ── */
.carta-dest{margin-bottom:24px;}
.cd-empresa{
  font-family:'Montserrat',sans-serif;
  font-size:12px;font-weight:700;color:#2D292A;
  margin-bottom:2px;
}
.cd-puesto{font-size:11px;color:#8E7676;font-weight:600;font-family:'Montserrat',sans-serif;}

/* ── ASUNTO ── */
.carta-asunto{
  font-size:11.5px;color:#444;
  font-style:italic;margin-bottom:22px;
  padding-left:12px;border-left:3px solid #8E7676;
  line-height:1.6;
}

/* ── CUERPO ── */
.carta-saludo{
  font-size:12px;color:#2D292A;margin-bottom:18px;
  font-family:'Lora',serif;
}
.carta-parrafo{
  font-size:12px;color:#333;line-height:1.85;
  margin-bottom:16px;font-family:'Lora',serif;
}

/* ── CIERRE ── */
.carta-cierre{
  font-size:12px;color:#333;margin-top:8px;margin-bottom:28px;
  font-family:'Lora',serif;
}

/* ── FIRMA ── */
.carta-firma{
  padding-top:18px;
  border-top:1px solid #EDE8E8;
}
.cf-nombre{
  font-family:'Montserrat',sans-serif;
  font-size:13px;font-weight:800;color:#2D292A;
  margin-bottom:5px;letter-spacing:-.2px;
}
.cf-dato{font-size:11px;color:#666;line-height:1.7;}
.cf-adj{font-size:11px;color:#888;font-style:italic;margin-top:10px;}

/* ── EDICIÓN ── */
[contenteditable="true"]{
  outline:none;
  border-radius:3px;
  transition:background .15s;
}
.editing [contenteditable="true"]:hover{
  background:rgba(142,118,118,.06);
  cursor:text;
}
.editing [contenteditable="true"]:focus{
  background:rgba(142,118,118,.08);
  outline:none;
}
.editing-hint{
  display:none;
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#2D292A;color:#fff;
  font-size:11px;font-weight:600;font-family:'Montserrat',sans-serif;
  padding:8px 18px;border-radius:20px;
  pointer-events:none;z-index:200;
  box-shadow:0 4px 14px rgba(0,0,0,.2);
}
.editing .editing-hint{display:block;}

/* ── PRINT ── */
@media print{
  .topbar,.editing-hint{display:none!important;}
  .ws{padding:0!important;background:#fff!important;}
  .carta-paper{box-shadow:none!important;width:100%!important;min-height:297mm;}
  @page{margin:0;size:A4;}
}
@media(max-width:800px){
  .ws{padding:60px 8px 40px;}
  .carta-wrap,.carta-paper{width:100%;}
  .carta-header{flex-direction:column;gap:12px;}
  .ch-right{text-align:left;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <button class="btn-back" onclick="window.location.href=BASE+'/cliente.html'">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Portal
  </button>
  <div class="tb-sep"></div>
  <div class="tb-brand">Carta de presentación</div>
  <div class="tb-name" id="tb-name">Cargando...</div>
  <div class="tb-spacer"></div>
  <span class="save-st" id="save-st"></span>
  <button class="tb-btn btn-edit" id="btn-edit" onclick="toggleEdit()">
    ✏ Editar
  </button>
  <button class="tb-btn btn-save" onclick="guardar()">
    ✓ Guardar
  </button>
  <button class="tb-btn btn-pdf" onclick="imprimir()">
    ↓ PDF
  </button>
</div>

<!-- HINT EDICIÓN -->
<div class="editing-hint">Hacé clic en cualquier texto para editarlo</div>

<!-- WORKSPACE -->
<div class="ws">
  <div class="carta-wrap">
    <div class="carta-paper" id="carta-paper">
      <div style="display:flex;align-items:center;justify-content:center;min-height:200px;color:#999;font-size:13px;font-family:'Montserrat',sans-serif;">
        Cargando carta...
      </div>
    </div>
  </div>
</div>

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://mmicaelajairedin-ui.github.io/analisisform';
var EDGE='https://ddxnrsnjdvtqhxunxnwj.supabase.co/functions/v1/generar-informe';

var _email=null,_cand=null,_editing=false,_saveT=null;

// ── INIT ──
(function(){
  var p=new URLSearchParams(window.location.search);
  _email=p.get('email');
  if(!_email){var u=localStorage.getItem('mj_user');if(u){try{_email=JSON.parse(u).email;}catch(e){}}}
  if(!_email){
    document.getElementById('carta-paper').innerHTML='<div style="padding:3rem;text-align:center;color:#999;font-family:Montserrat,sans-serif;font-size:13px;">Sesión no encontrada. <a href="'+BASE+'/login.html" style="color:#8E7676;">Iniciar sesión</a></div>';
    return;
  }
  cargar();
})();

// ── CARGA ──
function cargar(){
  fetch(SB+'/rest/v1/candidatos?email=eq.'+enc(_email)+'&select=*&limit=1',{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  }).then(function(r){return r.json();})
  .then(function(rows){
    _cand=rows&&rows.length?rows[0]:{nombre:_email,email:_email};
    document.getElementById('tb-name').textContent=_cand.nombre||'';
    // Check localStorage for more recent saved carta
    var localCarta=localStorage.getItem('carta_'+_email);
    if(localCarta&&(!_cand.carta_presentacion||localCarta.length>(_cand.carta_presentacion||'').length)){
      _cand.carta_presentacion=localCarta;
    }
    renderCarta();
  }).catch(function(){
    document.getElementById('carta-paper').innerHTML='<div style="padding:3rem;text-align:center;color:#999;font-family:Montserrat,sans-serif;font-size:13px;">Error al cargar. Recargá la página.</div>';
  });
}

// ── RENDER ──
function renderCarta(){
  var c=_cand;
  var nombre  = c.nombre||'Tu Nombre';
  var email2  = c.email||'';
  var tel     = c.telefono||c.tel||'';
  var ciudad  = c.ubicacion||c.ciudad||'';
  var linkedin= c.linkedin?'linkedin.com/in/'+c.linkedin:'';
  var carta   = c.carta_presentacion||'';
  var hoy     = new Date().toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});

  // Parsear la carta en párrafos si existe
  var parrafos=[];
  var saludo='Estimado/a Sr./Sra.:';
  var cierre='Quedo a su entera disposición para ampliar esta información en una entrevista personal.\n\nAtentamente,';

  if(carta){
    // Separar por líneas dobles
    var lineas=carta.split(/\n\n|\r\n\r\n/).map(function(l){return l.trim();}).filter(Boolean);
    // Primera línea suele ser el saludo
    if(lineas.length>0&&(lineas[0].toLowerCase().includes('estimado')||lineas[0].toLowerCase().includes('dear')||lineas[0].toLowerCase().includes('hola'))){
      saludo=lineas.shift();
    }
    // Últimas líneas suelen ser cierre + firma (quitar firma porque la ponemos nosotros)
    // Buscar el cierre típico
    var cierreIdx=-1;
    lineas.forEach(function(l,i){
      if(l.toLowerCase().includes('atentamente')||l.toLowerCase().includes('un saludo')||l.toLowerCase().includes('quedo a')||l.toLowerCase().includes('cordialmente')){
        cierreIdx=i;
      }
    });
    if(cierreIdx>=0){
      // Todo desde el cierre hasta antes del nombre es el cierre
      var restoCierre=lineas.splice(cierreIdx).join('\n\n');
      // Quitar el nombre del candidato al final si aparece
      restoCierre=restoCierre.replace(new RegExp(escReg(nombre)+'\\s*$','i'),'').trim();
      cierre=restoCierre;
    }
    parrafos=lineas;
  }

  // Si no hay carta, poner párrafos de ejemplo
  if(!parrafos.length){
    parrafos=[
      'Me dirijo a usted para expresar mi interés en la posición de [PUESTO] en [EMPRESA]. He seguido de cerca el trabajo de su organización y creo que mi experiencia en [SECTOR/ÁREA] puede aportar valor real a su equipo.',
      'A lo largo de mis [X] años de carrera en [ÁREA], he desarrollado una sólida capacidad para [HABILIDAD PRINCIPAL]. En mi etapa anterior como [CARGO] en [EMPRESA ANTERIOR], logré [LOGRO CONCRETO Y CUANTIFICADO], lo que me permitió comprender en profundidad los desafíos que enfrentan equipos como el suyo.',
      'Lo que más me motiva de esta oportunidad es [RAZÓN ESPECÍFICA RELACIONADA CON LA EMPRESA]. Estoy convencido/a de que mi forma de trabajar —orientada a resultados, con atención al detalle y con genuina vocación de colaboración— encaja bien con la cultura que proyecta [EMPRESA].'
    ];
    cierre='Quedo a su disposición para una conversación en el momento que le resulte conveniente.\n\nAtentamente,';
  }

  var paper=document.getElementById('carta-paper');
  paper.innerHTML=

    // CABECERA
    '<div class="carta-header">'+
      '<div class="ch-left">'+
        '<div class="ch-nombre" contenteditable="false">'+esc(nombre)+'</div>'+
        (ciudad?'<div class="ch-dato" contenteditable="false">'+esc(ciudad)+'</div>':'')+
        (tel?'<div class="ch-dato" contenteditable="false">'+esc(tel)+'</div>':'')+
        (email2?'<div class="ch-dato" contenteditable="false">'+esc(email2)+'</div>':'')+
        (linkedin?'<div class="ch-dato" contenteditable="false">'+esc(linkedin)+'</div>':'')+
      '</div>'+
      '<div class="ch-right">'+
        '<div class="ch-fecha" contenteditable="false">'+esc(ciudad?ciudad+', ':'')+hoy+'</div>'+
      '</div>'+
    '</div>'+

    // DESTINATARIO
    '<div class="carta-dest">'+
      '<div class="cd-empresa" contenteditable="false">[EMPRESA]</div>'+
      '<div class="cd-puesto" contenteditable="false">Atención: Departamento de Recursos Humanos</div>'+
    '</div>'+

    // ASUNTO
    '<div class="carta-asunto" contenteditable="false">'+
      'Ref. candidatura para el puesto de [PUESTO]'+
    '</div>'+

    // SALUDO
    '<div class="carta-saludo" contenteditable="false">'+esc(saludo)+'</div>'+

    // PÁRRAFOS
    parrafos.map(function(p){
      return '<div class="carta-parrafo" contenteditable="false">'+esc(p)+'</div>';
    }).join('')+

    // CIERRE
    '<div class="carta-cierre" contenteditable="false" style="white-space:pre-line;">'+esc(cierre)+'</div>'+

    // FIRMA
    '<div class="carta-firma">'+
      '<div class="cf-nombre" contenteditable="false">'+esc(nombre)+'</div>'+
      (tel?'<div class="cf-dato" contenteditable="false">'+esc(tel)+'</div>':'')+
      (email2?'<div class="cf-dato" contenteditable="false">'+esc(email2)+'</div>':'')+
      (linkedin?'<div class="cf-dato" contenteditable="false">'+esc(linkedin)+'</div>':'')+
      '<div class="cf-adj">Adj. Currículum Vitae</div>'+
    '</div>';
}

// ── EDIT MODE ──
function toggleEdit(){
  _editing=!_editing;
  var btn=document.getElementById('btn-edit');
  var paper=document.getElementById('carta-paper');
  paper.querySelectorAll('[contenteditable]').forEach(function(el){
    el.contentEditable=_editing?'true':'false';
  });
  if(_editing){
    paper.classList.add('editing');
    btn.textContent='✓ Listo';
    btn.classList.add('on');
  } else {
    paper.classList.remove('editing');
    btn.textContent='✏ Editar';
    btn.classList.remove('on');
    guardar();
  }
}

// ── GUARDAR — directo a Supabase tabla cartas ──
function guardar(){
  if(!_email)return;
  var st=document.getElementById('save-st');
  var paper=document.getElementById('carta-paper');
  
  // Recolectar todo el texto editable
  var partes=[];
  var empresa=paper.querySelector('.cd-empresa');
  var asunto=paper.querySelector('.carta-asunto');
  var saludo=paper.querySelector('.carta-saludo');
  var parrafos=paper.querySelectorAll('.carta-parrafo');
  var cierre=paper.querySelector('.carta-cierre');
  
  if(saludo)partes.push(saludo.textContent.trim());
  parrafos.forEach(function(p){if(p.textContent.trim())partes.push(p.textContent.trim());});
  if(cierre)partes.push(cierre.textContent.trim());
  var cartaTexto=partes.join('\n\n');
  
  // Guardar empresa y asunto también
  var empresaNombre=empresa?empresa.textContent.trim():'[EMPRESA]';
  var asuntoTexto=asunto?asunto.textContent.trim():'';
  
  var payload={
    carta_presentacion: cartaTexto,
    carta_empresa: empresaNombre,
    carta_asunto: asuntoTexto
  };

  st.textContent='Guardando...';st.style.color='#888';
  
  // PATCH directo a candidatos — funciona con service key via anon si RLS lo permite
  // Si falla, guardamos en localStorage como backup
  fetch(SB+'/rest/v1/candidatos?email=eq.'+enc(_email),{
    method:'PATCH',
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(payload)
  }).then(function(r){
    if(r.ok||r.status===204){
      st.textContent='✓ Guardada';st.style.color='#5A8C6E';
      // Backup en localStorage
      localStorage.setItem('carta_'+_email, cartaTexto);
    } else {
      // Fallback: guardar en localStorage
      localStorage.setItem('carta_'+_email, cartaTexto);
      st.textContent='✓ Guardada localmente';st.style.color='#8E7676';
    }
    setTimeout(function(){st.textContent='';st.style.color='';},3000);
  }).catch(function(){
    localStorage.setItem('carta_'+_email, cartaTexto);
    st.textContent='✓ Guardada localmente';st.style.color='#8E7676';
    setTimeout(function(){st.textContent='';st.style.color='';},3000);
  });
}

function imprimir(){
  guardar();
  setTimeout(function(){window.print();},600);
}

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function enc(s){return encodeURIComponent(s);}
function escReg(s){return(s||'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
</script>
</body>
</html>
