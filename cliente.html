<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu informe de perfil — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:2rem 1rem 4rem;}
.wrap{max-width:720px;margin:0 auto;}

/* HEADER */
.header{text-align:center;margin-bottom:2rem;}
.header-brand{display:inline-flex;align-items:center;gap:10px;background:#fff;border-radius:20px;padding:8px 20px;margin-bottom:1.25rem;border:1px solid #eee;}
.header-dot{width:10px;height:10px;border-radius:50%;background:#8C7B80;}
.header-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.header-title{font-size:11px;color:#999;}
.header h1{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:6px;}
.header p{font-size:13px;color:#666;line-height:1.6;}

/* LOADING / ERROR */
.loading{text-align:center;padding:4rem;color:#999;font-size:14px;}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#8C7B80;margin:0 2px;animation:dp 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* REPORT */
.report{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #eee;margin-bottom:1.5rem;}
.rhead{background:#8C7B80;padding:28px 32px;}
.rhead-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.rhead-brand-name{font-size:18px;font-weight:700;color:#fff;}
.rhead-brand-title{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px;letter-spacing:.04em;}
.rhead-meta{text-align:right;color:#fff;}
.rhead-tag{font-size:9px;font-weight:600;opacity:.7;letter-spacing:.08em;text-transform:uppercase;}
.rhead-cand{font-size:15px;font-weight:700;margin-top:2px;}
.rhead-date{font-size:10px;opacity:.75;margin-top:1px;}
.rhead-welcome{font-size:13px;color:rgba(255,255,255,.9);line-height:1.5;border-top:1px solid rgba(255,255,255,.2);padding-top:12px;margin-top:4px;}

.rbody{padding:28px 32px;}

/* SCORES */
.scores-title{font-size:11px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.scores-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:24px;}
.score-card{background:#f9f8f8;border-radius:10px;padding:14px 8px;text-align:center;}
.sc-label{font-size:8px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;line-height:1.4;}
.sc-pct{font-size:22px;font-weight:700;line-height:1;}
.sc-pct.hi{color:#4a7c5f;}.sc-pct.mid{color:#8C7B80;}.sc-pct.lo{color:#c0756e;}
.sc-track{height:5px;background:#eee;border-radius:3px;margin-top:6px;overflow:hidden;}
.sc-fill{height:5px;border-radius:3px;}
.fill-hi{background:#4a7c5f;}.fill-mid{background:#8C7B80;}.fill-lo{background:#c0756e;}
.sc-sym{font-size:9px;font-weight:600;margin-top:4px;}
.sc-sym.hi{color:#4a7c5f;}.sc-sym.mid{color:#8C7B80;}.sc-sym.lo{color:#c0756e;}

/* PROGRESS */
.progress-section{background:#f3efef;border-radius:12px;padding:18px 20px;margin-bottom:24px;border:1px solid #e0d8da;}
.progress-title{font-size:12px;font-weight:700;color:#6B5A5F;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.progress-title::before{content:'';display:block;width:3px;height:14px;background:#8C7B80;border-radius:2px;}
.prog-row{display:grid;grid-template-columns:130px 1fr 50px;align-items:center;gap:10px;margin-bottom:10px;}
.prog-label{font-size:11px;color:#666;font-weight:500;}
.prog-bars{display:flex;flex-direction:column;gap:4px;}
.prog-bar-wrap{display:flex;align-items:center;gap:6px;}
.prog-bar-bg{flex:1;height:5px;background:#e5e0e1;border-radius:3px;overflow:hidden;}
.prog-bar-fill{height:5px;border-radius:3px;}
.bar-before{background:#c9bbbe;}.bar-after{background:#8C7B80;}
.prog-bar-num{font-size:10px;font-weight:600;min-width:28px;text-align:right;}
.prog-change{font-size:12px;font-weight:700;text-align:right;}
.prog-change.up{color:#4a7c5f;}.prog-change.same{color:#999;}.prog-change.down{color:#c0756e;}

/* SECTIONS */
.sec{margin-bottom:20px;}
.sec-title{font-size:10px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.sec-title::after{content:'';flex:1;height:1px;background:#f0ecec;}
.sec-body{font-size:13px;color:#2a2a2a;line-height:1.75;white-space:pre-wrap;}
.bullets{list-style:none;padding:0;}
.bullets li{font-size:13px;color:#2a2a2a;line-height:1.65;padding:6px 0 6px 18px;position:relative;border-bottom:0.5px solid #f5f1f1;}
.bullets li:last-child{border-bottom:none;}
.bullets li::before{content:'';position:absolute;left:0;top:14px;width:5px;height:5px;border-radius:50%;background:#8C7B80;}
.motivador{background:#f3efef;border-radius:12px;padding:18px 20px;font-size:14px;color:#4a3a3e;line-height:1.7;font-style:italic;border-left:3px solid #8C7B80;margin-top:8px;}

.rfooter{background:#f9f8f8;border-top:1px solid #ece8e8;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;}
.rfooter-brand{font-size:10px;font-weight:600;color:#8C7B80;}
.rfooter-note{font-size:9px;color:#aaa;}

/* NEXT STEPS */
.next-box{background:#fff;border-radius:14px;padding:24px;border:1px solid #eee;text-align:center;}
.next-box h3{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:6px;}
.next-box p{font-size:13px;color:#666;line-height:1.6;margin-bottom:16px;}
.next-btn{display:inline-block;padding:12px 28px;font-size:13px;font-weight:600;font-family:'Montserrat',sans-serif;background:#8C7B80;color:#fff;border:none;border-radius:10px;cursor:pointer;text-decoration:none;}
.next-btn:hover{background:#6B5A5F;}

@media(max-width:520px){
  .scores-grid{grid-template-columns:1fr 1fr;}
  .rhead-top{flex-direction:column;gap:10px;}
  .rhead-meta{text-align:left;}
  .prog-row{grid-template-columns:100px 1fr 40px;}
}
@media print{
  body{background:#fff;padding:0;}
  .header{display:none;}.next-box{display:none;}
  .rhead{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .score-card{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .progress-section{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .motivador{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-brand">
      <div class="header-dot"></div>
      <div>
        <div class="header-name">Micaela Jairedin</div>
        <div class="header-title">Career Coach & Recruiter</div>
      </div>
    </div>
    <h1 id="h-title">Tu informe de perfil profesional</h1>
    <p id="h-sub">Aquí encontrarás el análisis personalizado que hemos preparado para ti.</p>
  </div>

  <div id="content">
    <div class="loading">
      <div class="dots"><span></span><span></span><span></span></div>
      <p style="margin-top:12px;">Cargando tu informe...</p>
    </div>
  </div>

</div>

<script>
const SB_URL='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';

async function init(){
  const params=new URLSearchParams(window.location.search);
  const email=params.get('email');
  if(!email){showError('No se encontró tu informe. Contacta con Micaela.');return;}

  try{
    const r=await fetch(SB_URL+'/rest/v1/informes?email=eq.'+encodeURIComponent(email)+'&order=created_at.desc&select=*',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    const rows=await r.json();
    if(!rows||!rows.length){showError('Tu informe aún no está disponible. Micaela lo publicará pronto.');return;}

    const latest=rows[0];
    const d=JSON.parse(latest.data);
    const prev=latest.prev?JSON.parse(latest.prev):null;
    const hasProgress=!!(prev&&prev.scores&&prev.scores.length);

    renderReport(d,prev,hasProgress);
  }catch(e){
    showError('Error al cargar el informe. Inténtalo de nuevo.');
  }
}

function showError(msg){
  document.getElementById('content').innerHTML='<div class="report"><div class="rbody" style="text-align:center;padding:3rem;">'
    +'<p style="font-size:14px;color:#999;line-height:1.7;">'+msg+'</p>'
    +'<p style="font-size:12px;color:#ccc;margin-top:8px;">mmicaela.jairedin@gmail.com</p>'
    +'</div></div>';
}

function renderReport(d,prev,hasProgress){
  function sc(arr){
    return arr.map(s=>{
      const pct=Math.min(100,Math.max(0,Math.round(s.val)));
      const cl=pct>=70?'hi':pct>=45?'mid':'lo';
      const sym=pct>=70?'Muy bien':pct>=45?'En proceso':'Por trabajar';
      return '<div class="score-card">'
        +'<div class="sc-label">'+s.label+'</div>'
        +'<div class="sc-pct '+cl+'">'+pct+'%</div>'
        +'<div class="sc-track"><div class="sc-fill fill-'+cl+'" style="width:'+pct+'%"></div></div>'
        +'<div class="sc-sym '+cl+'">'+sym+'</div>'
        +'</div>';
    }).join('');
  }

  function bul(arr){if(!arr||!arr.length)return '';return '<ul class="bullets">'+arr.map(x=>'<li>'+x+'</li>').join('')+'</ul>';}
  function pro(t){return '<div class="sec-body">'+(t||'')+'</div>';}

  let progressHTML='';
  if(hasProgress&&prev){
    progressHTML='<div class="progress-section"><div class="progress-title">Tu evolución — comparativa de sesiones</div>'
      +d.scores.map(s=>{
        const cur=Math.round(s.val);
        const prevS=prev.scores.find(ps=>ps.label===s.label);
        const pre=prevS?Math.round(prevS.val):0;
        const diff=cur-pre;
        const cl=diff>0?'up':diff<0?'down':'same';
        return '<div class="prog-row">'
          +'<div class="prog-label">'+s.label+'</div>'
          +'<div class="prog-bars">'
          +'<div class="prog-bar-wrap"><div class="prog-bar-bg"><div class="prog-bar-fill bar-before" style="width:'+pre+'%"></div></div><div class="prog-bar-num" style="color:#999;">'+pre+'%</div></div>'
          +'<div class="prog-bar-wrap"><div class="prog-bar-bg"><div class="prog-bar-fill bar-after" style="width:'+cur+'%"></div></div><div class="prog-bar-num" style="color:#8C7B80;">'+cur+'%</div></div>'
          +'</div>'
          +'<div class="prog-change '+cl+'">'+(diff>0?'+':'')+diff+'%</div>'
          +'</div>';
      }).join('')+'</div>';
  }

  document.getElementById('h-title').textContent='Tu informe de perfil, '+(d.candidato||'');
  document.getElementById('h-sub').textContent='Aquí encontrarás el análisis personalizado que Micaela ha preparado para ti.';

  document.getElementById('content').innerHTML=
    '<div class="report">'
    +'<div class="rhead">'
      +'<div class="rhead-top">'
        +'<div><div class="rhead-brand-name">Micaela Jairedin</div><div class="rhead-brand-title">Career Coach & Recruiter</div></div>'
        +'<div class="rhead-meta"><div class="rhead-tag">Informe de perfil profesional</div><div class="rhead-cand">'+(d.candidato||'')+'</div><div class="rhead-date">'+(d.fecha||new Date().toLocaleDateString('es-ES'))+'</div></div>'
      +'</div>'
      +(d.mensaje_candidato?'<div class="rhead-welcome">'+d.mensaje_candidato+'</div>':'')
    +'</div>'
    +'<div class="rbody">'
      +'<div class="scores-title">Diagnóstico de tu perfil</div>'
      +'<div class="scores-grid">'+sc(d.scores||[])+'</div>'
      +progressHTML
      +'<div class="sec"><div class="sec-title">Tu situación</div>'+pro(d.resumen)+'</div>'
      +'<div class="sec"><div class="sec-title">Tus fortalezas</div>'+bul(d.fortalezas)+'</div>'
      +'<div class="sec"><div class="sec-title">Áreas de mejora</div>'+bul(d.gaps)+'</div>'
      +'<div class="sec"><div class="sec-title">El mercado en 2025</div>'+pro(d.mercado)+'</div>'
      +'<div class="sec"><div class="sec-title">Estrategia recomendada</div>'+pro(d.estrategia)+'</div>'
      +'<div class="sec"><div class="sec-title">Acciones para tu CV</div>'+bul(d.cv_acciones)+'</div>'
      +'<div class="sec"><div class="sec-title">Acciones para tu LinkedIn</div>'+bul(d.linkedin_acciones)+'</div>'
      +'<div class="sec"><div class="sec-title">Acciones de networking</div>'+bul(d.networking_acciones)+'</div>'
    +'</div>'
    +'<div class="rfooter"><div class="rfooter-brand">Micaela Jairedin · Career Coach & Recruiter</div><div class="rfooter-note">Informe personalizado · Confidencial</div></div>'
    +'</div>'
    +'<div class="next-box">'
      +'<h3>¿Tienes preguntas sobre tu informe?</h3>'
      +'<p>Estaré encantada de resolverlas en nuestra próxima sesión. También puedes contactarme directamente si necesitas algo antes.</p>'
      +'<a href="mailto:mmicaela.jairedin@gmail.com?subject=Consulta sobre mi informe" class="next-btn">Escribir a Micaela</a>'
    +'</div>';
}

init();
</script>
</body>
</html>
