*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:2rem 1rem 4rem;}
.wrap{max-width:720px;margin:0 auto;}

.bn{font-size:13px;font-weight:600;}

.lb{padding:4px 14px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;border:none;border-radius:16px;cursor:pointer;background:transparent;color:#999;}
.lb.on{background:#8C7B80;color:#fff;}
.loading{text-align:center;padding:4rem;color:#999;}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#8C7B80;margin:0 2px;animation:dp 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.tabs-nav{display:flex;gap:4px;margin-bottom:1.5rem;background:#fff;border-radius:12px;padding:6px;border:1px solid #eee;}
.tab-btn{flex:1;padding:10px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#666;transition:all .15s;}
.tab-btn.on{background:#8C7B80;color:#fff;}
.tab-content{display:none;}.tab-content.on{display:block;}
.report{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #eee;margin-bottom:1.5rem;}
.rhead{background:#8C7B80;padding:20px 24px;}
.rh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.rh-name{font-size:15px;font-weight:700;color:#fff;}
.rh-title{font-size:10px;color:rgba(255,255,255,.8);margin-top:2px;}
.rh-meta{text-align:right;color:#fff;}
.rh-tag{font-size:9px;font-weight:600;opacity:.7;letter-spacing:.08em;text-transform:uppercase;}
.rh-cand{font-size:13px;font-weight:700;margin-top:2px;}

.rbody{padding:20px 24px;}

.sc{background:#f9f8f8;border-radius:8px;padding:10px 6px;text-align:center;}

.sc-fi{height:4px;border-radius:2px;}
.fi-hi{background:#4a7c5f;}.fi-mid{background:#8C7B80;}.fi-lo{background:#c0756e;}

.sec-b{font-size:12px;color:#2a2a2a;line-height:1.75;white-space:pre-wrap;}
.bullets{list-style:none;padding:0;}
.bullets li{font-size:12px;color:#2a2a2a;line-height:1.6;padding:5px 0 5px 16px;position:relative;border-bottom:.5px solid #f5f1f1;}
.bullets li:last-child{border-bottom:none;}
.bullets li::before{content:'';position:absolute;left:0;top:12px;width:5px;height:5px;border-radius:50%;background:#8C7B80;}
.alert-b{background:#fdf6f6;border-left:3px solid #c0756e;border-radius:0 8px 8px 0;padding:8px 12px;margin-bottom:6px;font-size:12px;line-height:1.5;}

.rfooter-brand{font-size:10px;font-weight:600;color:#8C7B80;}

.wa-btn{display:inline-block;padding:12px 28px;font-size:13px;font-weight:600;font-family:'Montserrat',sans-serif;background:#8C7B80;color:#fff;border-radius:10px;text-decoration:none;}
.prog-card{background:#fff;border-radius:14px;border:1px solid #eee;padding:1.25rem;margin-bottom:1rem;}
.prog-card h3{font-size:13px;font-weight:700;margin-bottom:4px;}
.prog-card p{font-size:12px;color:#666;margin-bottom:12px;}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;margin-bottom:5px;border-radius:8px;cursor:pointer;border:1px solid #eee;background:#fafafa;transition:all .15s;}
.action-item.done{border-color:#c5dac5;background:#f0f7f0;}
.action-check{width:18px;height:18px;border-radius:50%;border:2px solid #ddd;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s;}
.action-item.done .action-check{border-color:#4a7c5f;background:#4a7c5f;}
.action-text{font-size:12px;color:#1a1a1a;line-height:1.5;}
.action-item.done .action-text{text-decoration:line-through;opacity:.65;color:#2e7d32;}
.action-area-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 5px;}
.box{background:#fff;border-radius:14px;padding:1.5rem;border:1px solid #eee;text-align:center;margin-bottom:1rem;}
.box h3{font-size:15px;font-weight:700;margin-bottom:6px;}
.box p{font-size:12px;color:#666;line-height:1.5;margin-bottom:14px;}
.notes-ta{width:100%;padding:10px;font-size:12px;font-family:'Montserrat',sans-serif;border:1.5px solid #ddd;border-radius:8px;resize:vertical;min-height:80px;outline:none;line-height:1.6;}
</style>

function T(){return TX[_lang];}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function bul(arr){if(!arr||!arr.length)return'';return'<ul class="bullets">'+arr.map(function(x){return'<li>'+esc(x)+'</li>';}).join('')+'</ul>';}
function alts(arr){if(!arr||!arr.length)return'';return arr.map(function(a){return'<div class="alert-b">'+esc(a)+'</div>';}).join('');}
function pro(s){return'<div class="sec-b">'+esc(s||'')+'</div>';}
function sec(title,body){return'<div class="sec"><div class="sec-t">'+title+'</div>'+body+'</div>';}

function setLang(l){

  document.getElementById('lb-en').className='lb'+(l==='en'?' on':'');

function showTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('on');});
  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('on');});
  document.getElementById('tab-'+id).classList.add('on');
  if(btn)btn.classList.add('on');
}

function getAllActions(){
  var t=T();var d=_d;
  var all=[];
  var areaMap={'cv_acciones':t.cvArea,'linkedin_acciones':t.liArea,'networking_acciones':t.netArea};
  ['cv_acciones','linkedin_acciones','networking_acciones'].forEach(function(k){
    (d[k]||[]).forEach(function(text){all.push({area:areaMap[k],text:text});});
  });
  return all;
}

function toggleAction(idx){
  _actions[idx]=!_actions[idx];
  localStorage.setItem('actions_'+_email,JSON.stringify(_actions));
  // Re-render only the progreso tab
  var tab=document.getElementById('tab-progreso');
  if(tab){
    tab.innerHTML=buildProgresoHTML();
    buildNotes();
  }
}

function buildProgresoHTML(){
  var t=T();var d=_d;
  var allActions=getAllActions();
  var done=allActions.filter(function(a,i){return _actions[i];}).length;
  var pct=allActions.length?Math.round((done/allActions.length)*100):0;
  var html='';

  // SCORE CARDS
  html+='<div class="prog-card">'
    +'<h3 style="margin-bottom:4px;">Diagnóstico de tu perfil</h3>'
    +'<p>Completa acciones abajo para ver cómo mejoran tus áreas</p>'
    +'<div class="scores-grid">';
  (d.scores||[]).forEach(function(s){
    var base=Math.round(s.val);
    var areaKey='';
    if(s.label.indexOf('CV')>=0||s.label.indexOf('marca')>=0||s.label.indexOf('brand')>=0)areaKey=t.cvArea;
    else if(s.label.indexOf('LinkedIn')>=0)areaKey=t.liArea;
    else if(s.label.indexOf('Red')>=0||s.label.indexOf('Network')>=0||s.label.indexOf('contacto')>=0)areaKey=t.netArea;
    var areaActs=allActions.filter(function(a){return a.area===areaKey;});
    var areaDone=areaActs.filter(function(a,i){var ai=allActions.indexOf(a);return _actions[ai];}).length;
    var gain=areaActs.length>0?Math.round((areaDone/areaActs.length)*20):0;
    var cur=Math.min(100,base+gain);
    var diff=cur-base;
    var cl=cur>=70?'hi':cur>=45?'mid':'lo';
    var lbl=cur>=70?t.Destacado:cur>=45?t.EnProgreso:t.Inicial;
    var lblcl=cur>=70?'#4a7c5f':cur>=45?'#8C7B80':'#c0756e';
    html+='<div class="sc">'
      +'<div class="sc-l">'+esc(s.label)+'</div>'
      +'<div class="sc-p '+cl+'">'+cur+'%</div>'
      +'<div class="sc-tr"><div class="sc-fi fi-'+cl+'" style="width:'+cur+'%"></div></div>'
      +'<div class="sc-lbl" style="color:'+lblcl+';">'+lbl+'</div>'
      +(diff>0?'<div style="font-size:9px;color:#4a7c5f;margin-top:2px;">+'+diff+'%</div>':'')
      +'</div>';
  });
  html+='</div></div>';

  // CV UPLOAD
  html+='<div class="prog-card">'
    +'<h3 style="margin-bottom:4px;">Sube tu CV actualizado</h3>'
    +'<p>Cuando hayas mejorado tu CV, súbelo aquí para compararlo con el original.</p>'
    +'<label style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:#f9f8f8;border:1.5px dashed #ddd;border-radius:10px;cursor:pointer;font-size:12px;color:#666;">'
      +'<span style="font-size:20px;">📎</span>'

      +'<input type="file" accept=".pdf,.doc,.docx" style="display:none" onchange="handleCVUpload(this)">'
    +'</label>'
    +'<div id="cv-compare-result" style="margin-top:10px;"></div>'
  +'</div>';

  // PROGRESS BAR + ACTIONS
  html+='<div class="prog-card">'
    +'<h3>'+t.progT+'</h3><p>'+t.progD+'</p>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">'
      +'<div style="font-size:22px;font-weight:700;color:#8C7B80;">'+pct+'%</div>'
      +'<div style="font-size:11px;color:#999;">'+done+' de '+allActions.length+'</div>'
    +'</div>'
    +'<div style="height:5px;background:#eee;border-radius:3px;overflow:hidden;margin-bottom:14px;">'
      +'<div style="height:5px;background:#8C7B80;border-radius:3px;width:'+pct+'%;transition:width .5s;"></div>'
    +'</div>';

  var areas={};
  var areaColors={};
  areaColors[t.cvArea]='#4A7FA5';areaColors[t.liArea]='#1D4A35';areaColors[t.netArea]='#8C7B80';
  allActions.forEach(function(a,i){
    if(!areas[a.area])areas[a.area]=[];
    areas[a.area].push({text:a.text,idx:i});
  });
  Object.keys(areas).forEach(function(area){
    var color=areaColors[area]||'#8C7B80';
    html+='<div class="action-area-label" style="color:'+color+';">'+area+'</div>';
    areas[area].forEach(function(a){
      var checked=!!_actions[a.idx];
      var isPri=a.idx<3;
      html+='<div class="action-item'+(checked?' done':'')+'" onclick="toggleAction('+a.idx+')" style="'+(isPri&&!checked?'border-color:#f3c94b;background:#fffdf0;':'')+'">'

function buildNotes(){

  var ta=document.createElement('textarea');
  ta.className='notes-ta';
  ta.placeholder=t.notasPh;

  ta.onchange=function(){localStorage.setItem('notes_'+_email,this.value);};
  var hint=document.createElement('div');
  hint.style.cssText='font-size:11px;color:#aaa;margin-top:4px;';
  hint.textContent=t.notasAuto;
  nc.appendChild(ta);nc.appendChild(hint);
}

      +'<div style="font-size:12px;font-weight:700;color:#2e7d32;margin-bottom:4px;">CV recibido ✓</div>'

  var html='';

  // TABS

function init(){
  var p=new URLSearchParams(window.location.search);
  _email=p.get('email');
  _showCv=p.get('cv')==='1';
  if(!_email){
    document.getElementById('content').innerHTML='<div class="loading"><p>No se encontró tu perfil. Contacta con Micaela.</p></div>';
    return;
  }
  _actions=JSON.parse(localStorage.getItem('actions_'+_email)||'{}');
  Promise.all([
    fetch(SB+'/rest/v1/informes?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=*',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=*',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();})
  ]).then(function(res){
    var rows=res[0],cvRows=res[1];
    if(!Array.isArray(rows)||!rows.length){
      document.getElementById('content').innerHTML='<div class="loading"><p>Tu informe aún no está disponible.</p><p style="font-size:11px;color:#ccc;margin-top:6px;">mmicaela.jairedin@gmail.com</p></div>';
      return;
    }
    _d=JSON.parse(rows[0].data);
    _prev=rows[0].prev?JSON.parse(rows[0].prev):null;
    _cvData=Array.isArray(cvRows)&&cvRows.length?cvRows[0]:null;
    render();
  }).catch(function(e){
    document.getElementById('content').innerHTML='<div class="loading"><p>Error: '+e.message+'</p></div>';
  });
}

init();
</script>
