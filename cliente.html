<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu perfil profesional — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:2rem 1rem 4rem;}
.wrap{max-width:720px;margin:0 auto;}
.brand{text-align:center;margin-bottom:2rem;}
.brand-pill{display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:20px;padding:8px 20px;border:1px solid #eee;margin-bottom:1rem;}
.brand-dot{width:10px;height:10px;border-radius:50%;background:#8C7B80;}
.brand-name{font-size:13px;font-weight:600;}
.brand-title{font-size:11px;color:#999;}
.brand h1{font-size:20px;font-weight:700;margin-bottom:6px;}
.brand p{font-size:13px;color:#666;line-height:1.6;}
.loading{text-align:center;padding:4rem;color:#999;}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#8C7B80;margin:0 2px;animation:dp 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* TABS */
.tabs-nav{display:flex;gap:4px;margin-bottom:1.5rem;background:#fff;border-radius:12px;padding:6px;border:1px solid #eee;}
.tab-btn{flex:1;padding:10px;font-size:13px;font-weight:600;font-family:'Montserrat',sans-serif;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#666;transition:all .15s;}
.tab-btn.on{background:#8C7B80;color:#fff;}
.tab-content{display:none;}.tab-content.on{display:block;}

/* REPORT */
.report{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #eee;margin-bottom:1.5rem;}
.rhead{background:#8C7B80;padding:24px 28px;}
.rhead-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.rhead-brand-name{font-size:17px;font-weight:700;color:#fff;}
.rhead-brand-title{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px;}
.rhead-meta{text-align:right;color:#fff;}
.rhead-tag{font-size:9px;font-weight:600;opacity:.7;letter-spacing:.08em;text-transform:uppercase;}
.rhead-cand{font-size:14px;font-weight:700;margin-top:2px;}
.rhead-date{font-size:10px;opacity:.75;margin-top:1px;}
.rhead-welcome{font-size:13px;color:rgba(255,255,255,.9);line-height:1.5;border-top:1px solid rgba(255,255,255,.2);padding-top:12px;margin-top:4px;}
.rbody{padding:24px 28px;}
.scores-title{font-size:10px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.scores-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:20px;}
.score-card{background:#f9f8f8;border-radius:8px;padding:12px 6px;text-align:center;}
.sc-label{font-size:8px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;line-height:1.4;}
.sc-pct{font-size:20px;font-weight:700;line-height:1;}
.sc-pct.hi{color:#4a7c5f;}.sc-pct.mid{color:#8C7B80;}.sc-pct.lo{color:#c0756e;}
.sc-track{height:4px;background:#eee;border-radius:2px;margin-top:5px;overflow:hidden;}
.sc-fill{height:4px;border-radius:2px;}
.fill-hi{background:#4a7c5f;}.fill-mid{background:#8C7B80;}.fill-lo{background:#c0756e;}
.sc-sym{font-size:8px;font-weight:600;margin-top:3px;}
.sc-sym.hi{color:#4a7c5f;}.sc-sym.mid{color:#8C7B80;}.sc-sym.lo{color:#c0756e;}

/* PROGRESS */
.progress-section{background:#f3efef;border-radius:10px;padding:16px;margin-bottom:20px;border:1px solid #e0d8da;}
.progress-title{font-size:11px;font-weight:700;color:#6B5A5F;margin-bottom:12px;}
.prog-row{display:grid;grid-template-columns:110px 1fr 45px;align-items:center;gap:8px;margin-bottom:8px;}
.prog-label{font-size:11px;color:#666;font-weight:500;}
.prog-bars{display:flex;flex-direction:column;gap:3px;}
.prog-bar-wrap{display:flex;align-items:center;gap:5px;}
.prog-bar-bg{flex:1;height:4px;background:#e5e0e1;border-radius:2px;overflow:hidden;}
.prog-bar-fill{height:4px;border-radius:2px;}
.bar-before{background:#c9bbbe;}.bar-after{background:#8C7B80;}
.prog-bar-num{font-size:9px;font-weight:600;min-width:26px;text-align:right;}
.prog-change{font-size:11px;font-weight:700;text-align:right;}
.prog-change.up{color:#4a7c5f;}.prog-change.same{color:#999;}.prog-change.down{color:#c0756e;}

.sec{margin-bottom:16px;}
.sec-title{font-size:10px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.sec-title::after{content:'';flex:1;height:1px;background:#f0ecec;}
.sec-body{font-size:12px;color:#2a2a2a;line-height:1.75;white-space:pre-wrap;}
.bullets{list-style:none;padding:0;}
.bullets li{font-size:12px;color:#2a2a2a;line-height:1.6;padding:5px 0 5px 16px;position:relative;border-bottom:0.5px solid #f5f1f1;}
.bullets li:last-child{border-bottom:none;}
.bullets li::before{content:'';position:absolute;left:0;top:12px;width:5px;height:5px;border-radius:50%;background:#8C7B80;}
.motivador{background:#f3efef;border-radius:10px;padding:14px 16px;font-size:13px;color:#4a3a3e;line-height:1.65;font-style:italic;border-left:3px solid #8C7B80;}
.rfooter{background:#f9f8f8;border-top:1px solid #ece8e8;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;}
.rfooter-brand{font-size:10px;font-weight:600;color:#8C7B80;}
.rfooter-note{font-size:9px;color:#aaa;}

/* CV SECTION */
.cv-locked{background:#fff;border-radius:16px;border:1.5px dashed #D4C5C8;padding:2rem;text-align:center;margin-bottom:1.5rem;}
.cv-locked h3{font-size:16px;font-weight:700;margin-bottom:8px;}
.cv-locked p{font-size:13px;color:#666;line-height:1.6;margin-bottom:16px;}
.price-tag{display:inline-block;background:#f3efef;color:#4A3A3E;font-size:14px;font-weight:700;padding:8px 20px;border-radius:20px;margin-bottom:16px;}
.code-input-wrap{display:flex;gap:8px;justify-content:center;margin-top:12px;}
.code-input{width:120px;padding:10px;font-size:16px;font-family:'Montserrat',sans-serif;border:1.5px solid #ddd;border-radius:8px;text-align:center;letter-spacing:.2em;font-weight:600;outline:none;}
.code-input:focus{border-color:#8C7B80;}
.cv-content{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #eee;margin-bottom:1.5rem;}
.cv-body{padding:28px 32px;font-size:13px;line-height:1.8;color:#2a2a2a;white-space:pre-wrap;word-break:break-word;}

/* COMPARISON */
.comparison{background:#fff;border-radius:16px;border:1px solid #eee;padding:1.5rem;margin-bottom:1.5rem;}
.comp-title{font-size:12px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem;}
.comp-row{display:grid;grid-template-columns:120px 1fr 60px;align-items:center;gap:10px;margin-bottom:10px;}
.comp-label{font-size:12px;color:#666;font-weight:500;}
.comp-bars{display:flex;flex-direction:column;gap:4px;}
.comp-bar-wrap{display:flex;align-items:center;gap:8px;}
.comp-bar-bg{flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden;}
.comp-bar-fill{height:6px;border-radius:3px;transition:width .8s ease;}
.bar-old{background:#D4C5C8;}.bar-new{background:#8C7B80;}
.comp-pct{font-size:10px;font-weight:600;min-width:30px;text-align:right;}
.comp-change{font-size:13px;font-weight:700;text-align:right;}
.comp-change.up{color:#4a7c5f;}.comp-change.same{color:#999;}
.comp-legend{display:flex;gap:16px;margin-top:8px;font-size:11px;color:#666;}
.comp-legend span{display:flex;align-items:center;gap:5px;}
.comp-legend-dot{width:10px;height:4px;border-radius:2px;}

/* BOTTOM BOXES */
.box{background:#fff;border-radius:14px;padding:1.5rem;border:1px solid #eee;text-align:center;margin-bottom:1rem;}
.box h3{font-size:15px;font-weight:700;margin-bottom:6px;}
.box p{font-size:12px;color:#666;line-height:1.5;margin-bottom:14px;}
.btn-wa{display:inline-block;padding:11px 24px;font-size:13px;font-weight:600;font-family:'Montserrat',sans-serif;background:#8C7B80;color:#fff;border-radius:10px;text-decoration:none;}
.service-box{border:1.5px solid #D4C5C8;background:#fdf9f9;}
.service-badge{display:inline-block;background:#8C7B80;color:#fff;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;margin-bottom:10px;letter-spacing:.06em;text-transform:uppercase;}
.revolut-link{font-size:13px;font-weight:700;color:#8C7B80;display:block;margin:8px 0;}

@media(max-width:520px){.scores-grid{grid-template-columns:1fr 1fr;}.rhead-top{flex-direction:column;gap:8px;}.rhead-meta{text-align:left;}.comp-row{grid-template-columns:90px 1fr 50px;}}
@media print{
  body{background:#fff;padding:0;}
  .brand{display:none;}.tabs-nav{display:none;}.tab-content{display:block!important;}
  .cv-locked{display:none;}.box{display:none;}.service-box{display:none;}
  .rhead{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .score-card{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .progress-section{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .motivador{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .comparison{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  @page{margin:1cm;size:A4;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-pill">
      <div class="brand-dot"></div>
      <div><div class="brand-name">Micaela Jairedin</div><div class="brand-title">Career Coach & Recruiter</div></div>
    </div>
    <h1 id="page-title">Tu perfil profesional</h1>
    <p id="page-sub">Aquí encontrarás tu análisis y seguimiento personalizado.</p>
  </div>

  <div id="content">
    <div class="loading"><div class="dots"><span></span><span></span><span></span></div><p style="margin-top:12px;">Cargando tu perfil...</p></div>
  </div>
</div>

<script>
const SB_URL='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';

let _d=null,_prev=null,_cvData=null,_email=null;

function imprimirInforme(){
  // Hide CV and service boxes temporarily for printing
  var tabs=document.querySelectorAll('.tab-btn');
  var tabContents=document.querySelectorAll('.tab-content');
  // Make sure informe tab is active then print
  document.querySelectorAll('.tab-content').forEach(function(t){t.style.display='none';});
  var inf=document.getElementById('tab-informe');
  if(inf) inf.style.display='block';
  window.print();
  // Restore after print
  setTimeout(function(){
    document.querySelectorAll('.tab-content').forEach(function(t){t.style.display='';});
    renderAll();
  },1000);
}

async function init(){
  const params=new URLSearchParams(window.location.search);
  _email=params.get('email');
  if(!_email){showError('No se encontr\u00f3 tu perfil. Contacta con Micaela.');return;}

  try{
    const [rInf,rCv]=await Promise.all([
      fetch(SB_URL+'/rest/v1/informes?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&select=*',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}),
      fetch(SB_URL+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=*',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}})
    ]);
    const rows=await rInf.json();
    const cvRows=await rCv.json();

    if(!rows||!rows.length){showError('Tu informe a\u00fan no est\u00e1 disponible. Micaela lo publicar\u00e1 pronto.');return;}

    _d=JSON.parse(rows[0].data);
    _prev=rows[0].prev?JSON.parse(rows[0].prev):null;
    _cvData=cvRows&&cvRows.length?cvRows[0]:null;

    document.getElementById('page-title').textContent='Tu perfil profesional, '+(_d.candidato||'');
    renderAll();
  }catch(e){
    showError('Error al cargar. Int\u00e9ntalo de nuevo.');
  }
}

function showError(msg){
  document.getElementById('content').innerHTML='<div class="report"><div class="rbody" style="text-align:center;padding:3rem;"><p style="font-size:14px;color:#999;">'+msg+'</p><p style="font-size:12px;color:#ccc;margin-top:8px;">mmicaela.jairedin@gmail.com</p></div></div>';
}

function renderAll(){
  const hasCV=!!_cvData;
  const hasPrev=!!(_prev&&_prev.scores&&_prev.scores.length);
  const cvUnlocked=hasCV&&checkCode();

  let html='';

  // TABS
  html+='<div class="tabs-nav">'
    +'<button class="tab-btn on" onclick="showTab(\'informe\',this)">Mi informe</button>'
    +(hasCV?'<button class="tab-btn" onclick="showTab(\'cv\',this)">Mi CV optimizado</button>':'')
    +(hasPrev?'<button class="tab-btn" onclick="showTab(\'progreso\',this)">Mi progreso</button>':'')
    +'</div>';

  // TAB INFORME
  html+='<div class="tab-content on" id="tab-informe">';
  html+=renderInforme();
  html+='</div>';

  // TAB CV
  if(hasCV){
    html+='<div class="tab-content" id="tab-cv">';
    if(cvUnlocked){
      html+=renderCV();
    } else {
      html+=renderCVLocked();
    }
    html+='</div>';
  }

  // TAB PROGRESO
  if(hasPrev){
    html+='<div class="tab-content" id="tab-progreso">';
    html+=renderProgreso();
    html+='</div>';
  }

  // BOTTOM BOXES
  html+='<div class="box"><h3>\u00bfTienes preguntas?</h3><p>Escr\u00edbeme directamente y te respondo.</p>'
    +'<a href="https://wa.me/34611256224?text=Hola%20Micaela%2C%20tengo%20una%20consulta%20sobre%20mi%20informe." class="btn-wa" target="_blank">Escribir por WhatsApp</a></div>';

  if(!cvUnlocked&&hasCV){
    html+=renderServiceBox();
  } else if(!hasCV){
    html+=renderServiceBox();
  }

  document.getElementById('content').innerHTML=html;
}

function showTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+id).classList.add('on');
  btn.classList.add('on');
}

function checkCode(){
  const stored=localStorage.getItem('cv_code_'+_email);
  if(!stored||!_cvData) return false;
  return stored===_cvData.codigo;
}

function unlockCV(){
  const code=document.getElementById('code-inp').value.trim().toUpperCase();
  if(!_cvData||!_cvData.codigo){alert('No hay CV disponible a\u00fan.');return;}
  if(code===_cvData.codigo.toUpperCase()){
    localStorage.setItem('cv_code_'+_email,_cvData.codigo);
    renderAll();
    setTimeout(()=>{
      const cvBtn=document.querySelector('.tab-btn:nth-child(2)');
      if(cvBtn)cvBtn.click();
    },100);
  } else {
    document.getElementById('code-err').textContent='C\u00f3digo incorrecto. Verifica el mensaje de Micaela.';
  }
}

function renderInforme(){
  const d=_d;
  function sc(arr){
    return arr.map(s=>{
      const pct=Math.min(100,Math.max(0,Math.round(s.val)));
      const cl=pct>=70?'hi':pct>=45?'mid':'lo';
      const sym=pct>=70?'Muy bien':pct>=45?'En proceso':'Por trabajar';
      return '<div class="score-card"><div class="sc-label">'+s.label+'</div>'
        +'<div class="sc-pct '+cl+'">'+pct+'%</div>'
        +'<div class="sc-track"><div class="sc-fill fill-'+cl+'" style="width:'+pct+'%"></div></div>'
        +'<div class="sc-sym '+cl+'">'+sym+'</div></div>';
    }).join('');
  }
  function bul(arr){if(!arr||!arr.length)return '';return '<ul class="bullets">'+arr.map(x=>'<li>'+x+'</li>').join('')+'</ul>';}
  function pro(t){return '<div class="sec-body">'+(t||'')+'</div>';}

  return '<div class="report">'
    +'<div class="rhead"><div class="rhead-top">'
      +'<div><div class="rhead-brand-name">Micaela Jairedin</div><div class="rhead-brand-title">Career Coach & Recruiter</div></div>'
      +'<div class="rhead-meta"><div class="rhead-tag">Informe de perfil</div><div class="rhead-cand">'+(d.candidato||'')+'</div><div class="rhead-date">'+(d.fecha||new Date().toLocaleDateString('es-ES'))+'</div></div>'
    +'</div>'+(d.mensaje_candidato?'<div class="rhead-welcome">'+d.mensaje_candidato+'</div>':'')+'</div>'
    +'<div class="rbody">'
      +'<div class="scores-title">Diagn\u00f3stico de tu perfil</div>'
      +'<div class="scores-grid">'+sc(d.scores||[])+'</div>'
      +'<div class="sec"><div class="sec-title">Tu situaci\u00f3n</div>'+pro(d.resumen)+'</div>'
      +'<div class="sec"><div class="sec-title">Tus fortalezas</div>'+bul(d.fortalezas)+'</div>'
      +'<div class="sec"><div class="sec-title">\u00c1reas de mejora</div>'+bul(d.gaps)+'</div>'
      +'<div class="sec"><div class="sec-title">El mercado en 2025</div>'+pro(d.mercado)+'</div>'
      +'<div class="sec"><div class="sec-title">Estrategia recomendada</div>'+pro(d.estrategia)+'</div>'
      +'<div class="sec"><div class="sec-title">Acciones para tu CV</div>'+bul(d.cv_acciones)+'</div>'
      +'<div class="sec"><div class="sec-title">Acciones para tu LinkedIn</div>'+bul(d.linkedin_acciones)+'</div>'
      +'<div class="sec"><div class="sec-title">Acciones de networking</div>'+bul(d.networking_acciones)+'</div>'
    +'</div>'
    +'<div class="rfooter"><div class="rfooter-brand">Micaela Jairedin \u00b7 Career Coach & Recruiter</div><div style="display:flex;align-items:center;gap:10px;"><div class="rfooter-note">Informe personalizado \u00b7 Confidencial</div><button onclick="imprimirInforme()" style="font-size:11px;font-family:Montserrat,sans-serif;font-weight:600;background:#8C7B80;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;">Descargar PDF</button></div></div>'
    +'</div>';
}

function renderCV(){
  var cvUrl=BASE+'/cv.html?email='+encodeURIComponent(_email)+(_cvData&&_cvData.codigo?'&code='+_cvData.codigo:'');
  return '<div style="background:#fff;border-radius:14px;border:1px solid #eee;padding:24px;text-align:center;margin-bottom:1.5rem;">'
    +'<div style="font-size:36px;margin-bottom:12px;">&#128196;</div>'
    +'<h3 style="font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:6px;">Tu CV optimizado est\u00e1 listo</h3>'
    +'<p style="font-size:13px;color:#666;line-height:1.6;margin-bottom:16px;">Micaela ha preparado tu CV adaptado al mercado europeo y optimizado para ATS. Abre el CV en una p\u00e1gina propia para verlo con dise\u00f1o completo y descargarlo como PDF.</p>'
    +'<a href="'+cvUrl+'" target="_blank" class="btn-wa" style="display:inline-block;text-decoration:none;">Ver y descargar mi CV &rarr;</a>'
    +'</div>';
}


function renderCVLocked(){
  return '<div class="cv-locked">'
    +'<div style="font-size:40px;margin-bottom:12px;">&#128274;</div>'
    +'<h3>Tu CV optimizado est\u00e1 listo</h3>'
    +'<p>Micaela ha preparado tu CV adaptado al mercado europeo y optimizado para ATS.<br>Introduce el c\u00f3digo que te envi\u00f3 por WhatsApp para acceder.</p>'
    +'<div class="code-input-wrap">'
      +'<input class="code-input" id="code-inp" type="text" maxlength="6" placeholder="XXXXXX" style="text-transform:uppercase;">'
      +'<button onclick="unlockCV()" style="padding:10px 18px;font-size:13px;font-weight:600;font-family:Montserrat,sans-serif;background:#8C7B80;color:#fff;border:none;border-radius:8px;cursor:pointer;">Acceder</button>'
    +'</div>'
    +'<p id="code-err" style="font-size:12px;color:#c0756e;margin-top:8px;min-height:16px;"></p>'
    +'</div>';
}

function renderProgreso(){
  const d=_d;const prev=_prev;
  return '<div class="comparison">'
    +'<div class="comp-title">Tu progreso \u2014 Comparativa de sesiones</div>'
    +'<div class="comp-legend">'
      +'<span><div class="comp-legend-dot bar-old"></div>Antes</span>'
      +'<span><div class="comp-legend-dot bar-new"></div>Ahora</span>'
    +'</div><br>'
    +d.scores.map(s=>{
      const cur=Math.round(s.val);
      const prevS=prev.scores.find(ps=>ps.label===s.label);
      const pre=prevS?Math.round(prevS.val):0;
      const diff=cur-pre;
      const cl=diff>0?'up':diff<0?'down':'same';
      return '<div class="comp-row">'
        +'<div class="comp-label">'+s.label+'</div>'
        +'<div class="comp-bars">'
          +'<div class="comp-bar-wrap"><div class="comp-bar-bg"><div class="comp-bar-fill bar-old" style="width:'+pre+'%"></div></div><div class="comp-pct" style="color:#999;">'+pre+'%</div></div>'

        +'<div class="comp-change '+cl+'">'+(diff>0?'+':'')+diff+'%</div>'
        +'</div>';
    }).join('')

}
