<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:0 0 5rem;}
.wrap{max-width:720px;margin:0 auto;padding:2rem 1rem;}
.brand{text-align:center;margin-bottom:2rem;}
.bp{display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:20px;padding:8px 20px;border:1px solid #eee;margin-bottom:.8rem;}
.bd{width:10px;height:10px;border-radius:50%;background:#8C7B80;}
.bn{font-size:13px;font-weight:600;}
.bt{font-size:11px;color:#999;}
.lb-bar{display:inline-flex;gap:4px;background:#fff;border-radius:20px;padding:4px;border:1px solid #eee;}
.lb{padding:4px 14px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;border:none;border-radius:16px;cursor:pointer;background:transparent;color:#999;}
.lb.on{background:#8C7B80;color:#fff;}
.loading{text-align:center;padding:4rem;color:#999;}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#8C7B80;margin:0 2px;animation:dp 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.tabs-nav{display:flex;gap:4px;margin-bottom:1.5rem;background:#fff;border-radius:12px;padding:6px;border:1px solid #eee;}
.tab-btn{flex:1;padding:10px 6px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#666;transition:all .15s;}
.tab-btn.on{background:#8C7B80;color:#fff;}
.tab-content{display:none;}.tab-content.on{display:block;}
/* WELCOME */
.welcome{background:linear-gradient(135deg,#8C7B80,#6B5A5F);border-radius:14px;padding:1.5rem 1.75rem;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.welcome::after{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.06);}
.welcome-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;}
.welcome-msg{font-size:14px;color:#fff;line-height:1.7;font-style:italic;}
.welcome-author{margin-top:12px;display:flex;align-items:center;gap:8px;}
.welcome-av{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.welcome-name{font-size:12px;color:rgba(255,255,255,.85);font-weight:600;}
/* PROFILE SUMMARY */
.summary-bar{background:#f9f8f8;border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.summary-nicho{flex:1;min-width:180px;}
.summary-nicho-label{font-size:10px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.summary-nicho-text{font-size:13px;color:#1a1a1a;line-height:1.5;font-weight:500;}
.score-chips{display:flex;gap:8px;flex-wrap:wrap;}
.score-chip{text-align:center;border-radius:8px;padding:8px 12px;}
.score-chip-n{font-size:16px;font-weight:700;}
.score-chip-l{font-size:9px;color:#666;margin-top:2px;max-width:60px;line-height:1.3;}
/* REPORT */
.report{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #eee;margin-bottom:1.5rem;}
.rhead{background:#8C7B80;padding:20px 24px;}
.rhead-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.rh-name{font-size:15px;font-weight:700;color:#fff;}
.rh-title{font-size:10px;color:rgba(255,255,255,.8);margin-top:2px;}
.rh-meta{text-align:right;color:#fff;}
.rh-cand{font-size:13px;font-weight:700;}
.rh-date{font-size:10px;opacity:.75;margin-top:2px;}
.rbody{padding:20px 24px;}
.scores-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px;}
@media(max-width:500px){.scores-grid{grid-template-columns:repeat(2,1fr);}}
.sc{background:#f9f8f8;border-radius:8px;padding:12px 6px;text-align:center;}
.sc-l{font-size:8px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;line-height:1.4;}
.sc-p{font-size:20px;font-weight:700;line-height:1;}
.sc-p.hi{color:#4a7c5f;}.sc-p.mid{color:#8C7B80;}.sc-p.lo{color:#c0756e;}
.sc-tr{height:4px;background:#eee;border-radius:2px;margin-top:5px;overflow:hidden;}
.sc-fi{height:4px;border-radius:2px;}
.fi-hi{background:#4a7c5f;}.fi-mid{background:#8C7B80;}.fi-lo{background:#c0756e;}
.sc-lbl{font-size:8px;font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:.04em;}
.sec{margin-bottom:16px;}
.sec-t{font-size:10px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.sec-t::after{content:'';flex:1;height:1px;background:#f0ecec;}
.sec-b{font-size:12px;color:#2a2a2a;line-height:1.75;white-space:pre-wrap;}
.bullets{list-style:none;padding:0;}
.bullets li{font-size:12px;color:#2a2a2a;line-height:1.6;padding:5px 0 5px 16px;position:relative;border-bottom:.5px solid #f5f1f1;}
.bullets li:last-child{border-bottom:none;}
.bullets li::before{content:'';position:absolute;left:0;top:12px;width:5px;height:5px;border-radius:50%;background:#8C7B80;}
.opp-note{background:#f0f7f0;border-radius:8px;padding:10px 12px;border-left:3px solid #4a7c5f;margin-bottom:8px;font-size:12px;color:#555;line-height:1.5;}
.rfooter{background:#f9f8f8;border-top:1px solid #ece8e8;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.rfooter-brand{font-size:10px;font-weight:600;color:#8C7B80;}
/* CV */
.service-box{background:#fff;border-radius:14px;border:1.5px solid #D4C5C8;padding:1.5rem;text-align:center;margin-bottom:1rem;}
.srv-badge{display:inline-block;background:#8C7B80;color:#fff;font-size:10px;font-weight:700;padding:3px 14px;border-radius:20px;margin-bottom:12px;letter-spacing:.06em;text-transform:uppercase;}
.service-box h3{font-size:16px;font-weight:700;margin-bottom:6px;}
.service-box p{font-size:13px;color:#666;line-height:1.6;margin-bottom:8px;}
.wa-btn{display:inline-block;padding:12px 28px;font-size:13px;font-weight:600;font-family:'Montserrat',sans-serif;background:#8C7B80;color:#fff;border-radius:10px;text-decoration:none;}
/* PROGRESS */
.prog-card{background:#fff;border-radius:14px;border:1px solid #eee;padding:1.5rem;margin-bottom:1rem;}
.prog-card h3{font-size:13px;font-weight:700;margin-bottom:4px;}
.prog-card p{font-size:12px;color:#666;margin-bottom:12px;}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;margin-bottom:5px;border-radius:8px;cursor:pointer;border:1px solid #eee;background:#fafafa;transition:all .15s;}
.action-item.done{border-color:#c5dac5;background:#f0f7f0;}
.action-check{width:18px;height:18px;border-radius:50%;border:2px solid #ddd;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s;}
.action-item.done .action-check{border-color:#4a7c5f;background:#4a7c5f;}
.action-text{font-size:12px;color:#1a1a1a;line-height:1.5;}
.action-item.done .action-text{text-decoration:line-through;opacity:.65;color:#2e7d32;}
.action-area-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 5px;}
.notes-area{width:100%;padding:10px;font-size:12px;font-family:'Montserrat',sans-serif;border:1.5px solid #ddd;border-radius:8px;resize:vertical;min-height:80px;outline:none;line-height:1.6;}
.notes-area:focus{border-color:#8C7B80;}
/* CV upload */
.cv-upload-label{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#f9f8f8;border:1.5px dashed #ddd;border-radius:10px;cursor:pointer;font-size:12px;color:#666;transition:.15s;}
.cv-upload-label:hover{border-color:#8C7B80;}
/* BOX */
.box{background:#fff;border-radius:14px;padding:1.5rem;border:1px solid #eee;text-align:center;margin-bottom:1rem;}
.box h3{font-size:15px;font-weight:700;margin-bottom:6px;}
.box p{font-size:12px;color:#666;line-height:1.5;margin-bottom:14px;}
</style>
</head>

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://mmicaelajairedin-ui.github.io/analisisform';
var _d=null,_prev=null,_cvData=null,_email=null,_lang='es',_showCv=false,_actions={};

var TX={
  es:{title:'Tu perfil profesional',sub:'Aquí encontrarás tu análisis y seguimiento personalizado.',
    t1:'Mi informe',t2:'Mi CV optimizado',t3:'Mi progreso',
    s1:'Tu situación',s2:'Tus fortalezas',s3:'Tus oportunidades de mejora',
    s4:'El mercado en 2025',s5:'Estrategia recomendada',
    s6:'Acciones para tu CV',s7:'Acciones para tu LinkedIn',s8:'Acciones de networking',

    notasT:'Mis notas',notasD:'Anota aquí tus avances, dudas o preguntas para la próxima sesión.',
    notasPh:'Escribe aquí...',notasGuardado:'✓ Guardado',
    cvArea:'CV y marca personal',liArea:'LinkedIn',netArea:'Red de contactos',

  en:{title:'Your professional profile',sub:'Here you will find your personalized analysis and follow-up.',
    t1:'My report',t2:'My optimized CV',t3:'My progress',
    s1:'Your situation',s2:'Your strengths',s3:'Your growth opportunities',
    s4:'The market in 2025',s5:'Recommended strategy',
    s6:'Actions for your CV',s7:'Actions for your LinkedIn',s8:'Networking actions',
    wa:'Message on WhatsApp',serv:'Extra service',servT:'CV optimization by Micaela',
    servD:'Micaela will rewrite your CV adapted to the European market and ATS-ready.',
    precio:'Price: €30',p1:'Step 1 — Pay on Revolut:',p2:'Step 2 — Message me on WhatsApp with the receipt.',
    pagarBtn:'I have paid — request my CV',
    progT:'My actions',progD:'Check off what you are doing to see your progress in real time',
    notasT:'My notes',notasD:'Write your progress, questions or notes for the next session.',
    notasPh:'Write here...',notasGuardado:'✓ Saved',
    cvArea:'CV & personal brand',liArea:'LinkedIn',netArea:'Network',
    empieza:'⚡ Start here',iniciado:'Initial',enprogreso:'In progress',destacado:'Standout',
    ahora:'Now',meta:'With actions'}
};

function T(){return TX[_lang];}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function bul(arr){if(!arr||!arr.length)return'';return'<ul class="bullets">'+arr.map(function(x){return'<li>'+esc(x)+'</li>';}).join('')+'</ul>';}
function pro(s){return'<div class="sec-b">'+esc(s||'')+'</div>';}
function sec(title,body){return'<div class="sec"><div class="sec-t">'+title+'</div>'+body+'</div>';}

function setLang(l){
  _lang=l;
  document.getElementById('lb-es').className='lb'+(l==='es'?' on':'');
  document.getElementById('lb-en').className='lb'+(l==='en'?' on':'');
  if(_d)render();
}

function showTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('on');});
  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('on');});
  var tab=document.getElementById('tab-'+id);
  if(tab)tab.classList.add('on');
  if(btn)btn.classList.add('on');
}

function getAllActions(){
  var t=T();
  var all=[];
  var map={'cv_acciones':t.cvArea,'linkedin_acciones':t.liArea,'networking_acciones':t.netArea};
  ['cv_acciones','linkedin_acciones','networking_acciones'].forEach(function(k){
    (_d[k]||[]).forEach(function(txt){all.push({area:map[k],text:txt});});
  });
  return all;
}

function toggleAction(idx){
  if(!_d)return;
  _actions[idx]=!_actions[idx];
  localStorage.setItem('actions_'+_email,JSON.stringify(_actions));
  updateProgress();
  // Save to Supabase
  clearTimeout(window._actTimer);
  window._actTimer=setTimeout(function(){
    fetch(SB+'/rest/v1/candidatos?email=eq.'+encodeURIComponent(_email),{
      method:'PATCH',
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({acciones_progreso:JSON.stringify(_actions)})
    }).catch(function(){});
  },1000);
}

function updateProgress(){
  var t=T();
  var allActions=getAllActions();
  var done=allActions.filter(function(a,i){return _actions[i];}).length;
  var pct=allActions.length?Math.round((done/allActions.length)*100):0;

  // Update progress bar
  var pb=document.getElementById('prog-bar-fill');
  var pp=document.getElementById('prog-pct');
  var pc=document.getElementById('prog-count');
  if(pb)pb.style.width=pct+'%';
  if(pp)pp.textContent=pct+'%';
  if(pc)pc.textContent=done+' de '+allActions.length;

  // Update score cards
  (_d.scores||[]).forEach(function(s,si){
    var base=Math.round(s.val);
    var areaKey='';
    if(s.label.indexOf('CV')>=0||s.label.indexOf('marca')>=0||s.label.indexOf('brand')>=0)areaKey=t.cvArea;
    else if(s.label.indexOf('LinkedIn')>=0)areaKey=t.liArea;
    else if(s.label.indexOf('Red')>=0||s.label.indexOf('contacto')>=0||s.label.indexOf('Network')>=0)areaKey=t.netArea;
    var areaActs=allActions.filter(function(a){return a.area===areaKey;});
    var areaDone=areaActs.filter(function(a,ai){
      var globalIdx=allActions.indexOf(a);
      return _actions[globalIdx];
    }).length;
    var gain=areaActs.length>0?Math.round((areaDone/areaActs.length)*20):0;
    var cur=Math.min(100,base+gain);
    var diff=cur-base;
    var cl=cur>=70?'#4a7c5f':cur>=45?'#8C7B80':'#c0756e';

    var card=document.getElementById('score-card-'+si);
    if(!card)return;
    var curEl=card.querySelector('.sc-cur');
    var fillEl=card.querySelector('.sc-fill');
    var diffEl=card.querySelector('.sc-diff');
    var cntEl=card.querySelector('.sc-cnt');
    if(curEl){curEl.textContent=cur+'%';curEl.style.color=cl;}
    if(fillEl){fillEl.style.width=cur+'%';fillEl.style.background=cl;}
    if(diffEl){diffEl.textContent=diff>0?'+'+diff+'%':'';diffEl.style.display=diff>0?'inline-block':'none';}
    if(cntEl)cntEl.textContent=areaDone+'/'+areaActs.length;
  });

  // Update action items
  allActions.forEach(function(a,i){
    var el=document.getElementById('action-'+i);
    if(!el)return;
    var checked=!!_actions[i];
    el.className='action-item'+(checked?' done':'');
    var isPri=i<3;
    if(isPri&&!checked){el.style.borderColor='#f3c94b';el.style.background='#fffdf0';}
    else if(checked){el.style.borderColor='';el.style.background='';}
    else{el.style.borderColor='';el.style.background='';}
    var chk=el.querySelector('.action-check');
    if(chk)chk.innerHTML=checked?'<svg width="9" height="7" viewBox="0 0 9 7"><polyline points="1 3.5 3 5.5 8 1" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>':'';
    var txt=el.querySelector('.action-text');
    if(txt){txt.style.textDecoration=checked?'line-through':'none';txt.style.opacity=checked?'.65':'1';txt.style.color=checked?'#2e7d32':'#1a1a1a';}
  });
}

var _noteTimer=null;

function handleCVUpload(inp){
  if(!inp.files||!inp.files[0])return;
  var lbl=document.getElementById('cv-upload-label');
  var res=document.getElementById('cv-upload-result');
  if(lbl)lbl.textContent=inp.files[0].name+' ✓';
  if(res)res.innerHTML='<div style="background:#f0f7f0;border-radius:8px;padding:10px 14px;margin-top:8px;font-size:12px;color:#2e7d32;border:1px solid #c5dac5;">CV recibido. Compártelo con Micaela por WhatsApp para revisarlo juntos.</div>';
}

function render(){
  if(!_d)return;
  var t=T();
  var d=_d;
  var hasCv=!!(_cvData&&_cvData.contenido);
  var allActions=getAllActions();
  var done=allActions.filter(function(a,i){return _actions[i];}).length;
  var pct=allActions.length?Math.round((done/allActions.length)*100):0;

  var html='';

  // TABS
  html+='<div class="tabs-nav">'
    +'<button class="tab-btn on" onclick="showTab(\'informe\',this)">'+t.t1+'</button>'
    +'<button class="tab-btn" onclick="showTab(\'cv\',this)">'+t.t2+'</button>'
    +'<button class="tab-btn" onclick="showTab(\'progreso\',this)">'+t.t3+'</button>'
    +'</div>';

  // ── TAB INFORME ──────────────────────────────
  html+='<div class="tab-content on" id="tab-informe">';

  // Welcome message
  if(d.mensaje_candidato){
    html+='<div class="welcome">'
      +'<div class="welcome-label">Mensaje de Micaela</div>'
      +'<div class="welcome-msg">&#8220;'+esc(d.mensaje_candidato)+'&#8221;</div>'
      +'<div class="welcome-author">'
        +'<div class="welcome-av">MJ</div>'
        +'<div class="welcome-name">Micaela Jairedin &middot; Career Coach</div>'
      +'</div>'
    +'</div>';
  }

  // Profile in 30 seconds
  if(d.nicho){
    html+='<div class="summary-bar">'
      +'<div class="summary-nicho">'
        +'<div class="summary-nicho-label">Tu perfil en 30 segundos</div>'
        +'<div class="summary-nicho-text">'+esc(d.nicho)+'</div>'
      +'</div>'
    +'</div>';
  }

  // Report card
  html+='<div class="report"><div class="rhead">'
    +'<div class="rhead-top">'
      +'<div><div class="rh-name">Micaela Jairedin</div><div class="rh-title">Career Coach &amp; Recruiter</div></div>'
      +'<div class="rh-meta"><div class="rh-cand">'+esc(d.candidato||'')+'</div><div class="rh-date">'+esc(d.fecha||'')+'</div></div>'
    +'</div>'
  +'</div>';

  html+='<div class="rbody">'
    +'<div class="scores-grid">'+d.scores.map(function(s){
      var p=Math.min(100,Math.max(0,Math.round(s.val)));
      var cl=p>=70?'hi':p>=45?'mid':'lo';
      var lbl=p>=70?t.destacado:p>=45?t.enprogreso:t.iniciado;
      var lblcl=p>=70?'#4a7c5f':p>=45?'#8C7B80':'#c0756e';
      return'<div class="sc"><div class="sc-l">'+esc(s.label)+'</div>'
        +'<div class="sc-p '+cl+'">'+p+'%</div>'
        +'<div class="sc-tr"><div class="sc-fi fi-'+cl+'" style="width:'+p+'%"></div></div>'
        +'<div class="sc-lbl" style="color:'+lblcl+';">'+lbl+'</div>'
      +'</div>';
    }).join('')+'</div>'
    +sec(t.s1,pro(d.resumen))
    +sec(t.s2,bul(d.fortalezas))

  +'</div>'

  html+='</div>';

  // ── TAB CV ───────────────────────────────────
  html+='<div class="tab-content" id="tab-cv">';

    html+='<div style="margin-bottom:1rem;">'

  } else {
    html+='<div class="service-box">'
      +'<div class="srv-badge">'+t.serv+'</div>'
      +'<h3>'+t.servT+'</h3><p>'+t.servD+'</p>'
      +'<div style="background:#f3efef;border-radius:8px;padding:12px;margin-bottom:14px;text-align:left;">'
        +'<div style="font-size:13px;font-weight:700;color:#4A3A3E;margin-bottom:4px;">'+t.precio+'</div>'
        +'<div style="font-size:12px;color:#666;line-height:1.6;">'+t.p1+'<br><span style="font-weight:700;color:#8C7B80;">revolut.me/micaelajl</span></div>'
        +'<div style="font-size:12px;color:#666;margin-top:4px;">'+t.p2+'</div>'
      +'</div>'
      +'<a href="https://wa.me/34611256224?text=Hola%20Micaela%2C%20acabo%20de%20pagar%2030%E2%82%AC%20en%20Revolut." class="wa-btn" target="_blank">'+t.pagarBtn+'</a>'
    +'</div>';
  }
  html+='</div>';

  // ── TAB PROGRESO ─────────────────────────────
  html+='<div class="tab-content" id="tab-progreso">';

  // Score cards before/after
  html+='<div class="prog-card">'
    +'<h3 style="margin-bottom:4px;">Tu diagn&oacute;stico</h3>'
    +'<p>Marca acciones abajo y ve c&oacute;mo mejoran tus &aacute;reas</p>';

  d.scores.forEach(function(s,si){
    var base=Math.round(s.val);
    var areaKey='';
    if(s.label.indexOf('CV')>=0||s.label.indexOf('marca')>=0||s.label.indexOf('brand')>=0)areaKey=t.cvArea;
    else if(s.label.indexOf('LinkedIn')>=0)areaKey=t.liArea;
    else if(s.label.indexOf('Red')>=0||s.label.indexOf('contacto')>=0||s.label.indexOf('Network')>=0)areaKey=t.netArea;
    var areaActs=allActions.filter(function(a){return a.area===areaKey;});
    var areaDone=areaActs.filter(function(a){
      var gi=allActions.indexOf(a);return _actions[gi];
    }).length;
    var gain=areaActs.length>0?Math.round((areaDone/areaActs.length)*20):0;
    var cur=Math.min(100,base+gain);
    var diff=cur-base;
    var cl=cur>=70?'#4a7c5f':cur>=45?'#8C7B80':'#c0756e';

    html+='<div id="score-card-'+si+'" style="margin-bottom:14px;padding-bottom:14px;border-bottom:.5px solid #eee;">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">'
        +'<div style="font-size:11px;font-weight:600;">'+esc(s.label)+'</div>'
        +'<div style="display:flex;align-items:center;gap:6px;">'
          +'<div style="font-size:11px;color:#aaa;">'+base+'%</div>'
          +'<div style="font-size:11px;color:#ccc;">&#8594;</div>'
          +'<div class="sc-cur" style="font-size:15px;font-weight:700;color:'+cl+';">'+cur+'%</div>'
          +'<div class="sc-diff" style="font-size:10px;font-weight:700;color:#4a7c5f;background:#e8f5e9;padding:2px 6px;border-radius:10px;display:'+(diff>0?'inline-block':'none')+';">+'+diff+'%</div>'
        +'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">'
        +'<div style="font-size:9px;color:#aaa;width:36px;text-align:right;">'+t.ahora+'</div>'
        +'<div style="flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden;">'
          +'<div style="height:5px;background:#D4C5C8;border-radius:3px;width:'+base+'%;"></div>'
        +'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px;">'
        +'<div style="font-size:9px;color:#4a7c5f;width:36px;text-align:right;font-weight:600;">'+t.meta+'</div>'
        +'<div style="flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden;">'
          +'<div class="sc-fill" style="height:5px;background:'+cl+';border-radius:3px;width:'+cur+'%;transition:width .6s;"></div>'
        +'</div>'
      +'</div>'
      +(areaActs.length>0?'<div style="font-size:10px;color:#999;margin-top:4px;"><span class="sc-cnt">'+areaDone+'/'+areaActs.length+'</span> acciones completadas en esta &aacute;rea</div>':'')
    +'</div>';
  });
  html+='</div>';

  // CV Upload
  html+='<div class="prog-card">'
    +'<h3 style="margin-bottom:4px;">Sube tu CV actualizado</h3>'
    +'<p>Cuando hayas mejorado tu CV, compártelo con Micaela para revisarlo juntos.</p>'
    +'<label class="cv-upload-label">'
      +'<span style="font-size:18px;">&#128196;</span>'
      +'<span id="cv-upload-label">Seleccionar CV (PDF o Word)</span>'
      +'<input type="file" accept=".pdf,.doc,.docx" style="display:none" onchange="handleCVUpload(this)">'
    +'</label>'
    +'<div id="cv-upload-result"></div>'
  +'</div>';

  // Progress bar + actions
  html+='<div class="prog-card">'
    +'<h3>'+t.progT+'</h3><p>'+t.progD+'</p>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">'
      +'<div id="prog-pct" style="font-size:22px;font-weight:700;color:#8C7B80;">'+pct+'%</div>'
      +'<div id="prog-count" style="font-size:11px;color:#999;">'+done+' de '+allActions.length+'</div>'
    +'</div>'
    +'<div style="height:5px;background:#eee;border-radius:3px;overflow:hidden;margin-bottom:16px;">'
      +'<div id="prog-bar-fill" style="height:5px;background:#8C7B80;border-radius:3px;width:'+pct+'%;transition:width .5s;"></div>'
    +'</div>';

  // Actions grouped by area
  var areas={};
  var areaColors={};
  areaColors[t.cvArea]='#4A7FA5';
  areaColors[t.liArea]='#1D4A35';
  areaColors[t.netArea]='#8C7B80';

  allActions.forEach(function(a,i){
    if(!areas[a.area])areas[a.area]=[];
    areas[a.area].push({text:a.text,idx:i});
  });

  Object.keys(areas).forEach(function(area){
    var color=areaColors[area]||'#8C7B80';
    var areaDoneCount=areas[area].filter(function(a){return _actions[a.idx];}).length;
    html+='<div class="action-area-label" style="color:'+color+';">'+area+' &nbsp;<span style="font-weight:400;color:#999;">'+areaDoneCount+'/'+areas[area].length+'</span></div>';
    areas[area].forEach(function(a,ai){
      var checked=!!_actions[a.idx];
      var isPri=a.idx<3;
      html+='<div class="action-item'+(checked?' done':'')+'" id="action-'+a.idx+'" onclick="toggleAction('+a.idx+')" '
        +'style="'+(isPri&&!checked?'border-color:#f3c94b;background:#fffdf0;':checked?'border-color:#c5dac5;background:#f0f7f0;':'')+'\">'
        +'<div class="action-check">'+(checked?'<svg width="9" height="7" viewBox="0 0 9 7"><polyline points="1 3.5 3 5.5 8 1" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>':'')+'</div>'
        +'<div style="flex:1;">'
          +(isPri&&!checked?'<div style="font-size:8px;font-weight:700;color:#92620a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;">'+t.empieza+'</div>':'')
          +'<div class="action-text">'+esc(a.text)+'</div>'
        +'</div>'
      +'</div>';
    });
  });
  html+='</div>';

  // Comparison (second session)
  

  // Notes
  html+='<div class="prog-card" id="notes-card"><h3>'+t.notasT+'</h3><p>'+t.notasD+'</p></div>';
  html+='</div>';

  // Bottom box
  html+='<div class="box"><h3>'+t.wa+'</h3><p>Escríbeme directamente y te respondo.</p>'
    +'<a href="https://wa.me/34611256224?text=Hola%20Micaela%2C%20tengo%20una%20consulta." class="wa-btn" target="_blank">'+t.wa+'</a></div>';

  document.getElementById('content').innerHTML=html;
  document.getElementById('page-title').textContent=t.title+(d.candidato?', '+d.candidato:'');
  document.getElementById('page-sub').textContent=t.sub;

  // Build notes textarea via DOM
  var nc=document.getElementById('notes-card');
  if(nc){
    var ta=document.createElement('textarea');
    ta.className='notes-area';
    ta.placeholder=t.notasPh;
    ta.value=localStorage.getItem('notes_'+_email)||'';
    ta.oninput=function(){
      localStorage.setItem('notes_'+_email,this.value);
      clearTimeout(_noteTimer);
      _noteTimer=setTimeout(function(){saveNote(ta.value);},2000);
    };
    var hint=document.createElement('div');
    hint.style.cssText='font-size:11px;color:#aaa;margin-top:4px;';
    hint.textContent='Guardado automáticamente';
    nc.appendChild(ta);
    nc.appendChild(hint);
  }
}

function init(){
  var p=new URLSearchParams(window.location.search);
  _email=p.get('email');
  _showCv=p.get('cv')==='1';
  if(!_email){
    document.getElementById('content').innerHTML='<div class="loading"><p>No se encontró tu perfil. Contacta con Micaela.</p></div>';
    return;
  }
  _actions=JSON.parse(localStorage.getItem('actions_'+_email)||'{}');

  Promise.all([
    fetch(SB+'/rest/v1/informes?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=*',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(_email)+'&order=created_at.desc&limit=1&select=*',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();})
  ]).then(function(res){
    var rows=res[0],cvRows=res[1];
    if(!Array.isArray(rows)||!rows.length){
      document.getElementById('content').innerHTML='<div class="loading"><p>Tu informe aún no está disponible.</p><p style="font-size:11px;color:#ccc;margin-top:6px;">mmicaela.jairedin@gmail.com</p></div>';
      return;
    }
    _d=JSON.parse(rows[0].data);
    _prev=rows[0].prev?JSON.parse(rows[0].prev):null;
    _cvData=Array.isArray(cvRows)&&cvRows.length?cvRows[0]:null;
    // Load saved actions from Supabase
    fetch(SB+'/rest/v1/candidatos?email=eq.'+encodeURIComponent(_email)+'&select=acciones_progreso&limit=1',{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    }).then(function(r){return r.ok?r.json():[];}).catch(function(){return[];}).then(function(rows2){
      if(rows2&&rows2.length&&rows2[0].acciones_progreso){
        try{_actions=JSON.parse(rows2[0].acciones_progreso);}catch(e){}
      }
      render();
    });
  }).catch(function(e){
    document.getElementById('content').innerHTML='<div class="loading"><p>Error: '+e.message+'</p></div>';
  });
}

init();
</script>
