<!-- Buscamos 5 coaches — formato cuadrado 1:1 (1080x1080) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#52B788" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#52B788" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#glow)"/>

  <!-- Logo Pathway arriba -->
  <g transform="translate(490, 110) scale(1.3)">
    <polygon points="10,82 32,52 54,82" fill="#52B788"/>
    <polygon points="34,82 58,28 82,82" fill="#FAFDF9"/>
    <circle cx="58" cy="22" r="5" fill="#E9C46A"/>
  </g>

  <!-- Eyebrow -->
  <text x="540" y="320"
        font-family="'Inter', Arial, sans-serif"
        font-size="22"
        font-weight="600"
        fill="#E9C46A"
        text-anchor="middle"
        letter-spacing="6">COMUNIDAD DE COACHES DE CARRERA</text>

  <!-- Headline grande -->
  <text x="540" y="450"
        font-family="'Fraunces', Georgia, serif"
        font-size="120"
        font-weight="500"
        fill="#FAFDF9"
        text-anchor="middle"
        letter-spacing="-3">Buscamos</text>
  <text x="540" y="590"
        font-family="'Fraunces', Georgia, serif"
        font-size="180"
        font-weight="600"
        fill="#E9C46A"
        text-anchor="middle"
        letter-spacing="-5">5 coaches</text>
  <text x="540" y="700"
        font-family="'Fraunces', Georgia, serif"
        font-size="72"
        font-weight="400"
        font-style="italic"
        fill="#FAFDF9"
        text-anchor="middle"
        letter-spacing="-2">de carrera.</text>

  <!-- Línea separadora -->
  <line x1="440" y1="780" x2="640" y2="780" stroke="#52B788" stroke-width="2"/>

  <!-- Subline -->
  <text x="540" y="850"
        font-family="'Inter', Arial, sans-serif"
        font-size="28"
        font-weight="400"
        fill="rgba(250,253,249,0.85)"
        text-anchor="middle">Una comunidad de coaches LATAM.</text>
  <text x="540" y="895"
        font-family="'Inter', Arial, sans-serif"
        font-size="28"
        font-weight="400"
        fill="rgba(250,253,249,0.85)"
        text-anchor="middle">1 encuentro al mes. Sin venta. Sin pitch.</text>

  <!-- Footer -->
  <text x="540" y="1010"
        font-family="'Inter', Arial, sans-serif"
        font-size="20"
        font-weight="600"
        fill="#52B788"
        text-anchor="middle"
        letter-spacing="3">PATHWAYCAREERCOACH.COM/COMUNIDAD</text>
</svg>
