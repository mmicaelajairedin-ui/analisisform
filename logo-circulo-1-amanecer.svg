<!-- Variante 1: Badge circular cálido con sol amanecer detrás de la montaña -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo circular cálido con gradient -->
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFF6D9"/>
      <stop offset="55%" stop-color="#F5EAB8"/>
      <stop offset="100%" stop-color="#E9C46A"/>
    </radialGradient>
    <linearGradient id="m1a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#74D29F"/>
      <stop offset="100%" stop-color="#52B788"/>
    </linearGradient>
    <linearGradient id="m1b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3F8862"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
  </defs>

  <!-- Fondo circular -->
  <circle cx="256" cy="256" r="256" fill="url(#bg1)"/>

  <!-- Sol amanecer (círculo amanecer detrás de la montaña) -->
  <circle cx="320" cy="200" r="58" fill="#FFD96B" opacity="0.9"/>

  <!-- Montaña pequeña (verde claro) -->
  <path d="M 110 380 L 200 220 L 260 320 Z" fill="url(#m1a)"/>

  <!-- Montaña grande (verde oscuro) -->
  <path d="M 200 380 L 320 170 L 420 380 Z" fill="url(#m1b)"/>

  <!-- Punta dorada al pico de la montaña grande -->
  <circle cx="320" cy="170" r="12" fill="#E9C46A"/>
</svg>
