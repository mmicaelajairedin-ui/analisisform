<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Panel Coach · Career Pathway</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">

<style>
/* ── DESIGN TOKENS (Tus colores originales con mejor contraste) ── */
:root {
  --accent: #8E7676;
  --accent-dark: #6B5656;
  --accent-light: #F9F7F7;
  --bg-main: #F2EEEE;
  --text-dark: #4A4444;
  --white: #ffffff;
  --radius: 12px;
  --shadow: 0 10px 25px rgba(142, 118, 118, 0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Open Sans', sans-serif;
  background: var(--bg-main);
  color: var(--text-dark);
  height: 100vh;
  overflow: hidden; /* CRUCIAL: Evita que el layout se rompa */
}

/* ── LAYOUT ESTRUCTURAL ── */
.app-container {
  display: grid;
  grid-template-columns: 300px 1fr;
  height: 100vh;
  width: 100vw;
}

/* SIDEBAR (Lista de Clientes) */
.sidebar {
  background: var(--white);
  border-right: 1px solid rgba(142, 118, 118, 0.2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 25px;
  border-bottom: 1px solid var(--bg-main);
  background: var(--accent);
  color: var(--white);
}

#client-list-container {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

/* CONTENIDO PRINCIPAL */
.main-content {
  overflow-y: auto;
  padding: 40px;
  background: var(--bg-main);
}

/* ── COMPONENTES VISUALES ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 30px;
  margin-bottom: 25px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(142, 118, 118, 0.1);
}

.section-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Botones con tus colores */
.btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s;
}

.btn:hover { background: var(--accent-dark); transform: translateY(-1px); }

/* Clientes en la lista */
.client-item {
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.2s;
}

.client-item:hover { background: var(--accent-light); }
.client-item.active {
  background: var(--accent-light);
  border-color: var(--accent);
}

/* Textareas para IA y Análisis */
textarea {
  width: 100%;
  border: 1px solid #D4BFBF;
  border-radius: 8px;
  padding: 15px;
  font-family: inherit;
  margin-top: 10px;
  min-height: 120px;
}

</style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2 style="font-family:'Montserrat'; font-size:18px;">Career Pathway</h2>
      <p style="font-size:12px; opacity:0.8;">Panel de Control Coach</p>
    </div>
    <div id="client-list-container">
      <p style="text-align:center; padding:20px; font-size:12px; color:#999;">Cargando clientes...</p>
    </div>
  </aside>

  <main class="main-content">
    
    <div style="margin-bottom:30px; display:flex; gap:10px;">
        <button class="btn" onclick="showView('nuevo')">+ Nuevo Cliente</button>
        <button class="btn" onclick="showView('analisis')">Análisis e IA</button>
        <button class="btn" onclick="showView('cv')">Generador de CV</button>
    </div>

    <section id="view-analisis" class="card">
      <h2 class="section-title">Análisis de Perfil IA</h2>
      <p style="font-size:14px; margin-bottom:15px;">Utiliza este módulo para procesar la información del cliente y generar la estrategia.</p>
      
      <div class="form-group">
        <label>Prompt para Análisis</label>
        <textarea id="ia-analysis-prompt" placeholder="Pega aquí los datos del cliente para que la IA analice su perfil..."></textarea>
      </div>
      
      <div style="margin-top:15px; display:flex; gap:10px;">
        <button class="btn" onclick="ejecutarAnalisisIA()">Generar Análisis</button>
        <button class="btn" style="background:#6B6060;" onclick="copiarAnalisis()">Copiar Resultado</button>
      </div>
    </section>

    <section id="view-cv" class="card" style="display:none;">
      <h2 class="section-title">Estructura de CV Optimizado</h2>
      <div id="cv-result-container">
         <textarea id="cv-final-text" style="height:400px;"></textarea>
      </div>
      <button class="btn" style="margin-top:15px;" onclick="guardarProgresoCV()">Guardar Trabajo</button>
    </section>

  </main>
</div>

<script>

</script>

</body>
</html>
