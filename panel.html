<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Coach · Career Pathway</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
/* ── DISEÑO PREMIUM CORREGIDO ── */
:root {
  --accent: #8E7676;
  --accent-dark: #766262;
  --accent-light: #F5EFEF;
  --bg: #F5F4F2;
  --white: #FFFFFF;
  --text: #4A4444;
  --border: #D1D1D1;
  --shadow: 0 4px 12px rgba(0,0,0,.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

.app-container { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }

/* BARRA LATERAL (Donde cargan los candidatos) */
.sidebar {
  background: linear-gradient(180deg, #8E7676 0%, #766262 100%);
  display: flex; flex-direction: column; color: white;
}
.sidebar-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); }

/* IMPORTANTE: Este ID 'clist' es el que usa tu script original */
#clist { flex: 1; overflow-y: auto; padding: 10px; } 

/* NAVEGACIÓN Y PESTAÑAS */
.main-view { display: flex; flex-direction: column; overflow: hidden; }
.tab-bar { 
  display: flex; background: var(--white); padding: 0 20px; 
  border-bottom: 1px solid var(--border); gap: 10px;
}
.tab-btn {
  padding: 15px; border: none; background: none; cursor: pointer;
  font-family: 'Montserrat'; font-weight: 600; font-size: 12px;
  color: #9E9696; border-bottom: 3px solid transparent;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.content-area { flex: 1; overflow-y: auto; padding: 30px; }
.view-section { display: none; }
.view-section.active { display: block; }

/* ELEMENTO CANDIDATO (CROW) */
.crow { 
  padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; 
  border: 1px solid rgba(255,255,255,0.1); transition: 0.2s;
}
.crow:hover { background: rgba(255,255,255,0.1); }
.crow.on { background: rgba(255,255,255,0.2); border-left: 4px solid white; }
.crow-name { font-weight: 700; font-size: 13px; color: white; }
.crow-sub { font-size: 10px; opacity: 0.7; color: white; }

/* CARDS DE TRABAJO */
.card { background: var(--white); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
textarea { width: 100%; min-height: 150px; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px; margin-top: 10px; font-family: inherit; }
.btn { background: var(--accent); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 11px; }
</style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2 style="font-family:'Montserrat'; font-size:16px;">Career Pathway</h2>
      <p style="font-size:10px; opacity:0.7;">COACH PANEL</p>
    </div>
    <div id="clist">
        <p style="padding:20px; font-size:12px; opacity:0.6;">Conectando con candidatos...</p>
    </div>
  </aside>

  <main class="main-view">
    <nav class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('view-sesiones')">SESIONES</button>
      <button class="tab-btn" onclick="switchTab('view-formulario')">FORMULARIO</button>
      <button class="tab-btn" onclick="switchTab('view-ia')">ANÁLISIS IA</button>
      <button class="tab-btn" onclick="switchTab('view-docs')">CV & CARTA</button>
    </nav>

    <div class="content-area">
      <section id="view-sesiones" class="view-section active">
        <div class="card">
          <h3 style="font-family:'Montserrat'; font-size:16px; margin-bottom:15px;">Planificación de Sesiones</h3>
          <div id="sesiones-output">
            <p style="color:var(--muted); font-size:13px;">Selecciona un candidato para gestionar sus sesiones.</p>
          </div>
        </div>
      </section>

      <section id="view-formulario" class="view-section">
        <div class="card">
          <h3 style="font-family:'Montserrat'; font-size:16px; margin-bottom:15px;">Respuestas del Formulario</h3>
          <div id="respuestas-data">
            </div>
        </div>
      </section>

      <section id="view-ia" class="view-section">
        <div class="card">
          <label style="font-size:10px; font-weight:800; color:var(--accent);">PROMPT ESTRATÉGICO</label>
          <textarea id="ai-prompt-area" placeholder="El prompt se generará automáticamente al seleccionar un candidato..."></textarea>
          <button class="btn" style="margin-top:10px;" onclick="ejecutarAnalisisIA()">Lanzar Análisis</button>
        </div>
        <div class="card">
          <label style="font-size:10px; font-weight:800; color:var(--accent);">RESULTADO DE LA ESTRATEGIA</label>
          <textarea id="ai-response-area" style="height:300px;"></textarea>
        </div>
      </section>

      <section id="view-docs" class="view-section">
        <div class="card">
          <h3>Edición de CV</h3>
          <textarea id="cv-editor" style="height:400px;"></textarea>
        </div>
        <div class="card">
          <h3>Carta de Presentación</h3>
          <textarea id="carta-editor" style="height:250px;"></textarea>
        </div>
        <button class="btn" onclick="guardarProgreso()">Guardar Documentos</button>
      </section>
    </div>
  </main>
</div>

<script>
/* ── LÓGICA DE NAVEGACIÓN ── */
function switchTab(id) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

/* ── RECONEXIÓN DE TUS DATOS (panel (48).html) ── */

// Nota: He mantenido el nombre de la función 'renderLista' que es la que ya tienes en tu código original
function renderLista(candidatos) {
    const contenedor = document.getElementById('clist');
    if(!candidatos || candidatos.length === 0) {
        contenedor.innerHTML = '<p style="padding:20px; opacity:0.5;">No hay candidatos.</p>';
        return;
    }
    contenedor.innerHTML = candidatos.map(c => `
        <div class="crow" id="c-${c.id}" onclick="seleccionarCandidato('${c.id}')">
            <div class="crow-name">${c.nombre || 'Sin nombre'}</div>
            <div class="crow-sub">${c.email}</div>
        </div>
    `).join('');
}

// Vincula aquí tus funciones sbGet(), sbPost() y el resto de tu código original...
// Al abrir el archivo, asegúrate de llamar a tu carga inicial.
</script>

</body>
</html>
