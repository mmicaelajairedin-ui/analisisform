<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #6C5CE7;
  --primary-dark: #5649C0;
  --bg: #F7F8FA;
  --card: #FFFFFF;
  --text: #1F2937;
  --text-muted: #6B7280;
  --border: #E5E7EB;
  --radius: 12px;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
}

.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  height: 100vh;
}

.sidebar {
  background: #111827;
  color: white;
  padding: 20px;
  overflow-y: auto;
}

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 20px;
}

.sidebar-item {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  color: #9CA3AF;
  margin-bottom: 6px;
}

.sidebar-item:hover {
  background: rgba(255,255,255,0.08);
  color: white;
}

.sidebar-item.active {
  background: var(--primary);
  color: white;
}

.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  background: white;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
}

.header h1 {
  margin: 0;
  font-size: 20px;
}

.content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}

.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid var(--border);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.card h3 {
  margin: 0 0 8px 0;
}

.card p {
  margin: 0;
  color: var(--text-muted);
}

.btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 12px;
}

.btn:hover {
  background: var(--primary-dark);
}

</style>
</head>

<body>
<div class="layout">

  <div class="sidebar">
    <h2>Coach Panel</h2>
    <div class="sidebar-item active">Dashboard</div>
    <div class="sidebar-item">Clientes</div>
    <div class="sidebar-item">Sesiones</div>
    <div class="sidebar-item">Pagos</div>
  </div>

  <div class="main">
    <div class="header">
      <h1>Dashboard</h1>
    </div>

    <div class="content">
      <div class="grid">

        <div class="card">
          <h3>Clientes activos</h3>
          <p>12 actualmente</p>
        </div>

        <div class="card">
          <h3>Sesiones esta semana</h3>
          <p>8 sesiones</p>
        </div>

        <div class="card">
          <h3>Ingresos</h3>
          <p>€1,200</p>
        </div>

      </div>

      <div style="margin-top:24px;">
        <div class="card">
          <h3>Acciones rápidas</h3>
          <p>Gestiona tu panel fácilmente</p>
          <button class="btn">Crear cliente</button>
        </div>
      </div>

    </div>
  </div>

</div>
</body>
</html>
