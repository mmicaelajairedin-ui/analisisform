<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Coach · Career Pathway</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── EL ESTILO QUE TE GUSTA (Premium Soft UI) ── */
:root {
  --accent: #8E7676;
  --accent-dark: #766262;
  --accent-light: #F5EFEF;
  --bg: #F5F4F2;
  --white: #FFFFFF;
  --text: #4A4444;
  --border: #D1D1D1;
  --shadow: 0 4px 12px rgba(0,0,0,.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

/* LAYOUT PRINCIPAL */
.app-container { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }

/* SIDEBAR: LISTA DE CLIENTES */
.sidebar {
  background: linear-gradient(180deg, #8E7676 0%, #766262 100%);
  display: flex; flex-direction: column; color: white;
}
.sidebar-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); }
#clist { flex: 1; overflow-y: auto; padding: 10px; } /* AQUÍ SE CARGAN TUS CLIENTES */

/* CONTENIDO PRINCIPAL */
.main-view { display: flex; flex-direction: column; overflow: hidden; }
.tab-bar { 
  display: flex; background: var(--white); padding: 0 20px; 
  border-bottom: 1px solid var(--border); gap: 10px;
}
.tab-btn {
  padding: 15px; border: none; background: none; cursor: pointer;
  font-family: 'Montserrat'; font-weight: 600; font-size: 12px;
  color: #9E9696; border-bottom: 3px solid transparent;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* SECCIONES */
.content-area { flex: 1; overflow-y: auto; padding: 30px; }
.view-section { display: none; }
.view-section.active { display: block; }

/* CARDS ORIGINALES */
.card { background: var(--white); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
textarea { width: 100%; min-height: 150px; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px; margin-top: 10px; }
.btn { background: var(--accent); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }

/* ESTILO CLIENTE EN LISTA */
.crow { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; border: 1px solid transparent; }
.crow:hover { background: rgba(255,255,255,0.1); }
.crow.on { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2 style="font-family:'Montserrat'; font-size:16px;">Career Pathway</h2>
      <p style="font-size:10px; opacity:0.7;">PANEL DE CONTROL</p>
    </div>
    <div id="clist">
        <p style="padding:20px; font-size:12px; opacity:0.6;">Cargando candidatos...</p>
    </div>
  </aside>

  <main class="main-view">
    <nav class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('view-sesiones')">SESIONES</button>
      <button class="tab-btn" onclick="switchTab('view-formulario')">FORMULARIO</button>
      <button class="tab-btn" onclick="switchTab('view-ia')">ANÁLISIS IA</button>
      <button class="tab-btn" onclick="switchTab('view-docs')">CV & CARTA</button>
    </nav>

    <div class="content-area">
      <section id="view-sesiones" class="view-section active">
        <h3 style="margin-bottom:15px; font-family:'Montserrat';">Control de Sesiones</h3>
        <div id="sesiones-container" class="card">
          </div>
      </section>

      <section id="view-formulario" class="view-section">
        <h3 style="margin-bottom:15px; font-family:'Montserrat';">Respuestas del Cliente</h3>
        <div id="formulario-data" class="card">
          </div>
      </section>

      <section id="view-ia" class="view-section">
        <div class="card">
          <label style="font-size:11px; font-weight:700; color:var(--accent);">PROMPT PARA IA</label>
          <textarea id="prompt-ia"></textarea>
          <button class="btn" style="margin-top:10px;" onclick="ejecutarAnalisisIA()">Generar Estrategia</button>
        </div>
        <div class="card">
          <label style="font-size:11px; font-weight:700; color:var(--accent);">RESULTADO DEL ANÁLISIS</label>
          <textarea id="resultado-ia" placeholder="La IA analizará el perfil..."></textarea>
        </div>
      </section>

      <section id="view-docs" class="view-section">
        <div class="card">
          <h4 style="margin-bottom:10px;">Curriculum Vitae</h4>
          <textarea id="cv-texto" style="height:300px;"></textarea>
        </div>
        <div class="card">
          <h4 style="margin-bottom:10px;">Carta de Presentación</h4>
          <textarea id="carta-texto"></textarea>
        </div>
        <button class="btn" onclick="guardarProgreso()">Guardar Todo</button>
      </section>
    </div>
  </main>
</div>

<script>
/* ── LÓGICA DE NAVEGACIÓN ── */
function switchTab(id) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

/* ── RECONEXIÓN CON TUS FUNCIONES ORIGINALES ── */

// 1. Aquí debes mantener tus funciones sbGet() y sbPost() tal cual las tienes
// 2. Esta es la función que llena la lista de clientes:
function renderLista(candidatos) {
    const contenedor = document.getElementById('clist');
    contenedor.innerHTML = candidatos.map(c => `
        <div class="crow" onclick="seleccionarCandidato('${c.id}')">
            <div class="crow-name">${c.nombre || c.email}</div>
            <div style="font-size:10px; opacity:0.6;">${c.email}</div>
        </div>
    `).join('');
}

    console.log("Cargando candidato:", id);

    // - Generar el prompt de IA
}

/* CARGA INICIAL */
window.onload = function() {

};
</script>

</body>
</html>
