<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Panel Coach · Career Pathway</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
:root {
  --accent: #8E7676;
  --accent-dark: #6B5656;
  --accent-light: #F9F7F7;
  --accent-mid: #D4BFBF;
  --bg-app: #F2EEEE;
  --sidebar-w: 320px;
  --white: #ffffff;
  --text: #4A4444;
  --radius: 12px;
  --shadow: 0 8px 30px rgba(142, 118, 118, 0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Open Sans', sans-serif;
  background: var(--bg-app);
  color: var(--text);
  height: 100vh;
  overflow: hidden; /* Evita mezcla de páginas */
}

/* ── DISPOSICIÓN PRINCIPAL ── */
.app-layout {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100vh;
}

/* ── COLUMNA IZQUIERDA: CANDIDATOS ── */
.sidebar {
  background: var(--white);
  border-right: 1px solid var(--accent-mid);
  display: flex;
  flex-direction: column;
  z-index: 10;
}

.sidebar-header {
  padding: 30px 20px;
  background: var(--accent);
  color: white;
  text-align: center;
}

.search-box { padding: 15px; border-bottom: 1px solid var(--accent-light); }
.search-box input {
  width: 100%; padding: 10px; border-radius: 20px; border: 1px solid var(--accent-mid); outline: none;
}

#client-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

/* Estilo de cada candidato */
.client-card {
  padding: 15px;
  margin-bottom: 10px;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.2s;
}
.client-card:hover { background: var(--accent-light); }
.client-card.active {
  background: var(--accent-light);
  border-color: var(--accent);
  box-shadow: var(--shadow);
}

/* ── COLUMNA DERECHA: PESTAÑAS Y CONTENIDO ── */
.main-view {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Navegación de Pestañas */
.tab-bar {
  display: flex;
  background: var(--white);
  padding: 0 20px;
  border-bottom: 1px solid var(--accent-mid);
  gap: 5px;
}

.tab-btn {
  padding: 15px 20px;
  border: none;
  background: none;
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: #9E9696;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.3s;
}

.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 40px;
}

.section-panel { display: none; }
.section-panel.active { display: block; animation: fadeIn 0.3s; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* ── COMPONENTES DE TRABAJO ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 25px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}

.title-deco {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 20px;
  border-left: 4px solid var(--accent);
  padding-left: 15px;
}

textarea {
  width: 100%; min-height: 150px; padding: 15px;
  border: 1px solid var(--accent-mid); border-radius: 8px;
  font-family: inherit; font-size: 14px; margin-top: 10px;
}

.btn {
  background: var(--accent); color: white; border: none;
  padding: 12px 25px; border-radius: 8px; font-weight: 700;
  cursor: pointer; transition: 0.3s;
}
.btn:hover { background: var(--accent-dark); }

</style>
</head>
<body>

<div class="app-layout">
  
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1 style="font-family:'Montserrat'; font-size:18px;">Career Pathway</h1>
      <span style="font-size:11px; letter-spacing:1px;">COACH PANEL</span>
    </div>
    <div class="search-box">
      <input type="text" placeholder="Buscar candidato..." onkeyup="filterClients(this.value)">
    </div>
    <div id="client-list">
      </div>
  </aside>

  <main class="main-view">
    
    <nav class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('tab-sesiones')">SESIONES</button>
      <button class="tab-btn" onclick="switchTab('tab-formulario')">FORMULARIO</button>
      <button class="tab-btn" onclick="switchTab('tab-ia')">ANÁLISIS IA</button>
      <button class="tab-btn" onclick="switchTab('tab-documentos')">CV & CARTA</button>
      <button class="tab-btn" onclick="switchTab('tab-nuevo')">+ NUEVO</button>
    </nav>

    <div class="content-area">
      
      <section id="tab-sesiones" class="section-panel active">
        <h2 class="title-deco">Planificación de Sesiones</h2>
        <div class="card" id="sesiones-container">
            <p>Selecciona un candidato para ver sus sesiones.</p>
        </div>
      </section>

      <section id="tab-formulario" class="section-panel">
        <h2 class="title-deco">Respuestas del Formulario</h2>
        <div class="card" id="respuestas-container">
            </div>
      </section>

      <section id="tab-ia" class="section-panel">
        <h2 class="title-deco">Análisis Estratégico IA</h2>
        <div class="card">
          <label>Prompt de Análisis Generado:</label>
          <textarea id="prompt-ia-display" readonly></textarea>
          <button class="btn" style="margin-top:15px;" onclick="ejecutarAnalisisIA()">Lanzar Análisis</button>
        </div>
        <div class="card">
          <label>Resultado del Análisis:</label>
          <textarea id="resultado-ia" placeholder="Aquí aparecerá el análisis estratégico..."></textarea>
        </div>
      </section>

      <section id="tab-documentos" class="section-panel">
        <h2 class="title-deco">Documentos de Aplicación</h2>
        <div class="card">
          <h3>Curriculum Vitae</h3>
          <textarea id="cv-editor" style="height:300px;"></textarea>
        </div>
        <div class="card">
          <h3>Carta de Presentación</h3>
          <textarea id="carta-editor" style="height:200px;"></textarea>
        </div>
        <button class="btn" onclick="guardarDocs()">Guardar Documentos</button>
      </section>

      <section id="tab-nuevo" class="section-panel">
        <h2 class="title-deco">Registrar Candidato</h2>
        <div class="card" style="max-width:500px;">
          <input type="text" id="new-name" placeholder="Nombre completo" style="margin-bottom:10px;">
          <input type="email" id="new-email" placeholder="Email" style="margin-bottom:10px;">
          <button class="btn" onclick="crearCliente()">Crear Acceso</button>
        </div>
      </section>

    </div>
  </main>
</div>

<script>
// Aquí debes mantener tus funciones originales:

// 2. renderLista() para llenar la barra lateral.
// 3. La lógica de emailjs.init().
// 4. Tu lógica de cvPrompt y generación de textos.

function switchTab(id) {
    document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

</body>
</html>
