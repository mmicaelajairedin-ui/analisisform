<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Panel — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#F4F4F4;min-height:100vh;}
.layout{display:grid;grid-template-columns:200px 1fr;min-height:100vh;}
/* SIDEBAR */
.sb{background:#8E7676;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.sb-brand{padding:14px 14px 12px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:8px;}
.sb-av{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
.sb-name{font-size:12px;font-weight:700;color:#fff;line-height:1.2;}
.sb-sub{font-size:9px;color:rgba(255,255,255,.45);}
.sb-nav{padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.sb-lbl{font-size:8px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.12em;padding:8px 8px 4px;}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;font-size:11px;font-weight:600;color:rgba(255,255,255,.6);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Montserrat',sans-serif;transition:all .12s;}
.ni.on{background:rgba(255,255,255,.18);color:#fff;}
.ni:hover:not(.on){background:rgba(255,255,255,.09);color:#fff;}
.sb-foot{padding:10px 8px 14px;}
.sb-btn{width:100%;padding:9px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;background:#fff;color:#8E7676;border:none;border-radius:12px;cursor:pointer;transition:opacity .15s;}
.sb-btn:hover{opacity:.9;}
/* MAIN */
.main{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid #EBEBEB;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.topbar-title{font-size:15px;font-weight:700;color:#4A3F3F;}
.tag{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;background:#F5F0F0;color:#8E7676;}
/* CONTENT */
.content{padding:14px 14px 60px;flex:1;}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px;}
.stat{background:#fff;border-radius:14px;padding:12px 14px;border:1px solid #EBEBEB;}
.stat-v{font-size:20px;font-weight:700;color:#8E7676;}
.stat-l{font-size:10px;color:#9E9696;margin-top:2px;}
/* TABLE */
.table-card{background:#fff;border-radius:14px;border:1px solid #EBEBEB;overflow:hidden;margin-bottom:12px;}
.thead{display:grid;grid-template-columns:32px 1fr 130px 110px 80px;gap:8px;padding:9px 16px;border-bottom:1px solid #F0EBEB;}
.th{font-size:9px;font-weight:700;color:#9E9696;text-transform:uppercase;letter-spacing:.07em;}
.trow{display:grid;grid-template-columns:32px 1fr 130px 110px 80px;gap:8px;padding:11px 16px;border-bottom:1px solid #F7F4F4;align-items:center;cursor:pointer;transition:background .1s;}
.trow:last-child{border-bottom:none;}
.trow:hover{background:#FAFAFA;}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.cname{font-size:12px;font-weight:700;color:#4A3F3F;}
.cmeta{font-size:10px;color:#9E9696;margin-top:1px;}
.prog{display:flex;gap:2px;margin-bottom:5px;}
.prog-seg{height:4px;flex:1;border-radius:3px;}
.pills{display:flex;gap:3px;flex-wrap:wrap;}
.pill{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;}
.p-inf{background:#F5F0F0;color:#8E7676;}
.p-cv{background:#EAF3EE;color:#2E7D5A;}
.actions{display:flex;gap:3px;}
.abtn{font-size:9px;padding:3px 7px;border-radius:6px;background:none;border:1px solid #E8E0E0;color:#9E9696;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;transition:all .12s;}
.abtn:hover{border-color:#8E7676;color:#8E7676;}
.abtn.dis{opacity:.28;cursor:default;}
.pago-ok{font-size:11px;font-weight:600;color:#2E7D5A;}
.pago-pend{font-size:11px;font-weight:600;color:#b45309;}
/* DETALLE */
.det{background:#fff;border-radius:14px;border:1px solid #EBEBEB;padding:14px 16px;display:none;margin-bottom:12px;}
.det.open{display:block;}
.det-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #F0EBEB;}
.det-name{font-size:15px;font-weight:700;color:#4A3F3F;}
.det-sub{font-size:11px;color:#9E9696;margin-top:2px;}
.det-tabs{display:flex;gap:2px;border-bottom:1px solid #F0EBEB;margin-bottom:12px;}
.dtab{font-size:11px;font-weight:600;padding:7px 12px;cursor:pointer;color:#9E9696;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Montserrat',sans-serif;}
.dtab.on{color:#8E7676;border-bottom-color:#8E7676;}
.det-body{font-size:12px;color:#4A3F3F;line-height:1.7;}
.irow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.ibox{background:#F9F7F7;border-radius:10px;padding:9px 11px;}
.ibox-l{font-size:9px;font-weight:700;color:#9E9696;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.ibox-v{font-size:12px;color:#4A3F3F;font-weight:600;}
/* LOADING */
.lds{display:flex;gap:5px;justify-content:center;padding:2rem;}
.ld{width:7px;height:7px;border-radius:50%;background:#8E7676;animation:lp 1.2s ease-in-out infinite;}
.ld:nth-child(2){animation-delay:.2s;}.ld:nth-child(3){animation-delay:.4s;}
@keyframes lp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.empty{text-align:center;padding:2rem;color:#9E9696;font-size:12px;}
/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:999;padding:1rem;}
.modal.open{display:flex;}
.modal-box{background:#fff;border-radius:20px;padding:20px;max-width:400px;width:100%;}
.modal-box h3{font-size:14px;font-weight:700;color:#4A3F3F;margin-bottom:14px;}
.mf{margin-bottom:10px;}
.mf label{display:block;font-size:9px;font-weight:700;color:#9E9696;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.mf input{width:100%;padding:9px 11px;font-size:12px;font-family:'Montserrat',sans-serif;border:1.5px solid #EBEBEB;border-radius:10px;outline:none;color:#4A3F3F;}
.mf input:focus{border-color:#8E7676;}
.mf-st{font-size:11px;margin-top:6px;min-height:14px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
.btn-p{padding:9px 18px;font-size:12px;font-weight:700;font-family:'Montserrat',sans-serif;background:#8E7676;color:#fff;border:none;border-radius:10px;cursor:pointer;}
.btn-p:hover{background:#7A6565;}
.btn-s{padding:9px 18px;font-size:12px;font-weight:700;font-family:'Montserrat',sans-serif;background:transparent;color:#8E7676;border:1.5px solid #8E7676;border-radius:10px;cursor:pointer;}
.btn-s:hover{background:#F5F0F0;}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#4A3F3F;color:#fff;font-size:12px;font-weight:600;padding:10px 20px;border-radius:10px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;font-family:'Montserrat',sans-serif;}
.toast.on{opacity:1;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="layout">
  <div class="sb">
    <div class="sb-brand">
      <div class="sb-av">MJ</div>
      <div><div class="sb-name">Micaela Jairedin</div><div class="sb-sub">Career Coach</div></div>
    </div>
    <div class="sb-nav">
      <div class="sb-lbl">Principal</div>
      <button class="ni on" onclick="verSec('cands',this)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        Candidatos
      </button>
      <button class="ni" onclick="verSec('links',this)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Links rápidos
      </button>
      <button class="ni" onclick="window.open('https://wa.me/34611256224','_blank')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        WhatsApp
      </button>
      <div class="sb-lbl" style="margin-top:6px;">Herramientas</div>
      <button class="ni" onclick="window.open('https://mmicaelajairedin-ui.github.io/analisisform/index.html','_blank')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Formulario
      </button>
      <button class="ni" onclick="cerrarSesion()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </button>
    </div>
    <div class="sb-foot">
      <button class="sb-btn" onclick="abrirNuevoCliente()">+ Nuevo candidato</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Candidatos</div>
      <div style="display:flex;gap:6px;" id="topbar-tags"></div>
    </div>
    <div class="content" id="content">
      <div class="lds"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
    </div>
  </div>
</div>

<!-- MODAL NUEVO CLIENTE -->
<div class="modal" id="modal-nc" onclick="if(event.target===this)cerrarModal('modal-nc')">
  <div class="modal-box">
    <h3>Crear acceso para cliente</h3>
    <div class="mf"><label>Nombre completo</label><input type="text" id="nc-nombre" placeholder="Nombre Apellido"></div>
    <div class="mf"><label>Email</label><input type="email" id="nc-email" placeholder="cliente@email.com"></div>
    <div class="mf"><label>Contraseña</label><input type="text" id="nc-pass" placeholder="Ej: proceso2025"></div>
    <div class="mf-st" id="nc-st"></div>
    <div class="modal-actions">
      <button class="btn-s" onclick="cerrarModal('modal-nc')">Cancelar</button>
      <button class="btn-p" onclick="crearCliente()">Crear acceso</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://mmicaelajairedin-ui.github.io/analisisform';
var EDGE='https://ddxnrsnjdvtqhxunxnwj.supabase.co/functions/v1/generar-informe';
var COLORS=['#F5EDEE:#8E7676','#EDF5ED:#4A6B4A','#EDF0F5:#4A5A6B','#F5F0ED:#6B5A4A','#F0EDF5:#5A4A6B'];
emailjs.init('rPy7LSI615o_T5fbU');

var cands=[],reps={},cvs={},notes={},activeSec='cands',activeCand=null,activeDTab='datos';

(function(){
  var u=localStorage.getItem('mj_user');
  if(!u){window.location.href=BASE+'/login.html';return;}
  var p=JSON.parse(u);
  if(p.rol!=='coach'&&p.rol!=='admin'){window.location.href=BASE+'/login.html';}
})();

function get(t,q){return fetch(SB+'/rest/v1/'+t+'?'+q+'&order=created_at.desc',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();});}
function patch(t,q,d){return fetch(SB+'/rest/v1/'+t+'?'+q,{method:'PATCH',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(d)});}
function post(t,d){return fetch(SB+'/rest/v1/'+t,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},body:JSON.stringify(d)}).then(function(r){if(!r.ok)throw new Error(r.status);});}
function upsert(t,d){
  var em=d.email||'';
  return fetch(SB+'/rest/v1/'+t+'?email=eq.'+encodeURIComponent(em)+'&select=id',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();}).then(function(rows){
    if(rows&&rows.length)return fetch(SB+'/rest/v1/'+t+'?email=eq.'+encodeURIComponent(em),{method:'PATCH',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},body:JSON.stringify(d)});
    return fetch(SB+'/rest/v1/'+t,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},body:JSON.stringify(d)});
  });
}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ini(n){return(n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();}
function col(i){return COLORS[i%COLORS.length].split(':');}
function toArr(id){var el=document.getElementById(id);return el?el.value.split('\n').map(function(l){return l.trim();}).filter(Boolean):[];}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2500);}
function cerrarModal(id){document.getElementById(id).classList.remove('open');}
function abrirModal(id){document.getElementById(id).classList.add('open');}

function llamarEdge(payload){
  return fetch(EDGE,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify(payload)}).then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error||r.status);return d;});});
}

function cargar(){
  Promise.all([
    get('candidatos','select=*'),
    get('informes','select=*'),
    get('cv_publicados','select=id,email,codigo,contenido,created_at')
  ]).then(function(res){
    var all=res[0],allReps=res[1],allCvs=res[2];
    var byEmail={};
    all.forEach(function(c){var k=(c.email||'').toLowerCase().trim();if(!byEmail[k])byEmail[k]=[];byEmail[k].push(c);});
    cands=Object.values(byEmail).map(function(g){g.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});return g[0];});
    cands.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
    reps={};allReps.forEach(function(r){var k=(r.email||'').toLowerCase().trim();if(!reps[k])reps[k]=[];reps[k].push(r);});
    cvs={};allCvs.forEach(function(cv){cvs[(cv.email||'').toLowerCase().trim()]=cv;});
    notes=JSON.parse(localStorage.getItem('mj_notes')||'{}');
    cands.forEach(function(c){if(c.notas_coach)notes[c.id]=c.notas_coach;});
    renderSec(activeSec);
  }).catch(function(){document.getElementById('content').innerHTML='<div class="empty">Error al cargar. Recarga la página.</div>';});
}

function verSec(sec,el){
  activeSec=sec;activeCand=null;
  document.querySelectorAll('.ni').forEach(function(b){b.classList.remove('on');});
  if(el)el.classList.add('on');
  renderSec(sec);
}

function renderSec(sec){
  if(sec==='cands')renderCands();
  else if(sec==='links')renderLinks();
}

function renderCands(){
  document.getElementById('topbar-title').textContent='Candidatos';
  var total=cands.length;
  var repN=Object.keys(reps).length;
  var cvN=Object.keys(cvs).length;
  var nuevos=cands.filter(function(c){return !localStorage.getItem('seen_'+c.id);}).length;

  document.getElementById('topbar-tags').innerHTML=
    '<span class="tag">'+total+' candidatos</span>'
    +(nuevos?'<span class="tag" style="background:#FEF3E2;color:#b45309;">'+nuevos+' nuevos</span>':'');

  var h='<div class="stats">'
    +'<div class="stat"><div class="stat-v">'+total+'</div><div class="stat-l">Candidatos</div></div>'
    +'<div class="stat"><div class="stat-v">'+repN+'</div><div class="stat-l">Informes</div></div>'
    +'<div class="stat"><div class="stat-v">'+cvN+'</div><div class="stat-l">CVs</div></div>'
    +'<div class="stat"><div class="stat-v" style="color:#2E7D5A;">0€</div><div class="stat-l">Cobrado</div></div>'
    +'</div>';

  if(!cands.length){
    h+='<div class="empty">No hay candidatos aún. Comparte el formulario de intake.</div>';
    document.getElementById('content').innerHTML=h;return;
  }

  h+='<div class="table-card">'
    +'<div class="thead"><div></div><div class="th">Candidato</div><div class="th">Proceso</div><div class="th">Links rápidos</div><div class="th">Pago</div></div>';

  cands.forEach(function(c,i){
    var email=(c.email||'').toLowerCase().trim();
    var hasRep=!!(reps[email]&&reps[email].length);
    var hasCv=!!cvs[email];
    var sem=parseInt(c.semana_activa||1);
    var cl=col(i);
    var clienteUrl=BASE+'/cliente.html?email='+encodeURIComponent(c.email);
    var cvUrl=BASE+'/cv.html?email='+encodeURIComponent(c.email);
    var waMsg=encodeURIComponent('Hola '+((c.nombre||'').split(' ')[0])+', te comparto tu espacio: '+clienteUrl);

    h+='<div class="trow" onclick="abrirCand('+c.id+','+i+')">';
    h+='<div class="av" style="background:'+cl[0]+';color:'+cl[1]+'">'+ini(c.nombre)+'</div>';
    h+='<div><div class="cname">'+esc(c.nombre||'--')+'</div><div class="cmeta">'+esc(c.rol||c.sector||'--')+' · '+esc(c.ciudad||'--')+'</div></div>';
    h+='<div><div class="prog">';
    for(var s=1;s<=4;s++){h+='<div class="prog-seg" style="background:'+(s<=sem?'#8E7676':'#E8E0E0')+';"></div>';}
    h+='</div><div class="pills">'
      +(hasRep?'<span class="pill p-inf">Informe</span>':'')
      +(hasCv?'<span class="pill p-cv">CV</span>':'')
      +'</div></div>';
    h+='<div class="actions" onclick="event.stopPropagation();">';
    h+='<button class="abtn" onclick="copiar(\''+clienteUrl+'\')" title="Copiar link portal">Portal</button>';
    h+='<button class="abtn'+(hasCv?'':' dis')+'" '+(hasCv?'onclick="copiar(\''+cvUrl+'\')"':'')+' title="Copiar link CV">CV</button>';
    h+='<button class="abtn" onclick="window.open(\'https://wa.me/?text='+waMsg+'\',\'_blank\')" title="WhatsApp">WA</button>';
    h+='</div>';
    h+='<div class="pago-pend">—</div>';
    h+='</div>';
  });

  h+='</div>';

  // Área de detalle del candidato
  h+='<div class="det" id="det-area"></div>';

  document.getElementById('content').innerHTML=h;

  if(activeCand){
    var c=cands.find(function(x){return x.id===activeCand;});
    if(c){var i=cands.findIndex(function(x){return x.id===activeCand;});abrirCand(activeCand,i,true);}
  }
}

function abrirCand(id,i,noScroll){
  activeCand=id;
  localStorage.setItem('seen_'+id,'1');
  var c=cands.find(function(x){return x.id===id;});
  var email=(c.email||'').toLowerCase().trim();
  var cl=col(i||0);
  var det=document.getElementById('det-area');
  if(!det)return;
  det.classList.add('open');

  var tabs=['datos','generar','informe','sesion','cv','carta','notas'];
  var labels={datos:'Datos',generar:'Generar informe',informe:'Informe',sesion:'Mi sesión',cv:'CV',carta:'Carta',notas:'Notas'};
  var hasRep=!!(reps[email]&&reps[email].length);
  if(!hasRep){tabs=tabs.filter(function(t){return t!=='informe'&&t!=='sesion';});}

  var h='<div class="det-head">'
    +'<div class="av" style="width:38px;height:38px;font-size:12px;background:'+cl[0]+';color:'+cl[1]+'">'+ini(c.nombre)+'</div>'
    +'<div><div class="det-name">'+esc(c.nombre||'--')+'</div><div class="det-sub">'+esc(c.email||'--')+'</div></div>'

  if(tab==='datos')return tabDatos(c);

function tabInforme(c){
  var email=(c.email||'').toLowerCase().trim();
  if(!reps[email]||!reps[email].length)return '<div class="empty">Genera el informe primero.</div>';
  var rep=reps[email][0];var d=rep.data;if(typeof d==='string')d=JSON.parse(d);
  var isPub=!!rep.published;

  function sc(){return(d.scores||[]).map(function(s){var p=Math.min(100,Math.max(0,Math.round(s.val)));var c2=p>=70?'#2E7D5A':p>=45?'#8E7676':'#c0756e';return'<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-size:11px;font-weight:600;color:#4A3F3F;">'+esc(s.label)+'</span><span style="font-size:13px;font-weight:700;color:'+c2+';">'+p+'%</span></div><div style="height:5px;background:#F0EBEB;border-radius:3px;overflow:hidden;"><div style="height:5px;background:'+c2+';border-radius:3px;width:'+p+'%;"></div></div></div>';}).join('');}
  function bul(arr){if(!arr||!arr.length)return'';return'<ul style="list-style:none;padding:0;">'+arr.map(function(x){return'<li style="font-size:11px;padding:4px 0 4px 12px;position:relative;border-bottom:.5px solid #F0EBEB;color:#4A3F3F;"><span style="position:absolute;left:0;top:10px;width:4px;height:4px;border-radius:50%;background:#8E7676;display:block;"></span>'+esc(x)+'</li>';}).join('')+'</ul>';}

  var h='<div style="display:flex;gap:6px;margin-bottom:12px;">';
  h+='<button class="abtn" style="padding:6px 12px;" onclick="regenerarInforme('+c.id+')">↻ Regenerar</button>';
  if(isPub)h+='<button class="abtn" style="padding:6px 12px;" onclick="copiar(\''+BASE+'/cliente.html?email='+encodeURIComponent(c.email)+'\')">Copiar link cliente</button>';
  h+='</div>';
  h+=sc();
  if(d.resumen)h+='<div style="margin-bottom:10px;"><div class="ibox-l" style="margin-bottom:4px;">Resumen</div><div style="font-size:11px;color:#4A3F3F;line-height:1.7;">'+esc(d.resumen)+'</div></div>';
  if(d.fortalezas&&d.fortalezas.length)h+='<div style="margin-bottom:10px;"><div class="ibox-l" style="margin-bottom:4px;">Fortalezas</div>'+bul(d.fortalezas)+'</div>';
  if(d.gaps&&d.gaps.length)h+='<div style="margin-bottom:10px;"><div class="ibox-l" style="margin-bottom:4px;">Gaps</div>'+bul(d.gaps)+'</div>';
  if(d.estrategia)h+='<div style="margin-bottom:12px;"><div class="ibox-l" style="margin-bottom:4px;">Estrategia</div><div style="font-size:11px;color:#4A3F3F;line-height:1.7;background:#F9F7F7;border-left:3px solid #8E7676;padding:8px 11px;border-radius:0 8px 8px 0;">'+esc(d.estrategia)+'</div></div>';
  if(!isPub)h+='<button class="btn-p" onclick="publicarInforme('+c.id+')">Publicar al cliente</button>';
  else h+='<div style="font-size:11px;font-weight:600;color:#2E7D5A;">✓ Publicado al cliente</div>';
  return h;
}

async function crearCliente(){
  var nombre=document.getElementById('nc-nombre').value.trim();
  var email=document.getElementById('nc-email').value.trim().toLowerCase();
  var pass=document.getElementById('nc-pass').value.trim();

  st.textContent='Creando...';st.style.color='#9E9696';
  var hash=await hashPass(pass);
  fetch(SB+'/rest/v1/usuarios',{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},body:JSON.stringify({email:email,password_hash:hash,rol:'cliente',nombre:nombre,activo:true})}).then(function(r){
    if(r.ok||r.status===201){
      var loginUrl=BASE+'/login.html';
      var pn=nombre.split(' ')[0];
      var msg='Hola '+pn+' 👋\n\nTienes acceso a tu espacio de coaching:\n🔗 '+loginUrl+'\n📧 '+email+'\n🔑 '+pass+'\n\nMicaela';
      st.innerHTML='<div style="margin-top:6px;"><div style="font-size:11px;font-weight:600;color:#2E7D5A;margin-bottom:8px;">✓ Cliente creado</div>'
        +'<a href="https://wa.me/?text='+encodeURIComponent(msg)+'" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:9px;background:#25D366;color:#fff;border-radius:10px;font-size:11px;font-weight:700;text-decoration:none;">Enviar acceso por WhatsApp a '+esc(pn)+'</a></div>';
      toast('✓ Cliente '+nombre+' creado');

  }).catch(function(){st.textContent='Error de conexión.';st.style.color='#c0756e';});
}

async function hashPass(p){var e=new TextEncoder();var h=await crypto.subtle.digest('SHA-256',e.encode(p));return Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');}

function textToHtml(text,candidato,emailCand,cvEmail){

  function esc2(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function bold(t){return esc2(t).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');}
  var sections={},cur=null,curLines=[],name='',role='';
  for(var i=0;i<lines.length;i++){var l=lines[i];if(!l||l==='---')continue;if(!name&&(l.startsWith('# ')||(l===l.toUpperCase()&&l.length>3&&l.length<60))){name=l.replace(/^#+\s*/,'').trim();continue;}if(!role&&name&&l.startsWith('**')&&!l.startsWith('##')&&l.length<100){role=l.replace(/\*\*/g,'').trim();continue;}if(l.startsWith('## ')){if(cur)sections[cur]=curLines;cur=l.replace(/^##\s*/,'').toUpperCase().trim();curLines=[];continue;}if(cur)curLines.push(l);}

  var edu=(sections['FORMACIÓN']||sections['FORMACION']||sections['EDUCACIÓN']||[]).map(function(l){var c=l.replace(/^[•\-\s]+/,'').trim();if(!c)return null;var yr=c.match(/\d{4}/);var p=c.split('|');return{deg:(p[0]||c).replace(/\d{4}.*/,'').trim(),school:(p[1]||'').trim(),yr:yr?yr[0]:''};}).filter(Boolean);

  h+='<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:"DM Sans",sans-serif;background:#E8E6E2;padding:2rem 1rem 5rem;font-size:12px;}.bar{max-width:800px;margin:0 auto 1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}.bar-l{font-size:11px;font-weight:600;color:#8E7676;background:#fff;padding:5px 14px;border-radius:20px;border:1px solid #e0d8d5;}.bar-r{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}.xbtn{padding:6px 14px;font-size:11px;font-weight:700;font-family:"DM Sans",sans-serif;border-radius:7px;cursor:pointer;border:none;}.xbtn-y{background:#f3a41b;color:#fff;}.xbtn-p{background:#8E7676;color:#fff;}.cv{max-width:800px;margin:0 auto;background:#fff;box-shadow:0 6px 40px rgba(0,0,0,.12);}.hd{background:#8E7676;padding:28px 32px 22px;}.hd-inner{display:flex;align-items:center;gap:20px;}.ph-c{width:80px;height:80px;border-radius:50%;border:2.5px solid rgba(255,255,255,.3);overflow:hidden;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;}.ph-c img{width:100%;height:100%;object-fit:cover;display:none;}.ph-ini{font-family:"Playfair Display",serif;font-size:26px;font-weight:800;color:rgba(255,255,255,.9);}.hi{flex:1;}.nm{font-family:"Playfair Display",serif;font-size:24px;font-weight:800;color:#fff;text-transform:uppercase;margin-bottom:3px;}.rl{font-size:9px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px;}.cts{display:flex;flex-wrap:wrap;gap:3px 16px;}.ct{font-size:10.5px;color:rgba(255,255,255,.75);}.ct a{color:#fff;}.bd{display:grid;grid-template-columns:185px 1fr;}.sd{background:#F9F7F7;padding:22px 16px;border-right:1px solid #E8E0E0;}.ss{margin-bottom:20px;}.sh{font-size:7.5px;font-weight:700;color:#8E7676;text-transform:uppercase;letter-spacing:.2em;margin-bottom:7px;padding-bottom:4px;border-bottom:1.5px solid #8E7676;}.sk{font-size:11px;padding:3px 0 3px 11px;border-bottom:.5px t;print-color-adjust:exact;}@page{margin:.4cm;size:A4;}}</style></head><body>';
