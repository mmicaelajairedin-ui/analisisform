<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Panel Coach · Career Pathway</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS — Soft UI Premium
═══════════════════════════════════════════════════ */
:root{
  --accent:#8E7676;
  --accent-dark:#766262;
  --accent-light:#F5EFEF;
  --accent-mid:#D4BFBF;
  --title:#8E7676;
  --body:#6B6060;
  --muted:#9E9696;
  --bg:#F5F4F2;
  --card:#FFFFFF;
  --border:#D1D1D1;
  --shadow:0 4px 12px rgba(0,0,0,.05);
  --shadow-md:0 8px 24px rgba(0,0,0,.08);
  --shadow-float:0 20px 50px rgba(0,0,0,.12);
  --green:#5A8C6E;--green-light:#EBF5EF;
  --red:#C0756E;--red-light:#FAEAEA;
  --blue:#5B7FA6;--blue-light:#EBF0F7;
  --orange:#C4907A;--orange-light:#FAF0EB;
  --r-sm:8px;--r:14px;--r-lg:20px;
  --font-title:'Montserrat',sans-serif;
  --font-body:'Open Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font-body);color:var(--title);background:var(--bg);}

/* ═══ LAYOUT ═══ */
.layout{display:grid;grid-template-columns:260px 1fr;height:100vh;overflow:hidden;}

/* ═══ SIDEBAR ═══ */
.sidebar{
  background:linear-gradient(180deg,#8E7676 0%,#766262 100%);
  border-right:none;
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow:hidden;
}
/* Todos los textos del sidebar en blanco */
.sidebar .sb-brand-name { color:#fff !important; font-family:'Montserrat',sans-serif; font-weight:700; }
.sidebar .sb-brand-sub  { color:rgba(255,255,255,.6) !important; }
.sidebar .sb-stat-v     { color:#fff !important; }
.sidebar .sb-stat-l     { color:rgba(255,255,255,.55) !important; }
.sidebar .sb-stat       { border-color:rgba(255,255,255,.12) !important; }
.sidebar .sb-stats      { border-color:rgba(255,255,255,.12) !important; }
.sidebar .sb-nav        { border-color:rgba(255,255,255,.12) !important; }
.sidebar .nb            { color:rgba(255,255,255,.75) !important; }
.sidebar .nb:hover      { background:rgba(255,255,255,.12) !important; color:#fff !important; }
.sidebar .nb.nb-on      { background:rgba(255,255,255,.2) !important; color:#fff !important; font-weight:700 !important; }
.sidebar .nb svg        { stroke:rgba(255,255,255,.75); }
.sidebar .nb.nb-on svg  { stroke:#fff; }
.sidebar .nb-badge      { background:rgba(255,255,255,.2) !important; color:#fff !important; }
.sidebar .sb-actions    { border-color:rgba(255,255,255,.12) !important; }
.sidebar .sb-btn-primary{ background:rgba(255,255,255,.18) !important; color:#fff !important; border:1px solid rgba(255,255,255,.25) !important; }
.sidebar .sb-btn-primary:hover { background:rgba(255,255,255,.28) !important; }
.sidebar .sb-btn-ghost  { background:transparent !important; color:rgba(255,255,255,.7) !important; border:1px solid rgba(255,255,255,.2) !important; }
.sidebar .sb-btn-ghost:hover { background:rgba(255,255,255,.1) !important; }
.sidebar .sb-btn-danger { background:transparent !important; color:rgba(255,255,255,.6) !important; border:1px solid rgba(255,255,255,.15) !important; }
/* Lista de clientes */
.sidebar .crow          { border-color:rgba(255,255,255,.1) !important; }
.sidebar .crow:hover    { background:rgba(255,255,255,.08) !important; }
.sidebar .crow.on       { background:rgba(255,255,255,.15) !important; border-left:3px solid rgba(255,255,255,.6) !important; }
.sidebar .crow-name     { color:rgba(255,255,255,.92) !important; }
.sidebar .crow-sub      { color:rgba(255,255,255,.5) !important; }
.sidebar .pill          { background:rgba(255,255,255,.12) !important; color:rgba(255,255,255,.8) !important; }
.sidebar .pill-rep      { background:rgba(90,140,110,.5) !important; color:#C8F0DC !important; }
.sidebar .pill-pub      { background:rgba(91,127,166,.5) !important; color:#C0D8F0 !important; }
.sidebar .pill-new      { background:rgba(196,144,122,.45)!important; color:#F0D8C8 !important; }
.sidebar .pill-s        { background:rgba(255,255,255,.12)!important; color:rgba(255,255,255,.7) !important; }
.sidebar .sb-list       { border-color:rgba(255,255,255,.1) !important; }
.sidebar #clist         { scrollbar-color: rgba(255,255,255,.2) transparent; }
.sb-brand{
  padding:12px 16px 10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.sb-foto{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--accent-mid);flex-shrink:0;}
.sb-brand-name{font-size:11px;font-weight:700;color:var(--title);font-family:var(--font-title);}
.sb-brand-sub{font-size:9px;color:var(--muted);}

/* Stats */
.sb-stats{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
.sb-stat{padding:8px 12px;border-right:1px solid var(--border);}
.sb-stat:nth-child(2n){border-right:none;}
.sb-stat-v{font-size:18px;font-weight:800;font-family:var(--font-title);line-height:1;}
.sb-stat-l{font-size:8px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}

/* Nav */
.sb-nav{padding:10px 10px 6px;border-bottom:1px solid var(--border);}
.nb{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;border-radius:var(--r-sm);
  cursor:pointer;font-size:12px;font-weight:600;
  color:var(--body);border:none;background:none;
  font-family:var(--font-title);width:100%;text-align:left;
  transition:all .15s;margin-bottom:3px;
}
.nb:hover{background:var(--accent-light);color:var(--accent);}
.nb.nb-on{background:var(--accent);color:#fff;}
.nb svg{flex-shrink:0;opacity:.6;}
.nb.nb-on svg{opacity:1;}
.nb-badge{
  margin-left:auto;font-size:9px;font-weight:800;
  background:var(--accent-light);color:var(--accent);
  padding:2px 7px;border-radius:20px;
}
.nb.nb-on .nb-badge{background:rgba(255,255,255,.25);color:#fff;}

/* Actions */
.sb-actions{padding:10px;}
.sb-btn{
  width:100%;padding:9px 12px;font-size:11px;font-weight:700;
  font-family:var(--font-title);letter-spacing:.04em;
  border-radius:var(--r-sm);cursor:pointer;transition:all .15s;
  margin-bottom:5px;display:flex;align-items:center;gap:8px;border:none;
}
.sb-btn-primary{background:var(--accent);color:#fff;}
.sb-btn-primary:hover{background:var(--accent-dark);}
.sb-btn-ghost{background:var(--bg);color:var(--body);border:1px solid var(--border);}
.sb-btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.sb-btn-danger{background:var(--bg);color:var(--red);border:1px solid #E8CECA;}
.sb-btn-danger:hover{background:var(--red-light);}

/* Client list */
.sb-list{flex:1;overflow-y:auto;padding:6px 8px;}
.crow{
  display:flex;flex-direction:column;
  padding:10px 10px;border-radius:var(--r-sm);
  cursor:pointer;transition:all .15s;margin-bottom:2px;
  border:1.5px solid transparent;
}
.crow:hover{background:var(--bg);}
.crow.on{background:var(--accent-light);border-color:var(--accent-mid);}
.crow-top{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.av{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;flex-shrink:0;
  font-family:var(--font-title);
}
.crow-name{font-size:12px;font-weight:700;color:var(--title);flex:1;}
.crow-sub{font-size:10px;color:var(--muted);margin-bottom:4px;}
.crow-pills{display:flex;gap:3px;flex-wrap:wrap;}
.pill{font-size:8px;font-weight:700;padding:2px 6px;border-radius:20px;}
.pill-new{background:#FEF9E7;color:#D4A017;}
.pill-ok{background:var(--accent-light);color:var(--accent);}
.pill-rep{background:var(--green-light);color:var(--green);}
.pill-pub{background:var(--blue-light);color:var(--blue);}
.pill-s{background:var(--bg);color:var(--body);border:1px solid var(--border);}

/* ═══ MAIN CONTENT ═══ */
.main{
  flex:1;background:var(--bg);
  display:flex;flex-direction:column;
  min-height:0;overflow:hidden;
}
.empty-main{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1;min-height:100vh;
  gap:14px;text-align:center;padding:2rem;
}
.empty-main-icon{font-size:52px;}
.empty-main-title{font-size:20px;font-weight:800;color:var(--title);font-family:var(--font-title);}
.empty-main-desc{font-size:13px;color:var(--muted);}

/* Candidate header */
.cand-header{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:22px 28px 0;flex-shrink:0;
}
.cand-hd-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.av-lg{
  width:50px;height:50px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:800;flex-shrink:0;
  font-family:var(--font-title);
}
.cand-name{font-size:20px;font-weight:800;color:var(--title);font-family:var(--font-title);line-height:1.2;}
.cand-sub{font-size:12px;color:var(--body);margin-top:2px;}
.cand-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-blue{background:var(--blue-light);color:var(--blue);}
.badge-rose{background:var(--accent-light);color:var(--accent);}
.badge-orange{background:var(--orange-light);color:var(--orange);}
.badge-gray{background:var(--bg);color:var(--body);border:1px solid var(--border);}

/* PROCESO — Flecha de pasos */
.proceso-wrap{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;gap:0;
  overflow-x:auto;
}
.paso{
  display:flex;align-items:center;flex:1;min-width:0;
}
.paso-body{
  flex:1;min-width:0;
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;cursor:pointer;transition:all .15s;
  position:relative;
}
.paso-body::after{
  content:'';
  position:absolute;right:-14px;top:0;
  border-top:20px solid transparent;
  border-bottom:20px solid transparent;
  border-left:14px solid transparent;
  z-index:2;transition:border-left-color .15s;
}
.paso-body::before{
  content:'';
  position:absolute;right:-16px;top:0;
  border-top:20px solid transparent;
  border-bottom:20px solid transparent;
  border-left:14px solid var(--border);
  z-index:1;
}
.paso:last-child .paso-body::after,
.paso:last-child .paso-body::before{display:none;}
.paso-dot{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;flex-shrink:0;
  font-family:var(--font-title);
  border:2px solid var(--border);background:var(--bg);color:var(--muted);
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.paso-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Estado done */
.paso.done .paso-dot{background:var(--green);border-color:var(--green);color:#fff;}
.paso.done .paso-lbl{color:var(--green);}
.paso.done .paso-body{background:var(--green-light);}
.paso.done .paso-body::after{border-left-color:var(--green-light);}
/* Estado active */
.paso.active .paso-dot{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 4px var(--accent-light);}
.paso.active .paso-lbl{color:var(--accent);font-weight:800;}
.paso.active .paso-body{background:var(--accent-light);}
.paso.active .paso-body::after{border-left-color:var(--accent-light);}
/* Estado pending */
.paso.pending .paso-body:hover{background:var(--bg);}

/* Tabs */
.tabs{display:flex;overflow-x:auto;border-bottom:0;padding:0 28px;background:var(--card);border-bottom:1px solid var(--border);}
.tab{
  padding:12px 16px;font-size:12px;font-weight:600;
  color:var(--muted);border:none;background:none;cursor:pointer;
  font-family:var(--font-title);white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .15s;
}
.tab:hover{color:var(--accent);}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}

/* Tab body */
.tab-body{padding:24px 28px;overflow-y:auto;flex:1;}

/* Cards / Gen boxes */
.card{
  background:var(--card);border-radius:var(--r);
  box-shadow:var(--shadow);padding:20px 22px;
  margin-bottom:16px;border:1px solid var(--border);
}
.card-title{font-size:16px;font-weight:700;color:var(--title);font-family:var(--font-title);margin-bottom:4px;}
.card-desc{font-size:13px;color:var(--body);margin-bottom:14px;line-height:1.6;}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.card-lbl{font-size:9px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.12em;}

.gen-box{
  background:var(--card);border-radius:var(--r);
  box-shadow:var(--shadow);padding:20px 22px;
  margin-bottom:14px;border:1px solid var(--border);
}
.gen-box h3{font-size:15px;font-weight:700;color:var(--title);font-family:var(--font-title);margin-bottom:6px;}
.gen-box p{font-size:13px;color:var(--body);margin-bottom:14px;line-height:1.6;}

/* AI Loading */
.ai-loading{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);padding:10px 0;}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:dp 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* Informe */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ii{background:var(--bg);border-radius:var(--r-sm);padding:12px 14px;border:1px solid var(--border);}
.iil{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.iiv{font-size:13px;color:var(--title);font-weight:600;}
.sc-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:.5px solid var(--border);}
.sc-lbl{font-size:13px;color:var(--title);}
.sc-bar{height:6px;background:var(--border);border-radius:3px;width:130px;overflow:hidden;}
.sc-fill{height:6px;border-radius:3px;}
.bul-list{list-style:none;}
.bul-list li{padding:7px 0;border-bottom:.5px solid var(--border);font-size:13px;color:var(--body);display:flex;gap:8px;line-height:1.5;}
.bul-list li::before{content:'→';color:var(--accent);flex-shrink:0;}
.code-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;font-size:11px;color:var(--body);word-break:break-all;line-height:1.6;}
.pro-tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin:2px;}
.alt-list{display:flex;flex-wrap:wrap;gap:6px;}
.alt-tag{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;background:var(--blue-light);color:var(--blue);cursor:pointer;transition:all .15s;}
.alt-tag:hover{background:var(--blue);color:#fff;}

/* Status */
.status{font-size:12px;min-height:20px;margin-top:8px;color:var(--body);}

/* Semana progress */
.sem-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.sem-btn{
  padding:7px 14px;font-size:11px;font-weight:700;
  font-family:var(--font-title);border-radius:var(--r-sm);
  cursor:pointer;border:1.5px solid var(--border);
  background:var(--card);color:var(--body);transition:all .15s;
}
.sem-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.sem-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}

/* Acciones lista */
.ac-list{list-style:none;}
.ac-item{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:.5px solid var(--border);font-size:13px;color:var(--body);line-height:1.5;}
.ac-bullet{width:20px;height:20px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px;}

/* Buttons */
.btn{
  padding:10px 20px;font-size:12px;font-weight:700;
  font-family:var(--font-title);letter-spacing:.06em;text-transform:uppercase;
  border-radius:var(--r-sm);cursor:pointer;border:none;transition:all .15s;
  display:inline-flex;align-items:center;gap:7px;
}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover:not(:disabled){background:#4a7a5e;}
.btn-rose,.btn-pub{background:var(--accent);color:#fff;}.btn-rose:hover:not(:disabled),.btn-pub:hover:not(:disabled){background:var(--accent-dark);}
.btn-sec{background:var(--accent-light);color:var(--accent);border:1.5px solid var(--accent-mid);}
.btn-sec:hover{background:var(--accent-mid);}
.btn-blue{background:var(--blue);color:#fff;}.btn-blue:hover{background:#4a6d92;}

/* Inputs */
textarea,input[type=text],input[type=email],input[type=password],select{
  width:100%;padding:10px 13px;font-size:13px;
  font-family:var(--font-body);
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  outline:none;color:var(--title);background:var(--card);
  transition:border-color .15s;
}
textarea:focus,input:focus,select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(142,118,118,.1);
}
textarea{resize:vertical;line-height:1.6;}

/* Form field */
.mf{margin-bottom:13px;}
.mf label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;font-family:var(--font-title);}

/* Paste area */
.paste-area{min-height:90px;font-size:12px;}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(74,63,63,.35);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:1rem;backdrop-filter:blur(4px);
}
.modal-box{
  background:var(--card);border-radius:var(--r-lg);
  padding:28px;width:100%;max-width:580px;
  max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-float);
}
.modal-box h3{font-size:18px;font-weight:800;color:var(--title);font-family:var(--font-title);margin-bottom:18px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--title);color:#fff;
  padding:10px 22px;border-radius:10px;
  font-size:12px;font-weight:600;z-index:9999;
  opacity:0;transition:all .3s;pointer-events:none;
  font-family:var(--font-title);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* CV frame */
#cv-frame-wrap{width:100%;border-radius:var(--r-sm);overflow:hidden;}
#cv-frame{width:100%;border:none;display:block;}

/* Refresh btn (compat) */
.refresh-btn{
  width:100%;padding:8px 12px;font-size:11px;font-weight:700;
  font-family:var(--font-title);border-radius:var(--r-sm);
  cursor:pointer;border:1px solid var(--border);
  background:var(--card);color:var(--body);transition:all .15s;
  margin-bottom:4px;
}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Dynamic panel */
#dynamic-panel{
  padding:28px;max-width:960px;margin:0 auto;width:100%;
}

/* Stat cards en secciones */
.stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{
  background:var(--card);border-radius:var(--r);
  padding:20px;text-align:center;
  box-shadow:var(--shadow);border:1px solid var(--border);
}
.stat-card-v{font-size:34px;font-weight:800;letter-spacing:-0.02em;font-family:var(--font-title);line-height:1;}
.stat-card-l{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:5px;}

/* Section title */
.sec-title{font-size:22px;font-weight:800;color:var(--title);font-family:var(--font-title);margin-bottom:6px;}
.sec-desc{font-size:13px;color:var(--muted);margin-bottom:22px;}

/* Link cards */
.link-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 22px;margin-bottom:12px;border:1px solid var(--border);}
.link-card-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:.5px solid var(--border);}
.link-card-name{font-size:14px;font-weight:700;color:var(--title);font-family:var(--font-title);flex:1;}
.link-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.link-url{flex:1;font-size:11px;background:var(--bg);border-radius:var(--r-sm);padding:8px 11px;color:var(--body);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:1px solid var(--border);}
.link-copy-btn,.link-wa-btn{
  padding:8px 14px;font-size:11px;font-weight:700;
  font-family:var(--font-title);border-radius:var(--r-sm);
  cursor:pointer;border:none;white-space:nowrap;transition:all .15s;
}
.link-copy-btn{background:var(--accent-light);color:var(--accent);border:1.5px solid var(--accent-mid);}
.link-copy-btn:hover{background:var(--accent-mid);}
.link-wa-btn{background:#25D366;color:#fff;}
.link-wa-btn:hover{background:#1FB055;}
.link-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}

/* Pagos table */
.pagos-table{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border);}
.pagos-thead{display:grid;grid-template-columns:1fr 130px 155px 115px 90px;padding:11px 18px;background:var(--bg);border-bottom:1px solid var(--border);font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-family:var(--font-title);}
.pagos-row{display:grid;grid-template-columns:1fr 130px 155px 115px 90px;padding:13px 18px;border-bottom:.5px solid var(--border);align-items:center;gap:8px;}
.pago-monto{width:110px;padding:7px 10px;font-size:12px;font-family:var(--font-body);border:1.5px solid var(--border);border-radius:var(--r-sm);outline:none;color:var(--title);}
.pago-estado{padding:7px 10px;font-size:12px;font-family:var(--font-title);border:1.5px solid var(--border);border-radius:var(--r-sm);outline:none;font-weight:700;cursor:pointer;}
.pago-save{padding:7px 14px;font-size:11px;font-weight:700;font-family:var(--font-title);background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);cursor:pointer;letter-spacing:.04em;transition:all .15s;}
.pago-save:hover{background:var(--accent-dark);}

/* Resumen lista */
.res-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:.5px solid var(--border);cursor:pointer;transition:background .15s;border-radius:var(--r-sm);padding:10px 8px;}
.res-item:hover{background:var(--bg);}

/* ═══════════════════════════════════════
   SISTEMA TIPOGRÁFICO UNIFICADO — panel
═══════════════════════════════════════ */
:root{
  --fs-xs:9px; --fs-sm:11px; --fs-md:13px;
  --fs-lg:15px; --fs-xl:20px; --fs-2xl:26px;
  --fw-reg:400; --fw-semi:600; --fw-bold:700; --fw-xbold:800;
}

/* Títulos de sección dinámica */
.dp-title{font-size:var(--fs-xl)!important;font-weight:var(--fw-xbold)!important;letter-spacing:-.02em;}
.dp-desc{font-size:var(--fs-md)!important;line-height:1.65;}
.dp-card-title{font-size:var(--fs-lg)!important;font-weight:var(--fw-xbold)!important;}
.dp-lbl{font-size:var(--fs-xs)!important;font-weight:var(--fw-bold)!important;text-transform:uppercase;letter-spacing:.1em;}

/* Candidato header */
.chead-name,.cand-name{font-size:var(--fs-xl)!important;font-weight:var(--fw-xbold)!important;letter-spacing:-.01em;}
.chead-sub,.cand-sub{font-size:var(--fs-sm)!important;font-weight:var(--fw-semi)!important;}

/* Sidebar cliente list */
.crow-name{font-size:var(--fs-sm)!important;font-weight:var(--fw-bold)!important;}
.crow-sub{font-size:var(--fs-xs)!important;}

/* Informe */
.iil{font-size:var(--fs-xs)!important;font-weight:var(--fw-bold)!important;text-transform:uppercase;letter-spacing:.1em;}
.iiv{font-size:var(--fs-md)!important;font-weight:var(--fw-semi)!important;}
.sc-lbl{font-size:var(--fs-md)!important;font-weight:var(--fw-semi)!important;}

/* Gen boxes body */
.gen-box h3{font-size:var(--fs-lg)!important;font-weight:var(--fw-xbold)!important;}
.gen-box p{font-size:var(--fs-md)!important;line-height:1.65;}

/* Tabs */
.tab{font-size:var(--fs-sm)!important;font-weight:var(--fw-semi)!important;letter-spacing:.03em;}
.tab.on{font-weight:var(--fw-bold)!important;}

/* Nav */
.nb{font-size:var(--fs-sm)!important;}
.nb.nb-on{font-weight:var(--fw-bold)!important;}

/* Botones */
.btn{font-size:var(--fs-sm)!important;font-weight:var(--fw-xbold)!important;letter-spacing:.07em;}
.sb-btn{font-size:var(--fs-sm)!important;font-weight:var(--fw-bold)!important;}

/* Acciones lista */
.ac-item{font-size:var(--fs-md)!important;line-height:1.65;}

/* Status */
.status{font-size:var(--fs-sm)!important;}

/* ═══ TARJETAS MÁS VISIBLES ═══ */
.gen-box{
  border:1.5px solid var(--accent-md)!important;
  box-shadow:0 4px 16px rgba(0,0,0,.07)!important;
}
.dp-card{
  border:1.5px solid var(--accent-md)!important;
  box-shadow:0 4px 16px rgba(0,0,0,.07)!important;
}
.lk-card{
  border:1.5px solid var(--accent-md)!important;
  box-shadow:0 4px 16px rgba(0,0,0,.07)!important;
}
.ii{
  border:1.5px solid var(--border)!important;
  box-shadow:0 2px 8px rgba(0,0,0,.04)!important;
}
/* Crow activo más visible */
.crow.on{
  border-left:3px solid var(--accent)!important;
  border-color:var(--accent-md)!important;
}
/* Paso activo más visible */
.paso.active .paso-inner{
  box-shadow:inset 0 -3px 0 var(--accent)!important;
}
/* Cabecera candidato más visible */
.chead{
  border-bottom:2px solid var(--border)!important;
  box-shadow:0 2px 8px rgba(0,0,0,.06)!important;
}
/* Tabs container */
.tabs{
  box-shadow:0 2px 6px rgba(0,0,0,.04)!important;
}
/* bul-list items más visibles */
.bul-list li{
  font-size:var(--fs-md)!important;
  padding:9px 0!important;
  border-bottom:1px solid var(--border)!important;
}
.bul-list li::before{
  font-size:16px!important;
  font-weight:700!important;
}


/* ═══ CLASES FALTANTES — secciones dinámicas ═══ */

/* Stat grid — resumen */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-v{font-size:34px;font-weight:800;letter-spacing:-0.02em;font-family:var(--font-title);line-height:1;color:var(--accent);}

/* Resumen rows */
.res-row{
  display:flex;align-items:center;gap:12px;

}

/* Link cards */
.lk-card-hd{

}

}

.lk-url{

  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  border:1px solid var(--border);
}
.lk-cp-btn{
  padding:8px 14px;font-size:11px;font-weight:700;
  font-family:var(--font-title);border-radius:var(--r-sm);

  background:var(--accent-lt);color:var(--accent);
  border:1.5px solid var(--accent-md);
}

.lk-wa-btn{
  padding:8px 14px;font-size:11px;font-weight:700;

}

/* Pagos */
.pg-table{
  background:var(--card);border-radius:var(--r);
  box-shadow:var(--shadow);overflow:hidden;
  border:1.5px solid var(--accent-md);
}
.pg-thead{
  display:grid;grid-template-columns:1fr 130px 155px 110px 90px;
  padding:11px 18px;background:var(--bg);

}

}
.pg-row:last-child{border-bottom:none;}

/* DP extras */

  display:flex;align-items:center;justify-content:space-between;

}
.dp-empty{

}

}

/* Dynamic panel layout */
#dynamic-panel{

function toArr(id){return document.getElementById(id).value.split('\n').map(function(l){return l.trim();}).filter(Boolean);}
function cerrarModal(id){document.getElementById(id).style.display='none';}
function abrirModal(id){document.getElementById(id).style.display='flex';}
function showToast(msg){var t=document.createElement('div');t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;font-weight:600;padding:11px 22px;border-radius:10px;z-index:99999;font-family:Montserrat,sans-serif;';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3000);}
function ini(name){return (name||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();}
function col(i){return COLORS[i%COLORS.length].split(':');}

// ── LLAMADA A LA EDGE FUNCTION ──
function llamarEdge(payload){
  return fetch(EDGE,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},
    body:JSON.stringify(payload)
  }).then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error||r.status);return d;});});
}

function loadCands(){
  document.getElementById('clist').innerHTML='<div style="padding:2rem;text-align:center;color:#999;font-size:12px;">Cargando...</div>';
  Promise.all([sbGet('candidatos','select=*'),sbGet('informes','select=*'),sbGet('cv_publicados','select=id,email,codigo,contenido,created_at')]).then(function(res){
    var all=res[0],allReps=res[1],allCvs=res[2];
    var byEmail={};
    all.forEach(function(c){var k=(c.email||'').toLowerCase().trim();if(!byEmail[k])byEmail[k]=[];byEmail[k].push(c);});
    cands=Object.values(byEmail).map(function(g){g.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});g[0]._subs=g.length;g[0]._hist=g;return g[0];});
    cands.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
    reps={};allReps.forEach(function(r){var k=(r.email||'').toLowerCase().trim();if(!reps[k])reps[k]=[];reps[k].push(r);});
    cvs={};allCvs.forEach(function(cv){cvs[(cv.email||'').toLowerCase().trim()]=cv;});
    notes=JSON.parse(localStorage.getItem('mj_notes')||'{}');
    cands.forEach(function(c){if(c.notas_coach){notes[c.id]=c.notas_coach;}});
    localStorage.setItem('mj_notes',JSON.stringify(notes));
    renderSidebar();
    if(activeId){var c=cands.find(function(x){return x.id===activeId;});if(c)renderMain(c);}
  }).catch(function(){document.getElementById('clist').innerHTML='<div style="padding:2rem;text-align:center;color:#999;font-size:12px;">Error. Pulsa Actualizar.</div>';});
}

function renderSidebar(){
  var newC=cands.filter(function(c){return !localStorage.getItem('seen_'+c.id);}).length;
  document.getElementById('st-tot').textContent=cands.length;
  document.getElementById('st-rep').textContent=Object.keys(reps).length;
  document.getElementById('st-cv').textContent=Object.keys(cvs).length;
  document.getElementById('st-new').textContent=newC;
  var list=document.getElementById('clist');
  if(!cands.length){
    list.innerHTML='<div style="padding:2rem 1.5rem;text-align:center;">'+
      '<div style="font-size:48px;margin-bottom:12px;">🎯</div>'+
      '<div style="font-size:14px;font-weight:700;color:#4A3F3F;margin-bottom:6px;">Sin candidatos aún</div>'+
      '<div style="font-size:12px;color:#9E9696;margin-bottom:16px;line-height:1.5;">Creá tu primer cliente<br>para empezar el proceso.</div>'+
      '<button onclick="abrirCrearCliente()" style="padding:10px 20px;background:#8C7B80;color:#fff;border:none;border-radius:20px;font-size:12px;font-weight:700;font-family:Montserrat,sans-serif;cursor:pointer;">+ Crear primer cliente</button>'+
      '</div>';
    return;
  }
  list.innerHTML='';
  // Ordenar por: nuevos primero, luego por semana activa
  var sorted = cands.slice().sort(function(a,b){
    var aNew = !localStorage.getItem('seen_'+a.id) ? 1 : 0;
    var bNew = !localStorage.getItem('seen_'+b.id) ? 1 : 0;
    if(bNew !== aNew) return bNew - aNew;
    return parseInt(b.semana_activa||1) - parseInt(a.semana_activa||1);
  });

  sorted.forEach(function(c,i){
    var seen=localStorage.getItem('seen_'+c.id);
    var email=(c.email||'').toLowerCase().trim();
    var hasRep=!!(reps[email]&&reps[email].length);
    var hasCv=!!cvs[email];
    var sem=parseInt(c.semana_activa||1);
    var cl=col(i);
    var isNew = !seen;

    var d=document.createElement('div');
    d.className='crow'+(activeId===c.id?' on':'');
    d.style.cssText='border-radius:12px;margin-bottom:6px;transition:all .2s ease;border:1px solid '+(isNew?'#8C7B8033':'transparent')+';';
    d.onclick=function(){openCand(c.id);};

    // Barra de progreso del candidato
    var progress = 0;
    if(hasRep) progress += 40;
    if(hasCv)  progress += 40;
    if(sem > 1) progress += 20;

    d.innerHTML=
      '<div class="crow-top">'+
        '<div class="av" style="background:'+cl[0]+';color:'+cl[1]+';width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;">'+ini(c.nombre)+'</div>'+
        '<div style="flex:1;min-width:0;">'+
          '<div class="crow-name" style="display:flex;align-items:center;gap:6px;">'+
            escH(c.nombre||'--')+
            (isNew?'<span style="font-size:9px;background:#8C7B80;color:#fff;padding:2px 6px;border-radius:10px;font-weight:700;">NUEVO</span>':'')+
          '</div>'+
          '<div class="crow-sub" style="font-size:11px;">'+escH(c.rol||c.sector||'--')+'</div>'+
        '</div>'+
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">'+
          (hasCv?'<span style="font-size:10px;color:#5A8C6E;font-weight:700;">CV ✓</span>':'<span style="font-size:10px;color:#CCC;">sin CV</span>')+
          '<span style="font-size:10px;color:#9E9696;">S'+sem+'</span>'+
        '</div>'+
      '</div>'+
      // Barra de progreso del candidato
      '<div style="margin:6px 0 0;height:3px;background:#F0EDED;border-radius:2px;overflow:hidden;">'+
        '<div style="height:3px;width:'+progress+'%;background:'+cl[0]+';border-radius:2px;transition:width .5s ease;"></div>'+
      '</div>';

    list.appendChild(d);
  });
}

function openCand(id){activeId=id;atab='datos';localStorage.setItem('seen_'+id,'1');var c=cands.find(function(x){return x.id===id;});renderSidebar();renderMain(c);}

function renderMain(c){
  var email=(c.email||'').toLowerCase().trim();
  var hasRep=!!(reps[email]&&reps[email].length);
  var hasCvPub=!!cvs[email];
  var i=cands.findIndex(function(x){return x.id===c.id;});
  var cl=col(i);
  var sem=parseInt(c.semana_activa||1);
  var semNames=['','CV y Marca','LinkedIn','Red','Entrevistas'];
  var semColors=['','var(--accent)','var(--blue)','var(--green)','var(--orange)'];
  var semColor=semColors[sem]||'var(--accent)';
  var pct=Math.round((sem-1)/4*100);

  // Avatar
  var avHtml=c.foto_perfil?
    '<div class="av-big" style="overflow:hidden;border:3px solid var(--border);">'
      +'<img src="'+c.foto_perfil+'" style="width:100%;height:100%;object-fit:cover;display:block;"></div>':
    '<div class="av-big" style="background:'+cl[0]+';color:'+cl[1]+';border:3px solid var(--border);">'+ini(c.nombre)+'</div>';

  // Badges
  var badges='';
  if(hasRep) badges+='<span class="chead-badge badge-green">&#10003; Informe</span>';
  if(hasCvPub) badges+='<span class="chead-badge badge-blue">&#10003; CV</span>';
  if(sem>1) badges+='<span class="chead-badge badge-rose">S'+sem+' '+(semNames[sem]||'')+'</span>';
  if(!hasRep&&!hasCvPub) badges+='<span class="chead-badge badge-gray">Sin publicar</span>';

  // Proceso en flecha
  var pasoLabels=['Evaluación','CV','LinkedIn','Red','Final'];
  var pasoHtml='';
  for(var p=0;p<5;p++){
    var ps=p<sem-1?'done':p===sem-1?'active':'pending';
    pasoHtml+='<div class="paso '+ps+'"><div class="paso-inner">'
      +'<div class="paso-dot">'+(p<sem-1?'&#10003;':String(p+1))+'</div>'
      +'<div class="paso-lbl">'+pasoLabels[p]+'</div>'
      +'</div></div>';
  }

  var tabs=['datos','generar','cv'];
  if(hasRep) tabs.splice(2,0,'informe','sesion');
  tabs.push('carta'); tabs.push('notas'); tabs.push('mensajes');
  var labels={datos:'Datos',generar:'Generar IA',sesion:'Sesión',informe:'Informe',cv:'CV IA',carta:'Carta',notas:'Notas',mensajes:'✉ Mensajes'};
  var tabsHTML=tabs.map(function(t){
    return '<div class="tab'+(atab===t?' on':'')+'" onclick="switchTab(\''+t+'\','+c.id+')">'+labels[t]+'</div>';
  }).join('');

  document.getElementById('main').innerHTML=
    '<div class="chead" style="gap:16px;">'
      +avHtml
      +'<div style="flex:1;min-width:0;">'
        +'<div class="chead-name">'+escH(c.nombre||'--')+'</div>'
        +'<div class="chead-sub">'+escH(c.email||'--')+(c.ciudad?' &middot; '+escH(c.ciudad):'')+'</div>'
        +'<div class="cand-badges" style="margin-top:6px;">'+badges+'</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0;">'
        +'<div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-family:Montserrat,sans-serif;">Progreso</div>'
        +'<div style="font-size:32px;font-weight:800;letter-spacing:-0.02em;color:'+semColor+';line-height:1;font-family:Montserrat,sans-serif;">'+pct+'%</div>'
        +'<div style="font-size:11px;font-weight:700;color:'+semColor+';font-family:Montserrat,sans-serif;">'+(semNames[sem]||'Inicio')+'</div>'
      +'</div>'
    +'</div>'
    +'<div class="proceso-wrap">'+pasoHtml+'</div>'
    +'<div class="tabs">'+tabsHTML+'</div>'
    +'<div class="tab-body" id="tc">'+renderTab(c,atab)+'</div>';
}

function switchTab(tab,id){
  atab=tab;var c=cands.find(function(x){return x.id===id;});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  event.target.classList.add('on');
  document.getElementById('tc').innerHTML=renderTab(c,tab);
}

function renderTab(c,tab){
  if(tab==='datos')return tabDatos(c);
  if(tab==='generar')return tabGenerar(c);
  if(tab==='informe')return tabInforme(c);
  if(tab==='sesion')return tabSesion(c);
  if(tab==='carta')return tabCarta(c);
  if(tab==='cv')return tabCV(c);
  if(tab==='notas')return tabNotas(c);
  if(tab==='mensajes')return tabMensajes(c);
  return '';
}

r-radius:6px;cursor:pointer;white-space:nowrap;">Cambiar</button>'    +'</div>'    +'<div id="ps-'+c.id+'" style="font-size:11px;margin-top:6px;color:var(--muted);"></div>'    +'</div>';

function tabGenerar(c){
  var savedCvLi=c.linkedin_texto||localStorage.getItem('cvli_'+c.id)||'';
  var html='<div class="gen-box">';
  html+='<h3>Paso 1 — Pega el CV y LinkedIn del cliente</h3>';
  html+='<p>Abre el CV y el LinkedIn del cliente, copia todo el texto y pégalo aquí. Cuanto más texto, mejor será el análisis.</p>';
  html+='<textarea id="paste-area-'+c.id+'" rows="6" placeholder="Pega aquí el texto del CV y LinkedIn..." style="border:1.5px solid #f3c94b;background:#fffdf0;">'+escH(savedCvLi)+'</textarea>';
  html+='<div style="display:flex;align-items:center;gap:8px;margin-top:6px;">';
  html+='<button class="btn" style="background:#f3a41b;" onclick="guardarCVLinkedIn('+c.id+')">Guardar texto</button>';
  html+='<span id="cvli-st-'+c.id+'" style="font-size:11px;color:#666;"></span></div></div>';
  html+='<div class="gen-box">';
  html+='<h3>Paso 2 — Generar informe con IA</h3>';
  html+='<p>Claude analizará todos los datos del formulario + el CV y LinkedIn que pegaste. Tarda unos 20 segundos.</p>';
  html+='<button class="btn btn-green" id="btn-gen-inf-'+c.id+'" onclick="generarInformeAI('+c.id+')">✨ Generar informe automáticamente</button>';
  html+='<div id="st-gen-'+c.id+'" class="status"></div>';
  html+='</div>';

}

function generarInformeAI(id){
  var c=cands.find(function(x){return x.id===id;});
  var btn=document.getElementById('btn-gen-inf-'+id);
  var st=document.getElementById('st-gen-'+id);
  var savedCvLi=document.getElementById('paste-area-'+id)?document.getElementById('paste-area-'+id).value:'';

  if(btn){btn.disabled=true;btn.textContent='Generando...';}
  if(st){st.innerHTML='<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div> Claude está analizando el perfil...</div>';}

  // Guardar el texto CV/LinkedIn primero
  if(savedCvLi){
    localStorage.setItem('cvli_'+id,savedCvLi);
    fetch(SB+'/rest/v1/candidatos?id=eq.'+id,{
      method:'PATCH',
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({linkedin_texto:savedCvLi})
    }).catch(function(){});
  }

  // Construir payload limpio sin referencias circulares
  var payload={
    accion:'generar_informe',
    nombre:c.nombre||'',email:c.email||'',edad:c.edad||'',
    experiencia:c.experiencia||'',sector:c.sector||'',educacion:c.educacion||'',
    habilidades:c.habilidades||'',objetivo:c.objetivo||'',idiomas:c.idiomas||'',
    ubicacion:c.ubicacion||'',situacion:c.situacion||'',urgencia:c.urgencia||'',
    modalidad:c.modalidad||'',linkedin:c.linkedin||'',obstaculos:c.obstaculos||'',
    linkedin_texto:savedCvLi||c.linkedin_texto||''
  };

  llamarEdge(payload).then(function(res){
    if(st){st.innerHTML='<span style="color:#4a7c5f;font-weight:600;">✓ Informe generado. Recargando panel...</span>';}
    // Recargar candidatos para mostrar el nuevo informe
    setTimeout(function(){
      loadCands();
      setTimeout(function(){
        var updated=cands.find(function(x){return x.id===id;});
        if(updated){atab='informe';renderMain(updated);}
      },500);
    },1000);
  }).catch(function(err){
    if(btn){btn.disabled=false;btn.textContent='✨ Generar informe automáticamente';}
    if(st){st.innerHTML='<span style="color:#c0756e;">Error: '+escH(String(err))+'</span>';}
  });
}

function tabInforme(c){
  var email=(c.email||'').toLowerCase().trim();
  if(!reps[email]||!reps[email].length)return '<p style="color:#999;font-size:13px;padding:1rem 0;">Genera el informe primero desde la pestaña "Generar informe".</p>';
  var rep=reps[email][0];var d=rep.data;if(typeof d==='string')d=JSON.parse(d);var isPub=!!rep.published;
  function sc(){return (d.scores||[]).map(function(s){var p=Math.min(100,Math.max(0,Math.round(s.val)));var cl=p>=70?'hi':p>=45?'mid':'lo';return '<div class="sc"><div class="sc-lbl">'+s.label+'</div><div class="sc-pct '+cl+'">'+p+'%</div><div class="sc-bar"><div class="sc-fill fill-'+cl+'" style="width:'+p+'%"></div></div></div>';}).join('');}
  function bul(arr){if(!arr||!arr.length)return '';return '<ul class="buls">'+arr.map(function(x){return '<li>'+escH(x)+'</li>';}).join('')+'</ul>';}
  function pro(t){return '<div class="sec-body">'+escH(t||'')+'</div>';}
  function alts(arr){if(!arr||!arr.length)return '';return arr.map(function(a){return '<div class="alert-b">'+escH(a)+'</div>';}).join('');}
  return '<div style="display:flex;gap:8px;margin-bottom:12px;">'
    +'<button class="btn-sec" style="font-size:11px;padding:6px 12px;" onclick="abrirEditInf('+c.id+')">Editar informe</button>'
    +'<button class="btn-sec" style="font-size:11px;padding:6px 12px;" onclick="regenerarInforme('+c.id+')">↻ Regenerar con IA</button>'
    +(isPub?'<button class="btn-sec" style="font-size:11px;padding:6px 12px;" onclick="verURL('+c.id+')">Ver URL cliente</button>':'')
    +'</div>'
    +'<div class="rbox">'
    +'<div class="rchip">Informe &middot; '+(d.fecha||new Date().toLocaleDateString('es-ES'))+'</div>'
    +'<div class="scores-grid">'+sc()+'</div>'
    +'<div class="sec"><div class="sec-t">Resumen</div>'+pro(d.resumen)+'</div>'
    +'<div class="sec"><div class="sec-t">Fortalezas</div>'+bul(d.fortalezas)+'</div>'
    +'<div class="sec"><div class="sec-t">Gaps</div>'+bul(d.gaps)+'</div>'
    +'<div class="sec"><div class="sec-t">Mercado 2025</div>'+pro(d.mercado)+'</div>'
    +'<div class="sec"><div class="sec-t">Estrategia</div>'+pro(d.estrategia)+'</div>'
    +'<div class="sec"><div class="sec-t">Acciones CV</div>'+bul(d.cv_acciones)+'</div>'
    +'<div class="sec"><div class="sec-t">Acciones LinkedIn</div>'+bul(d.linkedin_acciones)+'</div>'
    +'<div class="sec"><div class="sec-t">Networking</div>'+bul(d.networking_acciones)+'</div>'

function generarCVAI(id){
  var c=cands.find(function(x){return x.id===id;});
  var btn=document.getElementById('btn-gen-cv-'+id);
  var st=document.getElementById('st-gen-cv-'+id);
  var savedCvLi=document.getElementById('paste-area-cv-'+id)?document.getElementById('paste-area-cv-'+id).value:c.linkedin_texto||'';

  if(btn){btn.disabled=true;btn.textContent='Generando CV...';}
  if(st){st.innerHTML='<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div> Claude está redactando el CV...</div>';}

  var email=(c.email||'').toLowerCase().trim();
  var repData=reps[email]&&reps[email].length?reps[email][0].data||reps[email][0]:null;
  if(repData&&typeof repData==='string')repData=JSON.parse(repData);
  var nicho=repData?repData.nicho||'':'';
  var scores=repData?(repData.scores||[]).map(function(s){return s.label+': '+Math.round(s.val)+'%';}).join(' | '):'';
  var obs=(c.obstaculos||'').split('|').map(function(s){return s.trim();}).filter(Boolean).join(', ');
  var urgenciaInmediata=(c.urgencia||'').toLowerCase().indexOf('antes')>=0;

  var payload={
    accion:'generar_cv',
    nombre:c.nombre||'',email:c.email||'',ciudad:c.ciudad||'',
    exp:c.exp||'',sector:c.sector||'',cargo:c.cargo||'',
    rol:c.rol||'',modalidad:c.modalidad||'',geo:c.geo||'',
    urgencia:c.urgencia||'',habilidades:c.habilidades||'',
    logro:c.logro||'',extra:c.extra||'',
    linkedin:c.linkedin||'',cv_url:c.cv_url||'',
    obstaculos:obs,nicho:nicho,scores:scores,
    linkedin_texto:savedCvLi,
    urgencia_inmediata:urgenciaInmediata?'si':'no'
  };

  llamarEdge(payload).then(function(res){
    var cvText = '';
    var cvDataJson = null;

    if(res.cv_data){
      // CV como JSON estructurado
      cvDataJson = res.cv_data;
      cvText = res.cv_texto || '';
      localStorage.setItem('cvdata_'+id, JSON.stringify(cvDataJson));
      localStorage.setItem('cvtext_'+id, JSON.stringify(cvDataJson));
    } else {
      cvText = res.cv_texto || res.texto || '';
      if(!cvText){ throw new Error('No se recibió el texto del CV'); }
      localStorage.setItem('cvtext_'+id, cvText);
    }

    // ── AUTO-PUBLICAR en cv_publicados para que cv.html lo pueda leer ──
    var contenidoGuardar = cvDataJson
      ? JSON.stringify(cvDataJson)   // JSON estructurado — cv.html lo parsea
      : textToHtml(cvText, c.nombre||'', c.email||'', c.email||'');

    if(st){ st.innerHTML='<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div> Publicando CV...</div>'; }

    sbUpsert('cv_publicados', {
      email: (c.email||'').toLowerCase().trim(),
      candidato_id: c.id,
      contenido: contenidoGuardar
    }).then(function(){
      // Actualizar cache local
      var em = (c.email||'').toLowerCase().trim();
      if(!cvs[em]) cvs[em] = {};
      cvs[em].contenido = contenidoGuardar;

      if(st){ st.innerHTML='<span style="color:#4a7c5f;font-weight:600;">✓ CV generado y publicado. El cliente ya puede verlo.</span>'; }
      if(btn){ btn.disabled=false; btn.textContent='✨ Regenerar CV'; }
      atab='cv';
      renderMain(c);
    }).catch(function(err2){
      // Si falla la publicación, igual mostrar éxito parcial
      if(st){ st.innerHTML='<span style="color:#f3a41b;font-weight:600;">✓ CV generado (error al publicar: '+escH(String(err2))+')</span>'; }
      if(btn){ btn.disabled=false; btn.textContent='✨ Regenerar CV'; }
      atab='cv';
      renderMain(c);
    });

  }).catch(function(err){
    if(btn){ btn.disabled=false; btn.textContent='✨ Generar CV optimizado'; }
    if(st){ st.innerHTML='<span style="color:#c0756e;">Error: '+escH(String(err))+'</span>'; }
  });
}

function generarCartaAI(id){
  var c=cands.find(function(x){return x.id===id;});
  var btn=document.getElementById('btn-gen-carta-'+id);
  var st=document.getElementById('st-gen-carta-'+id);

  if(btn){btn.disabled=true;btn.textContent='Generando carta...';}

  var email=(c.email||'').toLowerCase().trim();
  var repData=reps[email]&&reps[email].length?reps[email][0].data||reps[email][0]:null;
  if(repData&&typeof repData==='string')repData=JSON.parse(repData);
  var nicho=repData?repData.nicho||'':'';
  var obs=(c.obstaculos||'').split('|').map(function(s){return s.trim();}).filter(Boolean).join(', ');

  var payload={
    accion:'generar_carta',
    nombre:c.nombre||'',email:c.email||'',ciudad:c.ciudad||'',
    linkedin:c.linkedin||'',exp:c.exp||'',sector:c.sector||'',
    cargo:c.cargo||'',rol:c.rol||'',empresa:c.empresa||'',
    logro:c.logro||'',habilidades:c.habilidades||'',
    obstaculos:obs,nicho:nicho,
    linkedin_texto:c.linkedin_texto||localStorage.getItem('cvli_'+id)||''
  };

  llamarEdge(payload).then(function(res){
    var cartaText=res.carta_texto||res.texto||'';
    if(!cartaText){throw new Error('No se recibió el texto de la carta');}
    localStorage.setItem('carta_'+id,cartaText);

function textToHtml(text, candidato, emailCand, cvEmail) {
  var _cvEmail = cvEmail || emailCand || '';

  // ── PARSEAR MARKDOWN ──
  var lines = text.split('\n').map(function(l){ return l.trim(); });

  function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function bold(t){ return esc(t).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'); }
  function fmtNum(t){ return t.replace(/\b(\d{4,})\b/g,function(m){return m.replace(/\B(?=(\d{3})+(?!\d))/g,'.');}); }

  // Encontrar secciones por encabezados ## o palabras clave en mayúsculas
  var sections = {};
  var currentSection = null;
  var currentLines = [];
  var name = '', role = '';

  for (var i = 0; i < lines.length; i++) {
    var l = lines[i];
    if (!l || l === '---') continue;

    // Detectar nombre (primera línea con # o todo mayúsculas)
    if (!name && (l.startsWith('# ') || (l === l.toUpperCase() && l.length > 3 && l.length < 60 && !l.startsWith('#')))) {
      name = l.replace(/^#+\s*/,'').trim();
      continue;
    }

    // Detectar rol (línea en negrita sin ## que viene después del nombre)
    if (!role && name && l.startsWith('**') && !l.startsWith('##') && l.length < 100) {
      role = l.replace(/\*\*/g,'').trim();
      continue;
    }

    // Detectar sección con ##
    if (l.startsWith('## ')) {
      if (currentSection) sections[currentSection] = currentLines;
      currentSection = l.replace(/^##\s*/,'').toUpperCase().trim();
      currentLines = [];
      continue;
    }

    if (currentSection) currentLines.push(l);
  }
  if (currentSection) sections[currentSection] = currentLines;

  if (!name) name = candidato || 'CV';

function publicarCV(id){
  var cvRaw=document.getElementById('cvt-'+id)?document.getElementById('cvt-'+id).value.trim():'';
  // Limpiar backticks y formato markdown extra
  var cvText=cvRaw.replace(/^```[\w]*\n?/,'').replace(/\n?```$/,'').trim();
  var st=document.getElementById('st-cvpub-'+id);
  if(!cvText){if(st){st.textContent='No hay CV para publicar.';st.style.color='#c0756e';}return;}
  var c=cands.find(function(x){return x.id===id;});
  if(st){st.textContent='Convirtiendo a HTML y publicando...';st.style.color='#666';}
  var cvHtml=textToHtml(cvText,c.nombre||'',c.email||'',c.email||'');
  if(st){st.textContent='Publicando...';st.style.color='#666';}
  sbUpsert('cv_publicados',{email:c.email,candidato_id:id,contenido:cvHtml,codigo:''}).then(function(){
    var email=(c.email||'').toLowerCase().trim();
    cvs[email]={email:c.email,codigo:'',contenido:cvHtml};
    var cvUrl=BASE+'/cv.html?email='+encodeURIComponent(c.email);
    window._lastCvUrl=cvUrl;
    if(st){st.innerHTML='<div class="code-box"><div style="font-size:11px;font-weight:700;color:#2e7d32;margin-bottom:5px;">✓ CV publicado</div><div style="font-size:11px;color:#666;margin-bottom:7px;">'+escH(cvUrl)+'</div><button class="btn" style="font-size:11px;padding:6px 12px;" onclick="navigator.clipboard.writeText(window._lastCvUrl).then(function(){showToast(\'Copiado\');})">Copiar URL</button></div>';}
    renderSidebar();
  }).catch(function(e){if(st){st.textContent='Error: '+e.message;st.style.color='#c0756e';}});
}

function enviarCartaCliente(id){

  _sec = sec;

    var nb = document.getElementById('nb-'+s);
    if (nb) nb.classList.toggle('nb-on', s===sec);

  var dp = document.getElementById('dynamic-panel');
  if (sec === 'clientes') {
    if (cp) cp.style.display = '';

// ── crearCliente ─────────────────────────────────────────
function crearCliente(){
  var nombre=document.getElementById('nc-nombre').value.trim();
  var email=document.getElementById('nc-email').value.trim().toLowerCase();
  var pass=document.getElementById('nc-pass').value.trim();
  var st=document.getElementById('nc-status');
  if(!nombre||!email){if(st){st.textContent='Nombre y email son obligatorios.';st.style.color='#c0756e';}return;}
  if(pass&&pass.length<6){if(st){st.textContent='La contraseña debe tener mínimo 6 caracteres.';st.style.color='#c0756e';}return;}
  if(st){st.textContent='Creando cliente...';st.style.color='#666';}
  sbPost('candidatos',{email:email,nombre:nombre,semana_activa:1})
  .then(function(){
    if(st){st.textContent='✓ Cliente creado';st.style.color='#5A8C6E';}
    setTimeout(function(){
      cerrarModal('modal-crear');
      ['nc-nombre','nc-email','nc-pass'].forEach(function(id){
        var el=document.getElementById(id);if(el)el.value='';
      });
      loadCands();
    },1200);
  }).catch(function(err){
    if(st){st.textContent='Error: '+String(err);st.style.color='#c0756e';}
  });
}
