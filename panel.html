<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Panel Coach · Career Pathway</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">

<style>
:root {
  /* Paleta de Alto Contraste */
  --sidebar-bg: #1e272e;
  --main-bg: #f4f7f6;
  --accent: #0984e3;
  --accent-dark: #074b83;
  --text-main: #2d3436;
  --text-light: #636e72;
  --white: #ffffff;
  --border: #dcdde1;
  --radius: 12px;
  --shadow: 0 4px 12px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Open Sans', sans-serif;
  background-color: var(--main-bg);
  color: var(--text-main);
  height: 100vh;
  overflow: hidden; /* Evita que las páginas se junten al hacer scroll */
}

/* ESTRUCTURA PRINCIPAL */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: 100vh;
}

/* BARRA LATERAL */
.sidebar {
  background: var(--sidebar-bg);
  color: var(--white);
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(255,255,255,0.1);
  overflow-y: auto;
}

.sb-header {
  padding: 30px 20px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.sb-header h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: 18px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.nav-group { padding: 20px 15px; }

.nb {
  display: block;
  padding: 12px 16px;
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  border-radius: var(--radius);
  margin-bottom: 8px;
  font-weight: 600;
  transition: all 0.3s ease;
  cursor: pointer;
}

.nb:hover {
  background: rgba(255,255,255,0.05);
  color: var(--white);
}

.nb.nb-on {
  background: var(--accent);
  color: var(--white);
  box-shadow: 0 4px 12px rgba(9, 132, 227, 0.4);
}

/* CONTENIDO PRINCIPAL */
.main-content {
  overflow-y: auto;
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 30px;
}

.section-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 20px;
  color: var(--text-main);
  border-left: 5px solid var(--accent);
  padding-left: 15px;
}

/* TARJETAS Y CONTENEDORES */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 30px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.grid-cols {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

/* FORMULARIOS */
.form-group { margin-bottom: 20px; }

label {
  display: block;
  font-weight: 700;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text-light);
  text-transform: uppercase;
}

input, select, textarea {
  width: 100%;
  padding: 12px 15px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  transition: border-color 0.3s;
}

input:focus {
  outline: none;
  border-color: var(--accent);
}

.btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  transition: background 0.3s;
}

.btn:hover { background: var(--accent-dark); }

/* LISTA DE CLIENTES EN SIDEBAR (Ejemplo de mejora) */
.client-item {
  padding: 12px;
  margin: 5px 0;
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  cursor: pointer;
}

.client-item.active {
  background: rgba(255,255,255,0.15);
  border: 1px solid var(--accent);
}

/* ESTADOS VISUALES */
.status-msg { margin-top: 10px; font-size: 14px; font-weight: 600; }

</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="sb-header">
      <h1>Coach Panel</h1>
    </div>
    
    <nav class="nav-group">
      <div class="nb nb-on" onclick="showSec('sec-home')">🏠 Dashboard</div>
      <div class="nb" onclick="showSec('sec-clientes')">👥 Gestionar Clientes</div>
      <div class="nb" onclick="showSec('sec-config')">⚙️ Configuración</div>
    </nav>

    <div style="padding:20px; border-top:1px solid rgba(255,255,255,0.05);">
      <p style="font-size:11px; color:rgba(255,255,255,0.4);">CLIENTES RECIENTES</p>
      <div id="sidebar-client-list">
        </div>
    </div>
  </aside>

  <main class="main-content">
    
    <section id="sec-home">
      <h2 class="section-title">Resumen General</h2>
      <div class="grid-cols">
        <div class="card">
          <h3>Clientes Activos</h3>
          <p style="font-size:32px; font-weight:800; color:var(--accent);" id="count-activos">0</p>
        </div>
        <div class="card">
          <h3>Última Actividad</h3>
          <p id="last-activity">Cargando...</p>
        </div>
      </div>
    </section>

    <section id="sec-clientes" style="display:none;">
      <h2 class="section-title">Crear Nuevo Cliente</h2>
      <div class="card" style="max-width: 600px;">
        <div class="form-group">
          <label>Nombre Completo</label>
          <input type="text" id="nc-nombre" placeholder="Ej. Juan Pérez">
        </div>
        <div class="form-group">
          <label>Email de Acceso</label>
          <input type="email" id="nc-email" placeholder="juan@ejemplo.com">
        </div>
        <div class="form-group">
          <label>Contraseña Temporal</label>
          <input type="password" id="nc-pass" placeholder="Mínimo 6 caracteres">
        </div>
        <button class="btn" onclick="crearCliente()">Registrar Cliente</button>
        <div id="nc-status" class="status-msg"></div>
      </div>
    </section>

  </main>
</div>

<script>
// Lógica de navegación
function showSec(id) {
  document.querySelectorAll('section').forEach(s => s.style.display = 'none');
  document.getElementById(id).style.display = 'block';
  
  document.querySelectorAll('.nb').forEach(n => n.classList.remove('nb-on'));
  event.currentTarget.classList.add('nb-on');
}

// Simulación de las funciones que ya tenías
function crearCliente() {
  const nombre = document.getElementById('nc-nombre').value;
  const status = document.getElementById('nc-status');
  
  if(!nombre) {
    status.innerText = "Error: El nombre es obligatorio";
    status.style.color = "#d63031";
    return;
  }
  
  status.innerText = "Procesando...";
  status.style.color = "#0984e3";
  
  // Aquí iría tu sbPost('candidatos', ...) original
  setTimeout(() => {
    status.innerText = "✓ Cliente creado correctamente";
    status.style.color = "#00b894";
  }, 1000);
}

// Función para renderizar clientes en el sidebar (Mejora visual)
function renderSidebarClients(lista) {
  const container = document.getElementById('sidebar-client-list');
  container.innerHTML = lista.map(c => `
    <div class="client-item" onclick="cargarDetalle('${c.id}')">
      <div style="font-weight:600; font-size:13px;">${c.nombre}</div>
      <div style="font-size:11px; opacity:0.6;">${c.email}</div>
    </div>
  `).join('');
}
</script>

</body>
</html>
