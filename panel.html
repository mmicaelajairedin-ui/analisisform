<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;}
.layout{display:grid;grid-template-columns:300px 1fr;min-height:100vh;}
.sidebar{background:#fff;border-right:1px solid #eee;display:flex;flex-direction:column;}
.sidebar-top{padding:20px;border-bottom:1px solid #eee;}
.sidebar-top h1{font-size:15px;font-weight:700;color:#1a1a1a;}
.sidebar-top p{font-size:11px;color:#999;margin-top:2px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;}
.stat{background:#f9f8f8;border-radius:8px;padding:10px 12px;}
.stat-l{font-size:10px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.stat-v{font-size:20px;font-weight:700;color:#1a1a1a;margin-top:2px;}
.clist{flex:1;overflow-y:auto;padding:8px;}
.crow{padding:12px;border-radius:10px;cursor:pointer;margin-bottom:4px;transition:all .15s;border:1px solid transparent;}
.crow:hover{background:#f9f8f8;border-color:#eee;}
.crow.on{background:#f3efef;border-color:#8C7B80;}
.crow-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.crow-sub{font-size:11px;color:#999;margin-top:2px;}
.crow-pills{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.pill-new{background:#fef3e2;color:#b45309;}
.pill-pub{background:#e8f5e9;color:#2e7d32;}
.pill-rep{background:#f3efef;color:#6B5A5F;}
.empty-list{padding:2rem;text-align:center;color:#999;font-size:13px;}
.refresh-btn{margin:8px 12px;padding:8px;font-size:11px;font-weight:600;font-family:'Montserrat',sans-serif;background:transparent;border:1px solid #eee;border-radius:8px;cursor:pointer;color:#666;width:calc(100% - 24px);transition:all .15s;}
.refresh-btn:hover{border-color:#8C7B80;color:#8C7B80;}

.main{padding:24px;overflow-y:auto;}
.empty-main{display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-size:14px;text-align:center;flex-direction:column;gap:8px;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid #eee;margin-bottom:20px;}
.tab{font-size:13px;padding:8px 16px;cursor:pointer;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;transition:all .15s;}
.tab.on{color:#8C7B80;border-bottom-color:#8C7B80;font-weight:700;}
.tc{display:none;}.tc.on{display:block;}

/* CANDIDATE HEADER */
.chead{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #eee;}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.chead-name{font-size:17px;font-weight:700;color:#1a1a1a;}
.chead-sub{font-size:12px;color:#999;margin-top:2px;}
.chead-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:9px 18px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;background:#8C7B80;color:#fff;border:none;border-radius:8px;cursor:pointer;transition:background .15s;}
.btn:hover{background:#6B5A5F;}
.btn:disabled{background:#ddd;color:#999;cursor:not-allowed;}
.btn-sec{padding:9px 18px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;background:transparent;color:#8C7B80;border:1.5px solid #8C7B80;border-radius:8px;cursor:pointer;transition:all .15s;}
.btn-sec:hover{background:#f3efef;}
.btn-danger{padding:9px 18px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;background:transparent;color:#c0756e;border:1.5px solid #c0756e;border-radius:8px;cursor:pointer;}

/* INFO GRID */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.ii{background:#f9f8f8;border-radius:8px;padding:10px 12px;}
.iil{font-size:10px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.iiv{font-size:13px;color:#1a1a1a;font-weight:500;line-height:1.4;}
.fw{grid-column:1/-1;}
.olist{display:flex;flex-direction:column;gap:6px;}
.oi{display:flex;align-items:center;gap:8px;font-size:12px;padding:7px 10px;background:#f9f8f8;border-radius:8px;}
.odot{width:5px;height:5px;border-radius:50%;background:#c0756e;flex-shrink:0;}

/* GENERADOR */
.gen-box{background:#fff;border:1px solid #eee;border-radius:12px;padding:20px;margin-bottom:16px;}
.gen-box h3{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.gen-box p{font-size:12px;color:#666;margin-bottom:12px;line-height:1.5;}
textarea{width:100%;padding:10px 12px;font-size:12px;font-family:'Montserrat',sans-serif;border:1.5px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;resize:vertical;outline:none;line-height:1.5;transition:border-color .15s;}
textarea:focus{border-color:#8C7B80;box-shadow:0 0 0 2px rgba(140,123,128,.1);}
.prompt-area{background:#f9f8f8;border-radius:8px;padding:12px;margin:10px 0;font-size:11px;font-family:monospace;color:#333;line-height:1.5;max-height:150px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;border:1px solid #eee;}
.status{font-size:11px;color:#999;margin-top:6px;min-height:14px;}

/* REPORT */
.report{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #eee;}
.rhead{background:#8C7B80;padding:22px 26px;display:flex;align-items:center;justify-content:space-between;}
.rhead-name{font-size:17px;font-weight:700;color:#fff;}
.rhead-title{font-size:11px;color:rgba(255,255,255,.85);margin-top:2px;letter-spacing:.04em;}
.rhead-meta{text-align:right;color:#fff;}
.rhead-tag{font-size:9px;font-weight:600;opacity:.7;letter-spacing:.08em;text-transform:uppercase;}
.rhead-cand{font-size:14px;font-weight:700;margin-top:2px;}
.rhead-date{font-size:10px;opacity:.75;margin-top:1px;}
.rbody{padding:22px 26px;}

/* SCORES */
.scores-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:22px;}
.score-card{background:#f9f8f8;border-radius:8px;padding:12px 8px;text-align:center;}
.sc-label{font-size:8px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;line-height:1.4;}
.sc-pct{font-size:22px;font-weight:700;line-height:1;}
.sc-pct.hi{color:#4a7c5f;}.sc-pct.mid{color:#8C7B80;}.sc-pct.lo{color:#c0756e;}
.sc-track{height:5px;background:#eee;border-radius:3px;margin-top:6px;overflow:hidden;}
.sc-fill{height:5px;border-radius:3px;}
.fill-hi{background:#4a7c5f;}.fill-mid{background:#8C7B80;}.fill-lo{background:#c0756e;}
.sc-delta{font-size:9px;font-weight:700;margin-top:4px;}
.sc-delta.up{color:#4a7c5f;}.sc-delta.same{color:#999;}

/* PROGRESS COMPARISON */
.progress-banner{background:linear-gradient(135deg,#f3efef,#e8f5e9);border-radius:10px;padding:14px 16px;margin-bottom:16px;border:1px solid #ddd;}
.progress-banner h4{font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:10px;}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.prog-label{font-size:11px;color:#666;width:120px;flex-shrink:0;}
.prog-bars{flex:1;display:flex;flex-direction:column;gap:3px;}
.prog-bar-wrap{display:flex;align-items:center;gap:6px;}
.prog-bar-bg{flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden;}
.prog-bar-fill{height:5px;border-radius:3px;transition:width .6s ease;}
.prog-bar-lbl{font-size:10px;font-weight:600;min-width:32px;text-align:right;}
.bar-before{background:#ddd;}.bar-after{background:#8C7B80;}
.prog-change{font-size:11px;font-weight:700;color:#4a7c5f;min-width:40px;text-align:right;}

.sec{margin-bottom:18px;}
.sec-title{font-size:10px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.sec-title::after{content:'';flex:1;height:1px;background:#f0ecec;}
.sec-body{font-size:12px;color:#2a2a2a;line-height:1.75;white-space:pre-wrap;}
.bullets{list-style:none;padding:0;}
.bullets li{font-size:12px;color:#2a2a2a;line-height:1.65;padding:5px 0 5px 16px;position:relative;border-bottom:0.5px solid #f5f1f1;}
.bullets li:last-child{border-bottom:none;}
.bullets li::before{content:'';position:absolute;left:0;top:13px;width:5px;height:5px;border-radius:50%;background:#8C7B80;}
.alert-box{background:#fdf6f6;border-left:3px solid #c0756e;border-radius:0 8px 8px 0;padding:9px 12px;margin-bottom:7px;font-size:12px;color:#2a2a2a;line-height:1.5;}
.motivador{background:#f3efef;border-radius:10px;padding:14px 16px;font-size:13px;color:#4a3a3e;line-height:1.65;font-style:italic;border-left:3px solid #8C7B80;}
.rfooter{background:#f9f8f8;border-top:1px solid #ece8e8;padding:12px 26px;display:flex;align-items:center;justify-content:space-between;}
.rfooter-brand{font-size:10px;font-weight:600;color:#8C7B80;}
.rfooter-note{font-size:9px;color:#aaa;}

/* PUBLISH */
.pub-box{background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:14px 16px;margin-top:16px;}
.pub-box h4{font-size:13px;font-weight:700;color:#166534;margin-bottom:4px;}
.pub-box p{font-size:12px;color:#166534;margin-bottom:10px;line-height:1.5;}
.pub-url{font-size:11px;font-family:monospace;background:#fff;border:1px solid #86efac;border-radius:6px;padding:8px 10px;color:#166534;word-break:break-all;}

/* NOTAS */
.narea{width:100%;font-size:12px;line-height:1.6;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-family:'Montserrat',sans-serif;resize:vertical;min-height:100px;outline:none;}
.narea:focus{border-color:#8C7B80;}
.saveok{font-size:11px;color:#8C7B80;font-weight:600;display:none;margin-left:8px;}

@media(max-width:768px){.layout{grid-template-columns:1fr;}.sidebar{max-height:300px;}.igrid{grid-template-columns:1fr;}.scores-grid{grid-template-columns:1fr 1fr;}}
@media print{
  .sidebar{display:none;}.layout{grid-template-columns:1fr;}
  .tabs{display:none;}.chead-actions{display:none;}.gen-box{display:none;}
  .pub-box{display:none;}.rhead{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .score-card{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .alert-box{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .motivador{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .progress-banner{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>
<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-top">
    <h1>Panel del coach</h1>
    <p>Micaela Jairedin · Career Coach & Recruiter</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-l">Total</div><div class="stat-v" id="st-tot">—</div></div>
    <div class="stat"><div class="stat-l">Nuevos</div><div class="stat-v" id="st-new">—</div></div>
    <div class="stat"><div class="stat-l">Con informe</div><div class="stat-v" id="st-rep">—</div></div>
    <div class="stat"><div class="stat-l">Publicados</div><div class="stat-v" id="st-pub">—</div></div>
  </div>
  <button class="refresh-btn" onclick="loadCands()">↺ Actualizar candidatos</button>
  <div class="clist" id="clist"><div class="empty-list">Cargando...</div></div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="empty-main">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <p>Selecciona un candidato para ver su perfil y generar el informe</p>
  </div>
</div>

</div>

<script charset="utf-8">
// @charset utf-8

const SB_URL='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
const BASE='https://mmicaelajairedin-ui.github.io/analisisform';

async function sbGet(table,filter){
  const url=SB_URL+'/rest/v1/'+table+'?'+filter+'&order=created_at.desc';
  const r=await fetch(url,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  return r.json();
}
async function sbInsert(table,data){
  const r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error(await r.text());
}
async function sbUpdate(table,id,data){
  const r=await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},body:JSON.stringify(data)});
  if(!r.ok)throw new Error(await r.text());
}

let cands=[], reps={}, notes={}, activeId=null, atab='datos';
const COLORS=['#E8D5D8:#6B4A50','#D5DDE8:#4A5A6B','#D5E8D8:#4A6B4A','#E8E0D5:#6B5A4A','#E0D5E8:#5A4A6B'];

function closePubModal(){var m=document.getElementById("modal-pub");if(m)m.remove();}
async function loadCands(){
  document.getElementById('clist').innerHTML='<div class="empty-list">Cargando...</div>';
  try{
    const all=await sbGet('candidatos','select=*');
    // Group by email '+'\u2014'+' keep most recent per email, track submission count
    const byEmail={};
    all.forEach(c=>{
      const key=(c.email||'sin-email').toLowerCase().trim();
      if(!byEmail[key]){byEmail[key]=[];}
      byEmail[key].push(c);
    });
    // For each email group: sort by created_at desc, keep most recent as main record
    cands=Object.values(byEmail).map(group=>{
      group.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
      const main=group[0];
      main._submissions=group.length;
      main._history=group;
      return main;
    });
    // Sort all by most recent submission
    cands.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    reps=JSON.parse(localStorage.getItem('mj_panel_reps')||'{}');
    notes=JSON.parse(localStorage.getItem('mj_panel_notes')||'{}');
    renderSidebar();
  }catch(e){
    document.getElementById('clist').innerHTML='<div class="empty-list">Error al cargar. Pulsa Actualizar.</div>';
  }
}

function renderSidebar(){
  const newC=cands.filter(c=>!localStorage.getItem('seen_p_'+c.id)).length;
  const repC=Object.keys(reps).length;
  const pubC=Object.values(reps).filter(r=>r.published).length;
  document.getElementById('st-tot').textContent=cands.length;
  document.getElementById('st-new').textContent=newC;
  document.getElementById('st-rep').textContent=repC;
  document.getElementById('st-pub').textContent=pubC;

  const list=document.getElementById('clist');
  if(!cands.length){list.innerHTML='<div class="empty-list">No hay candidatos a\u00FAn.<br>Cuando alguien complete el formulario aparecer\u00E1 aqu\u00ED.</div>';return;}
  list.innerHTML='';
  cands.forEach((c,i)=>{
    const seen=localStorage.getItem('seen_p_'+c.id);
    const hasRep=!!reps[c.id];
    const isPub=hasRep&&reps[c.id].published;
    const col=COLORS[i%COLORS.length].split(':');
    const ini=(c.nombre||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
    const d=document.createElement('div');
    d.className='crow'+(activeId===c.id?' on':'');
    d.onclick=()=>openCand(c.id);
    d.innerHTML='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">'
      +'<div class="av" style="width:30px;height:30px;font-size:11px;background:'+col[0]+';color:'+col[1]+'">'+ini+'</div>'
      +'<div class="crow-name">'+(c.nombre||''+'\u2014'+'')+'</div>'
      +(c._submissions>1?'<span style="font-size:9px;font-weight:700;background:#f3efef;color:#6B5A5F;padding:2px 6px;border-radius:10px;">'+c._submissions+'x</span>':'')
      +'</div>'
      +'<div class="crow-sub">'+(c.rol||c.sector||''+'\u2014'+'')+' &middot; '+(c.ciudad||''+'\u2014'+'')+'</div>'
      +'<div class="crow-pills">'
      +(!seen?'<span class="pill pill-new">Nuevo</span>':'')
      +(hasRep?'<span class="pill pill-rep">Informe \u2713</span>':'')
      +(isPub?'<span class="pill pill-pub">Publicado</span>':'')
      +'</div>';
    list.appendChild(d);
  });
}

function openCand(id){
  activeId=id;atab='datos';
  localStorage.setItem('seen_p_'+id,'1');
  const c=cands.find(x=>x.id===id);
  renderSidebar();
  renderMain(c);
}

function makeTabs(atab,cid,hasRep){
  var tabs=['datos','generar'];
  if(hasRep) tabs.push('informe');
  tabs.push('cv');
  tabs.push('notas');
  var labels={datos:'Datos',generar:'Generar informe',informe:'Informe',cv:'Generar CV',notas:'Mis notas'};
  var html='<div class="tabs">';
  for(var i2=0;i2<tabs.length;i2++){
    var t=tabs[i2];
    var cls='tab'+(atab===t?' on':'');
    var oc="switchTab('"+t+"',"+cid+")";
    html+='<div class="'+cls+'" onclick="'+oc+'">'+labels[t]+'</div>';
  }
  return html+'</div>';
}

function renderMain(c){
  const hasRep=!!reps[c.id];
  const isPub=hasRep&&reps[c.id].published;
  const i=cands.findIndex(x=>x.id===c.id);
  const col=COLORS[i%COLORS.length].split(':');
  const ini=(c.nombre||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();

  document.getElementById('main').innerHTML=
    '<div class="chead">'
      +'<div class="av" style="background:'+col[0]+';color:'+col[1]+'">'+ini+'</div>'
      +'<div><div class="chead-name">'+(c.nombre||''+'\u2014'+'')+'</div><div class="chead-sub">'+(c.email||''+'\u2014'+'')+' &middot; '+(c.ciudad||''+'\u2014'+'')+'</div></div>'
      +'<div class="chead-actions">'
        +(hasRep?'<button class="btn" onclick="printReport()">Descargar PDF</button>':'')
        +(hasRep&&!isPub?'<button class="btn-sec" onclick="publicarInforme('+c.id+')">Publicar al cliente</button>':'')
        +(isPub?'<button class="btn-sec" onclick="verUrlCliente('+c.id+')">Ver URL cliente</button>':'')
      +'</div>'
    +'</div>'
    +'<div class="tabs">'
      +'<div class="tab '+(atab==='datos'?'on':'')+'" onclick="switchTab(\'datos\','+c.id+')">Datos</div>'
      +'<div class="tab '+(atab==='generar'?'on':'')+'" onclick="switchTab(\'generar\','+c.id+')">Generar informe</div>'
      +(hasRep?'<div class="tab '+(atab==='informe'?'on':'')+'" onclick="switchTab(\'informe\','+c.id+')">Informe</div>':'')
      +'<div class="tab '+(atab==='notas'?'on':'')+'" onclick="switchTab(\'notas\','+c.id+')">Mis notas</div>'
    +'</div>'
    +'<div id="tab-content">'+renderTab(c, atab)+'</div>';
}

function switchTab(tab,id){
  atab=tab;
  const c=cands.find(x=>x.id===id);
  document.getElementById('tab-content').innerHTML=renderTab(c,tab);
}

function renderTab(c,tab){
  if(tab==='datos') return tabDatos(c);
  if(tab==='generar') return tabGenerar(c);
  if(tab==='informe') return tabInforme(c);
  if(tab==='cv') return tabCV(c);
  if(tab==='notas') return tabNotas(c);
  return '';
}

function tabDatos(c){
  const liUrl=c.linkedin?'linkedin.com/in/'+c.linkedin:'No tiene';
  const obs=(c.obstaculos||'').split('|').map(s=>s.trim()).filter(s=>s&&s!==''+'\u2014'+'');
  const ski=(c.skills||'').split(',').map(s=>s.trim()).filter(s=>s&&s!==''+'\u2014'+'');
  return '<div class="igrid">'
    +'<div class="ii"><div class="iil">Situaci\u00F3n</div><div class="iiv">'+(c.situacion||''+'\u2014'+'')+'</div></div>'
    +'<div class="ii"><div class="iil">Urgencia</div><div class="iiv">'+(c.urgencia||''+'\u2014'+'')+'</div></div>'

function generarInforme(id){
  const jsonTxt=document.getElementById('json-'+id).value.trim();
  const st=document.getElementById('st-gen-'+id);
  let d;
  try{ d=JSON.parse(jsonTxt.replace(/```json|```/g,'').trim()); }
  catch(e){ st.textContent='JSON no v\u00E1lido. C\u00F3pialo exactamente como lo gener\u00F3 Claude.'; st.style.color='#c0756e'; return; }

  // Check if there's a previous report for progress tracking
  const prev=reps[id]?reps[id].data:null;
  reps[id]={data:d, published:false, prev:prev, createdAt:new Date().toISOString()};
  localStorage.setItem('mj_panel_reps',JSON.stringify(reps));

  st.textContent='\u2713 Informe generado. Ve a la pesta\u00F1a "Informe".';
  st.style.color='#4a7c5f';

  // Switch to informe tab
  setTimeout(()=>{atab='informe';renderMain(cands.find(x=>x.id===id));},800);
}

function tabInforme(c){
  const rep=reps[c.id];
  if(!rep) return '<p style="color:#999;font-size:13px;">Genera el informe primero.</p>';
  const d=rep.data;
  const prev=rep.prev;

  function sc(arr){
    return arr.map(s=>{
      const pct=Math.min(100,Math.max(0,Math.round(s.val)));
      const cl=pct>=70?'hi':pct>=45?'mid':'lo';
      let delta='';
      if(prev){
        const prevScore=prev.scores.find(ps=>ps.label===s.label);
        if(prevScore){const diff=pct-Math.round(prevScore.val);delta='<div class="sc-delta '+(diff>=0?'up':'same')+'">'+(diff>=0?'+':'')+diff+'%</div>';}
      }
      return '<div class="score-card"><div class="sc-label">'+s.label+'</div>'
        +'<div class="sc-pct '+cl+'">'+pct+'%</div>'
        +'<div class="sc-track"><div class="sc-fill fill-'+cl+'" style="width:'+pct+'%"></div></div>'
        +delta+'</div>';
    }).join('');
  }
  function bul(arr){if(!arr||!arr.length)return '<p style="font-size:12px;color:#999;">'+'\u2014'+'</p>';return '<ul class="bullets">'+arr.map(x=>'<li>'+x+'</li>').join('')+'</ul>';}
  function alts(arr){if(!arr||!arr.length)return '';return arr.map(a=>'<div class="alert-box">'+a+'</div>').join('');}
  function pro(t){return '<div class="sec-body">'+(t||''+'\u2014'+'')+'</div>';}

  // Progress banner if there's a previous report
  let progressHTML='';
  if(prev){
    progressHTML='<div class="progress-banner"><h4>Progreso desde el primer an\u00E1lisis</h4>'
      +d.scores.map(s=>{
        const cur=Math.round(s.val);
        const prevS=prev.scores.find(ps=>ps.label===s.label);
        const pre=prevS?Math.round(prevS.val):0;
        const diff=cur-pre;
        return '<div class="prog-row">'
          +'<div class="prog-label">'+s.label+'</div>'
          +'<div class="prog-bars">'
          +'<div class="prog-bar-wrap"><div class="prog-bar-bg"><div class="prog-bar-fill bar-before" style="width:'+pre+'%"></div></div><div class="prog-bar-lbl" style="color:#999;">'+pre+'%</div></div>'
          +'<div class="prog-bar-wrap"><div class="prog-bar-bg"><div class="prog-bar-fill bar-after" style="width:'+cur+'%"></div></div><div class="prog-bar-lbl" style="color:#8C7B80;">'+cur+'%</div></div>'
          +'</div>'
          +'<div class="prog-change">'+(diff>=0?'+':'')+diff+'%</div>'
          +'</div>';
      }).join('')+'</div>';
  }

  return progressHTML
    +'<div class="report">'
    +'<div class="rhead">'
      +'<div><div class="rhead-name">Micaela Jairedin</div><div class="rhead-title">Career Coach & Recruiter</div></div>'
      +'<div class="rhead-meta"><div class="rhead-tag">Informe de perfil</div><div class="rhead-cand">'+(d.candidato||''+'\u2014'+'')+'</div><div class="rhead-date">'+(d.fecha||new Date().toLocaleDateString('es-ES'))+'</div></div>'
    +'</div>'
    +'<div class="rbody">'
      +'<div class="scores-grid">'+sc(d.scores||[])+'</div>'
      +'<div class="sec"><div class="sec-title">Resumen ejecutivo</div>'+pro(d.resumen)+'</div>'
      +'<div class="sec"><div class="sec-title">Fortalezas a explotar</div>'+bul(d.fortalezas)+'</div>'
      +'<div class="sec"><div class="sec-title">Gaps y puntos de mejora</div>'+bul(d.gaps)+'</div>'
      +'<div class="sec"><div class="sec-title">Contexto del mercado 2025</div>'+pro(d.mercado)+'</div>'
      +'<div class="sec"><div class="sec-title">Estrategia recomendada</div>'+pro(d.estrategia)+'</div>'
      +'<div class="sec"><div class="sec-title">Acciones '+'\u2014'+' CV</div>'+bul(d.cv_acciones)+'</div>'
      +'<div class="sec"><div class="sec-title">Acciones '+'\u2014'+' LinkedIn</div>'+bul(d.linkedin_acciones)+'</div>'
      +'<div class="sec"><div class="sec-title">Acciones '+'\u2014'+' Networking</div>'+bul(d.networking_acciones)+'</div>'
      +'<div class="sec"><div class="sec-title">Alertas internas (solo coach)</div>'+alts(d.alertas)+'</div>'
      +(d.mensaje_candidato?'<div class="sec"><div class="sec-title">Mensaje para el candidato</div><div class="motivador">'+d.mensaje_candidato+'</div></div>':'')
    +'</div>'
    +'<div class="rfooter"><div class="rfooter-brand">Micaela Jairedin &middot; Career Coach & Recruiter</div><div class="rfooter-note">Documento confidencial</div></div>'
    +'</div>';
}

  modal.id='modal-pub';modal.innerHTML='<div style="background:#fff;border-radius:16px;padding:24px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;font-family:Montserrat,sans-serif;">'
    +'<h3 style="font-size:15px;font-weight:700;margin-bottom:4px;">Revisar antes de publicar</h3>'
    +'<p style="font-size:12px;color:#666;margin-bottom:16px;line-height:1.5;">Edita el informe antes de envi\u00E1rselo al cliente. Los cambios solo afectan a la versi\u00F3n publicada.</p>'
    +'<div style="margin-bottom:12px;">'
      +'<label style="font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;">Resumen ejecutivo</label>'
      +'<textarea id="ed-resumen" style="width:100%;padding:10px;font-size:12px;font-family:Montserrat,sans-serif;border:1.5px solid #ddd;border-radius:8px;resize:vertical;min-height:80px;outline:none;">'+( d.resumen||'')+'</textarea>'
    +'</div>'
    +'<div style="margin-bottom:12px;">'
      +'<label style="font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;">Mensaje para el cliente</label>'
      +'<textarea id="ed-mensaje" style="width:100%;padding:10px;font-size:12px;font-family:Montserrat,sans-serif;border:1.5px solid #ddd;border-radius:8px;resize:vertical;min-height:80px;outline:none;">'+( d.mensaje_candidato||'')+'</textarea>'
    +'</div>'
    +'<div style="margin-bottom:16px;">'
      +'<label style="font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:8px;">Puntuaciones (%)</label>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'
      +d.scores.map((s,i)=>'<div><label style="font-size:10px;color:#999;display:block;margin-bottom:3px;">'+s.label+'</label>'
        +'<input type="number" id="ed-score-'+i+'" min="0" max="100" value="'+Math.round(s.val)+'" style="width:100%;padding:7px 10px;font-size:13px;font-family:Montserrat,sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;"></div>').join('')
      +'</div>'
    +'</div>'
    +'<div style="margin-bottom:12px;">'
      +'<label style="font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;">Estrategia recomendada</label>'
      +'<textarea id="ed-estrategia" style="width:100%;padding:10px;font-size:12px;font-family:Montserrat,sans-serif;border:1.5px solid #ddd;border-radius:8px;resize:vertical;min-height:60px;outline:none;">'+( d.estrategia||'')+'</textarea>'
    +'</div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;">'
      +'<button class="btn-sec" onclick="closePubModal()">Cancelar</button>'
      +'<button class="btn" onclick="confirmarPublicar('+id+',this)">Publicar al cliente -></button>'
    +'</div>'
  +'</div>';
  document.body.appendChild(modal);
}

function confirmarPublicar(id, btn){
  const rep=reps[id];if(!rep)return;
  const c=cands.find(x=>x.id===id);
  const d=rep.data;

  // Apply edits
  d.resumen=document.getElementById('ed-resumen').value;
  d.mensaje_candidato=document.getElementById('ed-mensaje').value;
  d.scores=d.scores.map((s,i)=>({...s,val:parseInt(document.getElementById('ed-score-'+i).value)||s.val}));
  const edEst=document.getElementById('ed-estrategia');if(edEst)d.estrategia=edEst.value;

  btn.textContent='Publicando...';btn.disabled=true;

  // Find previous published informe for this email to use as prev
  const prevRep=rep.prev;

  rep.data=d;rep.published=true;
  localStorage.setItem('mj_panel_reps',JSON.stringify(reps));

  sbInsert('informes',{candidato_id:id,email:c.email,data:JSON.stringify(d),prev:prevRep?JSON.stringify(prevRep):null})
    .then(()=>{
      document.querySelector('div[style*="position:fixed"]').remove();
      renderSidebar();renderMain(c);
      // Show URL
      verUrlCliente(id);
    })
    .catch(()=>{btn.textContent='Publicar al cliente ->';btn.disabled=false;alert('Error al publicar. Int\u00E9ntalo de nuevo.');});
}

function verUrlCliente(id){
  const c=cands.find(x=>x.id===id);
  const url=BASE+'/cliente.html?email='+encodeURIComponent(c.email);
  const box=document.createElement('div');box.id='url-modal';
  box.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:9999;';
  box.innerHTML='<div style="background:#fff;border-radius:14px;padding:24px;max-width:480px;width:90%;font-family:Montserrat,sans-serif;">'
    +'<h3 style="font-size:15px;font-weight:700;margin-bottom:8px;">URL del cliente</h3>'
    +'<p style="font-size:12px;color:#666;margin-bottom:12px;">Env\u00EDa este link al candidato para que vea su informe:</p>'
    +'<div style="background:#f9f8f8;border-radius:8px;padding:10px;font-size:11px;font-family:monospace;word-break:break-all;color:#333;margin-bottom:12px;">'+url+'</div>'
    +'<div style="display:flex;gap:8px;">'
    +'<button class="btn" onclick="navigator.clipboard.writeText(\''+url+'\').then(()=>this.textContent=\'Copiado \u2713\')">Copiar link</button>'
    +'<button class="btn-sec" onclick="document.getElementById(\'url-modal\').remove()">Cerrar</button>'
    +'</div></div>';
  document.body.appendChild(box);
}

function printReport(){window.print();}
function escH(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

loadCands();
