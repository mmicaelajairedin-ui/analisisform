<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel del coach — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;}
.layout{display:grid;grid-template-columns:300px 1fr;min-height:100vh;}
.sidebar{background:#fff;border-right:1px solid #eee;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden;}
.sb-top{padding:16px;border-bottom:1px solid #eee;}
.sb-top h1{font-size:15px;font-weight:700;color:#1a1a1a;}
.sb-top p{font-size:11px;color:#999;margin-top:2px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px;}
.stat{background:#f9f8f8;border-radius:8px;padding:10px;}
.stat-l{font-size:9px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.stat-v{font-size:20px;font-weight:700;color:#1D9E75;margin-top:2px;}
.refresh-btn{margin:0 10px 8px;padding:8px;font-size:11px;font-weight:600;font-family:'Montserrat',sans-serif;background:transparent;border:1px solid #eee;border-radius:8px;cursor:pointer;color:#666;width:calc(100% - 20px);transition:all .15s;}
.refresh-btn:hover{border-color:#8C7B80;color:#8C7B80;}
.clist{flex:1;overflow-y:auto;padding:8px;}
.crow{padding:10px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:all .15s;border:1px solid transparent;}
.crow:hover{background:#f9f8f8;border-color:#eee;}
.crow.on{background:#f3efef;border-color:#8C7B80;}
.crow-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.crow-name{font-size:13px;font-weight:600;color:#1a1a1a;flex:1;}
.crow-sub{font-size:11px;color:#999;}
.crow-pills{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.pill-new{background:#fef3e2;color:#b45309;}
.pill-ok{background:#E1F5EE;color:#085041;}
.pill-rep{background:#f3efef;color:#6B5A5F;}
.pill-pub{background:#e8f5e9;color:#2e7d32;}
.empty-list{padding:2rem;text-align:center;color:#999;font-size:13px;line-height:1.6;}
.main{padding:24px;overflow-y:auto;}
.empty-main{display:flex;align-items:center;justify-content:center;min-height:60vh;color:#999;font-size:14px;text-align:center;flex-direction:column;gap:8px;}
.chead{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #eee;flex-wrap:wrap;}
.av-big{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;}
.chead-name{font-size:17px;font-weight:700;}
.chead-sub{font-size:12px;color:#999;margin-top:2px;}
.chead-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;}
.tabs{display:flex;border-bottom:1px solid #eee;margin-bottom:20px;overflow-x:auto;}
.tab{font-size:12px;padding:8px 14px;cursor:pointer;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;white-space:nowrap;transition:all .15s;}
.tab.on{color:#8C7B80;border-bottom-color:#8C7B80;font-weight:700;}
.tc{display:none;}.tc.on{display:block;}
.btn{padding:8px 16px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;background:#8C7B80;color:#fff;border:none;border-radius:8px;cursor:pointer;transition:background .15s;}
.btn:hover{background:#6B5A5F;}
.btn-sec{padding:8px 16px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;background:transparent;color:#8C7B80;border:1.5px solid #8C7B80;border-radius:8px;cursor:pointer;transition:all .15s;}
.btn-sec:hover{background:#f3efef;}
.btn-green{background:#1D9E75;}.btn-green:hover{background:#0F6E56;}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.ii{background:#f9f8f8;border-radius:8px;padding:10px 12px;}
.iil{font-size:9px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.iiv{font-size:12px;color:#1a1a1a;font-weight:500;line-height:1.4;}
.fw{grid-column:1/-1;}
.olist{display:flex;flex-direction:column;gap:5px;}
.oi{display:flex;align-items:center;gap:8px;font-size:12px;padding:7px 10px;background:#f9f8f8;border-radius:8px;}
.odot{width:5px;height:5px;border-radius:50%;background:#c0756e;flex-shrink:0;}
.ptags{display:flex;flex-wrap:wrap;gap:5px;}
.ptag{background:#f3efef;color:#6B5A5F;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.gen-box{background:#fff;border:1px solid #eee;border-radius:10px;padding:16px;margin-bottom:12px;}
.gen-box h3{font-size:13px;font-weight:700;margin-bottom:4px;}
.gen-box p{font-size:12px;color:#666;margin-bottom:10px;line-height:1.5;}
textarea{width:100%;padding:10px 12px;font-size:12px;font-family:'Montserrat',sans-serif;border:1.5px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;resize:vertical;outline:none;line-height:1.5;}
textarea:focus{border-color:#8C7B80;}
.prompt-box{background:#f9f8f8;border-radius:8px;padding:10px;font-size:11px;font-family:monospace;color:#333;max-height:140px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;border:1px solid #eee;margin-bottom:8px;}
.status{font-size:11px;margin-top:6px;min-height:14px;}
.rbox{background:#f9f8f8;border-radius:12px;padding:16px;}
.rchip{display:inline-block;background:#D4C5C8;color:#4A3A3E;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;margin-bottom:12px;}
.scores-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:16px;}
.sc{background:#fff;border-radius:8px;padding:10px 6px;text-align:center;}
.sc-lbl{font-size:8px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;line-height:1.3;}
.sc-pct{font-size:20px;font-weight:700;}
.sc-pct.hi{color:#4a7c5f;}.sc-pct.mid{color:#8C7B80;}.sc-pct.lo{color:#c0756e;}
.sc-bar{height:4px;background:#eee;border-radius:2px;margin-top:5px;overflow:hidden;}
.sc-fill{height:4px;border-radius:2px;}
.fill-hi{background:#4a7c5f;}.fill-mid{background:#8C7B80;}.fill-lo{background:#c0756e;}
.sec{margin-bottom:16px;}
.sec-t{font-size:10px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.sec-t::after{content:'';flex:1;height:1px;background:#ece8e8;}
.sec-body{font-size:12px;color:#2a2a2a;line-height:1.75;white-space:pre-wrap;}
.buls{list-style:none;padding:0;}
.buls li{font-size:12px;color:#2a2a2a;line-height:1.6;padding:5px 0 5px 14px;position:relative;border-bottom:0.5px solid #f0ece8;}
.buls li:last-child{border-bottom:none;}
.buls li::before{content:'';position:absolute;left:0;top:12px;width:4px;height:4px;border-radius:50%;background:#8C7B80;}
.alert-b{background:#fdf6f6;border-left:3px solid #c0756e;border-radius:0 6px 6px 0;padding:8px 12px;margin-bottom:6px;font-size:12px;line-height:1.5;}
.motivador{background:#f3efef;border-radius:8px;padding:14px;font-size:13px;color:#4a3a3e;line-height:1.65;font-style:italic;border-left:3px solid #8C7B80;}
.narea{width:100%;font-size:12px;line-height:1.6;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-family:'Montserrat',sans-serif;resize:vertical;min-height:100px;outline:none;}
.narea:focus{border-color:#8C7B80;}
.saveok{font-size:11px;color:#8C7B80;font-weight:600;display:none;margin-left:8px;}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem;}
.modal-box{background:#fff;border-radius:14px;padding:24px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;font-family:'Montserrat',sans-serif;}
.modal-box h3{font-size:15px;font-weight:700;margin-bottom:4px;}
.modal-box p{font-size:12px;color:#666;margin-bottom:14px;line-height:1.5;}
.modal-field{margin-bottom:12px;}
.modal-field label{display:block;font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.modal-field textarea,.modal-field input{width:100%;padding:9px 11px;font-size:12px;font-family:'Montserrat',sans-serif;border:1.5px solid #ddd;border-radius:8px;outline:none;background:#fff;color:#1a1a1a;}
.modal-field textarea:focus,.modal-field input:focus{border-color:#8C7B80;}
.scores-edit{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.code-box{background:#e8f5e9;border-radius:8px;padding:12px;margin-top:10px;}
.code-box-title{font-size:11px;font-weight:700;color:#2e7d32;margin-bottom:6px;}
.code-val{font-size:20px;font-weight:700;letter-spacing:.2em;color:#1a1a1a;background:#fff;display:inline-block;padding:4px 16px;border-radius:6px;}
@media(max-width:768px){.layout{grid-template-columns:1fr;}.sidebar{height:auto;position:relative;}.igrid{grid-template-columns:1fr;}.scores-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
  <div class="sb-top">
    <h1>Panel del coach</h1>
    <p>Micaela Jairedin &middot; Career Coach & Recruiter</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-l">Total</div><div class="stat-v" id="st-tot">0</div></div>
    <div class="stat"><div class="stat-l">Nuevos</div><div class="stat-v" id="st-new">0</div></div>
    <div class="stat"><div class="stat-l">Informes</div><div class="stat-v" id="st-rep">0</div></div>
    <div class="stat"><div class="stat-l">CVs</div><div class="stat-v" id="st-cv">0</div></div>
  </div>
  <button class="refresh-btn" onclick="loadCands()">&#8635; Actualizar candidatos</button>
  <div class="clist" id="clist"><div class="empty-list">Cargando...</div></div>
</div>
<div class="main" id="main">
  <div class="empty-main">
    <p style="font-size:14px;color:#ccc;">Selecciona un candidato</p>
  </div>
</div>
</div>

<script>
var SB_URL='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://mmicaelajairedin-ui.github.io/analisisform';

function sbFetch(table,filter){
  return fetch(SB_URL+'/rest/v1/'+table+'?'+filter+'&order=created_at.desc',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}).then(function(r){return r.json();});
}
function sbPost(table,data){
  return fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify(data)}).then(function(r){if(!r.ok)throw new Error(r.status);});
}

var cands=[], reps={}, notes={}, cvs={}, activeId=null, atab='datos';
var COLORS=['#E8D5D8:#6B4A50','#D5DDE8:#4A5A6B','#D5E8D8:#4A6B4A','#E8E0D5:#6B5A4A','#E0D5E8:#5A4A6B'];

function loadCands(){
  document.getElementById('clist').innerHTML='<div class="empty-list">Cargando...</div>';
  Promise.all([
    sbFetch('candidatos','select=*'),
    sbFetch('informes','select=*'),
    sbFetch('cv_publicados','select=id,email,codigo,created_at')
  ]).then(function(results){
    var all=results[0];
    var allReps=results[1];
    var allCvs=results[2];

    // Group by email
    var byEmail={};
    all.forEach(function(c){
      var key=(c.email||'sin-email').toLowerCase().trim();
      if(!byEmail[key]) byEmail[key]=[];
      byEmail[key].push(c);
    });
    cands=Object.values(byEmail).map(function(group){
      group.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
      var main=group[0];
      main._submissions=group.length;
      main._history=group;
      return main;
    });
    cands.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});

    // Index reps and cvs by email
    reps={};
    allReps.forEach(function(r){
      var key=(r.email||'').toLowerCase().trim();
      if(!reps[key]) reps[key]=[];
      reps[key].push(r);
    });
    cvs={};
    allCvs.forEach(function(cv){
      var key=(cv.email||'').toLowerCase().trim();
      cvs[key]=cv;
    });

    notes=JSON.parse(localStorage.getItem('mj_notes')||'{}');
    renderSidebar();
    if(activeId){
      var c=cands.find(function(x){return x.id===activeId;});
      if(c) renderMain(c);
    }
  }).catch(function(e){
    document.getElementById('clist').innerHTML='<div class="empty-list">Error al cargar. Pulsa Actualizar.</div>';
  });
}

function renderSidebar(){
  var newC=cands.filter(function(c){return !localStorage.getItem('seen_'+c.id);}).length;
  var repC=Object.keys(reps).length;
  var cvC=Object.keys(cvs).length;
  document.getElementById('st-tot').textContent=cands.length;
  document.getElementById('st-new').textContent=newC;
  document.getElementById('st-rep').textContent=repC;
  document.getElementById('st-cv').textContent=cvC;

  var list=document.getElementById('clist');
  if(!cands.length){list.innerHTML='<div class="empty-list">No hay candidatos aun.<br>Cuando alguien complete el formulario aparecera aqui.</div>';return;}
  list.innerHTML='';
  cands.forEach(function(c,i){
    var seen=localStorage.getItem('seen_'+c.id);
    var email=(c.email||'').toLowerCase().trim();
    var hasRep=!!(reps[email]&&reps[email].length);
    var hasCv=!!cvs[email];
    var col=COLORS[i%COLORS.length].split(':');
    var ini=(c.nombre||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var d=document.createElement('div');
    d.className='crow'+(activeId===c.id?' on':'');
    d.onclick=function(){openCand(c.id);};
    d.innerHTML='<div class="crow-top">'
      +'<div class="av" style="background:'+col[0]+';color:'+col[1]+'">'+ini+'</div>'
      +'<div class="crow-name">'+(c.nombre||'--')+(c._submissions>1?' <span style="font-size:9px;background:#f3efef;color:#6B5A5F;padding:1px 6px;border-radius:10px;">'+c._submissions+'x</span>':'')+'</div>'
      +'</div>'
      +'<div class="crow-sub">'+(c.rol||c.sector||'--')+' &middot; '+(c.ciudad||'--')+'</div>'
      +'<div class="crow-pills">'
      +(!seen?'<span class="pill pill-new">Nuevo</span>':'<span class="pill pill-ok">Visto</span>')
      +(hasRep?'<span class="pill pill-rep">Informe</span>':'')
      +(hasCv?'<span class="pill pill-pub">CV</span>':'')
      +'</div>';
    list.appendChild(d);
  });
}

function openCand(id){
  activeId=id; atab='datos';
  localStorage.setItem('seen_'+id,'1');
  var c=cands.find(function(x){return x.id===id;});
  renderSidebar();
  renderMain(c);
}

function renderMain(c){
  var email=(c.email||'').toLowerCase().trim();
  var hasRep=!!(reps[email]&&reps[email].length);
  var hasCv=!!cvs[email];
  var i=cands.findIndex(function(x){return x.id===c.id;});
  var col=COLORS[i%COLORS.length].split(':');
  var ini=(c.nombre||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();

  var tabList=['datos','generar','cv'];
  if(hasRep) tabList.splice(2,0,'informe');
  tabList.push('notas');

  var tabLabels={datos:'Datos',generar:'Generar informe',informe:'Informe',cv:'Generar CV',notas:'Mis notas'};

  var tabsHTML=tabList.map(function(t){
    return '<div class="tab'+(atab===t?' on':'')+'" onclick="switchTab(\''+t+'\','+c.id+')">'+tabLabels[t]+'</div>';
  }).join('');

  var actionsHTML='';
  if(hasRep){
    actionsHTML+='<button class="btn" onclick="window.print()">PDF</button>';
    if(!reps[email][0].published){
      actionsHTML+='<button class="btn btn-green" onclick="abrirEditor('+c.id+')">Publicar informe</button>';
    } else {
      actionsHTML+='<button class="btn-sec" onclick="verURL('+c.id+')">URL cliente</button>';
    }
  }

  document.getElementById('main').innerHTML=
    '<div class="chead">'
      +'<div class="av-big" style="background:'+col[0]+';color:'+col[1]+'">'+ini+'</div>'
      +'<div><div class="chead-name">'+(c.nombre||'--')+'</div><div class="chead-sub">'+(c.email||'--')+' &middot; '+(c.ciudad||'--')+'</div></div>'
      +'<div class="chead-actions">'+actionsHTML+'</div>'
    +'</div>'
    +'<div class="tabs">'+tabsHTML+'</div>'
    +'<div id="tab-content">'+renderTab(c,atab)+'</div>';
  setTimeout(function(){fillSavedInputs(c.id);},50);
}

function switchTab(tab,id){
  atab=tab;
  var c=cands.find(function(x){return x.id===id;});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  event.target.classList.add('on');
  document.getElementById('tab-content').innerHTML=renderTab(c,tab);
  setTimeout(function(){fillSavedInputs(id);},50);
}

function renderTab(c,tab){
  if(tab==='datos') return tabDatos(c);
  if(tab==='generar') return tabGenerar(c);
  if(tab==='informe') return tabInforme(c);
  if(tab==='cv') return tabCV(c);
  if(tab==='notas') return tabNotas(c);
  return '';
}

function escH(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function tabDatos(c){
  var liUrl=c.linkedin?'linkedin.com/in/'+c.linkedin:'No tiene';
  var obs=(c.obstaculos||'').split('|').map(function(s){return s.trim();}).filter(function(s){return s&&s!='--';});
  var ski=(c.skills||'').split(',').map(function(s){return s.trim();}).filter(function(s){return s&&s!='--';});
  var histHTML='';
  if(c._submissions>1){
    histHTML='<div style="margin-top:16px;padding-top:14px;border-top:1px solid #eee;">'
      +'<div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Historial ('+c._submissions+' envios)</div>'
      +c._history.map(function(h,i){
        return '<div style="background:#f9f8f8;border-radius:6px;padding:8px 10px;margin-bottom:5px;">'
          +'<div style="font-size:11px;font-weight:600;">'+(i===0?'Mas reciente':'Envio '+(c._submissions-i))+' &middot; '+new Date(h.created_at).toLocaleDateString('es-ES')+'</div>'
          +'<div style="font-size:10px;color:#999;margin-top:2px;">Rol: '+(h.rol||'--')+' &middot; '+(h.situacion||'--')+'</div>'
          +'</div>';
      }).join('')
      +'</div>';
  }
  return '<div class="igrid">'
    +'<div class="ii"><div class="iil">Situacion</div><div class="iiv">'+(c.situacion||'--')+'</div></div>'
    +'<div class="ii"><div class="iil">Urgencia</div><div class="iiv">'+(c.urgencia||'--')+'</div></div>'
    +'<div class="ii"><div class="iil">Rol buscado</div><div class="iiv">'+(c.rol||'--')+'</div></div>'
    +'<div class="ii"><div class="iil">Salario</div><div class="iiv">'+(c.salario||'--')+'</div></div>'
    +'<div class="ii"><div class="iil">Empresa</div><div class="iiv">'+(c.empresa||'--')+'</div></div>'
    +'<div class="ii"><div class="iil">Modalidad</div><div class="iiv">'+(c.modalidad||'--')+'</div></div>'
    +'<div class="ii"><div class="iil">LinkedIn</div><div class="iiv">'+liUrl+'<br><span style="font-size:10px;color:#999">'+(c.li_estado||'--')+'</span></div></div>'
    +'<div class="ii"><div class="iil">CV</div><div class="iiv">'+(c.cv||'No subido')+(c.cv_url&&c.cv_url!='No subido'?'<br><a href="'+c.cv_url+'" target="_blank" style="font-size:10px;color:#8C7B80;font-weight:600;">Descargar</a>':'')+'</div></div>'
    +'<div class="ii fw"><div class="iil">Objetivo</div><div class="iiv" style="font-weight:400;line-height:1.5">'+(c.objetivo||'--')+'</div></div>'

function fillSavedInputs(id){
  var jel=document.getElementById('json-'+id);
  if(jel&&!jel.value){var saved=localStorage.getItem('json_'+id);if(saved)jel.value=saved;}
  var cel=document.getElementById('cv-text-'+id);
  if(cel&&!cel.value){var savedcv=localStorage.getItem('cvtext_'+id);if(savedcv)cel.value=savedcv;}
  if(jel) jel.addEventListener('input',function(){localStorage.setItem('json_'+id,this.value);});
  if(cel) cel.addEventListener('input',function(){localStorage.setItem('cvtext_'+id,this.value);});
}

function copiarPrompt(id){
  navigator.clipboard.writeText(window['_prompt_'+id]).then(function(){
    var st=document.getElementById('st-prompt-'+id);
    st.textContent='Copiado. Pegalo en Claude.ai';
    st.style.color='#8C7B80';
  });
}

function generarInforme(id){
  var jsonTxt=document.getElementById('json-'+id).value.trim();
  var st=document.getElementById('st-gen-'+id);
  var d;
  try{d=JSON.parse(jsonTxt.replace(/```json|```/g,'').trim());}
  catch(e){st.textContent='JSON no valido. Copialo exactamente como lo genero Claude.';st.style.color='#c0756e';return;}
  var c=cands.find(function(x){return x.id===id;});
  var email=(c.email||'').toLowerCase().trim();
  var prevRep=reps[email]&&reps[email].length?reps[email][0].data:null;
  var repData={data:JSON.stringify(d),published:false,prev:prevRep,createdAt:new Date().toISOString()};
  if(!reps[email]) reps[email]=[];
  reps[email].unshift({data:d,published:false});
  st.textContent='Informe generado. Ve a la pestana Informe.';
  st.style.color='#4a7c5f';
  setTimeout(function(){atab='informe';renderMain(c);},800);
}

function tabInforme(c){
  var email=(c.email||'').toLowerCase().trim();
  if(!reps[email]||!reps[email].length) return '<p style="color:#999;font-size:13px;">Genera el informe primero.</p>';
  var d=reps[email][0].data||reps[email][0];
  if(typeof d==='string') d=JSON.parse(d);

  function sc(arr){
    return (arr||[]).map(function(s){
      var pct=Math.min(100,Math.max(0,Math.round(s.val)));
      var cl=pct>=70?'hi':pct>=45?'mid':'lo';
      return '<div class="sc"><div class="sc-lbl">'+s.label+'</div>'
        +'<div class="sc-pct '+cl+'">'+pct+'%</div>'
        +'<div class="sc-bar"><div class="sc-fill fill-'+cl+'" style="width:'+pct+'%"></div></div>'
        +'</div>';
    }).join('');
  }
  function bul(arr){if(!arr||!arr.length)return '';return '<ul class="buls">'+arr.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul>';}
  function alts(arr){if(!arr||!arr.length)return '';return arr.map(function(a){return '<div class="alert-b">'+a+'</div>';}).join('');}
  function pro(t){return '<div class="sec-body">'+(t||'')+'</div>';}

  var editBtn='<div style="text-align:right;margin-bottom:10px;"><button class="btn-sec" style="font-size:11px;padding:6px 14px;" onclick="editarInforme('+c.id+')">✏ Editar informe</button></div>';
  return editBtn+'<div class="rbox">'
    +'<div class="rchip">Informe pre-sesion &middot; '+(d.fecha||new Date().toLocaleDateString('es-ES'))+'</div>'
    +'<div class="scores-grid">'+sc(d.scores)+'</div>'
    +'<div class="sec"><div class="sec-t">Resumen ejecutivo</div>'+pro(d.resumen)+'</div>'
    +'<div class="sec"><div class="sec-t">Fortalezas</div>'+bul(d.fortalezas)+'</div>'
    +'<div class="sec"><div class="sec-t">Gaps</div>'+bul(d.gaps)+'</div>'
    +'<div class="sec"><div class="sec-t">Mercado 2025</div>'+pro(d.mercado)+'</div>'
    +'<div class="sec"><div class="sec-t">Estrategia</div>'+pro(d.estrategia)+'</div>'
    +'<div class="sec"><div class="sec-t">Acciones CV</div>'+bul(d.cv_acciones)+'</div>'
    +'<div class="sec"><div class="sec-t">Acciones LinkedIn</div>'+bul(d.linkedin_acciones)+'</div>'
    +'<div class="sec"><div class="sec-t">Acciones networking</div>'+bul(d.networking_acciones)+'</div>'
    +'<div class="sec"><div class="sec-t">Preguntas para la sesion</div>'+bul(d.preguntas)+'</div>'
    +'<div class="sec"><div class="sec-t">Alertas internas</div>'+alts(d.alertas)+'</div>'
    +(d.mensaje_candidato?'<div class="sec"><div class="sec-t">Mensaje al candidato</div><div class="motivador">'+d.mensaje_candidato+'</div></div>':'')
    +'</div>';
}

function tabCV(c){

  var accCV=repData&&repData.cv_acciones?repData.cv_acciones.join('\n- '):'';

  var cvPrompt='Eres un experto en RRHH y redaccion de CVs para el mercado europeo. '
    +'Genera un CV profesional optimizado para ATS y para el mercado espanol/europeo. '
    +'El CV debe estar en espanol, ser claro, impactante y pasar filtros ATS.\n\n'
    +'DATOS:\nNombre: '+(c.nombre||'--')+'\nEmail: '+(c.email||'--')+'\nCiudad: '+(c.ciudad||'--')+'\n'
    +'Experiencia: '+(c.exp||'--')+'\nSector: '+(c.sector||'--')+'\nCargo actual: '+(c.cargo||'--')+'\n'
    +'Rol buscado: '+(c.rol||'--')+'\nEmpresa objetivo: '+(c.empresa||'--')+'\nModalidad: '+(c.modalidad||'--')+'\n'
    +'Salario: '+(c.salario||'--')+'\nSkills: '+(c.skills||'--')+'\n'
    +'Logro: '+(c.logro||'--')+'\n'
    +(c.extra&&c.extra!='--'?'Fuera del CV: '+c.extra+'\n':'')
    +'LinkedIn: '+liUrl+'\n'
    +(cvLink?'CV original: '+cvLink+'\n':'')+'\n'
    +(repData?'DIAGNOSTICO:\nScores: '+scores+'\nGaps a corregir:\n- '+gaps+'\nAcciones CV:\n- '+accCV+'\n\n':'')
    +(cvLink?'IMPORTANTE: Descarga y analiza el CV original en: '+cvLink+'\n\n':'')
    +'INSTRUCCIONES:\n'
    +'1. CV de maximo 2 paginas: Titular | Resumen ejecutivo | Experiencia con logros cuantificados | Formacion | Habilidades | Idiomas\n'
    +'2. Titular con rol buscado y palabras clave del sector\n'
    +'3. Bullets con formato: Verbo de accion + que hice + resultado cuantificado\n'
    +'4. Palabras clave ATS relevantes\n'
    +'5. Lenguaje adaptado al mercado espanol/europeo\n'
    +'6. Sin notas del autor al final\n\n'
    +'Genera el CV en texto plano con separadores y mayusculas para los titulos.';

  window['_cvprompt_'+c.id]=cvPrompt;

  var hasCv=!!cvs[email];

  return '<div class="gen-box">'
    +'<h3>Paso 1 &mdash; Copia el prompt y pegalo en Claude</h3>'
    +'<p>El prompt incluye todos los datos y el diagnostico del informe.</p>'
    +'<div class="prompt-box">'+escH(cvPrompt)+'</div>'
    +'<button class="btn" onclick="copiarCVPrompt('+c.id+')">Copiar prompt</button>'
    +'<div class="status" id="st-cvprompt-'+c.id+'"></div>'
    +'</div>'
    +'<div class="gen-box">'
    +'<h3>Paso 2 &mdash; Pega el CV generado por Claude</h3>'
    +'<p>Pega el texto del CV y pulsa "Publicar CV al cliente". Se generara un codigo de acceso para el candidato.</p>'
    +'<textarea id="cv-text-'+c.id+'" rows="8" placeholder="Pega aqui el CV generado por Claude..."></textarea>'
    +'<div style="margin-top:8px;"><button class="btn btn-green" onclick="publicarCV('+c.id+')">Publicar CV al cliente</button></div>'
    +'<div class="status" id="st-cvpub-'+c.id+'"></div>'
    +(hasCv?'<div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;">'+'<span style="font-size:11px;color:#4a7c5f;font-weight:600;">Ya hay un CV publicado.</span>'+'<button class="btn-sec" style="font-size:11px;padding:5px 12px;" onclick="editarCV('+c.id+')">Editar CV publicado</button>'+'</div>':'')
    +'</div>';
}

function copiarCVPrompt(id){
  navigator.clipboard.writeText(window['_cvprompt_'+id]).then(function(){
    var st=document.getElementById('st-cvprompt-'+id);
    st.textContent='Copiado. Pegalo en Claude.ai';
    st.style.color='#8C7B80';
  });
}

function publicarCV(id){
  var cvText=document.getElementById('cv-text-'+id).value.trim();
  var st=document.getElementById('st-cvpub-'+id);
  if(!cvText){st.textContent='Pega el CV antes de publicar.';st.style.color='#c0756e';return;}
  var c=cands.find(function(x){return x.id===id;});
  st.textContent='Publicando...';st.style.color='#666';
  var code='MICAELA';
  sbPost('cv_publicados',{email:c.email,candidato_id:id,contenido:cvText,codigo:code}).then(function(){
    var url=BASE+'/cv.html?email='+encodeURIComponent(c.email)+'&code='+code;
    window._lastCode=code;
    window._lastUrl=url;
    st.innerHTML='<div class="code-box">'
      +'<div class="code-box-title">CV publicado correctamente</div>'
      +'<div style="font-size:12px;margin-bottom:6px;">Codigo de acceso para el cliente (siempre el mismo):</div>'
      +'<div class="code-val">'+code+'</div>'
      +'<div style="font-size:11px;color:#666;margin-top:6px;margin-bottom:8px;">URL: '+url+'</div>'
      +'<button class="btn" onclick="copiarCodigoCV()">Copiar codigo y URL</button>'
      +'</div>';
  }).catch(function(e){
    st.textContent='Error al publicar: '+e.message;st.style.color='#c0756e';
  });
}

function copiarCodigoCV(){
  navigator.clipboard.writeText('Tu CV optimizado esta listo. Accede en: '+window._lastUrl+' | Codigo: '+window._lastCode);
}

function abrirEditor(id){
  var c=cands.find(function(x){return x.id===id;});
  var email=(c.email||'').toLowerCase().trim();
  var d=reps[email][0].data||reps[email][0];
  if(typeof d==='string') d=JSON.parse(d);

  var modal=document.createElement('div');
  modal.className='modal-overlay';
  modal.id='pub-modal';

    +'<h3>Revisar antes de publicar</h3>'
    +'<p>Edita el informe antes de enviarselo al cliente.</p>'

    +'<div class="modal-field"><label>Mensaje para el cliente</label><textarea id="ed-msg" rows="3">'+escH(d.mensaje_candidato||'')+'</textarea></div>'
    +'<div class="modal-field"><label>Puntuaciones (%)</label>'
    +'<div class="scores-edit">'
    +(d.scores||[]).map(function(s,i){return '<div><label style="font-size:10px;color:#999;display:block;margin-bottom:3px;">'+s.label+'</label><input type="number" id="ed-sc-'+i+'" min="0" max="100" value="'+Math.round(s.val)+'" style="width:100%;padding:7px;font-size:13px;font-family:Montserrat,sans-serif;border:1.5px solid #ddd;border-radius:6px;outline:none;"></div>';}).join('')
    +'</div></div>'

    +'<button class="btn-sec" onclick="document.getElementById(\'pub-modal\').remove()">Cancelar</button>'
    +'<button class="btn btn-green" onclick="confirmarPublicar('+id+')">Publicar al cliente</button>'
    +'</div></div>';
  document.body.appendChild(modal);
}

function confirmarPublicar(id){
  var c=cands.find(function(x){return x.id===id;});
  var email=(c.email||'').toLowerCase().trim();
  var d=reps[email][0].data||reps[email][0];
  if(typeof d==='string') d=JSON.parse(d);

  d.resumen=document.getElementById('ed-res').value;
  d.mensaje_candidato=document.getElementById('ed-msg').value;
  d.scores=d.scores.map(function(s,i){return Object.assign({},s,{val:parseInt(document.getElementById('ed-sc-'+i).value)||s.val});});

  var prevRep=reps[email].length>1?reps[email][1]:null;
  var prevData=prevRep?JSON.stringify(prevRep.data||prevRep):null;

  sbPost('informes',{candidato_id:id,email:c.email,data:JSON.stringify(d),prev:prevData}).then(function(){
    reps[email][0].published=true;
    document.getElementById('pub-modal').remove();
    renderSidebar();
    renderMain(c);
    verURL(id);
  }).catch(function(e){alert('Error al publicar: '+e.message);});
}

function verURL(id){
  var c=cands.find(function(x){return x.id===id;});
  var informeUrl=BASE+'/cliente.html?email='+encodeURIComponent(c.email);
  var email=(c.email||'').toLowerCase().trim();
  var cvRow=cvs[email];
  var cvUrl=cvRow?BASE+'/cv.html?email='+encodeURIComponent(c.email)+'&code='+cvRow.codigo:'';
  var modal=document.createElement('div');
  modal.className='modal-overlay';
  modal.id='url-modal';
  var html='<div class="modal-box"><h3>URLs del cliente</h3>';
  html+='<div style="margin-bottom:12px;">';
  html+='<div style="font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Informe</div>';
  html+='<div style="background:#f9f8f8;border-radius:6px;padding:8px;font-size:11px;font-family:monospace;word-break:break-all;margin-bottom:6px;">'+informeUrl+'</div>';
  html+='<button class="btn" style="font-size:11px;padding:6px 12px;" id="copy-inf-btn">Copiar link informe</button>';
  html+='</div>';
  if(cvUrl){
    html+='<div style="margin-bottom:12px;">';
    html+='<div style="font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">CV optimizado</div>';
    html+='<div style="background:#f9f8f8;border-radius:6px;padding:8px;font-size:11px;font-family:monospace;word-break:break-all;margin-bottom:6px;">'+cvUrl+'</div>';
    html+='<button class="btn" style="font-size:11px;padding:6px 12px;" id="copy-cv-btn">Copiar link CV</button>';
    html+='</div>';
  }
  html+='<div style="text-align:right;margin-top:8px;"><button class="btn-sec" id="close-url-btn">Cerrar</button></div>';
  html+='</div>';
  modal.innerHTML=html;
  document.body.appendChild(modal);
  document.getElementById('copy-inf-btn').onclick=function(){navigator.clipboard.writeText(informeUrl);this.textContent='Copiado';};
  if(cvUrl) document.getElementById('copy-cv-btn').onclick=function(){navigator.clipboard.writeText(cvUrl);this.textContent='Copiado';};
  document.getElementById('close-url-btn').onclick=function(){document.getElementById('url-modal').remove();};
}
