<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Panel Coach · Career Pathway</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
<style>

/* ════════════════════════════════════════════════════════
   PANEL CAREER PATHWAY — CSS LIMPIO Y DEFINITIVO
   ════════════════════════════════════════════════════════ */

/* ── Variables ── */
:root {
  --accent:       #8E7676;
  --accent-dark:  #766262;
  --accent-mid:   #A89090;
  --accent-light: #F5EFEF;
  --accent-lt:    #F5EFEF;
  --bg:           #F8F9FA;
  --white:        #FFFFFF;
  --card:         #FFFFFF;
  --body:         #4A4444;
  --title:        #2D2929;
  --muted:        #9E9E9E;
  --border:       #EDEAE8;
  --shadow:       0 4px 16px rgba(0,0,0,.05);
  --shadow-float: 0 8px 32px rgba(0,0,0,.10);
  --green:        #4A7A5E;
  --green-light:  #EAF4EF;
  --blue:         #4A6BA0;
  --blue-light:   #EAF0FA;
  --red:          #C0756E;
  --red-light:    #FAF0EF;
  --orange:       #C08A4A;
  --orange-light: #FAF3EA;
  --font-title:   'Montserrat', sans-serif;
  --font-body:    'Open Sans', sans-serif;
  --fs-xs:        10px;
  --fs-sm:        12px;
  --fs-md:        13px;
  --fs-lg:        15px;
  --fs-xl:        20px;
  --fw-semi:      600;
  --fw-bold:      700;
  --fw-xbold:     800;
  --r-sm:         8px;
  --r:            12px;
  --r-lg:         16px;
  /* Alias */
  --A:            #8E7676;
  --SB:           #F5EFEF;
  --T:            #2D2929;
  --BD:           #EDEAE8;
  --S:            0 4px 16px rgba(0,0,0,.05);
  --t1:           #2D2929;
  --t2:           #9E9E9E;
  --A2:           #766262;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--body);
  height: 100vh;
  overflow: hidden;
  font-size: var(--fs-md);
  line-height: 1.5;
}

/* ── Layout principal ── */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  background: linear-gradient(180deg, #8E7676 0%, #766262 100%);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  color: #fff;
}
.sb-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.sb-list::-webkit-scrollbar { width: 4px; }
.sb-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 2px; }

/* Nav buttons sidebar */
.nb {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 9px 12px;
  border: none;
  border-radius: 10px;
  background: transparent;
  color: rgba(255,255,255,.8);
  font-family: var(--font-title);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  transition: all .15s;
}
.nb:hover { background: rgba(255,255,255,.12); color: #fff; }
.nb.nb-on { background: rgba(255,255,255,.2); color: #fff; font-weight: 700; }

/* Candidatos en sidebar */
.crow {
  padding: 10px 12px;
  border-radius: 12px;
  cursor: pointer;
  margin-bottom: 4px;
  border: 1px solid transparent;
  transition: all .15s;
}
.crow:hover { background: rgba(255,255,255,.1); }
.crow.on { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.25); }
.crow-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.crow-name { font-size: 13px; font-weight: 700; color: #fff; }
.crow-sub { font-size: 11px; color: rgba(255,255,255,.6); }
.crow-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.pill {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  font-family: var(--font-title);
  letter-spacing: .02em;
}
.pill-new { background: #fff; color: var(--accent-dark); }
.pill-ok  { background: rgba(255,255,255,.15); color: rgba(255,255,255,.8); }
.pill-rep { background: rgba(200,240,220,.25); color: #C8F0DC; }
.pill-pub { background: rgba(192,216,240,.25); color: #C0D8F0; }
.pill-s   { background: rgba(255,255,255,.12); color: rgba(255,255,255,.7); }

/* Avatar */
.av {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 13px;
  font-family: var(--font-title);
  flex-shrink: 0;
}
.av-big {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 20px;
  font-family: var(--font-title);
  flex-shrink: 0;
}

/* ── Área principal ── */
.clients-panel {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}
.main {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
}
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Cabecera del candidato ── */
.chead {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 24px 28px 20px;
  background: linear-gradient(135deg, #FDFBFB 0%, #F5F0F0 100%);
  border-bottom: 1px solid var(--border);
}
.chead-name {
  font-family: var(--font-title);
  font-size: 22px;
  font-weight: 800;
  color: var(--title);
  letter-spacing: -.02em;
}
.chead-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
.cand-badges { display: flex; flex-wrap: wrap; gap: 6px; }
.chead-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: var(--font-title);
}
.badge-green { background: var(--green-light); color: var(--green); }
.badge-blue  { background: var(--blue-light);  color: var(--blue);  }
.badge-rose  { background: var(--accent-light); color: var(--accent-dark); }
.badge-gray  { background: #F0F0F0; color: var(--muted); }

/* ── Tabs ── */
.tabs {
  display: flex;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  overflow-x: auto;
  flex-shrink: 0;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--font-title);
  letter-spacing: .02em;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--muted);
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: all .15s;
}
.tab:hover { color: var(--accent);background:var(--accent-light);border-radius:8px 8px 0 0; }
.tab.on { color: var(--accent); border-bottom-color: var(--accent);font-weight:800; }

/* ── Tab body ── */
.tab-body { padding: 24px; }
.section-label { font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;font-family:var(--font-title);display:flex;align-items:center;gap:8px; }
.section-label::after { content:'';flex:1;height:1px;background:var(--border); }
.tab-body::-webkit-scrollbar { width: 6px; }
.tab-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Cards ── */
.card {
  background: var(--white);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}

/* ── Data grid (perfil del candidato) ── */
.igrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.ii {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  transition: border-color .15s;
}
.ii:hover { border-color: var(--accent-mid); }
.ii.fw { grid-column: 1 / -1; }
.iil {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 4px;
  font-family: var(--font-title);
}
.iiv {
  font-size: 14px;
  font-weight: 600;
  color: var(--title);
  line-height: 1.5;
}
.card-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.card-lbl {
  font-family: var(--font-title);
  font-size: 10px;
  font-weight: 800;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .1em;
}
.card-body { font-size: 13px; color: var(--body); line-height: 1.6; }

/* ── Botones ── */
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-family: var(--font-title);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
  background: var(--accent);
  color: #fff;
  transition: all .15s;
}
.btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-green { background: var(--green); }
.btn-green:hover { background: #3D6B50; }
.btn-sec {
  background: var(--bg);
  color: var(--accent);
  border: 1.5px solid var(--border);
}
.btn-sec:hover { border-color: var(--accent); }

/* ── Gen box ── */
.gen-box {
  background: var(--white);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.gen-box h3 {
  font-family: var(--font-title);
  font-size: 14px;
  font-weight: 800;
  color: var(--title);
  margin-bottom: 8px;
  letter-spacing: -.01em;
}
.gen-box p { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }

/* ── Inputs ── */
input, select, textarea {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--body);
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  width: 100%;
  transition: all .2s;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(142,118,118,.1);
  background: var(--white);
}
textarea { resize: vertical; min-height: 100px; }

/* ── Status / alerts ── */
.status { font-size: 12px; margin-top: 8px; min-height: 18px; }
.ai-loading { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
.dots span {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); margin: 0 2px;
  animation: bounce .8s infinite alternate;
}
.dots span:nth-child(2) { animation-delay: .15s; }
.dots span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { from { opacity:.3; transform:translateY(0); } to { opacity:1; transform:translateY(-4px); } }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--title); color: #fff; padding: 12px 24px; border-radius: 20px;
  font-size: 13px; font-weight: 600; font-family: var(--font-title);
  opacity: 0; pointer-events: none; transition: all .3s; z-index: 999;
  box-shadow: var(--shadow-float);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Modales ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4);
  display: none; align-items: center; justify-content: center;
  z-index: 200; backdrop-filter: blur(4px);
}
.modal-box {
  background: var(--white); border-radius: 24px; padding: 28px;
  max-width: 520px; width: 90%; box-shadow: var(--shadow-float);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
.modal-box h3 { font-family: var(--font-title); font-size: 18px; font-weight: 800; margin-bottom: 20px; color: var(--title); }
.modal-a { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.mf { margin-bottom: 14px; }
.mf label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }

/* ── Proceso (flechas) ── */
.proceso-wrap { display: flex; align-items: center; gap: 0; overflow-x: auto; padding: 16px 0; }
.paso { display: flex; align-items: center; }
.paso-inner { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 14px; border-radius: 10px; transition: all .2s; }
.paso-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; font-family: var(--font-title); }
.paso-lbl { font-size: 9px; font-weight: 700; text-align: center; text-transform: uppercase; letter-spacing: .06em; }
.paso-arr { width: 24px; height: 2px; background: var(--border); flex-shrink: 0; }
.paso.done .paso-dot { background: var(--green); color: #fff; }
.paso.done .paso-lbl { color: var(--green); }
.paso.done .paso-arr { background: var(--green); }
.paso.active .paso-inner { background: var(--accent-light); box-shadow: 0 4px 12px rgba(142,118,118,.2); }
.paso.active .paso-dot { background: var(--accent); color: #fff; }
.paso.active .paso-lbl { color: var(--accent-dark); font-weight: 800; }
.paso.pending .paso-dot { background: var(--border); color: var(--muted); }
.paso.pending .paso-lbl { color: var(--muted); }

/* ── Scores / gráficos ── */
.score-bar-wrap { margin-bottom: 10px; }
.score-bar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.score-bar-label { font-size: 12px; color: var(--body); }
.score-bar-val { font-size: 12px; font-weight: 700; color: var(--accent); }
.score-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.score-fill { height: 6px; border-radius: 3px; background: var(--accent); transition: width .6s ease; }

/* ── Listas bullet ── */
.bul-list { list-style: none; }
.bul-list li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; }
.bul-list li:last-child { border-bottom: none; }
.bul-list li::before { content: "→"; color: var(--accent); font-weight: 700; flex-shrink: 0; margin-top: 1px; }

/* ── Mensajes ── */
.msg-card { background: var(--bg); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
.msg-card-title { font-family: var(--font-title); font-size: 12px; font-weight: 800; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }

/* ── Dynamic panel (Resumen/Links/Pagos) ── */
#dynamic-panel { overflow-y: auto; flex: 1; padding: 24px; }
.dp-title { font-family: var(--font-title); font-size: 22px; font-weight: 800; color: var(--title); letter-spacing: -.02em; margin-bottom: 6px; }
.dp-desc { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }

/* ── Resumen: Stats grid ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--white);
  border-radius: 16px;
  padding: 20px 16px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  transition: transform .15s, box-shadow .15s;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-float); }
.stat-v {
  font-family: var(--font-title);
  font-size: 32px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -.02em;
}
.stat-l {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-top: 6px;
  font-family: var(--font-title);
}

/* ── Resumen: Card contenedora ── */
.dp-card {
  background: var(--white);
  border-radius: 16px;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  overflow: hidden;
  margin-bottom: 20px;
}
.dp-card-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  background: #FDFBFB;
}
.dp-card-title {
  font-family: var(--font-title);
  font-size: 15px;
  font-weight: 800;
  color: var(--title);
}
.dp-lbl {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
}
.dp-empty {
  padding: 2rem;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

/* ── Resumen: Filas de clientes ── */
.res-row {
  display: flex;
  align-items: center;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .12s;
}
.res-row:last-child { border-bottom: none; }
.res-row:hover { background: var(--accent-light); }

/* ── Links card ── */
.lk-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
}
.lk-url {
  flex: 1;
  font-size: 12px;
  color: var(--muted);
  font-family: monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lk-cp-btn {
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-title);
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s;
}
.lk-cp-btn:hover { background: var(--accent-dark); }

/* ── Links: Client cards ── */
.lk-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 12px;
  transition: box-shadow .15s;
}
.lk-card:hover { box-shadow: var(--shadow); }
.lk-card-hd {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.lk-lbl {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 6px;
  font-family: var(--font-title);
}
.lk-wa-btn {
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-title);
  background: #25D366;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .15s;
}
.lk-wa-btn:hover { opacity: .85; }
.dp-loading {
  padding: 2rem;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

/* ── Empty states ── */
.empty-main { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; text-align: center; padding: 3rem; color: var(--muted); }
.empty-main-icon { font-size: 48px; }
.empty-main-title { font-family: var(--font-title); font-size: 16px; font-weight: 700; color: var(--title); }
.empty-main-desc { font-size: 13px; color: var(--muted); max-width: 280px; line-height: 1.5; }

/* ── Código ── */
.code-box { background: #1E1E2E; color: #CDD6F4; padding: 16px; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 12px; overflow-x: auto; margin-top: 10px; }

/* ── Carta preview ── */
.carta { max-width: 600px; margin: 0 auto; }
.carta-header { border-bottom: 2px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; }
.carta-body { font-size: 13px; line-height: 1.8; color: var(--body); white-space: pre-wrap; }

/* ── Alertas ── */
.alert-b { background: var(--red-light); border-left: 3px solid var(--red); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--red); margin-bottom: 8px; }

/* ── Modal URL ── */
#modal-url-content a { color: var(--accent); word-break: break-all; }

/* ── Micro-interacciones ── */
button { transition: all .15s ease; }
button:active { transform: scale(.98); }
.card { transition: box-shadow .2s ease; }

/* ── Sidebar botón NUEVO CLIENTE ── */
.sidebar button[onclick*="abrirCrearCliente"] {
  background: #fff !important;
  color: #766262 !important;
  border: none !important;
  font-weight: 800 !important;
}
.sidebar button[onclick*="abrirCrearCliente"]:hover {
  background: #f5f5f5 !important;
}

/* ── Chead sin línea rígida ── */
.chead { border-bottom: 1px solid var(--border) !important; box-shadow: none !important; }
.tabs  { box-shadow: none !important; }

/* ── Responsive mínimo ── */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

</style>

function loadCands(){
  document.getElementById('clist').innerHTML='<div style="padding:2rem;text-align:center;color:#999;font-size:12px;">Cargando...</div>';
  Promise.all([sbGet('candidatos','select=*'),sbGet('informes','select=*'),sbGet('cv_publicados','select=id,email,codigo,contenido,created_at')]).then(function(res){
    var all=res[0],allReps=res[1],allCvs=res[2];
    var byEmail={};
    all.forEach(function(c){var k=(c.email||'').toLowerCase().trim();if(!byEmail[k])byEmail[k]=[];byEmail[k].push(c);});
    cands=Object.values(byEmail).map(function(g){g.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});g[0]._subs=g.length;g[0]._hist=g;return g[0];});
    cands.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
    reps={};allReps.forEach(function(r){var k=(r.email||'').toLowerCase().trim();if(!reps[k])reps[k]=[];reps[k].push(r);});
    cvs={};allCvs.forEach(function(cv){cvs[(cv.email||'').toLowerCase().trim()]=cv;});
    notes=JSON.parse(localStorage.getItem('mj_notes')||'{}');
    cands.forEach(function(c){if(c.notas_coach){notes[c.id]=c.notas_coach;}});
    localStorage.setItem('mj_notes',JSON.stringify(notes));
    renderSidebar();
    if(activeId){var c=cands.find(function(x){return x.id===activeId;});if(c)renderMain(c);}
  }).catch(function(){document.getElementById('clist').innerHTML='<div style="padding:2rem;text-align:center;color:#999;font-size:12px;">Error. Pulsa Actualizar.</div>';});
}

  var pasoLabels=['Evaluación','CV','LinkedIn','Red','Final'];

  var tabs=['perfil','documentos','sesion','gestion'];
  var labels={perfil:'📋 Perfil',documentos:'📄 Documentos',sesion:'📅 Sesión',gestion:'⚙ Gestión'};
  var tabsHTML=tabs.map(function(t){
    return '<div class="tab'+(atab===t?' on':'')+'" onclick="switchTab(\''+t+'\','+c.id+')">'+labels[t]+'</div>';
  }).join('');

  document.getElementById('main').innerHTML=
    '<div class="chead" style="gap:16px;">'
      +avHtml

        +'<div class="chead-name">'+escH(c.nombre||'--')+'</div>'

function switchTab(tab,id){
  atab=tab;var c=cands.find(function(x){return x.id===id;});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  event.target.classList.add('on');
  document.getElementById('tc').innerHTML=renderTab(c,tab);
}

function renderTab(c,tab){
  if(tab==='perfil') return tabPerfil(c);
  if(tab==='documentos') return tabDocumentos(c);
  if(tab==='sesion') return tabSesionGroup(c);
  if(tab==='gestion') return tabGestion(c);
  // Legacy tabs (fallback)
  if(tab==='datos')return tabDatos(c);
  if(tab==='generar')return tabGenerar(c);
  if(tab==='informe')return tabInforme(c);
  if(tab==='carta')return tabCarta(c);
  if(tab==='cv')return tabCV(c);
  if(tab==='notas')return tabNotas(c);
  if(tab==='pagos')return tabPagos(c);
  if(tab==='mensajes')return tabMensajes(c);
  return '';
}

function generarInformeAI(id){
  var c=cands.find(function(x){return x.id===id;});
  var btn=document.getElementById('btn-gen-inf-'+id);
  var st=document.getElementById('st-gen-'+id);
  var savedCvLi=document.getElementById('paste-area-'+id)?document.getElementById('paste-area-'+id).value:'';

  if(btn){btn.disabled=true;btn.textContent='Generando...';}
  if(st){st.innerHTML='<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div> Claude está analizando el perfil...</div>';}

  // Guardar el texto CV/LinkedIn primero
  if(savedCvLi){
    localStorage.setItem('cvli_'+id,savedCvLi);
    fetch(SB+'/rest/v1/candidatos?id=eq.'+id,{
      method:'PATCH',
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({linkedin_texto:savedCvLi})
    }).catch(function(){});
  }

  // Construir payload limpio sin referencias circulares
  var payload={
    accion:'generar_informe',
    nombre:c.nombre||'',email:c.email||'',edad:c.edad||'',
    experiencia:c.experiencia||'',sector:c.sector||'',educacion:c.educacion||'',
    habilidades:c.habilidades||'',objetivo:c.objetivo||'',idiomas:c.idiomas||'',
    ubicacion:c.ubicacion||'',situacion:c.situacion||'',urgencia:c.urgencia||'',
    modalidad:c.modalidad||'',linkedin:c.linkedin||'',obstaculos:c.obstaculos||'',
    linkedin_texto:savedCvLi||c.linkedin_texto||''
  };

  llamarEdge(payload).then(function(res){
    if(st){st.innerHTML='<span style="color:#4a7c5f;font-weight:600;">✓ Informe generado. Recargando panel...</span>';}
    // Recargar candidatos para mostrar el nuevo informe
    setTimeout(function(){
      loadCands();
      setTimeout(function(){
        var updated=cands.find(function(x){return x.id===id;});
        if(updated){atab='informe';renderMain(updated);}
      },500);
    },1000);
  }).catch(function(err){
    if(btn){btn.disabled=false;btn.textContent='✨ Generar informe automáticamente';}
    if(st){st.innerHTML='<span style="color:#c0756e;">Error: '+escH(String(err))+'</span>';}
  });
}

    exp:c.exp||'',sector:c.sector||'',cargo:c.cargo||'',
    rol:c.rol||'',modalidad:c.modalidad||'',geo:c.geo||'',
    urgencia:c.urgencia||'',habilidades:c.habilidades||'',
    logro:c.logro||'',extra:c.extra||'',
    linkedin:c.linkedin||'',cv_url:c.cv_url||'',
    obstaculos:obs,nicho:nicho,scores:scores,
    linkedin_texto:savedCvLi,
    urgencia_inmediata:urgenciaInmediata?'si':'no'
  };

  llamarEdge(payload).then(function(res){
    console.log('Edge function response:', JSON.stringify(res).slice(0,500));
    var cvText = '';
    var cvDataJson = null;

    if(res.cv_data){
      // CV como JSON estructurado
      cvDataJson = res.cv_data;
      cvText = res.cv_texto || '';
      localStorage.setItem('cvdata_'+id, JSON.stringify(cvDataJson));
      localStorage.setItem('cvtext_'+id, JSON.stringify(cvDataJson));
    } else {
      cvText = res.cv_texto || res.texto || '';
      if(!cvText){ throw new Error('No se recibió el texto del CV'); }
      localStorage.setItem('cvtext_'+id, cvText);
    }

    // ── AUTO-PUBLICAR en cv_publicados para que cv.html lo pueda leer ──
    // Si no hay cv_data pero cv_texto parece JSON, intentar parsearlo
    if(!cvDataJson && cvText){
      try{
        var tryParse=JSON.parse(cvText);
        if(tryParse&&(tryParse.nombre||tryParse.experiencia)){cvDataJson=tryParse;}
      }catch(e2){}
    }
    var contenidoGuardar = cvDataJson
      ? JSON.stringify(cvDataJson)   // JSON estructurado — cv.html lo parsea
      : textToHtml(cvText, c.nombre||'', c.email||'', c.email||'');

    if(st){ st.innerHTML='<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div> Publicando CV...</div>'; }

    var emailClean=(c.email||'').toLowerCase().trim();
    // Siempre intentar PATCH primero, luego POST si no existe
    fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(emailClean),{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=representation'},
      body:JSON.stringify({email:emailClean,candidato_id:c.id,contenido:contenidoGuardar})
    }).then(function(r){
      if(r.status===200||r.status===204){return r;}
      // 0 rows updated — hacer POST
      return fetch(SB+'/rest/v1/cv_publicados',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},
        body:JSON.stringify({email:emailClean,candidato_id:c.id,contenido:contenidoGuardar})
      });
    }).then(function(r){
      var em=emailClean;
      if(!cvs[em])cvs[em]={};
      cvs[em].contenido=contenidoGuardar;
      if(st){st.innerHTML='<span style="color:#4a7c5f;font-weight:600;">✓ CV generado y guardado. El cliente ya puede verlo.</span>';}
      if(btn){btn.disabled=false;btn.textContent='✨ Regenerar CV';}
      renderSidebar();
      atab='cv';
      renderMain(c);
    }).catch(function(err2){
      if(st){st.innerHTML='<span style="color:#f3a41b;font-weight:600;">✓ CV generado (error al guardar: '+escH(String(err2))+')</span>';}
      if(btn){btn.disabled=false;btn.textContent='✨ Regenerar CV';}
      atab='cv';
      renderMain(c);
    });

  }).catch(function(err){
    if(btn){ btn.disabled=false; btn.textContent='✨ Generar CV optimizado'; }
    if(st){ st.innerHTML='<span style="color:#c0756e;">Error: '+escH(String(err))+'</span>'; }
  });
}

function generarCartaAI(id){
  var c=cands.find(function(x){return x.id===id;});
  var btn=document.getElementById('btn-gen-carta-'+id);
  var st=document.getElementById('st-gen-carta-'+id);

  if(btn){btn.disabled=true;btn.textContent='Generando carta...';}
  if(st){st.innerHTML='<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div> Claude está redactando la carta...</div>';}

  var email=(c.email||'').toLowerCase().trim();
  var repData=reps[email]&&reps[email].length?reps[email][0].data||reps[email][0]:null;
  if(repData&&typeof repData==='string')repData=JSON.parse(repData);
  var nicho=repData?repData.nicho||'':'';
  var obs=(c.obstaculos||'').split('|').map(function(s){return s.trim();}).filter(Boolean).join(', ');

  var payload={
    accion:'generar_carta',
    nombre:c.nombre||'',email:c.email||'',ciudad:c.ciudad||'',
    linkedin:c.linkedin||'',exp:c.exp||'',sector:c.sector||'',
    cargo:c.cargo||'',rol:c.rol||'',empresa:c.empresa||'',
    logro:c.logro||'',habilidades:c.habilidades||'',
    obstaculos:obs,nicho:nicho,
    linkedin_texto:c.linkedin_texto||localStorage.getItem('cvli_'+id)||''
  };

  llamarEdge(payload).then(function(res){
    var cartaText=res.carta_texto||res.texto||'';
    if(!cartaText){throw new Error('No se recibió el texto de la carta');}
    localStorage.setItem('carta_'+id,cartaText);
    var el=document.getElementById('carta-'+id);
    if(el)el.value=cartaText;
    if(st){st.innerHTML='<span style="color:#4a7c5f;font-weight:600;">✓ Carta generada. Revísala y guárdala.</span>';}
    if(btn){btn.disabled=false;btn.textContent='✨ Regenerar carta';}
    // Guardar automáticamente
    fetch(SB+'/rest/v1/candidatos?email=eq.'+encodeURIComponent(c.email),{method:'PATCH',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({carta_presentacion:cartaText})}).catch(function(){});
  }).catch(function(err){
    if(btn){btn.disabled=false;btn.textContent='✨ Generar carta';}
    if(st){st.innerHTML='<span style="color:#c0756e;">Error: '+escH(String(err))+'</span>';}
  });
}

function copiarTexto(id){
  var el=document.getElementById(id);if(!el)return;
  navigator.clipboard.writeText(el.value).then(function(){showToast('Copiado');});
}

function guardarCarta(id){
  var val=document.getElementById('carta-'+id).value;
  localStorage.setItem('carta_'+id,val);
  var c=cands.find(function(x){return x.id===id;});
  var st=document.getElementById('st-cartasave-'+id);
  if(st){st.textContent='Guardando...';st.style.color='#666';}
  fetch(SB+'/rest/v1/candidatos?email=eq.'+encodeURIComponent(c.email),{method:'PATCH',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({carta_presentacion:val})}).then(function(r){var ok=r.ok||r.status===204;if(st){st.textContent=ok?'✓ Guardada':'Error';st.style.color=ok?'#4a7c5f':'#c0756e';}if(ok)showToast('Carta guardada ✓');}).catch(function(e){if(st){st.textContent='Error: '+e.message;st.style.color='#c0756e';}});
}

  html+='<div><div style="font-size:10px;font-weight:700;color:'+cur.color+';text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-family:Montserrat,sans-serif;">Estado de pago</div>';
  html+='<div style="font-size:20px;font-weight:800;color:'+cur.color+';font-family:Montserrat,sans-serif;">'+cur.label+'</div></div>';
  html+='<select id="pago-estado-'+c.id+'" onchange="guardarPago('+c.id+')" style="padding:8px 12px;border:1.5px solid '+cur.color+';border-radius:8px;font-size:12px;font-family:Montserrat,sans-serif;background:#fff;cursor:pointer;color:'+cur.color+';font-weight:700;">';
  estados.forEach(function(e){
    html+='<option value="'+e.val+'"'+(e.val===estado?' selected':'')+'>'+e.label+'</option>';
  });
  html+='</select></div>';
  
  // Monto y fecha
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';
  html+='<div style="background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:14px;">';
  html+='<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-family:Montserrat,sans-serif;">Monto</div>';
  html+='<input id="pago-monto-'+c.id+'" type="text" value="'+escH(monto)+'" placeholder="Ej: €500 / $300" onblur="guardarPago('+c.id+')" style="width:100%;border:none;outline:none;font-size:16px;font-weight:700;color:var(--title);font-family:Montserrat,sans-serif;background:transparent;">';
  html+='</div>';
  html+='<div style="background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:14px;">';
  html+='<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-family:Montserrat,sans-serif;">Fecha límite</div>';
  html+='<input id="pago-fecha-'+c.id+'" type="date" value="'+escH(fecha)+'" onchange="guardarPago('+c.id+')" style="width:100%;border:none;outline:none;font-size:13px;font-weight:600;color:var(--title);font-family:Montserrat,sans-serif;background:transparent;">';
  html+='</div></div>';
  
  // Notas de pago
  html+='<div style="background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:14px;">';
  html+='<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-family:Montserrat,sans-serif;">Notas</div>';
  html+='<textarea id="pago-notas-'+c.id+'" onblur="guardarPago('+c.id+')" rows="3" style="width:100%;border:none;outline:none;font-size:12px;font-family:Montserrat,sans-serif;resize:vertical;color:var(--body);" placeholder="Notas sobre el pago...">'+escH(notas)+'</textarea>';
  html+='</div>';
  
  html+='<div id="pago-st-'+c.id+'" style="font-size:11px;color:var(--muted);text-align:center;"></div>';
  html+='</div>';
  return html;
}

function guardarPago(id){
  var c=cands.find(function(x){return x.id===id;});
  if(!c)return;
  var estado=document.getElementById('pago-estado-'+id);
  var monto=document.getElementById('pago-monto-'+id);
  var fecha=document.getElementById('pago-fecha-'+id);
  var notas=document.getElementById('pago-notas-'+id);
  var st=document.getElementById('pago-st-'+id);
  var patch={
    pago_estado:estado?estado.value:'pendiente',
    pago_monto:monto?monto.value:'',
    pago_fecha:fecha?fecha.value:'',
    pago_notas:notas?notas.value:''
  };
  // Update local
  Object.assign(c,patch);
  if(st)st.textContent='Guardando...';
  fetch(SB+'/rest/v1/candidatos?id=eq.'+id,{
    method:'PATCH',
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(patch)
  }).then(function(r){
    if(st){st.textContent=r.ok||r.status===204?'✓ Guardado':'Error';setTimeout(function(){if(st)st.textContent='';},2000);}
  }).catch(function(){if(st){st.textContent='Error';setTimeout(function(){if(st)st.textContent='';},2000);}});
}

function textToHtml(text, candidato, emailCand, cvEmail) {
  var _cvEmail = cvEmail || emailCand || '';

  // ── PARSEAR MARKDOWN ──
  var lines = text.split('\n').map(function(l){ return l.trim(); });

  function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function bold(t){ return esc(t).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>'); }
  function fmtNum(t){ return t.replace(/\b(\d{4,})\b/g,function(m){return m.replace(/\B(?=(\d{3})+(?!\d))/g,'.');}); }

  // Encontrar secciones por encabezados ## o palabras clave en mayúsculas
  var sections = {};
  var currentSection = null;
  var currentLines = [];
  var name = '', role = '';

  for (var i = 0; i < lines.length; i++) {
    var l = lines[i];
    if (!l || l === '---') continue;

    // Detectar nombre (primera línea con # o todo mayúsculas)
    if (!name && (l.startsWith('# ') || (l === l.toUpperCase() && l.length > 3 && l.length < 60 && !l.startsWith('#')))) {
      name = l.replace(/^#+\s*/,'').trim();
      continue;
    }

    // Detectar rol (línea en negrita sin ## que viene después del nombre)
    if (!role && name && l.startsWith('**') && !l.startsWith('##') && l.length < 100) {
      role = l.replace(/\*\*/g,'').trim();
      continue;
    }

    // Detectar sección con ##
    if (l.startsWith('## ')) {
      if (currentSection) sections[currentSection] = currentLines;
      currentSection = l.replace(/^##\s*/,'').toUpperCase().trim();
      currentLines = [];
      continue;
    }

    if (currentSection) currentLines.push(l);
  }
  if (currentSection) sections[currentSection] = currentLines;

  if (!name) name = candidato || 'CV';

  // Extraer datos de contacto de OTROS DATOS
  var email = '', phone = '', city = '', linkedin = '';
  var emailM = text.match(/[\w.+-]+@[\w.-]+\.\w+/); if (emailM) email = emailM[0];
  var phoneM = text.match(/\+?[\d][\d\s().+\-]{7,15}/); if (phoneM) phone = phoneM[0].trim();
  var liM = text.match(/linkedin\.com\/in\/[\w-]+/i); if (liM) linkedin = liM[0];
  var cityM = text.match(/(Madrid|Barcelona|Valencia|Sevilla|Bilbao|Galicia|Boiro|Coruña|España|Spain|Galicia)/i); if (cityM) city = cityM[0].trim();

  var ini2 = (name||'CV').split(' ').map(function(w){ return w[0]||''; }).join('').slice(0,2).toUpperCase();

  // Parsear experiencia
  function parseExp(lines) {
    var blocks = [], cur = null;
    for (var i = 0; i < lines.length; i++) {
      var l = lines[i];
      if (!l || l === '---') continue;
      // Detectar inicio de puesto: línea en negrita o con año
      var isBold = l.startsWith('**') && l.includes('—');
      var hasYear = /\d{4}/.test(l) && !l.startsWith('•') && !l.startsWith('-');
      if (isBold || (hasYear && l.length < 200 && !l.startsWith('•'))) {
        if (cur) blocks.push(cur);
        cur = {title: l, bullets: []};
      } else if (cur) {
        if (l.startsWith('•') || l.startsWith('-')) {
          cur.bullets.push(l.replace(/^[•\-\s]+/,''));
        }
      }
    }
    if (cur) blocks.push(cur);
    return blocks;
  }

  function parseList(lines) {
    var items = [];
    lines.forEach(function(l) {
      var cl = l.replace(/^[•\-\*\s]+/,'').replace(/\*\*/g,'').trim();
      if (cl.length > 2) items.push(cl);
    });
    return items;
  }

  function parseLangs(lines) {
    var langs = [];
    lines.forEach(function(l) {
      var cl = l.replace(/^[•\-\s]+/,'').trim();
      if (!cl) return;
      var m = cl.match(/^(.+?)\s*[—\-–]\s*(.+)$/);
      if (m) langs.push({n: m[1].trim(), l: m[2].trim()});
      else langs.push({n: cl, l: ''});
    });
    return langs;
  }

  function parseEdu(lines) {
    var items = [];
    lines.forEach(function(l) {
      var cl = l.replace(/^[•\-\s]+/,'').trim();
      if (!cl || cl === '---') return;
      var parts = cl.split('|');
      var yr = cl.match(/\d{4}/);
      items.push({
        deg: (parts[0]||cl).replace(/\d{4}.*/,'').trim(),
        school: (parts[1]||'').trim(),
        yr: parts[2]?parts[2].trim():(yr?yr[0]:'')
      });
    });
    return items;
  }

  var expBlocks = parseExp(sections['EXPERIENCIA PROFESIONAL'] || []);
  var skills = parseList(sections['COMPETENCIAS'] || sections['HABILIDADES'] || []).slice(0,6);
  var tools = parseList(sections['HERRAMIENTAS'] || []).slice(0,10);
  var langs = parseLangs(sections['IDIOMAS'] || []);
  var edu = parseEdu(sections['FORMACIÓN'] || sections['FORMACION'] || sections['EDUCACIÓN'] || []);
  var certs = parseList(sections['CERTIFICACIONES'] || sections['CURSOS'] || []);
  var others = parseList(sections['OTROS DATOS'] || sections['DATOS ADICIONALES'] || [])
    .filter(function(o){ return !o.match(/[\w.+-]+@[\w.-]+/) && !o.match(/linkedin/i) && !o.match(/\+?\d[\d\s]{6,}/); });
  var summaryLines = sections['PERFIL PROFESIONAL'] || sections['OBJETIVO'] || sections['RESUMEN EJECUTIVO'] || [];
  var summary = summaryLines.join(' ').trim();

  // Parsear título y empresa de cada bloque de experiencia
  function parseExpTitle(raw) {
    var title = raw.replace(/\*\*/g,'').replace(/^#+\s*/,'');
    var dates = '', company = '';
    var dm = title.match(/(\d{2}\/\d{4}|\d{4})\s*[–\-—]\s*(\d{2}\/\d{4}|\d{4}|Presente|Presente|Actual|Present)/i);
    if (dm) { dates = dm[0]; title = title.replace(dm[0],'').trim(); }
    var parts = title.split(/\s*—\s*|\s*\|\s*/);
    var mainTitle = parts[0]||title;
    var rest = parts.slice(1).join(' | ');
    // El último pipe suele ser empresa
    var pipeparts = title.split('|');
    if (pipeparts.length > 1) {
      mainTitle = pipeparts[0].replace(/\s*—\s*.*/,'').trim();
      company = pipeparts[0].replace(/^[^—]+—\s*/,'').trim() + (pipeparts[1]?' | '+pipeparts[1].trim():'');
    } else if (parts.length > 1) {
      mainTitle = parts[0].trim();
      company = parts[1].trim();
    }
    return {title: mainTitle, company: company, dates: dates};
  }

  // ── HTML ──
  var cvEmailJs = JSON.stringify(_cvEmail);
  var h = '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">';
  h += '<title>Panel Coach · Career Pathway</title>';
  h += '<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">';
  h += '</head><body>';

  h += '<div class="cv"><div class="hd"><div class="hd-inner">';
  h += '<div class="ph-wrap"><div class="ph-c" onclick="document.getElementById(\'pf\').click()"><img id="pi" src="" alt=""><span id="pn" class="ph-ini">' + esc(ini2) + '</span></div><div class="ph-hint">+ Foto</div></div>';
  h += '<div class="hi"><div class="nm" contenteditable="false">' + esc(name) + '</div>';
  h += '<div class="rl" contenteditable="false">' + esc(role) + '</div>';
  h += '<div class="cts">';
  if (email) h += '<div class="ct" contenteditable="false">' + esc(email) + '</div>';
  if (phone) h += '<div class="ct" contenteditable="false">' + esc(phone) + '</div>';
  if (city) h += '<div class="ct" contenteditable="false">' + esc(city) + '</div>';
  if (linkedin) h += '<div class="ct"><a href="https://' + esc(linkedin) + '" target="_blank" contenteditable="false">' + esc(linkedin) + '</a></div>';
  h += '</div></div></div></div>';

  // Body
  h += '<div class="bd"><div class="sd">';
  if (langs.length) {
    h += '<div class="ss"><div class="sh">Idiomas</div>';
    langs.forEach(function(l) { h += '<div class="lg-row"><span class="lg-n" contenteditable="false">' + esc(l.n) + '</span>' + (l.l ? '<span class="lg-l" contenteditable="false">' + esc(l.l) + '</span>' : '') + '</div>'; });
    h += '</div>';
  }
  if (skills.length) {
    h += '<div class="ss"><div class="sh">Competencias</div>';
    skills.forEach(function(s) { h += '<div class="sk" contenteditable="false">' + esc(s) + '</div>'; });
    h += '</div>';
  }
  if (tools.length) {
    h += '<div class="ss"><div class="sh">Herramientas</div>';
    tools.forEach(function(t) { h += '<div class="sk" contenteditable="false">' + esc(t) + '</div>'; });
    h += '</div>';
  }
  if (edu.length) {
    h += '<div class="ss"><div class="sh">Formaci\u00f3n</div>';
    edu.forEach(function(e) { h += '<div class="ed"><div class="ed-d" contenteditable="false">' + esc(e.deg) + '</div>' + (e.school ? '<div class="ed-s" contenteditable="false">' + esc(e.school) + '</div>' : '') + (e.yr ? '<div class="ed-y" contenteditable="false">' + esc(e.yr) + '</div>' : '') + '</div>'; });
    h += '</div>';
  }
  if (certs.length) {
    h += '<div class="ss"><div class="sh">Certificaciones</div>';
    certs.forEach(function(c) { h += '<div class="ct2" contenteditable="false">' + esc(c) + '</div>'; });
    h += '</div>';
  }
  if (others.length) {
    h += '<div class="ss"><div class="sh">Otros datos</div>';
    others.forEach(function(o) { h += '<div class="ct2" contenteditable="false">' + esc(o) + '</div>'; });
    h += '</div>';
  }
  h += '</div><div class="mn">';

  // Resumen
  if (summary) h += '<div class="ms"><div class="mh">Resumen ejecutivo</div><div class="sum" contenteditable="false">' + bold(fmtNum(summary)) + '</div></div>';

  // Experiencia
  h += '<div class="ms"><div class="mh">Experiencia profesional</div>';
  expBlocks.forEach(function(block, ei) {
    var parsed = parseExpTitle(block.title);
    var ulId = 'ul' + ei;
    h += '<div class="ex"><div class="ex-top"><div class="ex-t" contenteditable="false">' + bold(esc(parsed.title)) + '</div>' + (parsed.dates ? '<div class="ex-d" contenteditable="false">' + esc(parsed.dates) + '</div>' : '') + '</div>';
    if (parsed.company) h += '<div class="ex-co" contenteditable="false">' + esc(parsed.company) + '</div>';
    h += '<ul class="ul" id="' + ulId + '">';
    block.bullets.forEach(function(b) { h += '<li contenteditable="false">' + bold(fmtNum(esc(b))) + '</li>'; });
    h += '</ul><div class="bc"><button class="bb" onclick="addB(\'' + ulId + '\')">+ Bullet</button><button class="bb rem" onclick="remB(\'' + ulId + '\')">&#8722; Quitar</button></div></div>';
  });
  h += '</div></div></div></div>';

  // Script edición
  var cvEmailJs2 = JSON.stringify(_cvEmail);
  h += '<script>var SB="https://ddxnrsnjdvtqhxunxnwj.supabase.co",KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU",_em=' + cvEmailJs2 + ',_saveT=null,_ed=false;';

function publicarCV(id){
  var cvRaw=document.getElementById('cvt-'+id)?document.getElementById('cvt-'+id).value.trim():'';
  var cvText=cvRaw.replace(/^```[\w]*\n?/,'').replace(/\n?```$/,'').trim();
  var st=document.getElementById('st-cvpub-'+id);
  if(!cvText){if(st){st.textContent='No hay CV para publicar.';st.style.color='#c0756e';}return;}
  var c=cands.find(function(x){return x.id===id;});
  if(st){st.textContent='Publicando...';st.style.color='#666';}
  // Si el texto es JSON (cv_data), guardarlo como JSON — NO convertir a HTML
  var contenidoFinal;
  try{
    var parsed=JSON.parse(cvText);
    if(parsed&&(parsed.nombre||parsed.experiencia)){
      contenidoFinal=JSON.stringify(parsed); // guardar JSON puro
    } else {
      contenidoFinal=textToHtml(cvText,c.nombre||'',c.email||'',c.email||'');
    }
  }catch(e){
    contenidoFinal=textToHtml(cvText,c.nombre||'',c.email||'',c.email||'');
  }
  var emailClean=(c.email||'').toLowerCase().trim();
  fetch(SB+'/rest/v1/cv_publicados?email=eq.'+encodeURIComponent(emailClean),{
    method:'PATCH',
    headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},
    body:JSON.stringify({email:emailClean,candidato_id:id,contenido:contenidoFinal})
  }).then(function(r){
    // Si no había fila, hacer POST
    if(r.status===204||r.ok){return r;}
    return fetch(SB+'/rest/v1/cv_publicados',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},
      body:JSON.stringify({email:emailClean,candidato_id:id,contenido:contenidoFinal})
    });
  }).then(function(){
    var email=(c.email||'').toLowerCase().trim();
    cvs[email]={email:c.email,codigo:'',contenido:contenidoFinal};
    var cvUrl=BASE+'/cv.html?email='+encodeURIComponent(c.email);
    window._lastCvUrl=cvUrl;
    if(st){st.innerHTML='<div class="code-box"><div style="font-size:11px;font-weight:700;color:#2e7d32;margin-bottom:5px;">✓ CV publicado</div><div style="font-size:11px;color:#666;margin-bottom:7px;">'+escH(cvUrl)+'</div><button class="btn" style="font-size:11px;padding:6px 12px;" onclick="navigator.clipboard.writeText(window._lastCvUrl).then(function(){showToast(\'Copiado\');})">Copiar URL</button></div>';}
    renderSidebar();
  }).catch(function(e){if(st){st.textContent='Error: '+e.message;st.style.color='#c0756e';}});
}

function enviarCartaCliente(id){
  var c=cands.find(function(x){return x.id===id;});
  var texto=document.getElementById('carta-'+id)?document.getElementById('carta-'+id).value:'';
  if(!texto){showToast('No hay carta para enviar');return;}
  var st=document.getElementById('st-cartasave-'+id);
  if(st){st.textContent='Enviando al cliente...';st.style.color='#666';}
  fetch(SB+'/rest/v1/candidatos?id=eq.'+id,{
    method:'PATCH',
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({carta_presentacion:texto})
  }).then(function(r){
    if(r.ok){
      if(st){st.textContent='✓ Carta enviada al cliente';st.style.color='#4a7c5f';}
      var cand=cands.find(function(x){return x.id===id;});
      if(cand)cand.carta_presentacion=texto;
      setTimeout(function(){if(st)st.textContent='';},3000);
    }else{throw new Error('Error '+r.status);}
  }).catch(function(e){if(st){st.textContent='Error: '+e.message;st.style.color='#c0756e';}});
}

// ── VER / CAMBIAR CONTRASEÑA DEL CLIENTE ──
function verPass(id){
  var c=cands.find(function(x){return x.id===id;});
  if(!c)return;
  var el=document.getElementById('pv-'+id);
  if(!el)return;
  var email=(c.email||'').toLowerCase().trim();
  el.textContent='Buscando...';
  fetch(SB+'/rest/v1/usuarios?email=eq.'+encodeURIComponent(email)+'&select=password_hash',{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  }).then(function(r){return r.json();}).then(function(rows){
    if(rows&&rows.length&&rows[0].password_hash){
      // Mostrar hash parcial (la contrasena real no se puede recuperar)
      el.textContent='Hash: '+rows[0].password_hash.substring(0,16)+'...';
      el.title='La contraseña está hasheada. Usa "Cambiar" para asignar una nueva.';
      setTimeout(function(){el.textContent='••••••••';el.title='';},8000);
    } else {
      el.textContent='Sin cuenta — usa Cambiar para crear';
      el.style.color='#c0756e';
      setTimeout(function(){el.textContent='••••••••';el.style.color='';},4000);
    }
  }).catch(function(err){
    el.textContent='Error: '+err.message;
    setTimeout(function(){el.textContent='••••••••';},3000);
  });
}

function cambiarPass(id,email){
  var inp=document.getElementById('np-'+id);
  var st=document.getElementById('ps-'+id);
  if(!inp||!st)return;
  var newPass=inp.value.trim();
  if(newPass.length<6){st.textContent='Mínimo 6 caracteres';st.style.color='#c0756e';return;}
  st.textContent='Guardando...';st.style.color='#666';
  var emailClean=(email||'').toLowerCase().trim();
  var encoder=new TextEncoder();
  crypto.subtle.digest('SHA-256',encoder.encode(newPass)).then(function(buf){
    var hash=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    return fetch(SB+'/rest/v1/usuarios?email=eq.'+encodeURIComponent(emailClean)+'&select=id',{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    }).then(function(r){return r.json();}).then(function(rows){
      if(rows&&rows.length){
        return fetch(SB+'/rest/v1/usuarios?email=eq.'+encodeURIComponent(emailClean),{
          method:'PATCH',
          headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},
          body:JSON.stringify({password_hash:hash})
        });
      } else {
        var nombre='';
        var c=cands.find(function(x){return x.id===id;});
        if(c)nombre=c.nombre||'';
        return fetch(SB+'/rest/v1/usuarios',{
          method:'POST',
          headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'},
          body:JSON.stringify({email:emailClean,password_hash:hash,rol:'cliente',nombre:nombre,activo:true})
        });
      }
    });
  }).then(function(r){
    if(r&&(r.ok||r.status===201||r.status===204)){
      st.textContent='✓ Contraseña actualizada';st.style.color='#4a7c5f';
      inp.value='';
      // Mostrar la nueva contraseña en texto claro por 5 segundos
      var pvEl=document.getElementById('pv-'+id);
      if(pvEl){pvEl.textContent=newPass;setTimeout(function(){pvEl.textContent='••••••••';},5000);}
    } else {
      r.text().then(function(t){st.textContent='Error: '+t.substring(0,80);st.style.color='#c0756e';}).catch(function(){st.textContent='Error al guardar';st.style.color='#c0756e';});
    }
  }).catch(function(err){
    st.textContent='Error: '+err.message;st.style.color='#c0756e';
  });
}
