<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;}
.layout{display:grid;grid-template-columns:300px 1fr;min-height:100vh;}
.sidebar{background:#fff;border-right:1px solid #eee;display:flex;flex-direction:column;}
.sidebar-top{padding:20px;border-bottom:1px solid #eee;}
.sidebar-top h1{font-size:15px;font-weight:700;color:#1a1a1a;}
.sidebar-top p{font-size:11px;color:#999;margin-top:2px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;}
.stat{background:#f9f8f8;border-radius:8px;padding:10px 12px;}
.stat-l{font-size:10px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.stat-v{font-size:20px;font-weight:700;color:#1a1a1a;margin-top:2px;}
.clist{flex:1;overflow-y:auto;padding:8px;}
.crow{padding:12px;border-radius:10px;cursor:pointer;margin-bottom:4px;transition:all .15s;border:1px solid transparent;}
.crow:hover{background:#f9f8f8;border-color:#eee;}
.crow.on{background:#f3efef;border-color:#8C7B80;}
.crow-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.crow-sub{font-size:11px;color:#999;margin-top:2px;}
.crow-pills{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.pill-new{background:#fef3e2;color:#b45309;}
.pill-pub{background:#e8f5e9;color:#2e7d32;}
.pill-rep{background:#f3efef;color:#6B5A5F;}
.empty-list{padding:2rem;text-align:center;color:#999;font-size:13px;}
.refresh-btn{margin:8px 12px;padding:8px;font-size:11px;font-weight:600;font-family:'Montserrat',sans-serif;background:transparent;border:1px solid #eee;border-radius:8px;cursor:pointer;color:#666;width:calc(100% - 24px);transition:all .15s;}
.refresh-btn:hover{border-color:#8C7B80;color:#8C7B80;}

.main{padding:24px;overflow-y:auto;}
.empty-main{display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-size:14px;text-align:center;flex-direction:column;gap:8px;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid #eee;margin-bottom:20px;}
.tab{font-size:13px;padding:8px 16px;cursor:pointer;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;transition:all .15s;}
.tab.on{color:#8C7B80;border-bottom-color:#8C7B80;font-weight:700;}
.tc{display:none;}.tc.on{display:block;}

/* CANDIDATE HEADER */
.chead{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #eee;}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.chead-name{font-size:17px;font-weight:700;color:#1a1a1a;}
.chead-sub{font-size:12px;color:#999;margin-top:2px;}
.chead-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:9px 18px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;background:#8C7B80;color:#fff;border:none;border-radius:8px;cursor:pointer;transition:background .15s;}
.btn:hover{background:#6B5A5F;}
.btn:disabled{background:#ddd;color:#999;cursor:not-allowed;}
.btn-sec{padding:9px 18px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;background:transparent;color:#8C7B80;border:1.5px solid #8C7B80;border-radius:8px;cursor:pointer;transition:all .15s;}
.btn-sec:hover{background:#f3efef;}
.btn-danger{padding:9px 18px;font-size:12px;font-weight:600;font-family:'Montserrat',sans-serif;background:transparent;color:#c0756e;border:1.5px solid #c0756e;border-radius:8px;cursor:pointer;}

/* INFO GRID */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.ii{background:#f9f8f8;border-radius:8px;padding:10px 12px;}
.iil{font-size:10px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.iiv{font-size:13px;color:#1a1a1a;font-weight:500;line-height:1.4;}
.fw{grid-column:1/-1;}
.olist{display:flex;flex-direction:column;gap:6px;}
.oi{display:flex;align-items:center;gap:8px;font-size:12px;padding:7px 10px;background:#f9f8f8;border-radius:8px;}
.odot{width:5px;height:5px;border-radius:50%;background:#c0756e;flex-shrink:0;}

/* GENERADOR */
.gen-box{background:#fff;border:1px solid #eee;border-radius:12px;padding:20px;margin-bottom:16px;}
.gen-box h3{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.gen-box p{font-size:12px;color:#666;margin-bottom:12px;line-height:1.5;}
textarea{width:100%;padding:10px 12px;font-size:12px;font-family:'Montserrat',sans-serif;border:1.5px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;resize:vertical;outline:none;line-height:1.5;transition:border-color .15s;}
textarea:focus{border-color:#8C7B80;box-shadow:0 0 0 2px rgba(140,123,128,.1);}
.prompt-area{background:#f9f8f8;border-radius:8px;padding:12px;margin:10px 0;font-size:11px;font-family:monospace;color:#333;line-height:1.5;max-height:150px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;border:1px solid #eee;}
.status{font-size:11px;color:#999;margin-top:6px;min-height:14px;}

/* REPORT */
.report{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #eee;}
.rhead{background:#8C7B80;padding:22px 26px;display:flex;align-items:center;justify-content:space-between;}
.rhead-name{font-size:17px;font-weight:700;color:#fff;}
.rhead-title{font-size:11px;color:rgba(255,255,255,.85);margin-top:2px;letter-spacing:.04em;}
.rhead-meta{text-align:right;color:#fff;}
.rhead-tag{font-size:9px;font-weight:600;opacity:.7;letter-spacing:.08em;text-transform:uppercase;}
.rhead-cand{font-size:14px;font-weight:700;margin-top:2px;}
.rhead-date{font-size:10px;opacity:.75;margin-top:1px;}
.rbody{padding:22px 26px;}

/* SCORES */
.scores-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:22px;}
.score-card{background:#f9f8f8;border-radius:8px;padding:12px 8px;text-align:center;}
.sc-label{font-size:8px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;line-height:1.4;}
.sc-pct{font-size:22px;font-weight:700;line-height:1;}
.sc-pct.hi{color:#4a7c5f;}.sc-pct.mid{color:#8C7B80;}.sc-pct.lo{color:#c0756e;}
.sc-track{height:5px;background:#eee;border-radius:3px;margin-top:6px;overflow:hidden;}
.sc-fill{height:5px;border-radius:3px;}
.fill-hi{background:#4a7c5f;}.fill-mid{background:#8C7B80;}.fill-lo{background:#c0756e;}
.sc-delta{font-size:9px;font-weight:700;margin-top:4px;}
.sc-delta.up{color:#4a7c5f;}.sc-delta.same{color:#999;}

/* PROGRESS COMPARISON */
.progress-banner{background:linear-gradient(135deg,#f3efef,#e8f5e9);border-radius:10px;padding:14px 16px;margin-bottom:16px;border:1px solid #ddd;}
.progress-banner h4{font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:10px;}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.prog-label{font-size:11px;color:#666;width:120px;flex-shrink:0;}
.prog-bars{flex:1;display:flex;flex-direction:column;gap:3px;}
.prog-bar-wrap{display:flex;align-items:center;gap:6px;}
.prog-bar-bg{flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden;}
.prog-bar-fill{height:5px;border-radius:3px;transition:width .6s ease;}
.prog-bar-lbl{font-size:10px;font-weight:600;min-width:32px;text-align:right;}
.bar-before{background:#ddd;}.bar-after{background:#8C7B80;}
.prog-change{font-size:11px;font-weight:700;color:#4a7c5f;min-width:40px;text-align:right;}

.sec{margin-bottom:18px;}
.sec-title{font-size:10px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.sec-title::after{content:'';flex:1;height:1px;background:#f0ecec;}
.sec-body{font-size:12px;color:#2a2a2a;line-height:1.75;white-space:pre-wrap;}
.bullets{list-style:none;padding:0;}
.bullets li{font-size:12px;color:#2a2a2a;line-height:1.65;padding:5px 0 5px 16px;position:relative;border-bottom:0.5px solid #f5f1f1;}
.bullets li:last-child{border-bottom:none;}
.bullets li::before{content:'';position:absolute;left:0;top:13px;width:5px;height:5px;border-radius:50%;background:#8C7B80;}
.alert-box{background:#fdf6f6;border-left:3px solid #c0756e;border-radius:0 8px 8px 0;padding:9px 12px;margin-bottom:7px;font-size:12px;color:#2a2a2a;line-height:1.5;}
.motivador{background:#f3efef;border-radius:10px;padding:14px 16px;font-size:13px;color:#4a3a3e;line-height:1.65;font-style:italic;border-left:3px solid #8C7B80;}
.rfooter{background:#f9f8f8;border-top:1px solid #ece8e8;padding:12px 26px;display:flex;align-items:center;justify-content:space-between;}
.rfooter-brand{font-size:10px;font-weight:600;color:#8C7B80;}
.rfooter-note{font-size:9px;color:#aaa;}

/* PUBLISH */
.pub-box{background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:14px 16px;margin-top:16px;}
.pub-box h4{font-size:13px;font-weight:700;color:#166534;margin-bottom:4px;}
.pub-box p{font-size:12px;color:#166534;margin-bottom:10px;line-height:1.5;}
.pub-url{font-size:11px;font-family:monospace;background:#fff;border:1px solid #86efac;border-radius:6px;padding:8px 10px;color:#166534;word-break:break-all;}

/* NOTAS */
.narea{width:100%;font-size:12px;line-height:1.6;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-family:'Montserrat',sans-serif;resize:vertical;min-height:100px;outline:none;}
.narea:focus{border-color:#8C7B80;}
.saveok{font-size:11px;color:#8C7B80;font-weight:600;display:none;margin-left:8px;}

@media(max-width:768px){.layout{grid-template-columns:1fr;}.sidebar{max-height:300px;}.igrid{grid-template-columns:1fr;}.scores-grid{grid-template-columns:1fr 1fr;}}
@media print{
  .sidebar{display:none;}.layout{grid-template-columns:1fr;}
  .tabs{display:none;}.chead-actions{display:none;}.gen-box{display:none;}
  .pub-box{display:none;}.rhead{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .score-card{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .alert-box{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .motivador{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .progress-banner{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>
<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-top">
    <h1>Panel del coach</h1>
    <p>Micaela Jairedin · Career Coach & Recruiter</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-l">Total</div><div class="stat-v" id="st-tot">—</div></div>
    <div class="stat"><div class="stat-l">Nuevos</div><div class="stat-v" id="st-new">—</div></div>
    <div class="stat"><div class="stat-l">Con informe</div><div class="stat-v" id="st-rep">—</div></div>
    <div class="stat"><div class="stat-l">Publicados</div><div class="stat-v" id="st-pub">—</div></div>
  </div>
  <button class="refresh-btn" onclick="loadCands()">↺ Actualizar candidatos</button>
  <div class="clist" id="clist"><div class="empty-list">Cargando...</div></div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="empty-main">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <p>Selecciona un candidato para ver su perfil y generar el informe</p>
  </div>
</div>

</div>

<script src="panel.js" charset="utf-8"></script>
</body>
</html>
