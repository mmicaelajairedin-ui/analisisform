/* ═══════════════════════════════════════════════════
   NUEVO MOTOR VISUAL (Fix Superposición + Alto Contraste)
═══════════════════════════════════════════════════ */
:root {
  /* Paleta Modernizada (Más contraste y limpieza) */
  --accent: #8E7676;
  --accent-dark: #6B5656;
  --accent-light: #F9F5F5;
  --accent-mid: #D4BFBF;
  
  --title: #1E293B; /* Textos oscuros de alto contraste */
  --body: #475569;
  --muted: #94A3B8;
  
  --bg-app: #F1F5F9; /* Fondo gris muy claro anti-fatiga */
  --card: #FFFFFF;
  --border: #E2E8F0;
  
  --sidebar-bg: #1E293B; /* Sidebar oscuro tipo SaaS Premium */
  --sidebar-text: #F8FAFC;
  --sidebar-hover: #334155;
  
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
  
  --radius: 12px;
  --radius-sm: 8px;
  
  --font-title: 'Montserrat', sans-serif;
  --font-body: 'Open Sans', sans-serif;
  
  /* Colores de estado vibrantes */
  --green: #10B981;
  --blue: #3B82F6;
  --orange: #F59E0B;
  --red: #EF4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

/* FIX CRÍTICO 1: Control global de desbordamiento para evitar superposición */
html, body {
  height: 100vh;
  width: 100vw;
  overflow: hidden; /* Esto evita que el contenido principal se salga de la pantalla */
  font-family: var(--font-body);
  color: var(--body);
  background: var(--bg-app);
}

/* FIX CRÍTICO 2: Layout CSS Grid estricto */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: 100vh;
  width: 100%;
}

/* ── SIDEBAR (Izquierda) ── */
.sidebar {
  background: var(--sidebar-bg);
  color: var(--sidebar-text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  border-right: 1px solid rgba(0,0,0,0.1);
  box-shadow: 2px 0 10px rgba(0,0,0,0.1);
  z-index: 50;
}

.sb-list {
  flex: 1;
  overflow-y: auto; /* Solo hace scroll la lista de clientes */
  padding: 10px;
}
.sb-list::-webkit-scrollbar { width: 5px; }
.sb-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 5px; }

/* Tarjetas de Clientes (Crow) */
.crow {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05) !important;
  border-radius: var(--radius-sm) !important;
  padding: 12px !important;
  margin-bottom: 8px !important;
  transition: all 0.2s ease !important;
  cursor: pointer;
}
.crow:hover { background: var(--sidebar-hover) !important; transform: translateX(2px); }
.crow.on {
  background: var(--sidebar-hover) !important;
  border-left: 4px solid var(--accent) !important;
  box-shadow: var(--shadow-md);
}
.crow-name { color: white !important; font-family: var(--font-title); font-weight: 700; font-size: 13px; }
.crow-sub { color: var(--muted) !important; font-size: 11px; margin-top: 2px; }

/* Botones Sidebar */
.nb {
  color: var(--muted) !important;
  transition: all 0.2s ease !important;
}
.nb:hover { background: var(--sidebar-hover) !important; color: white !important; }
.nb.nb-on { background: var(--accent) !important; color: white !important; font-weight: 700 !important; }

/* ── CONTENIDO PRINCIPAL (Derecha) ── */
.main-wrapper {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden; /* Contenedor principal rígido */
  background: var(--bg-app);
}

#clients-panel, #dynamic-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* FIX CRÍTICO 3: Área de trabajo con scroll independiente */
.tab-body, #dynamic-panel {
  flex: 1;
  overflow-y: auto; /* Aquí ocurre el scroll real del contenido */
  padding: 30px 40px !important;
  background: var(--bg-app);
}

/* ── ESTÉTICA DE TARJETAS Y COMPONENTES ── */
.card, .gen-box, .dp-card, .rbox, .ii {
  background: var(--card) !important;
  border: 1px solid var(--border) !important;
  border-radius: var(--radius) !important;
  box-shadow: var(--shadow-sm) !important;
  padding: 24px !important;
  margin-bottom: 20px !important;
  transition: box-shadow 0.2s ease;
}
.card:hover, .gen-box:hover, .dp-card:hover { box-shadow: var(--shadow-md) !important; }

h3, .sec-t, .dp-title {
  font-family: var(--font-title) !important;
  font-weight: 800 !important;
  color: var(--title) !important;
  margin-bottom: 15px !important;
}

.dp-title { font-size: 24px !important; letter-spacing: -0.5px; }

/* Cabecera Cliente (Chead) */
.chead {
  background: var(--card) !important;
  border-bottom: 1px solid var(--border) !important;
  padding: 20px 40px !important;
  box-shadow: var(--shadow-sm) !important;
  display: flex !important;
  align-items: center !important;
  gap: 20px !important;
  flex-shrink: 0; /* Evita que se aplaste */
  z-index: 10;
}
.chead-name { color: var(--title) !important; font-family: var(--font-title); font-size: 22px !important; font-weight: 800 !important; }
.chead-sub { color: var(--body) !important; font-size: 13px !important; }

/* Flujo de Proceso (Flechas) */
