<!-- Icono: triángulo Pathway con corazón adentro -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <!-- Triángulo principal (Pathway dark) -->
  <polygon points="10,86 50,14 90,86" fill="#2D6A4F"/>
  <!-- Punta dorada -->
  <circle cx="50" cy="14" r="4" fill="#E9C46A"/>

  <!-- Corazón centrado en el triángulo -->
  <path d="M 50 78
           C 50 78, 36 70, 36 60
           C 36 54, 41 51, 45 51
           C 47 51, 49 52, 50 54
           C 51 52, 53 51, 55 51
           C 59 51, 64 54, 64 60
           C 64 70, 50 78, 50 78 Z"
        fill="#FAFDF9"/>
</svg>
