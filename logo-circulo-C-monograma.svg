<!-- Variante C: Monograma con C circular elegante (estilo Coco Chanel / membership card) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="800" height="800">
  <defs>
    <path id="textCircleTopC" d="M 200 200 m -150 0 a 150 150 0 0 1 300 0" />
  </defs>

  <!-- Círculo de fondo dorado muy sutil -->
  <circle cx="200" cy="200" r="170" fill="#FFFCF1"/>

  <!-- C dorada gigante (la "C" de Círculo) — sutil, casi watermark -->
  <text x="200" y="270"
        font-family="'Fraunces', Georgia, serif"
        font-size="320"
        font-weight="400"
        fill="#E9C46A"
        text-anchor="middle"
        opacity="0.2">C</text>

  <!-- Logo Pathway original centrado -->
  <g transform="translate(150, 145) scale(1.0)">
    <polygon points="10,82 32,52 54,82" fill="#52B788"/>
    <polygon points="34,82 58,28 82,82" fill="#2D6A4F"/>
    <circle cx="58" cy="22" r="5" fill="#E9C46A"/>
  </g>

  <!-- Texto debajo -->
  <text x="200" y="265"
        font-family="'Fraunces', Georgia, serif"
        font-size="22"
        font-style="italic"
        font-weight="500"
        fill="#1B4332"
        text-anchor="middle">el círculo</text>

  <text x="200" y="290"
        font-family="'Inter', Arial, sans-serif"
        font-size="9"
        font-weight="600"
        fill="#5A5A55"
        text-anchor="middle"
        letter-spacing="4">PATHWAY · MMXXVI</text>
</svg>
