<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Acceder — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.card{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06);}
.logo{text-align:center;margin-bottom:2rem;}
.logo-dot{width:48px;height:48px;border-radius:50%;background:#f3efef;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.logo-dot span{font-size:18px;font-weight:700;color:#8C7B80;}
.logo h1{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:2px;}
.logo p{font-size:12px;color:#999;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase;}
.field input{width:100%;padding:12px 14px;font-size:14px;font-family:'Montserrat',sans-serif;border:1.5px solid #ddd;border-radius:10px;background:#fff;color:#1a1a1a;outline:none;transition:border-color .15s;}
.field input:focus{border-color:#8C7B80;box-shadow:0 0 0 3px rgba(140,123,128,.12);}
.btn{width:100%;padding:14px;font-size:14px;font-family:'Montserrat',sans-serif;font-weight:700;border:none;border-radius:10px;background:#8C7B80;color:#fff;cursor:pointer;transition:background .15s;margin-top:.5rem;}
.btn:hover{background:#6B5A5F;}
.btn:disabled{background:#bbb;cursor:not-allowed;}
.error{font-size:12px;color:#c0756e;text-align:center;margin-top:10px;min-height:16px;font-weight:600;}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:#999;margin-top:10px;}
.dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:#8C7B80;animation:dp 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-dot"><span>MJ</span></div>
    <h1>Micaela Jairedin</h1>
    <p>Career Coach & Recruiter</p>
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()">
  </div>
  <button class="btn" id="btn" onclick="entrar()">Entrar →</button>
  <div class="error" id="error"></div>
  <div class="loading" id="loading" style="display:none;">
    <div class="dots"><span></span><span></span><span></span></div>
    Verificando...
  </div>
</div>

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://mmicaelajairedin-ui.github.io/analisisform';

async function hashPassword(password){
  const encoder=new TextEncoder();
  const data=encoder.encode(password);
  const hashBuffer=await crypto.subtle.digest('SHA-256',data);
  const hashArray=Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function entrar(){
  var email=document.getElementById('email').value.trim().toLowerCase();
  var password=document.getElementById('password').value;
  var btn=document.getElementById('btn');
  var error=document.getElementById('error');
  var loading=document.getElementById('loading');

  error.textContent='';
  if(!email||!password){error.textContent='Introduce tu email y contraseña.';return;}

  btn.disabled=true;
  loading.style.display='flex';

  try{
    var hash=await hashPassword(password);
    var res=await fetch(SB+'/rest/v1/usuarios?email=eq.'+encodeURIComponent(email)+'&password_hash=eq.'+hash+'&activo=eq.true&select=id,email,rol,nombre',{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    });
    var rows=await res.json();

    if(!rows||!rows.length){
      error.textContent='Email o contraseña incorrectos.';
      btn.disabled=false;loading.style.display='none';
      return;
    }

  var usuario=rows[0];
    // Guardar sesión
    localStorage.setItem('mj_user',JSON.stringify({id:usuario.id,email:usuario.email,rol:usuario.rol,nombre:usuario.nombre}));

    // Redirigir según rol
    if(usuario.rol==='coach'||usuario.rol==='admin'){
      window.location.href=BASE+'/panel.html';
    } else {
      window.location.href=BASE+'/cliente.html?email='+encodeURIComponent(usuario.email);
    }
  }catch(err){
    error.textContent='Error de conexión. Inténtalo de nuevo.';
    btn.disabled=false;loading.style.display='none';
  }
}
</script>
</body>
</html>
