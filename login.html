<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Acceder — Pathway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bosque:#2D6A4F;
  --bosque-dark:#1B4332;
  --sendero:#52B788;
  --amanecer:#E9C46A;
  --carbon:#1B2E26;
  --niebla:#FAFDF9;
  --texto:#1B2E26;
  --texto-suave:#5A5A55;
  --borde:rgba(45,106,79,.12);
  --serif:'Fraunces',Georgia,serif;
  --sans:'Inter',-apple-system,sans-serif;
}
body{
  font-family:var(--sans);color:var(--texto);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:2rem 1rem;
  background:linear-gradient(135deg,#FAFDF9 0%,#F0F7F2 50%,#E8F2EC 100%);
  position:relative;overflow:hidden;
}
body::before{content:'';position:absolute;top:-180px;right:-180px;width:480px;height:480px;border-radius:50%;background:rgba(82,183,136,.08);}
body::after{content:'';position:absolute;bottom:-120px;left:-120px;width:340px;height:340px;border-radius:50%;background:rgba(45,106,79,.05);}
.card{
  background:#fff;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;
  box-shadow:0 8px 40px rgba(45,106,79,.08);position:relative;z-index:1;
  animation:cardIn .5s ease;
  border:1px solid var(--borde);
}
@keyframes cardIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.logo{text-align:center;margin-bottom:1.5rem;}
.logo-mark{width:48px;height:48px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;}
.logo h1{font-family:var(--serif);font-size:24px;font-weight:500;color:var(--carbon);margin-bottom:4px;letter-spacing:-0.6px;}
.logo h1 .accent{color:var(--sendero);}
.logo p{font-size:13px;color:var(--texto-suave);font-weight:400;}
.quote{
  text-align:center;font-size:12px;color:var(--bosque);font-style:italic;line-height:1.6;
  margin-bottom:1.5rem;padding:0 .5rem;
  animation:quoteIn .6s ease .2s both;
}
@keyframes quoteIn{from{opacity:0;}to{opacity:1;}}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--texto-suave);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;}
.field input{width:100%;padding:13px 14px;font-size:14px;font-family:var(--sans);border:1.5px solid var(--borde);border-radius:10px;background:#fff;color:var(--texto);outline:none;transition:all .2s;}
.field input:focus{border-color:var(--bosque);box-shadow:0 0 0 3px rgba(82,183,136,.15);background:#FAFDF9;}
.btn{width:100%;padding:14px;font-size:14px;font-family:var(--sans);font-weight:600;border:none;border-radius:10px;background:var(--bosque);color:#fff;cursor:pointer;transition:all .2s;margin-top:.5rem;box-shadow:0 4px 14px rgba(45,106,79,.18);}
.btn:hover{background:var(--bosque-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,106,79,.25);}
.btn:disabled{background:#bbb;cursor:not-allowed;box-shadow:none;transform:none;}
.error{font-size:12px;color:#C0756E;text-align:center;margin-top:10px;min-height:16px;font-weight:600;}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--texto-suave);margin-top:10px;}
.dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--sendero);animation:dp 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.divider{display:flex;align-items:center;gap:10px;margin:1.4rem 0 1rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--borde);}
.divider span{font-size:11px;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.08em;font-weight:500;}
.signup{text-align:center;font-size:13px;color:var(--texto-suave);}
.signup a{color:var(--bosque);text-decoration:none;font-weight:600;}
.signup a:hover{color:var(--bosque-dark);text-decoration:underline;}
.help{text-align:center;margin-top:1rem;font-size:11px;color:#999;}
.help a{color:var(--bosque);text-decoration:none;font-weight:500;}
.help a:hover{text-decoration:underline;}
.lang-bar{position:absolute;top:14px;right:14px;display:flex;gap:4px;z-index:2;}
.lang-bar button{padding:4px 10px;font-size:10px;font-weight:600;font-family:var(--sans);border-radius:20px;border:1.5px solid var(--borde);background:#fff;color:var(--texto-suave);cursor:pointer;transition:all .15s;}
.lang-bar button.on{background:var(--bosque);border-color:var(--bosque);color:#fff;}
@media(max-width:480px){
  .card{padding:1.5rem 1.2rem;border-radius:16px;}
  .field input{font-size:16px;padding:14px;}
  .btn{font-size:16px;padding:16px;min-height:48px;}
}
</style>
</head>
<body>
<div class="lang-bar">
  <button id="lng-es" class="on" onclick="setLng('es')">ES</button>
  <button id="lng-en" onclick="setLng('en')">EN</button>
</div>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg width="44" height="44" viewBox="0 0 100 100" aria-hidden="true">
        <polygon points="10,82 32,52 54,82" fill="#52B788"/>
        <polygon points="34,82 58,28 82,82" fill="#2D6A4F"/>
        <circle cx="58" cy="22" r="5" fill="#E9C46A"/>
      </svg>
    </div>
    <h1 id="lh">Bienvenida a Pathway<span class="accent">.</span></h1>
    <p id="lp">Accedé a tu portal</p>
  </div>
  <div class="quote" id="quote"></div>
  <div class="field">
    <label id="lab-email">Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label id="lab-pass">Contraseña</label>
    <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()">
  </div>
  <button class="btn" id="btn" onclick="entrar()">Entrar →</button>
  <div class="error" id="error"></div>
  <div class="loading" id="loading" style="display:none;">
    <div class="dots"><span></span><span></span><span></span></div>
    <span id="lng-verif">Verificando...</span>
  </div>
  <div class="divider"><span id="lng-or">o</span></div>
  <div class="signup" id="signup-row">
    <span id="lng-noaccount">¿Aún no tenés cuenta?</span>
    <a href="registro.html" id="lng-signup-link">Registrate aquí →</a>
  </div>
  <div class="help" id="lng-help">¿Problemas para entrar? <a href="mailto:hi@pathwaycareercoach.com">Escribinos</a>.</div>
</div>

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://pathwaycareercoach.com';

// ── Idioma (auto-detect navegador) ─────────────────────────
var QUOTES_ES=[
  '"Cada paso que das te acerca a donde quieres estar."',
  '"Tu próximo trabajo ya te está esperando."',
  '"El cambio empieza con una decisión. Ya la tomaste."',
  '"No buscas cualquier trabajo, buscas el correcto."',
  '"Tu experiencia tiene más valor del que crees."'
];
var QUOTES_EN=[
  '"Every step you take brings you closer to where you want to be."',
  '"Your next job is already waiting for you."',
  '"Change begins with a decision. You already made it."',
  '"You\'re not looking for any job — you\'re looking for the right one."',
  '"Your experience holds more value than you think."'
];
var TXT={
  es:{title:'Bienvenida a Pathway',sub:'Accedé a tu portal',email:'Email',pass:'Contraseña',btn:'Entrar →',ver:'Verificando...',err_empty:'Introducí tu email y contraseña.',err_wrong:'Email o contraseña incorrectos.',err_net:'Error de conexión. Intentalo de nuevo.',or:'o',noaccount:'¿Aún no tenés cuenta?',signup:'Registrate aquí →',help:'¿Problemas para entrar? <a href="mailto:hi@pathwaycareercoach.com">Escribinos</a>.'},
  en:{title:'Welcome to Pathway',sub:'Log in to your portal',email:'Email',pass:'Password',btn:'Log in →',ver:'Verifying...',err_empty:'Enter your email and password.',err_wrong:'Wrong email or password.',err_net:'Connection error. Try again.',or:'or',noaccount:"Don't have an account yet?",signup:'Sign up here →',help:'Trouble logging in? <a href="mailto:hi@pathwaycareercoach.com">Contact us</a>.'}
};

var _lng='es';
try{
  var _saved=localStorage.getItem('mj_lang');
  if(_saved==='es'||_saved==='en'){_lng=_saved;}
  else{
    var _nav=(navigator.language||navigator.userLanguage||'es').toLowerCase();
    if(_nav.indexOf('en')===0)_lng='en';
  }
}catch(e){}

function setLng(l){
  _lng=l;
  try{localStorage.setItem('mj_lang',l);}catch(e){}
  var t=TXT[l];
  document.getElementById('lh').innerHTML=t.title+'<span class="accent">.</span>';
  document.getElementById('lp').textContent=t.sub;
  document.getElementById('lab-email').textContent=t.email;
  document.getElementById('lab-pass').textContent=t.pass;
  document.getElementById('btn').textContent=t.btn;
  document.getElementById('lng-verif').textContent=t.ver;
  document.getElementById('lng-or').textContent=t.or;
  document.getElementById('lng-noaccount').textContent=t.noaccount;
  document.getElementById('lng-signup-link').textContent=t.signup;
  document.getElementById('lng-help').innerHTML=t.help;
  document.getElementById('lng-es').classList.toggle('on',l==='es');
  document.getElementById('lng-en').classList.toggle('on',l==='en');
  document.getElementById('email').placeholder = l==='en'?'you@email.com':'tu@email.com';
  document.getElementById('password').placeholder = l==='en'?'Your password':'Tu contraseña';
  var qs = l==='en'?QUOTES_EN:QUOTES_ES;
  document.getElementById('quote').textContent=qs[Math.floor(Math.random()*qs.length)];
}
setLng(_lng);

async function hashPassword(password){
  const encoder=new TextEncoder();
  const data=encoder.encode(password);
  const hashBuffer=await crypto.subtle.digest('SHA-256',data);
  const hashArray=Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function entrar(){
  var email=document.getElementById('email').value.trim().toLowerCase();
  var password=document.getElementById('password').value;
  var btn=document.getElementById('btn');
  var error=document.getElementById('error');
  var loading=document.getElementById('loading');

  error.textContent='';
  if(!email||!password){error.textContent=TXT[_lng].err_empty;return;}

  btn.disabled=true;
  loading.style.display='flex';

  try{
    var hash=await hashPassword(password);
    var res=await fetch(SB+'/rest/v1/usuarios?email=eq.'+encodeURIComponent(email)+'&password_hash=eq.'+hash+'&activo=eq.true&select=id,email,rol,nombre',{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    });
    var rows=await res.json();

    if(!rows||!rows.length){
      error.textContent=TXT[_lng].err_wrong;
      btn.disabled=false;loading.style.display='none';
      return;
    }

    var usuario=rows[0];
    localStorage.setItem('mj_user',JSON.stringify({id:usuario.id,email:usuario.email,rol:usuario.rol,nombre:usuario.nombre}));

    var _v='v='+Date.now();
    if(usuario.rol==='coach'||usuario.rol==='admin'){
      window.location.href=BASE+'/panel.html?'+_v;
    } else {
      window.location.href=BASE+'/cliente.html?'+_v;
    }
  }catch(err){
    error.textContent=TXT[_lng].err_net;
    btn.disabled=false;loading.style.display='none';
  }
}
</script>
</body>
</html>
