<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Acceder — Pathway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pw-bosque:#2D6A4F;
  --pw-bosque-d:#1B4332;
  --pw-sendero:#52B788;
  --pw-carbon:#1B2E26;
  --pw-niebla:#FAFDF9;
  --pw-texto:#1B2E26;
  --pw-texto-suave:#5A5A55;
  --pw-borde:rgba(45,106,79,.14);
  --pw-serif:'Fraunces',Georgia,serif;
  --pw-sans:'Inter',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--pw-sans);background:var(--pw-niebla);color:var(--pw-texto);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;-webkit-font-smoothing:antialiased;}
.card{background:#fff;border:1px solid var(--pw-borde);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 12px 40px rgba(45,106,79,.08);}
.logo{text-align:center;margin-bottom:1.75rem;}
.logo-mark{display:inline-flex;align-items:center;gap:8px;margin-bottom:10px;}
.logo-mark span{font-family:var(--pw-serif);font-size:22px;font-weight:600;color:var(--pw-bosque-d);letter-spacing:-0.8px;line-height:1;}
.logo p{font-size:12px;color:var(--pw-texto-suave);}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--pw-texto-suave);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.field input{width:100%;padding:12px 14px;font-size:14px;font-family:var(--pw-sans);border:1.5px solid var(--pw-borde);border-radius:10px;background:#fff;color:var(--pw-texto);outline:none;transition:border-color .15s;}
.field input:focus{border-color:var(--pw-bosque);box-shadow:0 0 0 3px rgba(45,106,79,.10);}
.btn{width:100%;padding:14px;font-size:14px;font-family:var(--pw-sans);font-weight:500;border:none;border-radius:10px;background:var(--pw-bosque-d);color:#fff;cursor:pointer;transition:background .15s;margin-top:.5rem;}
.btn:hover{background:var(--pw-bosque);}
.btn:disabled{background:#bbb;cursor:not-allowed;}
.error{font-size:12px;color:#c0756e;text-align:center;margin-top:10px;min-height:16px;font-weight:500;}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--pw-texto-suave);margin-top:10px;}
.dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--pw-bosque);animation:dp 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.foot{text-align:center;margin-top:1.25rem;font-size:12px;color:var(--pw-texto-suave);}
.foot a{color:var(--pw-bosque);text-decoration:none;font-weight:500;}
.foot a:hover{text-decoration:underline;}
@media(max-width:480px){
  .card{padding:1.5rem 1.2rem;border-radius:14px;}
  .field input{font-size:16px;padding:14px;}
  .btn{font-size:16px;padding:16px;min-height:48px;}
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg width="26" height="26" viewBox="0 0 100 100" aria-hidden="true"><polygon points="10,82 32,52 54,82" fill="#52B788"/><polygon points="34,82 58,28 82,82" fill="#2D6A4F"/><circle cx="58" cy="22" r="5" fill="#E9C46A"/></svg>
      <span>pathway<span style="color:#52B788;">.</span></span>
    </div>
    <p>Coaching de carrera con IA</p>
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()">
  </div>
  <button class="btn" id="btn" onclick="entrar()">Entrar &rarr;</button>
  <div class="error" id="error"></div>
  <div class="loading" id="loading" style="display:none;">
    <div class="dots"><span></span><span></span><span></span></div>
    Verificando...
  </div>
  <div class="foot">
    ¿Eres coach? <a href="registro.html">Registrarme</a>
  </div>
</div>

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://pathwaycareercoach.com';

async function hashPassword(password){
  const encoder=new TextEncoder();
  const data=encoder.encode(password);
  const hashBuffer=await crypto.subtle.digest('SHA-256',data);
  const hashArray=Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function entrar(){
  var email=document.getElementById('email').value.trim().toLowerCase();
  var password=document.getElementById('password').value;
  var btn=document.getElementById('btn');
  var error=document.getElementById('error');
  var loading=document.getElementById('loading');

  error.textContent='';
  if(!email||!password){error.textContent='Introduce tu email y contraseña.';return;}

  btn.disabled=true;
  loading.style.display='flex';

  try{
    var hash=await hashPassword(password);
    var res=await fetch(SB+'/rest/v1/usuarios?email=eq.'+encodeURIComponent(email)+'&password_hash=eq.'+hash+'&activo=eq.true&select=id,email,rol,nombre',{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    });
    var rows=await res.json();

    if(!rows||!rows.length){
      error.textContent='Email o contraseña incorrectos.';
      btn.disabled=false;loading.style.display='none';
      return;
    }

    var usuario=rows[0];
    localStorage.setItem('mj_user',JSON.stringify({id:usuario.id,email:usuario.email,rol:usuario.rol,nombre:usuario.nombre}));

    var _v='v='+Date.now();
    if(usuario.rol==='coach'||usuario.rol==='admin'){
      window.location.href=BASE+'/panel.html?'+_v;
    } else {
      window.location.href=BASE+'/cliente.html?'+_v;
    }
  }catch(err){
    error.textContent='Error de conexión. Inténtalo de nuevo.';
    btn.disabled=false;loading.style.display='none';
  }
}
</script>
</body>
</html>
