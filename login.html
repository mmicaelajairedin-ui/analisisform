<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Acceder — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Montserrat',sans-serif;color:#1a1a1a;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:2rem 1rem;
  background:linear-gradient(135deg,#F9F5F5 0%,#F5F0F0 30%,#EDE8E8 60%,#F0EDED 100%);
  position:relative;overflow:hidden;
}
body::before{content:'';position:absolute;top:-150px;right:-150px;width:400px;height:400px;border-radius:50%;background:rgba(140,123,128,.06);}
body::after{content:'';position:absolute;bottom:-100px;left:-100px;width:300px;height:300px;border-radius:50%;background:rgba(140,123,128,.04);}
.card{
  background:#fff;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:400px;
  box-shadow:0 8px 40px rgba(140,123,128,.12);position:relative;z-index:1;
  animation:cardIn .5s ease;
}
@keyframes cardIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.logo{text-align:center;margin-bottom:1.5rem;}
.logo-dot{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#8C7B80,#6B5A5F);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 4px 16px rgba(140,123,128,.25);}
.logo-dot span{font-size:18px;font-weight:800;color:#fff;}
.logo h1{font-size:17px;font-weight:800;color:#1a1a1a;margin-bottom:2px;letter-spacing:-.02em;}
.logo p{font-size:11px;color:#999;font-weight:500;}
.quote{
  text-align:center;font-size:12px;color:#8C7B80;font-style:italic;line-height:1.6;
  margin-bottom:1.5rem;padding:0 .5rem;
  animation:quoteIn .6s ease .2s both;
}
@keyframes quoteIn{from{opacity:0;}to{opacity:1;}}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:10px;font-weight:700;color:#666;margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;}
.field input{width:100%;padding:13px 14px;font-size:14px;font-family:'Montserrat',sans-serif;border:1.5px solid #E5E0E0;border-radius:12px;background:#fff;color:#1a1a1a;outline:none;transition:all .2s;}
.field input:focus{border-color:#8C7B80;box-shadow:0 0 0 3px rgba(140,123,128,.1);background:#FDFBFB;}
.btn{width:100%;padding:14px;font-size:14px;font-family:'Montserrat',sans-serif;font-weight:700;border:none;border-radius:12px;background:linear-gradient(135deg,#8C7B80,#6B5A5F);color:#fff;cursor:pointer;transition:all .2s;margin-top:.5rem;box-shadow:0 4px 14px rgba(140,123,128,.25);}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(140,123,128,.3);}
.btn:disabled{background:#bbb;cursor:not-allowed;box-shadow:none;transform:none;}
.error{font-size:12px;color:#c0756e;text-align:center;margin-top:10px;min-height:16px;font-weight:600;}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:#999;margin-top:10px;}
.dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:#8C7B80;animation:dp 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.help{text-align:center;margin-top:1.2rem;font-size:11px;color:#bbb;}
.help a{color:#8C7B80;text-decoration:none;font-weight:600;}
.help a:hover{text-decoration:underline;}
@media(max-width:480px){
  .card{padding:1.5rem 1.2rem;border-radius:16px;}
  .field input{font-size:16px;padding:14px;}
  .btn{font-size:16px;padding:16px;min-height:48px;}
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-dot"><span>MJ</span></div>
    <h1>Micaela Jairedin</h1>
    <p>Career Coach & Recruiter</p>
  </div>
  <div class="quote" id="quote"></div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()">
  </div>
  <button class="btn" id="btn" onclick="entrar()">Entrar →</button>
  <div class="error" id="error"></div>
  <div class="loading" id="loading" style="display:none;">
    <div class="dots"><span></span><span></span><span></span></div>
    Verificando...
  </div>
  <div class="help">¿Necesitás ayuda? <a href="https://wa.me/34611256224" target="_blank">Escribile a Micaela</a></div>
</div>

<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://mmicaelajairedin-ui.github.io/analisisform';

var QUOTES=[
  '"Cada paso que das te acerca a donde querés estar."',
  '"Tu próximo trabajo ya te está esperando."',
  '"El cambio empieza con una decisión. Ya la tomaste."',
  '"No buscás cualquier trabajo, buscás el correcto."',
  '"Tu experiencia tiene más valor del que creés."'
];
document.getElementById('quote').textContent=QUOTES[Math.floor(Math.random()*QUOTES.length)];

async function hashPassword(password){
  const encoder=new TextEncoder();
  const data=encoder.encode(password);
  const hashBuffer=await crypto.subtle.digest('SHA-256',data);
  const hashArray=Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function entrar(){
  var email=document.getElementById('email').value.trim().toLowerCase();
  var password=document.getElementById('password').value;
  var btn=document.getElementById('btn');
  var error=document.getElementById('error');
  var loading=document.getElementById('loading');

  error.textContent='';
  if(!email||!password){error.textContent='Introduce tu email y contraseña.';return;}

  btn.disabled=true;
  loading.style.display='flex';

  try{
    var hash=await hashPassword(password);
    var res=await fetch(SB+'/rest/v1/usuarios?email=eq.'+encodeURIComponent(email)+'&password_hash=eq.'+hash+'&activo=eq.true&select=id,email,rol,nombre',{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    });
    var rows=await res.json();

    if(!rows||!rows.length){
      error.textContent='Email o contraseña incorrectos.';
      btn.disabled=false;loading.style.display='none';
      return;
    }

    var usuario=rows[0];
    localStorage.setItem('mj_user',JSON.stringify({id:usuario.id,email:usuario.email,rol:usuario.rol,nombre:usuario.nombre}));

    var _v='v='+Date.now();
    if(usuario.rol==='coach'||usuario.rol==='admin'){
      window.location.href=BASE+'/panel.html?'+_v;
    } else {
      window.location.href=BASE+'/cliente.html?'+_v;
    }
  }catch(err){
    error.textContent='Error de conexión. Inténtalo de nuevo.';
    btn.disabled=false;loading.style.display='none';
  }
}
</script>
</body>
</html>
