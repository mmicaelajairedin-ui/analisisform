<!-- Variante B: Stacked lockup minimalista (estilo elegant brand) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="800" height="800">
  <!-- Fondo sutil -->
  <rect width="400" height="400" fill="#FAFDF9"/>

  <!-- Logo Pathway original arriba, ampliado -->
  <g transform="translate(150, 90) scale(1.0)">
    <polygon points="10,82 32,52 54,82" fill="#52B788"/>
    <polygon points="34,82 58,28 82,82" fill="#2D6A4F"/>
    <circle cx="58" cy="22" r="5" fill="#E9C46A"/>
  </g>

  <!-- Línea divisoria fina dorada -->
  <line x1="160" y1="220" x2="240" y2="220" stroke="#E9C46A" stroke-width="1" opacity="0.6"/>

  <!-- "el círculo" — serif italic, elegante -->
  <text x="200" y="270"
        font-family="'Fraunces', Georgia, serif"
        font-size="48"
        font-style="italic"
        font-weight="500"
        fill="#1B4332"
        text-anchor="middle"
        letter-spacing="-1">el círculo</text>

  <!-- Subtítulo small caps -->
  <text x="200" y="305"
        font-family="'Inter', Arial, sans-serif"
        font-size="11"
        font-weight="600"
        fill="#5A5A55"
        text-anchor="middle"
        letter-spacing="6">PATHWAY · COACHES DE CARRERA</text>
</svg>
