<!-- Icono: triángulo Pathway con 3 personitas adentro -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <!-- Triángulo principal (Pathway dark) -->
  <polygon points="10,86 50,14 90,86" fill="#2D6A4F"/>
  <!-- Punta dorada -->
  <circle cx="50" cy="14" r="4" fill="#E9C46A"/>

  <!-- 3 personitas dentro del triángulo (color crema/blanco para contraste) -->
  <!-- Persona izquierda (más chica, atrás) -->
  <circle cx="38" cy="62" r="3" fill="#FAFDF9"/>
  <path d="M 33 76 Q 33 68 38 68 Q 43 68 43 76 L 43 80 L 33 80 Z" fill="#FAFDF9"/>

  <!-- Persona central (más alta) -->
  <circle cx="50" cy="55" r="3.5" fill="#FAFDF9"/>
  <path d="M 44 72 Q 44 62 50 62 Q 56 62 56 72 L 56 78 L 44 78 Z" fill="#FAFDF9"/>

  <!-- Persona derecha (más chica) -->
  <circle cx="62" cy="62" r="3" fill="#FAFDF9"/>
  <path d="M 57 76 Q 57 68 62 68 Q 67 68 67 76 L 67 80 L 57 80 Z" fill="#FAFDF9"/>
</svg>
