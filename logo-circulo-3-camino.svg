<!-- Variante 3: Badge circular con camino curvo subiendo a la montaña (metáfora pathway) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#FAFDF9"/>
      <stop offset="100%" stop-color="#D7EDDD"/>
    </radialGradient>
    <linearGradient id="m3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
  </defs>

  <!-- Fondo circular -->
  <circle cx="256" cy="256" r="256" fill="url(#bg3)"/>

  <!-- Montaña pequeña (atrás, izquierda) -->
  <path d="M 90 380 L 175 260 L 250 380 Z" fill="#74D29F" opacity="0.85"/>

  <!-- Montaña grande (centro) -->
  <path d="M 200 400 L 320 160 L 430 400 Z" fill="url(#m3)"/>

  <!-- Punta dorada -->
  <circle cx="320" cy="160" r="13" fill="#E9C46A"/>

  <!-- Camino curvo dorado subiendo (la "pathway") -->
  <path d="M 130 430 Q 200 410 250 380 Q 290 360 310 320 Q 318 290 320 180"
        fill="none"
        stroke="#E9C46A"
        stroke-width="10"
        stroke-linecap="round"
        stroke-dasharray="0,18"
        opacity="0.85"/>

  <!-- Punto inicial del camino (huella) -->
  <circle cx="130" cy="430" r="9" fill="#E9C46A"/>
</svg>
