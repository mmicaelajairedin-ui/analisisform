<!DOCTYPE html><!-- v4 -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links — Micaela Jairedin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:2rem 1rem 4rem;}
.wrap{max-width:660px;margin:0 auto;}
.top{text-align:center;margin-bottom:2rem;}
.pill{display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:20px;padding:7px 18px;border:1px solid #eee;margin-bottom:1rem;}
.dot{width:8px;height:8px;border-radius:50%;background:#8C7B80;}
.pill-name{font-size:13px;font-weight:700;}
.pill-sub{font-size:11px;color:#999;}
.top h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.top p{font-size:13px;color:#666;}
.card{background:#fff;border-radius:14px;border:1px solid #eee;padding:1.25rem;margin-bottom:1rem;}
.sec-t{font-size:10px;font-weight:700;color:#8C7B80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-t::after{content:'';flex:1;height:1px;background:#f0ecec;}
.lrow{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f9f8f8;border-radius:10px;margin-bottom:8px;}
.lrow:last-child{margin-bottom:0;}
.licon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.linfo{flex:1;min-width:0;}
.llabel{font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:1px;}
.ldesc{font-size:11px;color:#999;line-height:1.4;}
.lbtns{display:flex;gap:6px;flex-shrink:0;}
.btn-c{padding:7px 14px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;background:#8C7B80;color:#fff;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;transition:.15s;}
.btn-c:hover{background:#6B5A5F;}
.btn-c.ok{background:#4a7c5f;}
.btn-o{padding:7px 14px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;background:#fff;color:#8C7B80;border:1.5px solid #8C7B80;border-radius:8px;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block;transition:.15s;}
.btn-o:hover{background:#f3efef;}
.cand-card{background:#fff;border-radius:14px;border:1px solid #eee;margin-bottom:10px;overflow:hidden;}
.cand-hd{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:.12s;}
.cand-hd:hover{background:#fafafa;}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.cand-name{font-size:13px;font-weight:700;flex:1;}
.cand-email{font-size:11px;color:#999;margin-top:1px;}
.badges{display:flex;gap:4px;flex-wrap:wrap;}
.badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;}
.b-inf{background:#f3efef;color:#6B5A5F;}
.b-cv{background:#e8f5e9;color:#2e7d32;}
.b-no{background:#fef3e2;color:#b45309;}
.arrow{font-size:12px;color:#ccc;transition:.15s;}
.cand-body{display:none;padding:0 16px 14px;}
.cand-body.open{display:block;}
.link-group-title{font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.08em;margin:12px 0 6px;}
.link-block{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#f9f8f8;border-radius:8px;margin-bottom:6px;}
.lb-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.lb-info{flex:1;min-width:0;}
.lb-label{font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:2px;}
.lb-desc{font-size:11px;color:#666;line-height:1.4;margin-bottom:4px;}
.lb-url{font-size:10px;color:#aaa;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-btns{display:flex;gap:5px;flex-shrink:0;flex-direction:column;}
.sb{padding:6px 12px;font-size:10px;font-weight:700;font-family:'Montserrat',sans-serif;border-radius:6px;cursor:pointer;border:none;white-space:nowrap;transition:.15s;text-decoration:none;display:block;text-align:center;}
.sb-p{background:#8C7B80;color:#fff;}.sb-p:hover{background:#6B5A5F;}.sb-p.ok{background:#4a7c5f;}
.sb-o{background:#fff;color:#8C7B80;border:1.5px solid #8C7B80;}.sb-o:hover{background:#f3efef;}
.lb-code{font-size:13px;font-weight:700;color:#1D4A35;background:#EAF3EE;padding:3px 10px;border-radius:6px;letter-spacing:.08em;}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;width:100%;margin-top:8px;transition:.15s;}
.wa-btn:hover{opacity:.9;}
.no-data{font-size:11px;color:#aaa;font-style:italic;padding:6px 2px;}
.loading{text-align:center;padding:2rem;color:#999;font-size:13px;}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#8C7B80;margin:0 2px;animation:dp 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
@media(max-width:600px){
  body{padding:1rem .75rem 3rem;}
  .wrap{max-width:100%;}
  .top h1{font-size:18px;}
  .card{padding:1rem;}
  .lrow{flex-wrap:wrap;gap:8px;padding:10px;}
  .lbtns{width:100%;justify-content:flex-end;}
  .btn-c,.btn-o{padding:9px 14px;font-size:12px;min-height:40px;}
  .sb{flex-wrap:wrap;gap:6px;}
  .sb button{padding:8px 12px;font-size:11px;min-height:36px;}
  input,select{font-size:16px!important;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="pill">
      <div class="dot"></div>
      <div><div class="pill-name">Micaela Jairedin</div><div class="pill-sub">Career Coach & Recruiter</div></div>
    </div>
    <h1>Mis links</h1>
    <p>Todo lo que necesitas compartir, en un solo lugar.</p>
  </div>

  <!-- LINKS FIJOS -->
  <div class="card">
    <div class="sec-t">Links fijos</div>
    <div class="lrow">
      <div class="licon" style="background:#f3efef;">📋</div>
      <div class="linfo">
        <div class="llabel">Formulario de candidatos</div>
        <div class="ldesc">Envía antes de la primera sesión</div>
      </div>
      <div class="lbtns">
        <button class="btn-c" id="cp-form">Copiar</button>
        <a class="btn-o" href="https://pathwaycareercoach.com/formulario.html" target="_blank">Abrir</a>
      </div>
    </div>
    <div class="lrow">
      <div class="licon" style="background:#E1F5EE;">🎛</div>
      <div class="linfo">
        <div class="llabel">Panel del coach</div>
        <div class="ldesc">Tu panel privado para gestionar candidatos</div>
      </div>
      <div class="lbtns">
        <button class="btn-c" id="cp-panel">Copiar</button>
        <a class="btn-o" href="https://mmicaelajairedin-ui.github.io/analisisform/panel.html" target="_blank">Abrir</a>
      </div>
    </div>
  </div>

  <!-- CANDIDATOS -->
  <div class="card">
    <div class="sec-t">Por candidato</div>
    <div id="cands"><div class="loading"><div class="dots"><span></span><span></span><span></span></div><p style="margin-top:8px;">Cargando...</p></div></div>
  </div>

</div>
<script>
var SB='https://ddxnrsnjdvtqhxunxnwj.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkeG5yc25qZHZ0cWh4dW54bndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDk5MzksImV4cCI6MjA5MDcyNTkzOX0.t82X1x-PDgFDGYhKC7YXoRKhga9I8Hjet60QUYvtZLU';
var BASE='https://mmicaelajairedin-ui.github.io/analisisform';
var COLORS=['#E8D5D8:#6B4A50','#D5DDE8:#4A5A6B','#D5E8D8:#4A6B4A','#E8E0D5:#6B5A4A','#E0D5E8:#5A4A6B'];

function ini(n){return(n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();}
function col(i){return COLORS[i%COLORS.length].split(':');}

function cpBtn(btn,url){
  navigator.clipboard.writeText(url).then(function(){
    var orig=btn.textContent;
    btn.textContent='✓';btn.classList.add('ok');
    setTimeout(function(){btn.textContent=orig;btn.classList.remove('ok');},2000);
  });
}

// Fixed buttons
document.getElementById('cp-form').onclick=function(){cpBtn(this,'https://pathwaycareercoach.com/formulario.html');};
document.getElementById('cp-panel').onclick=function(){cpBtn(this,'https://mmicaelajairedin-ui.github.io/analisisform/panel.html');};

function toggleBody(id){
  var b=document.getElementById('bd-'+id);
  var a=document.getElementById('ar-'+id);
  var open=b.classList.contains('open');
  b.classList.toggle('open');
  a.style.transform=open?'':'rotate(90deg)';
}

function makeLinkBlock(icon,label,desc,url,copyText,code){
  var div=document.createElement('div');
  div.className='link-block'+(code?' highlight':'');
  if(code) div.style.cssText='border:1.5px solid #c5dac5;background:#f0f7f0;';

  var iconEl=document.createElement('div');iconEl.className='lb-icon';iconEl.textContent=icon;
  var info=document.createElement('div');info.className='lb-info';

  var labelEl=document.createElement('div');labelEl.className='lb-label';labelEl.textContent=label;
  var descEl=document.createElement('div');descEl.className='lb-desc';descEl.textContent=desc;
  var urlEl=document.createElement('div');urlEl.className='lb-url';urlEl.textContent=url;

  info.appendChild(labelEl);
  info.appendChild(descEl);
  if(code){
    var codeEl=document.createElement('div');
    codeEl.style.marginTop='4px';
    codeEl.innerHTML='Código: <span class="lb-code">'+code+'</span>';
    info.appendChild(codeEl);
  }
  info.appendChild(urlEl);

  var btns=document.createElement('div');btns.className='lb-btns';
  var cp=document.createElement('button');cp.className='sb sb-p';cp.textContent='Copiar';
  cp.onclick=function(){cpBtn(cp,copyText);};
  var op=document.createElement('a');op.className='sb sb-o';op.textContent='Abrir';
  op.href=url;op.target='_blank';
  btns.appendChild(cp);btns.appendChild(op);

  div.appendChild(iconEl);div.appendChild(info);div.appendChild(btns);
  return div;
}

function load(){
  Promise.all([
    fetch(SB+'/rest/v1/candidatos?select=id,email,nombre,created_at&order=created_at.desc&limit=100',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/informes?select=email,created_at&order=created_at.desc&limit=200',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/cv_publicados?select=email,codigo&order=created_at.desc&limit=200',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();})
  ]).then(function(res){
    var all=Array.isArray(res[0])?res[0]:[];
    var allInf=Array.isArray(res[1])?res[1]:[];
    var allCvs=Array.isArray(res[2])?res[2]:[];

    // Group candidates by email
    var byEmail={};
    all.forEach(function(c){
      var k=(c.email||'').toLowerCase().trim();
      if(!byEmail[k])byEmail[k]=c;
    });
    var cands=Object.values(byEmail);
    cands.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});

    var infSet={};
    allInf.forEach(function(r){infSet[(r.email||'').toLowerCase().trim()]=true;});
    var cvMap={};
    allCvs.forEach(function(r){cvMap[(r.email||'').toLowerCase().trim()]=r.codigo;});

    var container=document.getElementById('cands');
    if(!cands.length){container.innerHTML='<p class="no-data" style="text-align:center;padding:1rem;">No hay candidatos aún.</p>';return;}
    container.innerHTML='';

    cands.forEach(function(c,i){
      var email=(c.email||'').toLowerCase().trim();
      var hasInf=!!infSet[email];
      var cvCode=cvMap[email]||'';
      var hasCv=!!cvCode;
      var cl=col(i);
      var infUrl=BASE+'/cliente.html?email='+encodeURIComponent(c.email);

      var card=document.createElement('div');card.className='cand-card';

      // HEAD
      var hd=document.createElement('div');hd.className='cand-hd';
      hd.onclick=function(){toggleBody(i);};
      var avEl=document.createElement('div');avEl.className='av';
      avEl.style.background=cl[0];avEl.style.color=cl[1];avEl.textContent=ini(c.nombre);
      var nameWrap=document.createElement('div');nameWrap.style.flex='1';
      nameWrap.innerHTML='<div class="cand-name">'+(c.nombre||'--')+'</div><div class="cand-email">'+(c.email||'--')+'</div>';
      var badges=document.createElement('div');badges.className='badges';
      if(hasInf) badges.innerHTML+='<span class="badge b-inf">Informe</span>';
      if(hasCv) badges.innerHTML+='<span class="badge b-cv">CV</span>';
      if(!hasInf&&!hasCv) badges.innerHTML='<span class="badge b-no">Sin publicar</span>';
      var arrowEl=document.createElement('div');arrowEl.className='arrow';arrowEl.id='ar-'+i;arrowEl.textContent='▶';
      hd.appendChild(avEl);hd.appendChild(nameWrap);hd.appendChild(badges);hd.appendChild(arrowEl);

      // BODY
      var body=document.createElement('div');body.className='cand-body';body.id='bd-'+i;

      // Link 1 — Informe
      var t1=document.createElement('div');t1.className='link-group-title';t1.textContent='📊 Link 1 — Informe (gratis)';
      body.appendChild(t1);
      if(hasInf){
        body.appendChild(makeLinkBlock('📊','Informe del cliente','El cliente ve su análisis + opción de pagar por el CV',infUrl,infUrl,null));
      } else {
        var nd1=document.createElement('div');nd1.className='no-data';nd1.textContent='⚠ Publica el informe desde el panel primero.';
        body.appendChild(nd1);
      }

      // Link 2 — CV
      var t2=document.createElement('div');t2.className='link-group-title';t2.textContent='📄 Link 2 — CV optimizado (30€, tras pago)';
      body.appendChild(t2);
      if(hasCv){
        var cvUrl=BASE+'/cliente.html?email='+encodeURIComponent(c.email)+'&cv=1';
        body.appendChild(makeLinkBlock('📄','CV optimizado con diseño','Enviar tras confirmar el pago en Revolut',cvUrl,'Link CV: '+cvUrl+' | Código: '+cvCode,cvCode));
      } else {
        var nd2=document.createElement('div');nd2.className='no-data';nd2.textContent='⚠ Publica el CV desde el panel primero.';
        body.appendChild(nd2);
      }

      // WhatsApp
      if(hasInf){
        var wa=document.createElement('button');wa.className='wa-btn';
        wa.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> Enviar por WhatsApp';
        var nombre=(c.nombre||'').split(' ')[0];
        var msg='Hola '+nombre+',%0A%0ATe comparto tu informe:%0A'+encodeURIComponent(infUrl);
        if(hasCv) msg+='%0A%0ATu CV est%C3%A1 listo. C%C3%B3digo: *'+cvCode+'*';
        wa.onclick=function(){window.open('https://wa.me/?text='+msg,'_blank');};
        body.appendChild(wa);
      }

      card.appendChild(hd);card.appendChild(body);
      container.appendChild(card);
    });
  }).catch(function(e){
    document.getElementById('cands').innerHTML='<p style="color:#c0756e;font-size:13px;text-align:center;padding:1rem;">Error: '+e.message+'</p>';
  });
}

load();
</script>
</body>
</html>
