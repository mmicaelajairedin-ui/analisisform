name: "🧪 Testing Agent Diario — Plataforma MJ"

# Ejecuta todos los días a las 10:00 AM hora de España (UTC+2)
# 08:00 UTC = 10:00 CEST (horario de verano)
# 09:00 UTC = 10:00 CET (horario de invierno)
on:
  schedule:
    - cron: '0 8 * * *'   # 10:00 AM CEST (verano)
  workflow_dispatch:        # Permite ejecución manual desde GitHub

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test-platform:
    name: "Ejecutar tests de la plataforma"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout del código"
        uses: actions/checkout@v4

      - name: "📦 Instalar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "📦 Instalar dependencias"
        run: npm install

      - name: "🎭 Instalar navegadores de Playwright"
        run: npx playwright install --with-deps chromium

      - name: "🧪 Ejecutar tests"
        id: run-tests
        run: |
          npx playwright test --reporter=json > tests/results/test-results.json 2>&1 || true
          echo "Tests ejecutados"
        env:
          BASE_URL: "https://mmicaelajairedin-ui.github.io/analisisform"
          NETLIFY_URL: "https://analisisform.netlify.app"

      - name: "📊 Generar reporte"
        id: generate-report
        run: |
          node tests/generate-report.js || true

          # Leer resumen para el step de email
          if [ -f tests/results/summary.json ]; then
            STATUS=$(cat tests/results/summary.json | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['status'])")
            TOTAL=$(cat tests/results/summary.json | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['totalTests'])")
            PASSED=$(cat tests/results/summary.json | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['passed'])")
            FAILED=$(cat tests/results/summary.json | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['failed'])")

            echo "status=$STATUS" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
          fi

      - name: "🔧 Auto-fixer: reparar problemas simples"
        id: auto-fix
        if: steps.generate-report.outputs.failed != '0'
        run: |
          node tests/auto-fixer.js || true

          # Leer resultados del auto-fixer
          FIXES_COUNT=0
          PENDING_COUNT=0
          if [ -f tests/results/fixes-applied.json ]; then
            FIXES_COUNT=$(python3 -c "import json;print(len(json.load(open('tests/results/fixes-applied.json'))))")
          fi
          if [ -f tests/results/pending-issues.json ]; then
            PENDING_COUNT=$(python3 -c "import json;print(len(json.load(open('tests/results/pending-issues.json'))))")
          fi

          echo "fixes=$FIXES_COUNT" >> $GITHUB_OUTPUT
          echo "pending=$PENDING_COUNT" >> $GITHUB_OUTPUT
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: "🔀 Crear PR con auto-fixes"
        id: create-pr
        if: steps.auto-fix.outputs.fixes != '0' && steps.auto-fix.outputs.fixes != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date +'%Y-%m-%d')
          BRANCH="auto-fix/${DATE}"

          # Verificar si hay cambios reales
          if [ -z "$(git status --porcelain -- '*.html' '*.js' '*.css' ':!tests/' ':!.github/' ':!package.json')" ]; then
            echo "No hay cambios en archivos de la plataforma"
            echo "pr_created=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Crear branch y commit
          git config user.name "Testing Agent MJ"
          git config user.email "testing-agent@micaelajairedin.com"
          git checkout -b "$BRANCH"
          git add -A -- '*.html' '*.js' '*.css' ':!tests/' ':!.github/' ':!package.json'

          # Generar mensaje del commit con los fixes
          FIXES_DESC=""
          if [ -f tests/results/fixes-applied.json ]; then
            FIXES_DESC=$(python3 -c "
          import json
          fixes = json.load(open('tests/results/fixes-applied.json'))
          for f in fixes:
              print(f'- {f[\"explanation\"]} ({f[\"file\"]})')
          ")
          fi

          git commit -m "fix: auto-reparaciones del Testing Agent ($DATE)

          Fixes aplicados automáticamente:
          $FIXES_DESC

          Generado por el Testing Agent Diario"

          git push origin "$BRANCH"

          # Crear PR
          PR_BODY=$(cat <<'PREOF'
          ## Auto-reparaciones del Testing Agent

          El testing diario detectó problemas simples y los reparó automáticamente.

          ### Fixes aplicados
          PREOF
          )

          if [ -f tests/results/fixes-applied.json ]; then
            FIXES_TABLE=$(python3 -c "
          import json
          fixes = json.load(open('tests/results/fixes-applied.json'))
          print('| Archivo | Problema | Fix aplicado |')
          print('|---------|----------|-------------|')
          for f in fixes:
              print(f'| \`{f[\"file\"]}\` | {f[\"category\"]} | {f[\"explanation\"]} |')
          ")
            PR_BODY="$PR_BODY
          $FIXES_TABLE"
          fi

          PR_BODY="$PR_BODY

          ---
          > **Revisa los cambios y mergea cuando estés conforme.**
          > _Generado automáticamente por el Testing Agent_"

          PR_URL=$(gh pr create \
            --title "🔧 Auto-fix: reparaciones del testing diario ($DATE)" \
            --body "$PR_BODY" \
            --label "testing-agent" \
            --base main \
            --head "$BRANCH")

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "pr_created=true" >> $GITHUB_OUTPUT
          echo "PR creado: $PR_URL"

          # Volver al branch original para los siguientes steps
          git checkout main

      - name: "📊 Re-generar reporte con info de auto-fixes"
        if: steps.auto-fix.outputs.fixes != '0' && steps.auto-fix.outputs.fixes != ''
        run: |
          node tests/generate-report.js || true

      - name: "📧 Enviar reporte por email"
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: |
            ${{ steps.generate-report.outputs.status == 'healthy' && '✅' || steps.generate-report.outputs.status == 'warning' && '⚠️' || '🔴' }} Reporte Testing MJ — ${{ steps.generate-report.outputs.passed }}/${{ steps.generate-report.outputs.total }} tests OK
          to: mmicaela.jairedin@gmail.com
          from: "Testing Agent MJ <${{ secrets.GMAIL_USER }}>"
          html_body: file://tests/results/report.html
          attachments: tests/results/report.txt

      - name: "🏷️ Asegurar que existen los labels"
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "testing-agent" --description "Issues creados por el Testing Agent diario" --color "d73a4a" --force 2>/dev/null || true
          gh label create "bug" --description "Something isn't working" --color "d73a4a" --force 2>/dev/null || true

      - name: "🐛 Crear Issue para problemas complejos"
        if: steps.auto-fix.outputs.pending != '0' && steps.auto-fix.outputs.pending != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f tests/results/issue-title.txt ] && [ -f tests/results/issue-body.md ]; then
            TITLE=$(cat tests/results/issue-title.txt)
            BODY=$(cat tests/results/issue-body.md)

            # Verificar si ya existe un issue abierto del testing agent para evitar duplicados
            EXISTING=$(gh issue list --label "testing-agent" --state open --limit 1 --json number -q '.[0].number' 2>/dev/null || echo "")

            if [ -n "$EXISTING" ]; then
              # Actualizar el issue existente con un comentario
              gh issue comment "$EXISTING" --body "## Actualización — $(date +'%d/%m/%Y %H:%M')

            $BODY"
              echo "Comentario añadido al issue #$EXISTING"
            else
              # Crear issue nuevo
              gh issue create \
                --title "$TITLE" \
                --body "$BODY" \
                --label "testing-agent,bug"
              echo "Issue creado con éxito"
            fi
          else
            echo "No hay archivos de issue para crear"
          fi

      - name: "✅ Cerrar Issue si todos los tests pasan"
        if: steps.generate-report.outputs.failed == '0' && steps.generate-report.outputs.status != 'error'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Si hay un issue abierto del testing agent, cerrarlo
          EXISTING=$(gh issue list --label "testing-agent" --state open --limit 1 --json number -q '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "✅ **Todos los tests pasan.** Issue cerrado automáticamente por el Testing Agent.

            Resultado: ${{ steps.generate-report.outputs.passed }}/${{ steps.generate-report.outputs.total }} tests OK"
            echo "Issue #$EXISTING cerrado (todos los tests pasan)"
          else
            echo "No hay issues abiertos del testing agent"
          fi

      - name: "📤 Subir resultados como artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: |
            tests/results/
          retention-days: 30

      - name: "📝 Resumen en GitHub Actions"
        if: always()
        run: |
          if [ -f tests/results/report.txt ]; then
            echo "## 🧪 Reporte de Testing Diario" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Estado | ${{ steps.generate-report.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Total tests | ${{ steps.generate-report.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Pasaron | ${{ steps.generate-report.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Fallaron | ${{ steps.generate-report.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Ver reporte completo</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat tests/results/report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi
