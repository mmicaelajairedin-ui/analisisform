name: "🏓 Keepalive — Mantener crons activos"

# Corre cada lunes a las 6:00 AM UTC para mantener el repo activo
# y que GitHub no desactive los cron schedules
on:
  schedule:
    - cron: '0 6 * * 1'   # Lunes 6:00 UTC = 8:00 CEST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    name: "Ping de actividad"
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🏓 Keepalive commit"
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          committer_username: "Testing Agent MJ"
          committer_email: "testing-agent@micaelajairedin.com"
          commit_message: "chore: keepalive para mantener crons activos"
