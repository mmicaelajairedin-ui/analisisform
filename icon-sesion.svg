<!-- Icono bonus: triángulo Pathway con reloj/sesión adentro -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <polygon points="10,86 50,14 90,86" fill="#2D6A4F"/>
  <circle cx="50" cy="14" r="4" fill="#E9C46A"/>

  <!-- Reloj minimalista -->
  <circle cx="50" cy="65" r="14" fill="none" stroke="#FAFDF9" stroke-width="3"/>
  <!-- Manecillas (12 y 3) -->
  <line x1="50" y1="65" x2="50" y2="56" stroke="#FAFDF9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="65" x2="58" y2="65" stroke="#FAFDF9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Centro -->
  <circle cx="50" cy="65" r="1.5" fill="#FAFDF9"/>
</svg>
