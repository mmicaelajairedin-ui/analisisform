<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="robots" content="noindex">
<title>Análisis de LinkedIn · Pathway</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --pw-bosque:#2D6A4F;
  --pw-sendero:#52B788;
  --pw-amanecer:#E9C46A;
  --pw-carbon:#1B2E26;
  --pw-niebla:#FAFDF9;
  --pw-texto:#1B2E26;
  --pw-texto-suave:#5A5A55;
  --pw-borde:rgba(45,106,79,.12);
  --pw-serif:'Fraunces',Georgia,serif;
  --pw-sans:'Inter',-apple-system,sans-serif;
}
html{scroll-behavior:smooth;}
body{font-family:var(--pw-sans);color:var(--pw-texto);background:var(--pw-niebla);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;}
a{color:var(--pw-bosque);text-decoration:none;}

.nav{position:sticky;top:0;z-index:50;background:rgba(250,253,249,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--pw-borde);}
.nav-inner{max-width:780px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.nav-brand{font-family:var(--pw-serif);font-size:20px;color:var(--pw-carbon);letter-spacing:-.6px;font-weight:500;}
.nav-back{font-size:13px;color:var(--pw-texto-suave);}
.nav-back:hover{color:var(--pw-bosque);}

.container{max-width:780px;margin:0 auto;padding:36px 24px 80px;}
.hdr{text-align:center;margin-bottom:28px;}
.hdr h1{font-family:var(--pw-serif);font-size:clamp(28px,4vw,38px);font-weight:500;color:var(--pw-carbon);letter-spacing:-1px;line-height:1.15;margin-bottom:8px;}
.hdr p{color:var(--pw-texto-suave);font-size:14px;}

.empty{background:#fff;border:1.5px solid var(--pw-borde);border-radius:18px;padding:48px 32px;text-align:center;}
.empty h2{font-family:var(--pw-serif);font-size:22px;font-weight:500;color:var(--pw-carbon);margin-bottom:10px;}
.empty p{color:var(--pw-texto-suave);font-size:14px;margin-bottom:18px;}
.empty a{display:inline-block;padding:11px 22px;background:var(--pw-bosque);color:#fff;border-radius:10px;font-size:13px;font-weight:600;}

.section{background:#fff;border:1.5px solid var(--pw-borde);border-radius:14px;padding:22px 24px;margin-bottom:16px;}
.section-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap;}
.section-h h3{font-size:13px;font-weight:700;color:var(--pw-carbon);text-transform:uppercase;letter-spacing:1.2px;}
.btn-copy{padding:7px 14px;background:#0a66c2;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--pw-sans);transition:background .15s;white-space:nowrap;}
.btn-copy:hover{background:#084d92;}
.btn-copy.copied{background:#4a7c5f;}

.before-label{font-size:10.5px;color:#c0756e;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.before-box{font-size:13px;color:#999;text-decoration:line-through;line-height:1.55;background:#fdf3f2;padding:10px 12px;border-radius:6px;border-left:3px solid #c0756e;white-space:pre-wrap;margin-bottom:10px;}
.before-empty{margin-bottom:10px;font-size:11px;color:var(--pw-texto-suave);font-style:italic;}
.after-label{font-size:10.5px;color:#4a7c5f;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.after-box{font-size:13.5px;color:var(--pw-carbon);line-height:1.6;background:rgba(82,183,136,.06);padding:12px 14px;border-radius:6px;border-left:3px solid #4a7c5f;white-space:pre-wrap;}

.score{display:flex;align-items:center;gap:14px;padding:18px 20px;background:linear-gradient(135deg,rgba(45,106,79,.06),rgba(82,183,136,.04));border-radius:12px;border:1.5px solid var(--pw-borde);margin-bottom:18px;}
.score-num{font-family:var(--pw-serif);font-size:46px;font-weight:600;line-height:1;}
.score-num span{font-size:18px;color:var(--pw-texto-suave);font-weight:400;}
.score-txt{flex:1;}
.score-txt b{font-size:14px;font-weight:700;color:var(--pw-carbon);display:block;margin-bottom:3px;}
.score-txt span{font-size:12px;color:var(--pw-texto-suave);}

.mockup-wrap{background:#fff;border:1px solid #d0d6da;border-radius:8px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.05);max-width:580px;margin:0 auto 22px;}
.mockup-banner{height:80px;background:linear-gradient(135deg,#0a66c2,#0e76d1);}
.mockup-body{padding:0 18px 18px;}
.mockup-avatar{margin-top:-38px;width:76px;height:76px;border-radius:50%;border:4px solid #fff;overflow:hidden;background:#0a66c2;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:600;font-family:Arial,sans-serif;box-shadow:0 0 0 1px #d0d6da;}
.mockup-avatar img{width:100%;height:100%;object-fit:cover;}
.mockup-name{margin-top:10px;font-family:Arial,sans-serif;font-size:20px;font-weight:600;color:#000;line-height:1.2;}
.mockup-headline{margin-top:4px;font-family:Arial,sans-serif;font-size:14px;color:#000;line-height:1.4;}
.mockup-loc{margin-top:6px;font-family:Arial,sans-serif;font-size:12px;color:rgba(0,0,0,.6);}
.mockup-actions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;}
.mockup-btn{padding:6px 14px;border-radius:100px;font-family:Arial,sans-serif;font-size:13px;font-weight:600;cursor:default;}
.mockup-btn-pri{background:#0a66c2;color:#fff;border:none;}
.mockup-btn-sec{background:#fff;color:#0a66c2;border:1px solid #0a66c2;}
.mockup-sec{border-top:1px solid #ebebeb;padding:18px;}
.mockup-sec h4{font-family:Arial,sans-serif;font-size:18px;font-weight:600;color:#000;margin-bottom:10px;}
.mockup-text{font-family:Arial,sans-serif;font-size:14px;color:rgba(0,0,0,.85);line-height:1.55;white-space:pre-wrap;}
.mockup-skills{display:flex;gap:6px;flex-wrap:wrap;}
.mockup-skill{padding:4px 12px;background:#eef3f8;color:#000;border-radius:100px;font-family:Arial,sans-serif;font-size:13px;}

.list-h{font-size:12px;font-weight:700;color:var(--pw-carbon);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.list-ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:8px;}
.list-ul li{display:flex;gap:10px;font-size:13px;line-height:1.55;color:var(--pw-texto);}
.list-ul li span.bullet{color:var(--pw-bosque);flex-shrink:0;}

.skill-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;background:rgba(82,183,136,.06);border:1px solid rgba(82,183,136,.18);border-radius:8px;margin-bottom:6px;font-size:13.5px;color:var(--pw-carbon);}
.skill-item .btn-mini{padding:5px 10px;font-size:11px;background:#0a66c2;color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:var(--pw-sans);font-weight:600;flex-shrink:0;}
.skill-item .btn-mini.copied{background:#4a7c5f;}

.suggest-item{padding:12px 14px;background:rgba(45,106,79,.04);border:1px solid var(--pw-borde);border-radius:10px;margin-bottom:8px;}
.suggest-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.suggest-text{font-size:13px;line-height:1.6;color:var(--pw-texto);flex:1;}

.cta-bottom{text-align:center;margin-top:22px;}
.cta-bottom a{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;background:#0a66c2;color:#fff;border-radius:8px;font-size:13px;font-weight:600;}

@media(max-width:560px){
  .section{padding:18px;}
  .container{padding:24px 16px 60px;}
}
</style>
</head>
<body>

<nav class="nav"><div class="nav-inner">
  <a href="cv-express.html" class="nav-brand">Pathway</a>
  <a href="cv-express.html" class="nav-back">← Volver al Pack Express</a>
</div></nav>

<div class="container">
  <div class="hdr">
    <h1>Tu LinkedIn optimizado</h1>
    <p>Cada bloque tiene un botón para copiar — pegalos directo en tu perfil.</p>
  </div>

  <div id="empty-state" class="empty" style="display:none;">
    <h2>No encontramos tu análisis</h2>
    <p>Volvé al Pack Express y completá el formulario para generar tu análisis de LinkedIn.</p>
    <a href="cv-express.html">Ir al Pack Express →</a>
  </div>

  <div id="content"></div>
</div>

<script>
(function(){
  'use strict';
  var SB='https://lwktcasitqgrylvuqorr.supabase.co';
  var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3a3RjYXNpdHFncnlsdnVxb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM5NTQ4OTAsImV4cCI6MjA1OTUzMDg5MH0.IPMVhc2gqg4MQLaxw45VFGaFaR6N9KhXR5hsLgBFRSU';

  function escHtml(s){return String(s||'').replace(/[&<>"]/g,function(c){return c==='&'?'&amp;':c==='<'?'&lt;':c==='>'?'&gt;':'&quot;';});}

  function copyText(text, btn, originalLabel){
    if(!navigator.clipboard){
      var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();
      try{document.execCommand('copy');}catch(e){}
      document.body.removeChild(ta);
      flashCopied(btn, originalLabel);return;
    }
    navigator.clipboard.writeText(text).then(function(){flashCopied(btn, originalLabel);})
      .catch(function(){flashCopied(btn, originalLabel);});
  }
  function flashCopied(btn, original){
    if(!btn)return;
    btn.classList.add('copied');
    btn.textContent='✓ Copiado';
    setTimeout(function(){btn.classList.remove('copied');btn.textContent=original;},1800);
  }

  function bindCopyButtons(root){
    root.querySelectorAll('[data-copy]').forEach(function(btn){
      btn.addEventListener('click',function(e){
        e.preventDefault();
        var idx=btn.getAttribute('data-copy');
        var src=root.querySelector('[data-copy-src="'+idx+'"]');
        if(!src)return;
        copyText(src.getAttribute('data-text')||src.textContent||'', btn, btn.getAttribute('data-original')||btn.textContent);
      });
    });
  }

  function render(li, nombreUser, fotoUser, liUrl){
    var ini=(nombreUser||'').split(' ').filter(Boolean).slice(0,2).map(function(s){return s.charAt(0).toUpperCase();}).join('')||'?';
    var h='';

    // Score
    if(li.score_actual!==undefined){
      var col=li.score_actual>=80?'#4a7c5f':li.score_actual>=60?'#E9C46A':'#c0756e';
      h+='<div class="score">';
      h+='<div class="score-num" style="color:'+col+';">'+li.score_actual+'<span>/100</span></div>';
      h+='<div class="score-txt"><b>Score actual de tu LinkedIn</b>';
      h+='<span>Evaluado contra los criterios de un recruiter senior. Aplicando las sugerencias podés llegar a 90+.</span></div>';
      h+='</div>';
    }

    // Mockup
    h+='<div class="section"><div class="list-h">📱 Cómo se vería tu LinkedIn — propuesta</div>';
    h+='<div class="mockup-wrap">';
    h+='<div class="mockup-banner"></div>';
    h+='<div class="mockup-body">';
    h+='<div class="mockup-avatar">'+(fotoUser?'<img src="'+escHtml(fotoUser)+'">':escHtml(ini))+'</div>';
    h+='<div class="mockup-name">'+escHtml(nombreUser||'Tu nombre')+'</div>';
    if(li.titular_propuesto)h+='<div class="mockup-headline">'+escHtml(li.titular_propuesto)+'</div>';
    h+='<div class="mockup-loc">Spain · 500+ contactos</div>';
    h+='<div class="mockup-actions"><button class="mockup-btn mockup-btn-pri">Conectar</button><button class="mockup-btn mockup-btn-sec">Mensaje</button></div>';
    h+='</div>';
    if(li.acerca_de_propuesto){
      h+='<div class="mockup-sec"><h4>Acerca de</h4><div class="mockup-text">'+escHtml(li.acerca_de_propuesto)+'</div></div>';
    }
    if(li.habilidades_sugeridas&&li.habilidades_sugeridas.length){
      h+='<div class="mockup-sec"><h4>Aptitudes</h4><div class="mockup-skills">';
      li.habilidades_sugeridas.slice(0,8).forEach(function(s){h+='<span class="mockup-skill">'+escHtml(s)+'</span>';});
      h+='</div></div>';
    }
    h+='</div></div>';

    // ── Bloque copiable: Titular ──
    if(li.titular_propuesto){
      h+='<div class="section">';
      h+='<div class="section-h"><h3>1. Titular (Headline)</h3>';
      h+='<button class="btn-copy" data-copy="titular" data-original="📋 Copiar titular">📋 Copiar titular</button>';
      h+='</div>';
      if(li.titular_actual&&li.titular_actual.trim()){
        h+='<div class="before-label">Lo que tienes ahora</div>';
        h+='<div class="before-box">'+escHtml(li.titular_actual)+'</div>';
      } else {
        h+='<div class="before-empty">No detectamos titular previo.</div>';
      }
      h+='<div class="after-label">Pega esto en su lugar</div>';
      h+='<div class="after-box" data-copy-src="titular" data-text="'+escHtml(li.titular_propuesto)+'">'+escHtml(li.titular_propuesto)+'</div>';
      h+='</div>';
    }

    // ── Bloque copiable: Acerca de ──
    if(li.acerca_de_propuesto){
      h+='<div class="section">';
      h+='<div class="section-h"><h3>2. Acerca de (About)</h3>';
      h+='<button class="btn-copy" data-copy="acerca" data-original="📋 Copiar Acerca de">📋 Copiar Acerca de</button>';
      h+='</div>';
      if(li.acerca_de_actual&&li.acerca_de_actual.trim()){
        h+='<div class="before-label">Lo que tienes ahora</div>';
        h+='<div class="before-box">'+escHtml(li.acerca_de_actual)+'</div>';
      } else {
        h+='<div class="before-empty">No detectamos sección "Acerca de" previa.</div>';
      }
      h+='<div class="after-label">Pega esto en su lugar</div>';
      h+='<div class="after-box" data-copy-src="acerca" data-text="'+escHtml(li.acerca_de_propuesto)+'">'+escHtml(li.acerca_de_propuesto)+'</div>';
      h+='</div>';
    }

    // ── Habilidades sugeridas: copy individual + "copiar todas" ──
    if(li.habilidades_sugeridas&&li.habilidades_sugeridas.length){
      h+='<div class="section">';
      h+='<div class="section-h"><h3>3. Aptitudes sugeridas</h3>';
      h+='<button class="btn-copy" data-copy="habs-all" data-original="📋 Copiar todas">📋 Copiar todas</button>';
      h+='</div>';
      h+='<p style="font-size:12px;color:var(--pw-texto-suave);margin-bottom:10px;">Agregá estas en la sección "Aptitudes" de tu LinkedIn — una por una o copiá todas.</p>';
      var allH=li.habilidades_sugeridas.join('\n');
      h+='<div data-copy-src="habs-all" data-text="'+escHtml(allH)+'" style="display:none;"></div>';
      li.habilidades_sugeridas.forEach(function(hab,i){
        h+='<div class="skill-item"><span>'+escHtml(hab)+'</span>';
        h+='<button class="btn-mini" data-copy="hab-'+i+'" data-original="Copiar">Copiar</button>';
        h+='<span data-copy-src="hab-'+i+'" data-text="'+escHtml(hab)+'" style="display:none;"></span></div>';
      });
      h+='</div>';
    }

    // ── Sugerencias para experiencia ──
    if(li.experiencia_sugerencias&&li.experiencia_sugerencias.length){
      h+='<div class="section">';
      h+='<div class="section-h"><h3>4. Mejoras para tu experiencia</h3></div>';
      h+='<p style="font-size:12px;color:var(--pw-texto-suave);margin-bottom:12px;">Aplicá estas sugerencias en cada experiencia laboral de tu LinkedIn.</p>';
      li.experiencia_sugerencias.forEach(function(p,i){
        h+='<div class="suggest-item"><div class="suggest-row">';
        h+='<div class="suggest-text">'+escHtml(p)+'</div>';
        h+='<button class="btn-copy" data-copy="exp-'+i+'" data-original="📋 Copiar">📋 Copiar</button>';
        h+='</div>';
        h+='<span data-copy-src="exp-'+i+'" data-text="'+escHtml(p)+'" style="display:none;"></span>';
        h+='</div>';
      });
      h+='</div>';
    }

    // ── Notas: puntos fuertes / áreas mejora ──
    if(li.puntos_fuertes&&li.puntos_fuertes.length){
      h+='<div class="section" style="background:rgba(82,183,136,.05);">';
      h+='<div class="list-h">✅ Lo que ya hacés bien</div>';
      h+='<ul class="list-ul">';
      li.puntos_fuertes.forEach(function(p){h+='<li><span class="bullet">▸</span><span>'+escHtml(p)+'</span></li>';});
      h+='</ul></div>';
    }
    if(li.areas_mejora&&li.areas_mejora.length){
      h+='<div class="section" style="background:rgba(233,196,106,.08);">';
      h+='<div class="list-h">⚠️ Áreas para mejorar</div>';
      h+='<ul class="list-ul">';
      li.areas_mejora.forEach(function(p){h+='<li><span class="bullet">▸</span><span>'+escHtml(p)+'</span></li>';});
      h+='</ul></div>';
    }

    if(liUrl){
      h+='<div class="cta-bottom"><a href="'+escHtml(liUrl)+'" target="_blank" rel="noopener">Abrir mi LinkedIn para aplicar los cambios →</a></div>';
    }

    return h;
  }

  function show(li, nombre, foto, liUrl){
    if(!li){
      document.getElementById('empty-state').style.display='block';
      return;
    }
    var content=document.getElementById('content');
    content.innerHTML=render(li, nombre, foto, liUrl||'');
    bindCopyButtons(content);
  }

  function load(){
    var liRaw=null;
    try{liRaw=localStorage.getItem('mj_express_linkedin');}catch(e){}
    var nombre='';
    try{nombre=localStorage.getItem('mj_express_nombre')||'';}catch(e){}
    var foto='';
    try{foto=localStorage.getItem('mj_express_foto')||'';}catch(e){}
    var email='';
    try{email=localStorage.getItem('mj_express_email')||'';}catch(e){}
    var liUrl='';
    try{liUrl=localStorage.getItem('mj_express_li_url')||'';}catch(e){}

    if(liRaw){
      try{
        var li=JSON.parse(liRaw);
        show(li, nombre, foto, liUrl);
        return;
      }catch(e){console.warn('linkedin parse failed', e);}
    }

    if(!email){
      document.getElementById('empty-state').style.display='block';
      return;
    }

    // Fallback: cargar desde Supabase
    fetch(SB+'/rest/v1/cv_express?email=eq.'+encodeURIComponent(email.toLowerCase().trim())+'&select=*&limit=1',{
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
    }).then(function(r){return r.ok?r.json():null;})
      .then(function(rows){
        var row=rows&&rows[0];
        if(!row||!row.linkedin_analisis){
          document.getElementById('empty-state').style.display='block';
          return;
        }
        var nom=nombre||(row.nombre||'');
        var fot=foto||(row.foto||'');
        try{localStorage.setItem('mj_express_linkedin', JSON.stringify(row.linkedin_analisis));}catch(e){}
        show(row.linkedin_analisis, nom, fot, liUrl);
      }).catch(function(e){
        console.error('[linkedin-viewer] supabase load failed', e);
        document.getElementById('empty-state').style.display='block';
      });
  }

  load();
})();
</script>
</body>
</html>
