<!-- Variante C: Logo original dentro de círculo cálido + 3 personitas mini (badge listo para WhatsApp) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512">
  <defs>
    <radialGradient id="bgC" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FAFDF9"/>
      <stop offset="100%" stop-color="#E6F5EE"/>
    </radialGradient>
  </defs>

  <!-- Fondo circular suave -->
  <circle cx="100" cy="100" r="100" fill="url(#bgC)"/>

  <!-- Logo original Pathway escalado x1.4 y centrado arriba -->
  <g transform="translate(30, 32)">
    <polygon points="10,82 32,52 54,82" fill="#52B788"/>
    <polygon points="34,82 58,28 82,82" fill="#2D6A4F"/>
    <circle cx="58" cy="22" r="5" fill="#E9C46A"/>
  </g>

  <!-- 3 figuritas humanas en la base (la comunidad) -->
  <!-- Persona 1 -->
  <circle cx="60" cy="148" r="6" fill="#52B788"/>
  <path d="M 51 165 Q 51 155 60 155 Q 69 155 69 165 L 69 170 L 51 170 Z" fill="#52B788"/>
  <!-- Persona 2 (vos, central) -->
  <circle cx="100" cy="146" r="7" fill="#2D6A4F"/>
  <path d="M 90 165 Q 90 153 100 153 Q 110 153 110 165 L 110 172 L 90 172 Z" fill="#2D6A4F"/>
  <!-- Persona 3 -->
  <circle cx="140" cy="148" r="6" fill="#52B788"/>
  <path d="M 131 165 Q 131 155 140 155 Q 149 155 149 165 L 149 170 L 131 170 Z" fill="#52B788"/>
</svg>
