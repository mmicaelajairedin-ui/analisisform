<!-- LinkedIn cover banner para Micaela — 1584x396 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="beige" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE3D6"/>
      <stop offset="50%" stop-color="#E5D9C9"/>
      <stop offset="100%" stop-color="#DDCFBC"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FFF8EE" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFF8EE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#2A2A2A" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Fondo beige con textura -->
  <rect width="1584" height="396" fill="url(#beige)"/>
  <rect width="1584" height="396" fill="url(#dots)"/>
  <rect width="1584" height="396" fill="url(#glow)"/>

  <!-- Línea decorativa izquierda (Pathway green sutil) -->
  <line x1="0" y1="198" x2="60" y2="198" stroke="#2D6A4F" stroke-width="3"/>

  <!-- BLOQUE IZQUIERDO: triangulito Pathway sutil + monograma -->
  <g transform="translate(120, 150)" opacity="0.85">
    <polygon points="10,82 32,52 54,82" fill="#52B788"/>
    <polygon points="34,82 58,28 82,82" fill="#2D6A4F"/>
    <circle cx="58" cy="22" r="5" fill="#E9C46A"/>
  </g>

  <!-- Nombre y eyebrow centrado-derecha -->
  <text x="1480" y="78"
        font-family="'Inter', sans-serif"
        font-size="13"
        font-weight="600"
        fill="#5A5550"
        text-anchor="end"
        letter-spacing="3.5">CAREER COACH · TALENT ACQUISITION · MENTORÍA 1:1</text>
  <line x1="1280" y1="74" x2="1320" y2="74" stroke="#5A5550" stroke-width="1.5"/>

  <!-- Nombre principal (Fraunces serif grande) -->
  <text x="1480" y="180"
        font-family="'Fraunces', Georgia, serif"
        font-size="78"
        font-weight="600"
        fill="#1B1B1B"
        text-anchor="end"
        letter-spacing="-2">Micaela Jairedin</text>

  <!-- Tagline en dos partes (regular + bold semantic) -->
  <text x="1480" y="225"
        font-family="'Fraunces', Georgia, serif"
        font-size="22"
        font-weight="400"
        font-style="italic"
        fill="#3D3833"
        text-anchor="end">Desde el otro lado de la entrevista.</text>
  <text x="1480" y="258"
        font-family="'Inter', sans-serif"
        font-size="18"
        font-weight="500"
        fill="#1B1B1B"
        text-anchor="end">Mentoría 1:1 para que dejes de aplicar y empiecen a llamarte.</text>

  <!-- STATS BAR: 4 columnas con divisores -->
  <g transform="translate(1180, 305)">
    <!-- Stat 1 -->
    <text x="0" y="0" font-family="'Fraunces', serif" font-size="32" font-weight="600" fill="#1B1B1B">+8</text>
    <text x="0" y="22" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#5A5550" letter-spacing="2.5">AÑOS</text>
    <line x1="55" y1="-22" x2="55" y2="22" stroke="#A89B8C" stroke-width="0.8"/>

    <!-- Stat 2 -->
    <text x="80" y="0" font-family="'Fraunces', serif" font-size="32" font-weight="600" fill="#1B1B1B">+800</text>
    <text x="80" y="22" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#5A5550" letter-spacing="2.5">PROCESOS</text>
    <line x1="180" y1="-22" x2="180" y2="22" stroke="#A89B8C" stroke-width="0.8"/>

    <!-- Stat 3 -->
    <text x="205" y="0" font-family="'Fraunces', serif" font-size="32" font-weight="600" fill="#1B1B1B">Ex</text>
    <text x="205" y="22" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#5A5550" letter-spacing="2.5">AMAZON</text>
    <line x1="270" y1="-22" x2="270" y2="22" stroke="#A89B8C" stroke-width="0.8"/>

    <!-- Stat 4 -->
    <text x="295" y="0" font-family="'Fraunces', serif" font-size="32" font-weight="600" fill="#1B1B1B">ES / EN</text>
    <text x="295" y="22" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#5A5550" letter-spacing="2.5">BILINGÜE</text>
  </g>

  <!-- URL footer -->
  <text x="1480" y="370"
        font-family="'Inter', sans-serif"
        font-size="12"
        font-weight="500"
        fill="#5A5550"
        text-anchor="end"
        letter-spacing="0.8">→ micaelajairedin.com</text>
</svg>
